- id: suricata.sensor.monitoring-posture
  category: observability
  summary: 'Suricata passively captures traffic (--pcap, interface: any) across the three networks it is attached to and emits cross-network detections (fast.log ET/CINS/Spamhaus alerts); it has no listening service of its own.'
  evidence:
  - path: evidence/compose-service.suricata.json
  - path: evidence/suricata-state.txt
  - path: evidence/runtime-baseline.txt
  - path: evidence/participant-discovery.kali.txt
  - path: evidence/docker-network.aptl-dmz.json
  - path: evidence/docker-network.aptl-internal.json
  - path: evidence/docker-network.aptl-security.json
  aces:
    disposition: blocked_by_aces_gap
    checked_surfaces:
    - relationships
    - infrastructure
    - nodes
    why_not_current_surfaces: No relationship type means observes/monitors/taps; connects_to asserts an initiated connection a passive sensor never makes, and carrying the posture in properties smuggles a missing typed concept. Node attachment (infrastructure links + runtime.network.endpoints) records attachment, not monitoring; Node.roles is login-role only; runtime.network has no promiscuous/capture posture field. limitations.md already lists Scenario-native observability as a known gap.
    gap_issue:
      tracker: Brad-Edwards/aces
      number: 429
      url: https://github.com/Brad-Edwards/aces/issues/429
- id: suricata.ids.detection-engine
  category: service-surface
  summary: 'Suricata''s observable detection semantics: app-layer parsers (http/tls/dns/ssh/smtp/ftp/smb), rule sources (suricata.rules 65814, local.rules 46, misp/misp-iocs.rules 6), HOME_NET/EXTERNAL_NET zoning, and eve.json/fast.log alert streams.'
  evidence:
  - path: evidence/suricata-state.txt
  - path: evidence/filesystem-checksums.txt
  - path: evidence/filesystem-tree.txt
  aces:
    disposition: blocked_by_aces_gap
    checked_surfaces:
    - nodes
    - nodes.services
    why_not_current_surfaces: No typed IDS/NDR service family exists (mail/db/file/ssh/identity do). runtime.applications is strictly HTTP/WS route-shaped, so encoding a rule engine as URL routes is the prohibited force-fit. software_components records only that Suricata is present; filesystem_inventory records the config/rule files as bytes (encoded) but not typed detection semantics; Node.services/runtime.network cannot represent a passive sensor with a unix-socket control channel.
    gap_issue:
      tracker: Brad-Edwards/aces
      number: 430
      url: https://github.com/Brad-Edwards/aces/issues/430
