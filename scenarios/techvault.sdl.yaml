name: techvault
description: 'ACES-authored TechVault scenario inventory surface. This file is the incremental SCN-010 authoring target for
  the TechVault container inventory passes and does not replace the legacy scenario set until the cutover issue completes.

  '
forwarding_agents:
- forwarding_agent_id: aptl-db-wazuh-agent
  implementation: wazuh_agent
  agent_kind: log_forwarder
  name: aptl-db-agent
  description: 'Off-node Wazuh agent sidecar container (compose service wazuh-sidecar-db, image aptl-wazuh-sidecar:local,
    container aptl-wazuh-sidecar-db). It mounts the db node''s db_data volume read-only at /logs and forwards PostgreSQL logs
    from /logs/pg_log/postgresql.log (LOG_FORMAT=syslog) to the wazuh-manager. Registered as aptl-db-agent on
    nodes.wazuh-manager.runtime.security_monitoring_managers[0].agents (manager agent_control confirms agent id 005, status
    Active). The sidecar is an APTL ADR-020 carve-out (postgres:16-alpine has no first-party Wazuh package); as of SCN-010
    issue #343 its asset-level inventory (image, packages, CVEs, filesystem, identity, runtime) is captured under
    docs/aces/inventory/wazuh-sidecar-db/ and encoded as the participant node nodes.techvault.wazuh-sidecar-db. This
    scenario-level forwarding_agents entry (per Brad-Edwards/aces#460) carries the cross-node forwarding spec that the
    relationships.db-logs-forwarded-wazuh and relationships.wazuh-sidecar-db-forwards-wazuh-manager edges resolve to.'
  sources:
  - source_id: aptl-db-wazuh-agent-pg-log
    kind: tailed_path
    location: /logs/pg_log/postgresql.log
    parse_format: syslog
    description: 'Tails the db container''s PostgreSQL log from the read-only db_data mount (compose LOG_PATHS=/logs/pg_log/postgresql.log,
      LOG_FORMAT=syslog); rendered into /var/ossec/etc/ossec.conf as a localfile block (evidenced by wazuh-agent-state.txt).'
  buffer_policy:
    buffer_policy_id: aptl-db-wazuh-agent-buffer
    queue_capacity: 5000
    eps: 500
    crypto: aes
    reconnect_seconds: 60
    description: 'Captured from the rendered /var/ossec/etc/ossec.conf in the wazuh-sidecar-db inventory bundle: client_buffer
      queue_size 5000, events_per_second 500, crypto_method aes, time-reconnect 60s (notify_time 10s).'
  ship_targets:
  - target_id: aptl-db-wazuh-agent-events-1514
    target_node_ref: techvault.wazuh-manager
    ingestion_port: 1514
    protocol: tcp
    description: 'Compose `WAZUH_MANAGER=wazuh.manager` resolves to the wazuh-manager node; events ship to its agent_event_ingestion
      listener on TCP/1514 (already encoded as nodes.wazuh-manager.runtime.security_monitoring_managers[0].listeners agent-events-1514).

      '
- forwarding_agent_id: aptl-suricata-wazuh-agent
  implementation: wazuh_agent
  agent_kind: log_forwarder
  name: aptl-suricata-agent
  description: 'Off-node Wazuh agent sidecar container (compose service wazuh-sidecar-suricata, image aptl-wazuh-sidecar:local,
    container aptl-wazuh-sidecar-suricata). It mounts the suricata node''s suricata_logs volume read-only at /logs and forwards
    Suricata EVE JSON from /logs/eve.json (LOG_FORMAT=json) to the wazuh-manager. Registered as aptl-suricata-agent on
    nodes.wazuh-manager.runtime.security_monitoring_managers[0].agents (manager agent_control confirms agent id 006, status
    Active). The sidecar is an APTL ADR-020 carve-out (jasonish/suricata:7.0 has no first-party Wazuh package); as of SCN-010
    issue #344 its asset-level inventory (image, packages, CVEs, filesystem, identity, runtime) is captured under
    docs/aces/inventory/wazuh-sidecar-suricata/ and encoded as the participant node nodes.techvault.wazuh-sidecar-suricata.
    This scenario-level forwarding_agents entry (per Brad-Edwards/aces#460) carries the cross-node forwarding spec that the
    relationships.suricata-logs-forwarded-wazuh and relationships.wazuh-sidecar-suricata-forwards-wazuh-manager edges resolve
    to.'
  sources:
  - source_id: aptl-suricata-wazuh-agent-eve
    kind: tailed_path
    location: /logs/eve.json
    parse_format: eve_json
    description: 'Tails the Suricata EVE JSON alert stream from the read-only suricata_logs mount (compose LOG_PATHS=/logs/eve.json,
      LOG_FORMAT=json); rendered into /var/ossec/etc/ossec.conf as a localfile block with log_format json (evidenced by
      wazuh-agent-state.txt).'
  buffer_policy:
    buffer_policy_id: aptl-suricata-wazuh-agent-buffer
    queue_capacity: 5000
    eps: 500
    crypto: aes
    reconnect_seconds: 60
    description: 'Captured from the rendered /var/ossec/etc/ossec.conf in the wazuh-sidecar-suricata inventory bundle: client_buffer
      queue_size 5000, events_per_second 500, crypto_method aes, time-reconnect 60s (notify_time 10s).'
  ship_targets:
  - target_id: aptl-suricata-wazuh-agent-events-1514
    target_node_ref: techvault.wazuh-manager
    ingestion_port: 1514
    protocol: tcp
    description: 'Compose `WAZUH_MANAGER=wazuh.manager` resolves to the wazuh-manager node; events ship to its agent_event_ingestion
      listener on TCP/1514 (already encoded as nodes.wazuh-manager.runtime.security_monitoring_managers[0].listeners agent-events-1514).'
