fail_fast: true

# Pre-ADR-043 Suricata bind mounts could leave checked-in
# ``config/suricata/suricata.yaml`` and ``rules/local.rules`` owned by UID
# 991 (``systemd-network``), which blocks the EOF/trailing-whitespace hooks
# that open files for write. ADR-043 seeds from named volumes instead; the
# local ownership-restore hook (first repo below) repairs legacy checkouts
# before those hooks run. ``local.rules`` keeps a per-hook ``exclude:`` as
# a fallback when ownership repair cannot make the file writable first.
repos:
  - repo: local
    hooks:
      - id: suricata-config-source-ownership
        name: Restore Suricata checked-in config ownership (legacy pre-ADR-043)
        # ``aptl`` is not pip-installed in the CI pre-commit job (it only
        # installs pre-commit), so put the checked-in source tree on the
        # import path; an editable install via ``.venv`` already exposes it.
        entry: >-
          bash -c 'if [ -x .venv/bin/python ]; then PY=.venv/bin/python;
          elif command -v python3 >/dev/null; then PY=python3;
          else echo "python3 or .venv/bin/python required" >&2; exit 1; fi;
          export PYTHONPATH="src${PYTHONPATH:+:$PYTHONPATH}";
          exec "$PY" -c "from pathlib import Path; from aptl.core.suricata_seed import ensure_suricata_config_source_ownership; import sys; r=ensure_suricata_config_source_ownership(Path.cwd()); (r.error and print(r.error, file=sys.stderr)); sys.exit(0 if r.success else 1)"'
        language: system
        pass_filenames: false
        files: ^config/suricata/(suricata\.yaml|rules/local\.rules)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^config/suricata/rules/.*\.rules$
      - id: end-of-file-fixer
        exclude: ^config/suricata/rules/.*\.rules$
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
        # Scenario SDL inventories are authored evidence surfaces and can
        # exceed 500 KB without being accidental binary/blob additions.
        exclude: ^scenarios/.*\.sdl\.yaml$
      - id: check-merge-conflict
      - id: detect-private-key
        # `tests/` historically holds private-key-shaped fixtures.
        # `mcp/aptl-mcp-common/{src,tests}/redaction.{ts,test.ts}` and
        # `src/aptl/utils/redaction.py` (+ its test) intentionally embed
        # PEM block markers — they implement and verify masking of those
        # markers, not real key material.
        exclude: |
          (?x)^(
            tests/.*|
            mcp/aptl-mcp-common/src/redaction\.ts|
            mcp/aptl-mcp-common/tests/redaction\.test\.ts|
            src/aptl/utils/redaction\.py
          )$

  # Local hooks: a Python complexity gate, then the three test suites
  # (which mirror the CI test jobs in .github/workflows/checks.yml). Each
  # hook is gated by a `files:` regex so a commit that doesn't touch a
  # given surface skips that hook; `pre-commit run --all-files` (and CI)
  # still runs everything because every repo file matches at least one
  # regex collectively. The complexity hook runs first so a god-method
  # fails fast, before the slower test suites (fail_fast: true).
  - repo: local
    hooks:
      - id: ruff-complexity
        name: Python complexity gate (ruff C901)
        # Hard, repo-wide gate on per-function cyclomatic complexity —
        # config in pyproject [tool.ruff.lint.mccabe] (max-complexity).
        # Only C901 is enabled (see [tool.ruff.lint] select): this is a
        # complexity guard, not a style linter. `language: python` with
        # `additional_dependencies` so the hook is self-contained — it
        # installs its own ruff and does NOT need the project's .venv (the
        # CI pre-commit job only `pip install pre-commit`s, no project
        # deps). `pass_filenames: false`: always lints all of src/, not
        # just the changed files.
        entry: ruff
        args: [check, src/]
        language: python
        additional_dependencies: ["ruff>=0.15.0"]
        pass_filenames: false
        files: ^(src/.*\.py|pyproject\.toml)$

      - id: ts-complexity
        name: TypeScript complexity gate (ESLint complexity)
        # Hard, repo-wide gate on per-function cyclomatic complexity for the
        # TypeScript surfaces — the sibling of `ruff-complexity` above, and the
        # same cyclomatic metric. Config (threshold, target globs, legacy
        # exemptions) lives in the root `eslint.config.js`; ONLY the core
        # `complexity` rule is enabled there, so this is a complexity guard, not
        # a style linter. `language: node` with pinned `additional_dependencies`
        # so the hook is self-contained — it installs its own toolchain into
        # pre-commit's isolated node env and does NOT need any package's
        # node_modules (the CI "Pre-commit hooks" job only `pip install
        # pre-commit`s, no Node project deps). `--quiet` drops ESLint's
        # `noInlineConfig` meta-warnings — the gate's only rule is an error, so
        # nothing real is hidden. `pass_filenames: false`: always lints the full
        # configured globs (mcp/*/src + web/src), not just the changed files.
        # Runs before the slower vitest hooks so a god-method fails fast
        # (fail_fast: true). This hook is deliberately NOT in the CI `SKIP` list
        # (.github/workflows/checks.yml), so it gates in the required
        # "Pre-commit hooks" job exactly as it does locally.
        entry: eslint
        args: [--config, eslint.config.js, --quiet, mcp, web/src]
        language: node
        additional_dependencies:
          - "eslint@9.34.0"
          - "@typescript-eslint/parser@8.41.0"
          - "svelte-eslint-parser@1.8.0"
          - "svelte@5.54.0"
        pass_filenames: false
        files: ^(mcp/[^/]+/src/.*\.ts|web/src/.*\.(ts|svelte)|eslint\.config\.js)$

      - id: vale-prose-lint
        name: Vale prose lint (ADR-038)
        # Lints staged markdown against Google style + AptlProject house
        # rules. The exclude regex mirrors the lintable-corpus filter in
        # tools/vale-lint-all.sh (generated artifacts, agent-facing
        # contracts, dated point-in-time records) — keep the two in sync.
        entry: tools/vale-lint-hook.sh
        language: system
        # The hook installs Vale and syncs its style packages on first use.
        # Pre-commit otherwise shards file arguments across concurrent hook
        # processes, which race while replacing the same binary and styles.
        require_serial: true
        types_or: [markdown]
        exclude: ^(\.claude/|\.gc/|\.github/|changelog\.d/|CHANGELOG\.md|AGENTS\.md|CLAUDE\.md|node_modules/|\.tools/|\.vale/)

      - id: pytest
        name: Python tests (pytest)
        # Prefer the repo's .venv (so contributors don't need to activate it
        # before committing). Fall back to PATH for contributors using a
        # different venv layout that they've already activated. Scenario SDL
        # is included so an edit to it runs the fast ACES validation-gate
        # logic tests (the slow full-scenario gate is the manual
        # `aces-scenario-gate` hook below).
        # -n auto parallelizes across cores via pytest-xdist (no coverage here,
        # so xdist worker measurement is not a concern — that constraint only
        # applies to the CI `coverage run` job).
        entry: bash -c 'if [ -x .venv/bin/pytest ]; then exec .venv/bin/pytest tests/ -q -k "not integration" -n auto; else exec pytest tests/ -q -k "not integration" -n auto; fi'
        language: system
        pass_filenames: false
        files: ^(src/.*\.py|tests/.*\.py|pyproject\.toml|scenarios/.*\.ya?ml)$

      - id: aces-scenario-gate
        name: ACES scenario validation gate (manual; techvault-operational)
        # SCN-010E / #322. The static gate validates the authoritative
        # techvault-operational SDL and spawns the `aces conformance backend`
        # CLI, so it is a manual-stage hook rather than part of the per-commit
        # path. Run it before pushing a scenario/manifest change:
        #   pre-commit run aces-scenario-gate --hook-stage manual
        # The advisory CI job `aces-scenario-gate` runs the same tests on PRs.
        entry: bash -c 'if [ -x .venv/bin/pytest ]; then exec .venv/bin/pytest tests/test_techvault_static_gate.py -q -m integration; else exec pytest tests/test_techvault_static_gate.py -q -m integration; fi'
        language: system
        pass_filenames: false
        stages: [manual]
        files: ^(scenarios/.*\.ya?ml|src/aptl/validation/.*\.py|src/aptl/backends/aces.*\.py)$

      - id: vitest-mcp-common
        name: MCP TypeScript tests (aptl-mcp-common vitest)
        entry: bash -c 'cd mcp/aptl-mcp-common && { [ -d node_modules ] || npm install --silent; } && npx vitest run'
        language: system
        pass_filenames: false
        files: ^mcp/aptl-mcp-common/

      - id: vitest-mcp-red
        name: MCP TypeScript tests (mcp-red vitest)
        # mcp-red consumes aptl-mcp-common via a `file:` dependency. npm
        # copies the build artifact at install time, so any common change
        # must propagate to mcp-red's node_modules before vitest runs.
        # `npm install` (no package arg) re-resolves dependencies from
        # this package.json, which honours the local `file:` entry — using
        # `npm install <pkg>` would treat it as a registry package spec
        # and could mutate the manifest/lockfile.
        entry: bash -c 'cd mcp/aptl-mcp-common && { [ -d node_modules ] || npm install --silent; } && npm run build --silent && cd ../mcp-red && rm -rf node_modules/aptl-mcp-common && npm install --no-audit --no-fund --silent && npx vitest run'
        language: system
        pass_filenames: false
        files: ^mcp/(aptl-mcp-common|mcp-red)/

      - id: vitest-web
        name: Web frontend tests (vitest)
        entry: bash -c 'cd web && { [ -d node_modules ] || npm install --silent; } && npx svelte-kit sync && npx vitest run'
        language: system
        pass_filenames: false
        files: ^web/
