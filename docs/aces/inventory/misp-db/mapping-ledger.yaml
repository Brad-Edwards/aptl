    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.runtime.service-listeners
  category: runtime
  summary: 'ACES #431 listener fields encode wildcard MariaDB TCP, the MariaDB Unix socket, and Docker embedded DNS listeners.'
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-listening-ports.json
  - path: evidence/participant-discovery.misp.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.services
    - nodes.techvault.misp-db.runtime.service_listeners
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
    caveat: Docker embedded DNS listener ports are backend-generated and encoded as node-local runtime listeners, not MariaDB
      application services.
- id: misp-db.runtime.environment
  category: runtime
  summary: Runtime environment includes MariaDB image defaults, MISP database/user variables, runtime HOME/HOSTNAME/PWD, and
    redacted password values.
  evidence:
