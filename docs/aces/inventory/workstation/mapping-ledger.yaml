schema_version: 1
asset:
  id: workstation
  scenario: TechVault
  aptl_issue: 334
  aces_methodology_issue: 353
  source_class: custom-build
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: aptl-workstation@sha256:7843052c4410f05703c15e400d434ecfe7999de9da2078ad127839ea3ddee14f
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence: []
    limits:
      - >
        This first-party local image was captured from the local Docker daemon.
        No registry-visible OCI, in-toto, or SLSA attestation was available for
        the mutable local tag at capture time.
correspondence_checks:
  - id: workstation-node-source-correspondence
    status: planned
    source: nodes.workstation.source
    realized_evidence:
      - path: evidence/docker-inspect.image.json
      - path: evidence/docker-history.image.txt
      - path: evidence/docker-history.image.jsonl
      - path: evidence/source-checksums.txt
    ledger_fact_ids:
      - workstation.image.identity
      - workstation.build.recipe
    method: >
      Compare the ACES source name/version and source.build provenance in
      scenarios/techvault.sdl.yaml against the realized local image digest,
      Docker build history, and source-package checksums captured in this
      bundle.
    limit: >
      Planned because issue #334 records a frozen non-destructive steady-state
      asset spec and evidence, not a fresh live equivalence run.
  - id: workstation-runtime-correspondence
    status: planned
    source: nodes.workstation.runtime
    realized_evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
      - path: evidence/systemd-units.txt
      - path: evidence/filesystem-tree.txt
      - path: evidence/filesystem-checksums.txt
      - path: evidence/os-packages.txt
      - path: evidence/trivy-vulnerability-list.json
      - path: evidence/osquery-processes.json
      - path: evidence/osquery-listening-ports.json
    ledger_fact_ids:
      - workstation.runtime.mount-table
      - workstation.runtime.container-host-config
      - workstation.runtime.process-set
      - workstation.runtime.environment-policy
      - workstation.runtime.filesystem-inventory
      - workstation.runtime.local-identity
      - workstation.runtime.package-inventory
      - workstation.runtime.vulnerability-scan
      - workstation.runtime.service-manager-state
    method: >
      Re-run the encoded scenario from ACES SDL, recapture runtime evidence,
      and compare mount, container host/security, process, environment,
      filesystem, local identity, package, scanner, and service-manager
      surfaces against this ledger.
    limit: >
      Planned because this issue records the current steady-state ACES spec and
      evidence, not a fresh clean-lab realization proof.
notes:
  - >
    The capture used the already-running local lab and did not run
    `aptl lab stop -v && aptl lab start`; this is a non-destructive frozen
    observation of the realized workstation container.
  - >
    Raw credential fixture contents, generated flags, private-key material, and
    the operator private key at /keys/aptl_lab_key are intentionally absent from
    committed evidence. Path metadata and checksums are retained where the
    redaction boundary permits them.
  - >
    Brad-Edwards/aces#418 added the typed service-manager unit runtime surface
    consumed by this bundle. No known ACES expressivity blocker or
    needs_gap_triage disposition remains in this ledger.
facts:
  - id: workstation.image.identity
    category: provenance
    summary: >
      The asset uses first-party local image aptl-workstation:latest, captured
      as aptl-workstation@sha256:7843052c4410f05703c15e400d434ecfe7999de9da2078ad127839ea3ddee14f.
    evidence:
      - path: evidence/docker-inspect.image.json
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.workstation.source.name
        - nodes.workstation.source.version
      rationale: >
        ACES node source identifies the first-party artifact and immutable
        observed image digest used by later backend realization.

  - id: workstation.build.recipe
    category: provenance
    summary: >
      The image is a custom build from containers/workstation/Dockerfile on
      rockylinux:9 with copied inputs from containers/workstation/,
      containers/base/, and the public lab key material.
    evidence:
      - path: evidence/compose-service.workstation.json
      - path: evidence/docker-history.image.txt
      - path: evidence/docker-history.image.jsonl
      - path: evidence/docker-inspect.image.json
      - path: evidence/source-checksums.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.workstation.source.build.base_image
        - nodes.workstation.source.build.dockerfile_path
        - nodes.workstation.source.build.instructions
        - nodes.workstation.source.build.layers
        - nodes.workstation.source.build.build_args
        - nodes.workstation.source.build.copied_sources
        - nodes.workstation.source.build.config
        - nodes.workstation.source.build.source_inputs
        - nodes.workstation.source.build.attestation
      rationale: >
        ACES Source.build encodes the observed Dockerfile recipe, Docker
        history/layer chain, copied source mappings, checksum-addressed source
        inputs, image-default config, and absent-attestation fact directly.

  - id: workstation.os.version
    category: runtime-configuration
    summary: The realized runtime OS is Rocky Linux 9.7 (Blue Onyx).
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.image.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.workstation.os
        - nodes.workstation.os_version
      rationale: ACES nodes have explicit OS family and version fields.

  - id: workstation.network.identity
    category: network
    summary: >
      The container is attached to aptl_aptl-internal at 172.20.2.40 with
      aliases aptl-workstation and workstation and DNS name
      ws01.techvault.local.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/docker-network.aptl-internal.json
      - path: evidence/compose-service.workstation.json
    aces:
      disposition: encoded
      surface: infrastructure
      fields:
        - infrastructure.workstation.links
        - infrastructure.workstation.properties
        - nodes.workstation.runtime.network.endpoints
      rationale: >
        ACES infrastructure and runtime.network fields encode the authored
        network link, static IP, aliases, DNS names, endpoint IDs, MAC address,
        and Docker bridge/IPAM realization metadata.

  - id: workstation.ssh.service
    category: service-surface
    summary: >
      OpenSSH is exposed on TCP 22 inside the internal network, Docker reports
      the SSH listener healthcheck healthy, and sshd -T shows password and
      public-key authentication enabled with root login disabled.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.container.json
      - path: evidence/compose-service.workstation.json
      - path: evidence/osquery-listening-ports.json
    aces:
      disposition: encoded
      surface: nodes.services
      fields:
        - nodes.workstation.services
        - nodes.workstation.conditions
        - nodes.workstation.runtime.health
        - nodes.workstation.runtime.ssh_servers
        - conditions.workstation-ssh-ready
      rationale: >
        ACES node service bindings, conditions, health logs, and ssh_servers
        encode the observed SSH surface and authentication policy.

  - id: workstation.runtime.mount-table
    category: runtime-configuration
    summary: >
      The observed runtime mount table includes 30 mount targets, including the
      overlay root, proc/sys/tmpfs pseudo-filesystems, /run and /tmp tmpfs
      mounts, /sys/fs/cgroup bind mount, /keys bind mount, /var/log named
      volume, and anonymous /home volume.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.container.json
      - path: evidence/docker-volume.workstation-logs.json
      - path: evidence/docker-volume.workstation-home.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.workstation.runtime.mounts
      rationale: >
        ACES runtime.mounts carries observed mount type, source, target,
        options, read-only state, propagation, backend-generated status, and
        persistence/stability classification.

  - id: workstation.runtime.container-host-config
    category: runtime-configuration
    summary: >
      Docker HostConfig grants CAP_SYS_ADMIN, CAP_SYS_NICE, CAP_SYS_RESOURCE,
      unconfined seccomp, host cgroup namespace, 256 MiB memory, 512 MiB swap,
      tmpfs mounts at /run and /tmp, and unless-stopped restart policy.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.workstation.runtime.container
        - nodes.workstation.runtime.linux_capabilities
        - nodes.workstation.runtime.operational_policy
      rationale: >
        ACES runtime.container, runtime.linux_capabilities, and
        runtime.operational_policy encode Docker host/security, namespace,
        capability, restart, and resource-limit facts.

  - id: workstation.runtime.process-set
    category: runtime-configuration
    summary: >
      PID 1 runs /usr/sbin/init as root, with systemd-journald and sshd as the
      observed steady-state child services.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-top.txt
      - path: evidence/osquery-processes.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.workstation.runtime.processes
      rationale: >
        ACES PR #458 removed the singular runtime.process field. The PID 1
        systemd-init identity (role: primary, user: root, command:
        /usr/sbin/init) continues as processes[0]; the YAML anchor that
        previously shared the command list across the singular and plural
        encodings was inlined when the singular was retired. The
        supervised/steady-state process set observed by Docker, ps, and
        osquery (systemd-journald, sshd) continues under the same
        runtime.processes field.

  - id: workstation.runtime.environment-policy
    category: runtime-configuration
    summary: >
      The runtime environment includes SIEM_IP, LABADMIN_SSH_KEY_FILE, PATH,
      and install toggles for Wazuh, Falco, and XSIAM.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
      - path: evidence/compose-service.workstation.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.workstation.runtime.environment
        - nodes.workstation.source.build.config.default_environment
      rationale: >
        ACES runtime.environment and source.build.config.default_environment
        carry observed runtime env vars and image-default environment values
        with value classifications.

  - id: workstation.runtime.filesystem-inventory
    category: filesystem-inventory
    summary: >
      The committed runtime filesystem inventory includes 191 catalogued paths
      and 132 checksum-backed files across /home, /root, /keys, /etc, /opt,
      /var/ossec, and /var/log, with sensitive paths tagged by redaction
      boundary.
    evidence:
      - path: evidence/filesystem-tree.txt
      - path: evidence/filesystem-checksums.txt
      - path: evidence/filesystem-sensitive-paths.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.workstation.runtime.filesystem_inventory
        - content.workstation-*
      caveat: >
        The encoded inventory covers the captured authored/custom and
        scenario-relevant runtime paths, not byte-identical enumeration of
        every Rocky Linux base-image root filesystem path.
      rationale: >
        ACES runtime.filesystem_inventory and content entries encode path,
        entry type, permissions, owner/group, size, stability, sensitivity, and
        SHA-256 digest fields for the catalogued scope.

  - id: workstation.runtime.local-identity
    category: identity
    summary: >
      The observed /etc/passwd and /etc/group snapshot contains 20 local users,
      39 local groups, and NOPASSWD sudo rules for dev-user and labadmin.
    evidence:
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: accounts
      fields:
        - nodes.workstation.runtime.local_identity
        - accounts.workstation-local-*
      rationale: >
        ACES local identity and account surfaces encode users, UID/GID values,
        primary groups, GECOS/home/shell fields, group membership, and sudo
        rule inventory.

  - id: workstation.runtime.package-inventory
    category: runtime-inventory
    summary: >
      The observed RPM inventory contains 261 packages, plus repository and
      language/tool manifests for Rocky, Wazuh, Falco, Git, PostgreSQL client,
      and Python runtime facts.
    evidence:
      - path: evidence/os-packages.txt
      - path: evidence/rpm-repositories.txt
      - path: evidence/language-manifests.txt
      - path: evidence/syft-sbom.cyclonedx.json.gz
      - path: evidence/trivy-sbom.cyclonedx.json.gz
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.workstation.runtime.packages
        - nodes.workstation.runtime.dependency_manifests
      caveat: >
        RPM repository file contents and scanner SBOM component records are
        retained as evidence; current ACES package fields encode package
        identity and manifest references rather than a first-class RPM
        repository policy model.
      rationale: >
        ACES runtime.packages and dependency_manifests encode package manager,
        package name, installed version, architecture, and observed tool
        manifests.

  - id: workstation.runtime.vulnerability-scan
    category: patch-state
    summary: >
      Trivy 0.70.0 reported 42 package vulnerability findings at scan time:
      2 critical, 22 high, 17 medium, and 1 low.
    evidence:
      - path: evidence/trivy-version.txt
      - path: evidence/trivy-vulnerability-list.json
      - path: evidence/trivy-vulnerability-counts.json
      - path: evidence/trivy-sbom.cyclonedx.json.gz
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.workstation.runtime.package_vulnerabilities
      caveat: >
        Vulnerability records are time-sensitive to the Trivy database and
        advisory feeds available at capture time.
      rationale: >
        ACES runtime.package_vulnerabilities encodes scanner-derived package
        finding IDs, affected packages, installed/fixed versions, severities,
        advisory URLs, scanner identity, image digest, and scan time.

  - id: workstation.runtime.osquery-baseline
    category: runtime-inventory
    summary: >
      osquery captured workstation process/listener rows from container
      namespaces and Docker container/image rows through the host Docker
      socket, while apt_sources was not applicable and installed_applications
      and programs were unavailable in the Linux osquery registry.
    evidence:
      - path: evidence/osquery-version.txt
      - path: evidence/osquery-processes.json
      - path: evidence/osquery-listening-ports.json
      - path: evidence/osquery-docker-containers.json
      - path: evidence/osquery-docker-images.json
      - path: evidence/osquery-apt-sources.json
      - path: evidence/osquery-installed-applications.json
      - path: evidence/osquery-programs.json
      - path: evidence/capture-limits.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.workstation.runtime.processes
        - nodes.workstation.runtime.ssh_servers
        - nodes.workstation.runtime.network
        - nodes.workstation.runtime.container
      caveat: >
        osquery unavailable/not-applicable table attempts are retained as
        evidence and capture limits; they do not imply empty package,
        application, or repository inventories.
      rationale: >
        The successful osquery observations cross-check runtime processes,
        listeners, Docker container metadata, Docker image identity, and network
        surfaces already encoded in ACES runtime fields.

  - id: workstation.provisioning.first-boot
    category: provisioning
    summary: >
      The image config enables lab-install.service for first boot and includes
      Wazuh/Falco install scripts; the realized service failed while enabling
      Wazuh because systemd-sysv-install was absent.
    evidence:
      - path: evidence/docker-history.image.txt
      - path: evidence/source-checksums.txt
      - path: evidence/runtime-baseline.txt
      - path: evidence/systemd-units.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.workstation.source.build.instructions
        - nodes.workstation.source.build.source_inputs
        - nodes.workstation.runtime.filesystem_inventory
        - nodes.workstation.runtime.service_manager_units
      caveat: >
        Build-time provisioning recipe and filesystem placement are encoded;
        realized service-manager unit outcome is encoded as observed runtime
        state rather than as provisioning intent.
      rationale: >
        ACES source.build and runtime.filesystem_inventory encode the authored
        install scripts, unit file, image enablement commands, and realized
        script/config file placement; runtime.service_manager_units encodes the
        first-boot unit result.

  - id: workstation.credential-fixtures
    category: scenario-weakness
    summary: >
      Workstation participant-visible artifacts include credential fixtures,
      passwordless SSH key material, database/webapp/AD references, generated
      flags, and NOPASSWD sudo grants; raw values are absent from committed
      evidence.
    evidence:
      - path: evidence/filesystem-sensitive-paths.txt
      - path: evidence/filesystem-tree.txt
      - path: evidence/filesystem-checksums.txt
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: vulnerabilities
      fields:
        - vulnerabilities.workstation-bash-history-credential-disclosure
        - vulnerabilities.workstation-pgpass-credential-disclosure
        - vulnerabilities.workstation-hardcoded-app-secrets
        - vulnerabilities.workstation-passwordless-private-key
        - vulnerabilities.workstation-nopasswd-sudo
        - nodes.workstation.vulnerabilities
        - content.workstation-credential-fixtures
      rationale: >
        ACES vulnerabilities and content encode the scenario weakness IDs,
        CWE classes, sensitive fixture dataset, and checksum/metadata-only
        redaction boundary without committing raw secret values.

  - id: workstation.relationships
    category: topology
    summary: >
      Workstation runtime and credential fixtures reference the Wazuh manager,
      TechVault database, webapp, and AD assets.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/filesystem-sensitive-paths.txt
      - path: evidence/compose-service.workstation.json
    aces:
      disposition: encoded
      surface: relationships
      fields:
        - relationships.workstation-configures-wazuh
        - relationships.workstation-credentials-reference-db
        - relationships.workstation-credentials-reference-webapp
        - relationships.workstation-credentials-reference-ad
      rationale: >
        ACES relationships encode topology and credential-reference edges from
        the workstation node and credential fixture dataset to related assets.

  - id: workstation.runtime.service-manager-state
    category: runtime-configuration
    summary: >
      The observed systemd unit state includes sshd active/running,
      systemd-journald active/running, lab-install failed, rsyslog failed,
      tmpfiles services failed, Wazuh inactive, and Falco unit files disabled.
    evidence:
      - path: evidence/systemd-units.txt
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-top.txt
      - path: evidence/osquery-processes.json
      - path: evidence/filesystem-tree.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.workstation.runtime.service_manager_units
      rationale: >
        Brad-Edwards/aces#418 added Node.runtime.service_manager_units, so the
        captured unit-file enable states, load/active/sub/result states, exit
        codes, bounded status text, main PIDs, unit-file path evidence, and
        same-node SSH service reference are encoded directly without forcing
        unit lifecycle facts into services, conditions, content, features, or
        process inventory.

  - id: workstation.capture.toolchain-baseline
    category: evidence-quality
    summary: >
      The capture records Docker, Docker Compose, Trivy, Syft, osquery, capture
      limits, evidence integrity checksums, and Syft CycloneDX normalization.
    evidence:
      - path: evidence/captured-at-utc.txt
      - path: evidence/capture-limits.txt
      - path: evidence/docker-version.json
      - path: evidence/docker-compose-version.json
      - path: evidence/trivy-version.txt
      - path: evidence/syft-version.json
      - path: evidence/osquery-version.txt
      - path: evidence/evidence-sha256sums.txt
      - path: normalize-syft-cyclonedx.jq
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.workstation.source.build.attestation
        - nodes.workstation.runtime.package_vulnerabilities
        - nodes.workstation.runtime.packages
      caveat: >
        Capture toolchain and evidence-integrity metadata are preserved in the
        inventory bundle and ledger; ACES SDL carries the relevant derived asset
        facts, not a first-class evidence-bundle manifest.
      rationale: >
        The SDL encodes derived build, package, and vulnerability facts while
        the ledger and evidence-sha256sums.txt preserve the audit surface for
        capture reproducibility.
