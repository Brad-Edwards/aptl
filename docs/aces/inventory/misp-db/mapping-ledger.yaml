    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.environment
    - features.techvault-misp-db-service.environment
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.runtime.local-identity
  category: identity
  summary: Local passwd/group inventory records 20 users, 40 groups, and no sudo rules for the container.
  evidence:
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.local_identity
    - accounts.misp-db-local-root
    - accounts.misp-db-local-mysql
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.application.software-versions
  category: runtime
  summary: MariaDB server/client versions, entrypoint file, and config manifests are captured and encoded.
  evidence:
  - path: evidence/language-manifests.txt
  - path: evidence/runtime-baseline.txt
  - path: evidence/os-packages.txt
  aces:
