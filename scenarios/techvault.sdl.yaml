  victim:
    type: VM
    description: 'TechVault generic victim container (SCN-010 issue #337 steady-state ACES inventory).'
    os: linux
    os_version: Rocky Linux 9.7 (Blue Onyx)
    source:
      name: aptl-victim
      version: aptl-victim@sha256:6ff54c44fdc14d319c7df44e76db5363a440eddb3ee27dae638619daee22f310
      build:
        description: Observed local Docker build provenance for the TechVault victim image. The mutable rockylinux:9 base tag
          is paired with the observed local image digest; no registry-visible attestation was available in this capture.
        base_image: rockylinux:9
        base_image_digest: ''
        dockerfile_path: containers/victim/Dockerfile
        instructions:
        - instruction: from
          arguments:
          - rockylinux:9 AS base
        - instruction: arg
          arguments:
          - INSTALL_WAZUH=true
        - instruction: arg
          arguments:
          - INSTALL_FALCO=true
        - instruction: arg
          arguments:
          - INSTALL_XSIAM=false
        - instruction: env
          arguments:
          - INSTALL_WAZUH=true
        - instruction: env
          arguments:
          - INSTALL_FALCO=true
        - instruction: env
          arguments:
          - INSTALL_XSIAM=false
        - instruction: run
          arguments:
          - dnf install -y epel-release && dnf update -y && dnf install -y rsyslog openssh-server sudo systemd systemd-sysv
            iproute iproute-tc hostname procps-ng openssh-clients net-tools gnupg && dnf clean all
        - instruction: run
          arguments:
          - (cd /lib/systemd/system/sysinit.target.wants/; for i in *; do [ $i == systemd-tmpfiles-setup.service ] || rm -f
            $i; done); rm -f /lib/systemd/system/multi-user.target.wants/*; rm -f /etc/systemd/system/*.wants/*; rm -f /lib/systemd/system/local-fs.target.wants/*;
            rm -f /lib/systemd/system/sockets.target.wants/*udev*; rm -f /lib/systemd/system/sockets.target.wants/*initctl*;
            rm -f /lib/systemd/system/basic.target.wants/*; rm -f /lib/systemd/system/anaconda.target.wants/*;
        - instruction: run
          arguments:
          - systemctl set-default multi-user.target
        - instruction: run
          arguments:
          - mkdir -p /etc/systemd/system/rsyslog.service.d && printf '[Service]\nRestrictNamespaces=false\nRestrictAddressFamilies=\nProtectKernelTunables=no\nProtectKernelModules=no\nProtectControlGroups=no\nProtectHome=no\nMemoryDenyWriteExecute=no\nNoNewPrivileges=no\nLockPersonality=no\nRestrictSUIDSGID=no\nSystemCallFilter=\nSystemCallArchitectures=\n'
            > /etc/systemd/system/rsyslog.service.d/docker-override.conf
        - instruction: run
          arguments:
          - systemctl enable rsyslog sshd systemd-user-sessions && systemctl enable systemd-user-sessions.service && ln -sf
            /usr/lib/systemd/system/systemd-user-sessions.service /etc/systemd/system/multi-user.target.wants/
        - instruction: run
          arguments:
          - mkdir /var/run/sshd && ssh-keygen -A && sed -i 's/#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config &&
            sed -i 's/#PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config && sed -i 's/#PubkeyAuthentication.*/PubkeyAuthentication
            yes/' /etc/ssh/sshd_config
        - instruction: run
          arguments:
          - useradd -m -s /bin/bash labadmin && usermod -aG wheel labadmin && echo "labadmin ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/labadmin
            && chmod 440 /etc/sudoers.d/labadmin
        - instruction: run
          arguments:
          - mkdir -p /home/labadmin/.ssh && chmod 700 /home/labadmin/.ssh && chown -R labadmin:labadmin /home/labadmin/.ssh
        - instruction: run
          arguments:
          - mkdir -p /opt/purple-team/scripts /etc/rsyslog.d
        - instruction: copy
          arguments:
          - base/scripts/entrypoint-base.sh /opt/purple-team/scripts/
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/entrypoint-base.sh
        - instruction: copy
          arguments:
          - base/scripts/ossec.conf.template /opt/purple-team/scripts/
        - instruction: run
          arguments:
          - mkdir -p /etc/falco/config.d
        - instruction: copy
          arguments:
          - base/falco_custom.yaml /etc/falco/config.d/
        - instruction: run
          arguments:
          - rpm --import https://packages.wazuh.com/key/GPG-KEY-WAZUH && printf '[wazuh]\ngpgcheck=1\ngpgkey=https://packages.wazuh.com/key/GPG-KEY-WAZUH\nenabled=1\nname=EL-$releasever
            - Wazuh\nbaseurl=https://packages.wazuh.com/4.x/yum/\npriority=1\n' > /etc/yum.repos.d/wazuh.repo && dnf install
            -y wazuh-agent-4.12.0 && dnf clean all && killall wazuh-execd wazuh-agentd wazuh-syscheckd wazuh-logcollector wazuh-modulesd
            2>/dev/null || true && rm -f /var/ossec/var/run/*.pid
        - instruction: run
          arguments:
          - rpm --import https://falco.org/repo/falcosecurity-packages.asc && printf '[falco]\nname=Falco repository\nbaseurl=https://download.falco.org/packages/rpm\ngpgcheck=1\ngpgkey=https://falco.org/repo/falcosecurity-packages.asc\nenabled=1\n'
            > /etc/yum.repos.d/falco.repo && dnf install -y falco && dnf clean all
        - instruction: copy
          arguments:
          - victim/entrypoint.sh /usr/local/bin/
        - instruction: run
          arguments:
          - chmod +x /usr/local/bin/entrypoint.sh
        - instruction: copy
          arguments:
          - victim/install-wazuh.sh /opt/purple-team/scripts/
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/install-wazuh.sh
        - instruction: copy
          arguments:
          - victim/install-falco.sh /opt/purple-team/scripts/
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/install-falco.sh
        - instruction: copy
          arguments:
          - victim/install-all.sh /opt/purple-team/scripts/
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/install-all.sh
        - instruction: copy
          arguments:
          - victim/lab-install.service /etc/systemd/system/
        - instruction: run
          arguments:
          - systemctl enable lab-install.service
        - instruction: expose
          arguments:
          - 22 514
        - instruction: volume
          arguments:
          - '["/var/log", "/home"]'
        - instruction: entrypoint
          arguments:
          - '["/usr/local/bin/entrypoint.sh"]'
        - instruction: cmd
          arguments:
          - '["/usr/sbin/init"]'
        layers:
        - created_by: CMD ["/usr/sbin/init"]
          size: 0
          empty: true
        - created_by: ENTRYPOINT ["/usr/local/bin/entrypoint.sh"]
          size: 0
          empty: true
        - created_by: VOLUME [/var/log /home]
          size: 0
          empty: true
        - created_by: EXPOSE [22/tcp 514/tcp]
          size: 0
          empty: true
        - created_by: 'RUN |3 INSTALL_WAZUH=true INSTALL_FALCO=true INSTALL_XSIAM=false /bin/sh -c systemctl enable lab-install.service
