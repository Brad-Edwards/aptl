      applications:
      - application_id: techvault-portal
        service: http
        protocol: http
        name: TechVault Solutions Customer Portal
        base_path: /
        framework: Flask 3.1.0
        description: Participant-observable Flask route, API, and UI surface implemented by /app/app.py and rendered templates/static assets.
        routes:
        - route_id: webapp-root
          path: /
          methods: [GET, HEAD, OPTIONS]
          name: Login entrypoint
          description: Root entrypoint renders the login UI for anonymous sessions and redirects authenticated sessions to the dashboard.
          auth_required: false
          session_required: false
          parameters:
          - name: session
            location: cookie
            required: false
            data_type: Flask session cookie
            description: Optional session cookie changes the response from login page to dashboard redirect.
          responses:
          - status_code: 200
            content_type: text/html
            description: Login page for anonymous sessions.
          redirects:
          - target: /dashboard
            status_code: 302
            condition: user_id present in Flask session
            description: Authenticated sessions are redirected to the dashboard.
          templates:
          - /app/templates/login.html
          - /app/templates/base.html
          static_assets:
          - /app/static/style.css
        - route_id: webapp-login
          path: /login
          methods: [GET, HEAD, OPTIONS, POST]
          name: Login form
          description: Login endpoint renders the login form, accepts username/password form fields, and interpolates the username into a SQL query.
          auth_required: false
          session_required: false
          parameters:
          - name: username
            location: form
            required: true
            data_type: string
            description: Login username used directly in the SQL WHERE clause on POST.
          - name: password
            location: form
            required: true
            data_type: string
            description: Password is MD5 hashed before comparison.
          responses:
          - status_code: 200
            content_type: text/html
            description: Login form on GET.
          - status_code: 401
            content_type: text/html
            description: Invalid credentials re-render the login form.
          - status_code: 500
            content_type: application/json
            description: SQL exceptions are returned as JSON errors.
          redirects:
          - target: /dashboard
            status_code: 302
            condition: successful login
            description: Successful credentials create a session and redirect to the dashboard.
          disclosures:
          - trigger: SQL exception during login query execution
            status_code: 500
            disclosure: Raw database exception string in JSON error field.
            sensitivity: unknown
            description: Verbose login error path exposes backend exception details.
          templates:
          - /app/templates/login.html
          - /app/templates/base.html
          static_assets:
          - /app/static/style.css
          vulnerability_refs:
          - webapp-sqli-login
          - webapp-verbose-error-disclosure
        - route_id: webapp-logout
          path: /logout
          methods: [GET, HEAD, OPTIONS]
          name: Logout
          description: Clears the Flask session and redirects to the root entrypoint.
          auth_required: false
          session_required: false
          parameters:
          - name: session
            location: cookie
