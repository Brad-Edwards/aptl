schema_version: 1
asset:
  id: db
  scenario: TechVault
  aptl_issue: 331
  aces_methodology_issue: 353
  source_class: upstream-image
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: postgres@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence: []
    limits:
    - No registry-visible OCI, in-toto, or SLSA attestation was captured for postgres:16-alpine in this local evidence pass.
correspondence_checks:
- id: db-node-source-correspondence
  status: planned
  source: nodes.techvault.db.source
  realized_evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/docker-history.image.jsonl
  - path: evidence/source-checksums.txt
  ledger_fact_ids:
  - db.image.identity
  - db.build.recipe
  method: Compare the ACES source name/version and source inputs against the captured image digest, history, and init-script checksums.
  limit: Planned because this issue records frozen inventory evidence, not a fresh live equivalence run.
- id: db-runtime-correspondence
  status: planned
  source: nodes.techvault.db.runtime
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/filesystem-tree.txt
  - path: evidence/filesystem-checksums.txt
  ledger_fact_ids:
  - db.runtime.mount-table
  - db.runtime.filesystem-inventory
  - db.runtime.primary-process
  - db.runtime.environment-policy
  - db.runtime.container-host-config
  - db.runtime.local-identity-database
  - db.postgres.logical-state
  method: Re-run the encoded scenario from ACES SDL, recapture runtime evidence, and compare runtime/container/database surfaces against this ledger.
  limit: Planned because this branch records the frozen steady-state ACES spec and evidence.
notes:
- Current ACES runtime fields cover the catalogued DB steady-state inventory facts without a known expressivity blocker.
- Brad-Edwards/aces#388 added first-class database logical-state fields consumed by this inventory.
- The PostgreSQL data-volume and init-script filesystem inventory is encoded; full Alpine root filesystem enumeration outside those surfaces is a capture boundary, not an ACES schema gap.
- The resolved POSTGRES_PASSWORD value is redacted in evidence and represented in SDL as a scenario fixture secret classification.
facts:
- id: db.image.identity
  category: provenance
  summary: The asset uses upstream image postgres:16-alpine, captured as postgres@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50.
  evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded
    surface: nodes
    fields:
    - nodes.techvault.db.source.name
    - nodes.techvault.db.source.version
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.build.recipe
  category: provenance
  summary: The image build recipe is upstream docker-library/postgres history; APTL contributes init SQL through a Compose bind mount rather than an in-tree Dockerfile.
  evidence:
  - path: evidence/docker-history.image.txt
  - path: evidence/docker-history.image.jsonl
  - path: evidence/source-checksums.txt
  aces:
    disposition: encoded
    surface: nodes
    fields:
    - nodes.techvault.db.source.build.instructions
    - nodes.techvault.db.source.build.layers
    - nodes.techvault.db.source.build.source_inputs
    - nodes.techvault.db.source.build.config
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.os.version
  category: runtime-configuration
  summary: The realized runtime OS is Alpine Linux v3.23 with PostgreSQL 16.13.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/language-manifests.txt
  aces:
    disposition: encoded
    surface: nodes
    fields:
    - nodes.techvault.db.os
    - nodes.techvault.db.os_version
    - nodes.techvault.db.runtime.database_services.version
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.network.identity
  category: network
  summary: The service is attached to aptl_aptl-internal at 172.20.2.11 with aliases aptl-db and db.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/docker-network.aptl-internal.json
  aces:
    disposition: encoded
    surface: infrastructure
    fields:
    - infrastructure.db.links
    - infrastructure.db.properties
    - nodes.techvault.db.runtime.network.endpoints
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.postgres.service
  category: service-surface
  summary: PostgreSQL listens on TCP 5432 and exposes the TechVault database.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/compose-service.db.json
  aces:
    disposition: encoded
    surface: nodes.services
    fields:
    - nodes.techvault.db.services
    - nodes.techvault.db.runtime.database_services
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.healthcheck
  category: runtime-configuration
  summary: Compose declares pg_isready healthcheck timing and Docker reports healthy observations.
  evidence:
  - path: evidence/compose-service.db.json
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded
    surface: conditions
    fields:
    - conditions.db-postgres-ready
    - nodes.techvault.db.conditions
    - nodes.techvault.db.runtime.health
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.runtime.mount-table
  category: runtime-configuration
  summary: The runtime mount table includes overlay root, pseudo-filesystems, Docker-managed files, the init bind mount, and the db_data volume.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-inspect.container.json
  - path: evidence/docker-volume.db-data.json
  aces:
    disposition: encoded
    surface: nodes
    fields:
    - nodes.techvault.db.runtime.mounts
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.runtime.filesystem-inventory
  category: filesystem-inventory
  summary: The catalogued filesystem inventory includes every captured path under /docker-entrypoint-initdb.d and /var/lib/postgresql/data with metadata and checksums for files.
  evidence:
  - path: evidence/filesystem-tree.txt
  - path: evidence/filesystem-checksums.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    fields:
    - nodes.techvault.db.runtime.filesystem_inventory
    - content.db-init-schema-sql
    - content.db-init-seed-data-sql
    - content.db-postgresql-conf
    - content.db-pg-hba-conf
    - content.db-postgresql-log
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
    caveat: The encoded inventory covers the captured PostgreSQL data volume and init-script bind mount, not byte-identical enumeration of every Alpine base-image root filesystem path.
- id: db.runtime.primary-process
  category: runtime-configuration
  summary: PID 1 runs PostgreSQL as the postgres user with the Compose logging flags.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-top.txt
  aces:
    disposition: encoded
    surface: nodes
    fields:
    - nodes.techvault.db.runtime.processes
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.runtime.environment-policy
  category: runtime-configuration
  summary: Runtime environment variables include Compose fixture DB/user/password inputs plus upstream image defaults, with secret value redacted in evidence.
  evidence:
  - path: evidence/compose-service.db.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    fields:
    - nodes.techvault.db.runtime.environment
    - features.techvault-postgres-service.environment
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.runtime.capability-restart-policy
  category: runtime-configuration
  summary: The container has no added Linux capabilities, restart policy unless-stopped, and a 256 MiB memory limit.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    fields:
    - nodes.techvault.db.runtime.linux_capabilities
    - nodes.techvault.db.runtime.operational_policy
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued DB fact directly.
- id: db.runtime.container-host-config
  category: runtime-configuration
  summary: Docker inspect exposes container host/security/runtime settings including namespace modes, masked/read-only paths, log driver, and runtime name.
  evidence:
