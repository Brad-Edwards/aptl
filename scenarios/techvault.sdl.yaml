infrastructure:
  suricata:
    count: 1
    links: [dmz-net, internal-net, security-net]
    dependencies: [wazuh-manager]
    properties:
      - {dmz-net: 172.20.1.50}
      - {internal-net: 172.20.2.50}
      - {security-net: 172.20.0.50}
    description: Suricata IDS sensor is attached to the DMZ, internal, and security TechVault networks and publishes no host ports; its passive cross-network monitoring posture is blocked on ACES Brad-Edwards/aces#429.
  dmz-net:
    count: 1
    properties: {cidr: 172.20.1.0/24, gateway: 172.20.1.1, internal: true}
  internal-net:
    count: 1
    properties: {cidr: 172.20.2.0/24, gateway: 172.20.2.1, internal: true}
  security-net:
    count: 1
    properties: {cidr: 172.20.0.0/24, gateway: 172.20.0.1}
  db:
    count: 1
    links:
    - internal-net
    properties:
    - internal-net: 172.20.2.11
  shuffle-backend:
    count: 1
    links: [security-net]
    properties:
      - {security-net: 172.20.0.20}
  wazuh-manager:
    count: 1
    links: [security-net, dmz-net, internal-net]
    properties:
      - {security-net: 172.20.0.10}
      - {dmz-net: 172.20.1.10}
      - {internal-net: 172.20.2.30}
  webapp:
    count: 1
    links: [dmz-net, internal-net]
    dependencies: [db, wazuh-manager]
    properties:
      - {dmz-net: 172.20.1.20}
      - {internal-net: 172.20.2.25}
  fileshare:
    count: 1
    links:
    - internal-net
    dependencies:
    - wazuh-manager
    properties:
    - internal-net: 172.20.2.12
  mailserver:
    count: 1
    links: [dmz-net, internal-net]
    properties:
      - {dmz-net: 172.20.1.21}
      - {internal-net: 172.20.2.26}
    description: Mailserver is attached to both the DMZ and internal TechVault networks; host-published ports are encoded under nodes.mailserver.runtime.network.


  redteam-net:
    count: 1
    properties: {cidr: 172.20.4.0/24, gateway: 172.20.4.1, internal: true}
  kali:
    count: 1
    links: [redteam-net, dmz-net, internal-net]
    properties:
      - {redteam-net: 172.20.4.30}
      - {dmz-net: 172.20.1.30}
      - {internal-net: 172.20.2.35}

  ad:
    count: 1
    links: [internal-net]
    dependencies: [wazuh-manager]
    properties:
      - {internal-net: 172.20.2.10}
  workstation:
    count: 1
    links:
    - internal-net
    dependencies:
    - wazuh-manager
    properties:
    - internal-net: 172.20.2.40
    description: Workstation is attached only to the internal TechVault network with no host-published ports.

  victim:
    count: 1
    links:
    - internal-net
    dependencies:
    - wazuh-manager
    properties:
    - internal-net: 172.20.2.20
    description: Victim is attached only to the internal TechVault network with no host-published ports.


features:
  techvault-postgres-service:
    type: Service
    source:
      name: postgres
      version: '16.13'
    environment:
    - POSTGRES_DB=techvault
    - POSTGRES_USER=techvault
    - POSTGRES_PASSWORD=<scenario-fixture-secret>
    dependencies: []
  techvault-webapp-service:
    type: Service
    source: flask-gunicorn-techvault
    dependencies: [webapp-wazuh-agent]
    environment:
      - DB_HOST=172.20.2.11
      - DB_PORT=5432
      - DB_NAME=techvault
      - DB_USER=techvault
      - DB_PASSWORD=<scenario-fixture-secret>
      - FLASK_ENV=production
  webapp-rsyslog-forwarding:
    type: Configuration
    source: containers/webapp/entrypoint.sh
    environment:
      - SIEM_IP=172.20.2.30
      - LOG_FORMAT=syslog
      - LOG_PATHS=/var/log/gunicorn/access.log
  webapp-wazuh-agent:
    type: Artifact
    source: containers/_wazuh-agent
    destination: /opt/aptl/wazuh

  techvault-fileshare-service:
    type: Service
    source:
      name: samba
      version: 4.15.13-Ubuntu
    environment:
    - SIEM_IP=172.20.0.10
    - WAZUH_MANAGER=wazuh.manager
    - AGENT_NAME=aptl-fileshare-agent
    - LOG_PATHS=/var/log/samba/log.samba-bgqd,/var/log/samba/log.*
    - LOG_FORMAT=syslog
    dependencies:
    - fileshare-wazuh-agent
  fileshare-rsyslog-forwarding:
    type: Configuration
    source: containers/fileshare/setup-shares.sh
    environment:
    - SIEM_IP=172.20.0.10
    - LOG_FORMAT=syslog
    - LOG_PATHS=/var/log/samba/log.samba-bgqd,/var/log/samba/log.*
  fileshare-wazuh-agent:
    type: Artifact
    source: containers/_wazuh-agent
    destination: /opt/aptl/wazuh
  techvault-mailserver-service:
    type: Service
    source:
      name: docker-mailserver
      version: v15.1.0
    environment:
    - ENABLE_SPAMASSASSIN=0
    - ENABLE_CLAMAV=0
    - ENABLE_FAIL2BAN=0
    - ENABLE_POSTGREY=0
    - ENABLE_SASLAUTHD=0
    - ONE_DIR=1
    - OVERRIDE_HOSTNAME=mail.techvault.local
    - PERMIT_DOCKER=network
    - SSL_TYPE=
    dependencies: []

  techvault-ad-domain-service:
    type: Service
    source:
      name: samba
      version: 4.15.13-Ubuntu
    environment:
      - SAMBA_DOMAIN=TECHVAULT
      - SAMBA_REALM=TECHVAULT.LOCAL
      - SAMBA_ADMIN_PASSWORD=<scenario-fixture-secret>
      - DNS_FORWARDER=172.20.1.22
  ad-rsyslog-forwarding:
    type: Configuration
    source: containers/ad/setup-ad.sh
    environment:
      - SIEM_IP=172.20.2.30
      - LOG_FORMAT=syslog
      - LOG_PATHS=/var/log/samba/log.samba,/var/log/samba/log.smbd,/var/log/samba/log.winbindd
  ad-wazuh-agent:
    type: Artifact
    source: containers/_wazuh-agent
    destination: /opt/aptl/wazuh
  workstation-credential-artifacts:
    type: Artifact
    source: containers/workstation/setup-workstation.sh
    destination: /home/dev-user
    description: Participant-visible workstation credential and onboarding artifacts represented by metadata, checksums, and secret-fixture classification.

  victim-rsyslog-forwarding:
    type: Configuration
    source: containers/base/scripts/entrypoint-base.sh
    destination: /etc/rsyslog.d/90-forward.conf
    environment:
    - SIEM_IP=172.20.2.30
    - SIEM_PORT=514
    - LOG_FORMAT=syslog
  victim-wazuh-agent:
    type: Artifact
    source: containers/victim/install-wazuh.sh
    destination: /var/ossec
    environment:
    - WAZUH_MANAGER=172.20.2.30
    description: Wazuh package/configuration is present; observed service-manager state records the unit inactive/dead.
  victim-falco-agent:
    type: Artifact
    source: containers/victim/install-falco.sh
    destination: /etc/falco
    description: Falco package/configuration is present; observed service-manager state records Falco units disabled/inactive.


conditions:
  db-postgres-ready:
    command: pg_isready -U techvault -d techvault
    interval: 10
    timeout: 5
    retries: 5
    start_period: 15
  wazuh-api-ready:
    command: curl -ks https://localhost:55000 || exit 1
    interval: 30
    timeout: 10
    retries: 5
    start_period: 120

  webapp-http-ready:
    command: curl -sf http://localhost:8080/ || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30

  fileshare-smb-ready:
    command: smbclient -L localhost -N || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
  mailserver-smtp-ready:
    command: nc -z localhost 25 || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 120

  kali-healthcheck:
    command: /usr/local/bin/aptl-healthcheck.sh
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30

  ad-domain-ready:
    command: samba-tool domain info 127.0.0.1 || exit 1
    interval: 30
    timeout: 10
    retries: 10
    start_period: 60
  workstation-ssh-ready:
    command: ss -tlnp | grep ':22' || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30

  victim-ssh-ready:
    command: ss -tlnp | grep ':22' || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30


vulnerabilities:
  webapp-sqli-login:
    name: SQL injection in login
    description: Login form interpolates username into SQL.
    technical: true
    class: CWE-89
  webapp-sqli-search:
    name: SQL injection in search
    description: Customer and user search paths interpolate query text into SQL.
    technical: true
    class: CWE-89
  webapp-command-injection:
    name: Command injection in ping tool
    description: The ping tool passes user input to a shell command.
    technical: true
    class: CWE-78
  webapp-reflected-xss:
    name: Reflected XSS
    description: Search query content is reflected into HTML.
    technical: true
    class: CWE-79
  webapp-stored-xss:
    name: Stored XSS
    description: Comment content is stored and rendered without sanitization.
    technical: true
    class: CWE-79
  webapp-idor-files:
    name: File IDOR
    description: File metadata API lacks ownership checks.
    technical: true
    class: CWE-639
  webapp-idor-users:
    name: User IDOR
    description: User API lacks authorization checks and exposes API keys.
    technical: true
    class: CWE-639
  webapp-admin-authz-bypass:
    name: Admin authorization bypass
    description: Admin panel checks only for an authenticated session and does not enforce an admin role.
    technical: true
    class: CWE-862
  webapp-backup-secret-disclosure:
    name: Backup secret disclosure
    description: Admin panel renders backup access key and secret key fields from backup_config.
    technical: true
    class: CWE-200
  webapp-env-disclosure:
    name: Exposed environment file
    description: The /.env route discloses database and JWT configuration.
    technical: true
    class: CWE-200
  webapp-debug-disclosure:
    name: Debug information disclosure
    description: The /debug route discloses application and database metadata.
    technical: true
    class: CWE-200
  webapp-weak-jwt:
    name: Weak JWT secret and no expiry
    description: JWT tokens use a weak shared secret and no expiration.
    technical: true
    class: CWE-347
  webapp-unrestricted-upload:
    name: Unrestricted file upload
    description: Upload path lacks type and size validation.
    technical: true
    class: CWE-434
  webapp-upload-path-traversal:
    name: Upload path traversal
    description: Upload handler saves the submitted filename directly below /tmp/uploads.
    technical: true
    class: CWE-22
  webapp-api-rate-limit-missing:
    name: Missing API rate limit
    description: Customer search API has no rate limiting.
    technical: true
    class: CWE-770
  webapp-hardcoded-secret:
    name: Hardcoded Flask secret
    description: Flask secret key is hardcoded in application source.
    technical: true
    class: CWE-798
  webapp-verbose-error-disclosure:
    name: Verbose error disclosure
    description: Login query and generic server error handling can expose internal exception details.
    technical: true
    class: CWE-209

  fileshare-guest-writable-shares:
    name: Guest-writable SMB shares
    description: Public and Shared SMB shares allow guest read/write access to participant-visible company data.
    technical: true
    class: CWE-732
  fileshare-hardcoded-deployment-credentials:
    name: Hardcoded deployment credentials
    description: Engineering deployment script contains database, AWS, and SSH deployment credential material as scenario fixtures.
    technical: true
    class: CWE-798
  fileshare-hr-pii-disclosure:
    name: HR PII disclosure on file share
    description: HR employee directory contains salary and SSN-last-four fixture data on the fileshare.
    technical: true
    class: CWE-200
  fileshare-financial-data-disclosure:
    name: Financial data disclosure on file share
    description: Finance revenue report fixture data is present on the fileshare.
    technical: true
    class: CWE-200
  fileshare-wifi-password-disclosure:
    name: WiFi password disclosure on shared drive
    description: Shared drive contains office, guest, and server-room WiFi password fixture data.
    technical: true
    class: CWE-200
  fileshare-weak-samba-service-account:
    name: Weak Samba service account password
    description: svc-fileshare is provisioned with a guessable participant-visible fixture password.
    technical: true
    class: CWE-521

  ad-weak-password-jessica:
    name: Weak AD password for jessica.williams
    description: The jessica.williams domain user is intentionally provisioned with a very weak fixture password.
    technical: true
    class: CWE-521
  ad-seasonal-password-michael:
    name: Seasonal AD password for michael.thompson
    description: The michael.thompson domain user is intentionally provisioned with a guessable seasonal fixture password.
    technical: true
    class: CWE-521
  ad-contractor-overprivileged:
    name: Over-privileged contractor AD account
    description: The contractor.temp account remains enabled and is a member of VPN-Users, Remote-Desktop, Engineering, and Domain Users.
    technical: true
    class: CWE-266
  ad-former-employee-enabled:
    name: Former employee account still enabled
    description: The former.employee account is intentionally still enabled despite being marked as stale.
    technical: true
    class: CWE-269
  ad-kerberoast-svc-sql:
    name: Kerberoastable SQL service account
    description: The svc-sql account has MSSQLSvc SPNs and a non-expiring fixture password.
    technical: true
    class: CWE-522
  ad-kerberoast-svc-web:
    name: Kerberoastable web service account
    description: The svc-web account has an HTTP SPN and a non-expiring fixture password.
    technical: true
    class: CWE-522
  ad-domain-admin-svc-backup:
    name: Domain Admin backup service account
    description: The svc-backup service account is intentionally a member of Domain Admins.
    technical: true
    class: CWE-266
  ad-domain-admin-devops:
    name: DevOps account with Domain Admin membership
    description: The emily.chen user is intentionally over-privileged with Domain Admin membership.
    technical: true
    class: CWE-266
  workstation-bash-history-credential-disclosure:
    name: Bash history credential disclosure
    description: dev-user bash history contains commands with reusable credentials and internal target references. Raw values
      are redacted from evidence and represented as secret fixtures.
    technical: true
    class: CWE-522
  workstation-pgpass-credential-disclosure:
    name: PostgreSQL password file disclosure
    description: dev-user .pgpass contains TechVault database credentials as a participant-visible fixture.
    technical: true
    class: CWE-522
  workstation-hardcoded-app-secrets:
    name: Hardcoded application and cloud secrets
    description: Workstation project artifacts include hardcoded webapp, database, JWT, API, and example cloud credential material
      as secret fixtures.
    technical: true
    class: CWE-798
  workstation-passwordless-private-key:
    name: Passwordless SSH private key
    description: dev-user has a passwordless SSH private key fixture and host references for lateral movement paths.
    technical: true
    class: CWE-522
  workstation-nopasswd-sudo:
    name: Passwordless sudo grant
    description: dev-user and labadmin have NOPASSWD sudo grants in /etc/sudoers.d.
    technical: true
    class: CWE-269

  victim-nopasswd-sudo:
    name: Passwordless sudo grant
    description: labadmin has a NOPASSWD sudo grant in /etc/sudoers.d/labadmin.
    technical: true
    class: CWE-269


