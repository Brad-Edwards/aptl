    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.network.endpoints
    - nodes.techvault.wazuh-sidecar-suricata.runtime.network.published_ports
    rationale: Current ACES SDL node network fields carry the realized endpoint and no-published-port facts directly.
- id: wazuh-sidecar-suricata.runtime.mounts-volume
  category: runtime
  summary: The shared aptl_suricata_logs volume (the suricata node's log directory) is mounted read-only at /logs; the runtime
    mount table and volume inspect record it.
  evidence:
  - path: evidence/docker-volume.suricata_logs.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.mounts
    rationale: Current ACES SDL node runtime.mounts carries the read-only shared-volume mount directly.
- id: wazuh-sidecar-suricata.runtime.filesystem-inventory
  category: filesystem
  summary: The agent install tree, APTL bootstrap scripts, AR wrapper, manager-pushed shared config, apt source/keyring, and
    the monitored log source are encoded with checksums for stable files.
  evidence:
  - path: evidence/filesystem-tree.txt.gz
  - path: evidence/filesystem-checksums.txt.xz
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.filesystem_inventory
    rationale: Current ACES SDL node runtime.filesystem_inventory carries the path/metadata/checksum facts directly.
    caveat: client.keys is captured verbatim as an agent fixture; .ssh is path/metadata only; transient logs/queue state are
      recorded as metadata; the read-only /logs PGDATA content is the db asset's inventory, not duplicated here.
- id: wazuh-sidecar-suricata.runtime.process-tree
  category: runtime
  summary: PID 1 is the bash bootstrap; the steady-state daemon set is wazuh-execd, wazuh-agentd (wazuh user), wazuh-syscheckd,
    wazuh-logcollector, wazuh-modulesd, plus the ossec.log tail.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-processes.json
  - path: evidence/docker-top.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.processes
    rationale: Current ACES SDL node runtime.processes carries the captured process tree directly.
- id: wazuh-sidecar-suricata.runtime.service-listeners
  category: runtime
  summary: The sidecar exposes no network listener; osquery (container netns) shows only wazuh internal unix-domain queue
    sockets and the Docker embedded DNS resolver.
  evidence:
  - path: evidence/osquery-listening-ports.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.service_listeners
    - nodes.techvault.wazuh-sidecar-suricata.runtime.network.published_ports
    rationale: Current ACES SDL node fields carry the no-network-listener fact directly (empty service_listeners + empty published_ports).
    caveat: ss/netstat are not installed in the image, so the listener fact is sourced from container-namespace osquery; the
      only sockets are internal wazuh IPC plus the backend-generated Docker DNS resolver.
- id: wazuh-sidecar-suricata.runtime.environment
  category: runtime
  summary: Runtime environment is four plain compose forwarding variables (WAZUH_MANAGER, AGENT_NAME, LOG_PATHS, LOG_FORMAT)
    plus image PATH/DEBIAN_FRONTEND; no secret-bearing variables are present.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.environment
    rationale: Current ACES SDL node runtime.environment carries the captured variables directly.
- id: wazuh-sidecar-suricata.runtime.linux-capabilities
  category: runtime
  summary: PID 1 holds the default Docker capability set (0x...a80425fb); CAP_NET_ADMIN is absent, so the baked-in aptl-firewall-drop
    active-response wrapper cannot run iptables.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.linux_capabilities
    rationale: Current ACES SDL node runtime.linux_capabilities carries the effective capability mask directly.
    caveat: The active-response wrapper is present in the image but inert on this sidecar (no CAP_NET_ADMIN); this is encoded
      as the capability fact + a filesystem_inventory note, not as a working prevention control.
- id: wazuh-sidecar-suricata.runtime.local-identity
  category: identity
  summary: Local passwd/group inventory records 19 users, 39 groups, no sudo rules, and one added service account (wazuh,
    uid 100 / gid 101).
  evidence:
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    - accounts
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.local_identity
    - accounts.wazuh-sidecar-suricata-local-root
    - accounts.wazuh-sidecar-suricata-local-wazuh
    rationale: Current ACES SDL node runtime.local_identity and the accounts registry carry the local identity surface directly.
- id: wazuh-sidecar-suricata.application.software-versions
  category: runtime
  summary: wazuh-agent 4.12.0 (revision rc1, WAZUH_TYPE=agent) is the sole application component; no language runtime is installed.
  evidence:
  - path: evidence/language-manifests.txt
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.software_components
    rationale: Current ACES SDL node runtime.software_components carries the wazuh-agent version directly.
- id: wazuh-sidecar-suricata.runtime.package-inventory
  category: runtime
  summary: dpkg package inventory captures 114 installed OS packages, including wazuh-agent 4.12.0-1, iptables, jq, and netcat-openbsd.
  evidence:
  - path: evidence/os-packages.txt
  - path: evidence/osquery-apt-sources.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.packages
    rationale: Current ACES SDL node runtime.packages carries the dpkg inventory directly.
- id: wazuh-sidecar-suricata.runtime.vulnerability-scan
  category: runtime
  summary: Trivy captured 194 vulnerability findings (5 critical, 17 high, 71 medium, 98 low, 3 unknown) for the image.
  evidence:
  - path: evidence/trivy-vulnerabilities.json.gz
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/trivy-vulnerability-counts.json
  - path: evidence/trivy-version.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.package_vulnerabilities
    rationale: Current ACES SDL node runtime.package_vulnerabilities carries the per-CVE findings directly.
    caveat: Vulnerability scanner output is time-sensitive and tied to the captured Trivy version/database state.
- id: wazuh-sidecar-suricata.runtime.sbom-toolchain
  category: runtime
  summary: Required Trivy CycloneDX and useful-optional Syft CycloneDX SBOMs are captured; Syft output is deterministically
    normalized.
  evidence:
  - path: evidence/trivy-sbom.cyclonedx.json.gz
  - path: evidence/syft-sbom.cyclonedx.json.gz
  - path: evidence/syft-version.json
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.packages
    - nodes.techvault.wazuh-sidecar-suricata.runtime.software_components
    rationale: Current ACES SDL node fields use dpkg + scanner-derived summaries; full CycloneDX docs are retained as evidence.
    caveat: SBOMs are retained as evidence; SDL package fields do not embed the full CycloneDX documents.
- id: wazuh-sidecar-suricata.runtime.osquery-baseline
  category: runtime
  summary: osquery captured processes, listeners, host-side Docker container/image rows, apt sources, and the unavailable
    Linux application/program table status.
  evidence:
  - path: evidence/osquery-processes.json
  - path: evidence/osquery-listening-ports.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/osquery-docker-images.json
  - path: evidence/osquery-apt-sources.json
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.processes
    - nodes.techvault.wazuh-sidecar-suricata.runtime.service_listeners
    - nodes.techvault.wazuh-sidecar-suricata.runtime.network
    rationale: Current ACES SDL node fields carry the osquery-derived runtime baseline directly.
    caveat: installed_applications and programs tables are unavailable in the digest-pinned Linux osquery image and are recorded
      as capture limits.
- id: wazuh-sidecar-suricata.agent.forwarding-spec
  category: relationship
  summary: The wazuh-agent tails /logs/eve.json (log_format json), buffers per ossec.conf (queue 5000, eps 500, crypto aes,
    reconnect 60s), and ships events to wazuh.manager TCP/1514.
  evidence:
  - path: evidence/wazuh-agent-state.txt
  - path: evidence/compose-service.wazuh-sidecar-suricata.json
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
    - relationships
    - nodes
    fields:
    - forwarding_agents.aptl-suricata-wazuh-agent.sources
    - forwarding_agents.aptl-suricata-wazuh-agent.buffer_policy
    - forwarding_agents.aptl-suricata-wazuh-agent.ship_targets
    rationale: The scenario-level forwarding_agents registry (Brad-Edwards/aces#460) carries the tailed source, buffer policy,
      and ship target; now enriched from the captured ossec.conf.
- id: wazuh-sidecar-suricata.agent.connection-state
  category: relationship
  summary: The manager registers the agent as id 005 aptl-suricata-agent, status Active; the agentd state file shows status=connected
    with events flowing.
  evidence:
  - path: evidence/observer-discovery.wazuh-manager.txt
  - path: evidence/wazuh-agent-state.txt
  aces:
    disposition: encoded_with_caveat
    surface: relationships
    checked_surfaces:
    - relationships
    fields:
    - relationships.wazuh-sidecar-suricata-forwards-wazuh-manager
    rationale: The realized sidecar-to-manager forwarding edge is encoded as a typed relationship resolving to the forwarding
      agent.
    caveat: Connection counters (msg_count/msg_sent/last_keepalive) are time-sensitive runtime telemetry, recorded as evidence
      rather than encoded as immutable SDL values.
- id: wazuh-sidecar-suricata.relationship.forwards-manager
  category: relationship
  summary: The logical db-log-origin edge and the realized sidecar-to-manager network edge both resolve to the aptl-suricata-wazuh-agent
    forwarding agent over TCP/1514 with crypto aes and parse_format eve_json.
  evidence:
  - path: evidence/wazuh-agent-state.txt
  - path: evidence/observer-discovery.wazuh-manager.txt
  - path: evidence/compose-service.wazuh-sidecar-suricata.json
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
    - relationships
    fields:
    - relationships.suricata-logs-forwarded-wazuh
    - relationships.wazuh-sidecar-suricata-forwards-wazuh-manager
    rationale: Current ACES SDL relationships + forwarding_edge fields carry the forwarding relationship directly.
- id: wazuh-sidecar-suricata.relationship.reads-suricata-logs
  category: relationship
  summary: The sidecar reads the suricata container's EVE JSON log read-only via the shared suricata_logs volume; the broader
    log directory is cross-referenced to the suricata asset inventory.
  evidence:
  - path: evidence/docker-volume.suricata_logs.json
  - path: evidence/wazuh-agent-state.txt
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    - relationships
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.mounts
    rationale: The read-only log source is encoded as a node runtime mount (source aptl_suricata_logs); the forwarding relationship
      is the suricata-logs-forwarded-wazuh edge.
    caveat: ACES models the shared-volume read as a node mount with the volume name as source; there is no typed cross-node
      volume-ownership reference, consistent with the db/misp-db inventory precedent. The log directory content belongs to
      the suricata asset inventory.
