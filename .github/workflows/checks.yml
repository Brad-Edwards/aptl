name: Checks

# Single quality + security gate. APTL itself is local-first and has no
# app deployment; the only deploy is the docs site, which lives in
# docs-deploy.yml (GitHub Pages, main only). All checks below run in
# parallel; SonarCloud waits for the test jobs to finish so it can
# ingest their coverage.
#
# Required repo secrets:
#   SONAR_TOKEN — SonarCloud authentication
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install pre-commit
      # Skip the local test hooks here — the dedicated python-tests /
      # mcp-tests / web-tests jobs below already run them with the right
      # toolchain (deps installed, node available, etc). The test hooks
      # exist for local pre-commit safety, not CI redundancy. The Vale
      # hook is likewise covered by the dedicated docs job below.
      - run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: pytest,vitest-mcp-common,vitest-mcp-red,vitest-web,vale-prose-lint

  docs:
    name: Docs (Vale prose lint + mkdocs strict build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # git-revision-date-localized needs full history for page dates
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[docs]"
      - name: Vale prose lint (full lintable corpus, ADR-038)
        run: bash tools/vale-lint-all.sh
      - name: mkdocs strict build (nav and links must resolve)
        run: mkdocs build --strict

  python-tests:
    name: Python tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"
      - run: |
          coverage run -m pytest tests/ -q -k "not integration"
          coverage xml -o coverage.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 7

  python-cross-platform:
    name: Python cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pytest_args: tests/ -q -k "not integration"
          - os: macos-latest
            pytest_args: tests/ -q -k "not integration"
          - os: windows-latest
            pytest_args: >-
              tests/test_cli.py
              tests/test_cli_config.py
              tests/test_cli_lifecycle.py
              tests/test_config.py
              tests/test_config_fuzz.py
              tests/test_env.py
              tests/test_env_fuzz.py
              tests/test_env_hydration.py
              tests/test_hostenv.py
              tests/test_lab_init_cli.py
              tests/test_lifecycle_policy.py
              tests/test_session.py
              tests/test_sysreqs.py
              tests/test_version.py
              tests/test_version_consistency.py
              -q
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"
      - name: Python portable suite without lab integration
        run: python -m pytest ${{ matrix.pytest_args }}
      - name: CLI import and help smoke
        run: aptl --help
      - name: Lab init smoke
        run: aptl lab init ci-lab

  aces-scenario-gate:
    name: ACES scenario validation gate (advisory, Phase A)
    runs-on: ubuntu-latest
    # SCN-010E / #322. The static validation gate parses the authoritative
    # techvault-operational SDL and spawns the `aces conformance backend` CLI,
    # so it is integration-marked and runs here rather than in the fast
    # python-tests suite. Advisory in Phase A — `continue-on-error` surfaces
    # failures on the PR without blocking merge; the Phase B cutover PR removes
    # `continue-on-error` to make the gate blocking. The gate needs only the
    # installed aces-sdl wheel (which bundles the contract corpus) and the
    # `aces` CLI — no separate corpus checkout.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"
      - name: ACES static validation gate (techvault-operational)
        # -n auto runs the parse / compile / conformance-CLI checks in parallel
        # via pytest-xdist. No coverage is collected here, so xdist worker
        # measurement is not a concern.
        run: python -m pytest tests/test_techvault_static_gate.py -q -m integration -n auto

  mcp-tests:
    name: MCP TypeScript tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - name: aptl-mcp-common — install, build, test
        # `npm run build` runs explicitly before mcp-red copies the build
        # output. The `prepare` script also builds, but ordering across
        # `npm install` and `npx vitest run --coverage` is not load-bearing
        # — the explicit build keeps the contract obvious and the mcp-red
        # step below dependable.
        # The `sed` rewrites LCOV `SF:src/...` paths to repo-root-relative
        # `SF:mcp/aptl-mcp-common/src/...` so SonarCloud can match coverage
        # against the actual project tree (Sonar resolves SF: paths against
        # `sonar.sources`, which is anchored at the repo root).
        run: |
          cd mcp/aptl-mcp-common
          npm install
          npm run build
          npx vitest run --coverage
          sed -i 's|^SF:|SF:mcp/aptl-mcp-common/|' coverage/lcov.info
      - name: mcp-red — install (rebuilds against fresh common), test, and coverage
        # mcp-red consumes aptl-mcp-common via `file:`. npm install in
        # mcp-red copies the *current* build artifact, so the explicit
        # `npm run build` above must have produced fresh `build/` first.
        # `sed` rewrites LCOV paths so SonarCloud matches coverage against
        # `mcp/mcp-red/src/...` (see aptl-mcp-common step for the same
        # reasoning).
        run: |
          cd mcp/mcp-red
          rm -rf node_modules/aptl-mcp-common
          npm install --no-audit --no-fund
          npx vitest run --coverage
          sed -i 's|^SF:|SF:mcp/mcp-red/|' coverage/lcov.info
      - name: dependent MCPs — rebuild against fresh common (build-only verification)
        # Plan rules require every aptl-mcp-common consumer to rebuild
        # and pass tests when common changes. None of these dependents
        # currently ship vitest suites, but a build pass catches type-
        # level breakage from common API drift. When any of these
        # packages add tests, extend the matrix below to also run
        # `npx vitest run`.
        run: |
          for pkg in mcp-wazuh mcp-soar mcp-network mcp-indexer mcp-reverse mcp-threatintel mcp-casemgmt; do
            echo "=== $pkg ==="
            cd "mcp/$pkg"
            rm -rf node_modules/aptl-mcp-common
            npm install --no-audit --no-fund
            if [ -f tsconfig.build.json ]; then
              npx tsc -p tsconfig.build.json
            else
              npx tsc
            fi
            cd -
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-coverage
          path: mcp/aptl-mcp-common/coverage/
          retention-days: 7
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-red-coverage
          path: mcp/mcp-red/coverage/
          retention-days: 7

  web-tests:
    name: Web frontend tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: |
          cd web
          npm install
          npx svelte-kit sync
          npx vitest run --coverage
          sed -i 's|^SF:|SF:web/|' coverage/lcov.info
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-coverage
          path: web/coverage/
          retention-days: 7

  dependency-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    # The Python scan (pip-audit) is BLOCKING: it installs the project's
    # runtime dependencies and fails the job on any known advisory, so a
    # vulnerable dependency cannot merge. The npm audit step stays advisory
    # (non-fatal at the step level) — the lab's large transitive Node tree
    # carries known findings that are triaged out of band, not gated here.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - name: pip-audit (Python dependencies) — blocking
        # Install the project so pip-audit sees aptl's real runtime
        # dependency tree, not just pip-audit's own. --skip-editable drops the
        # editable aptl checkout itself (not a published PyPI release, so
        # --strict would otherwise error on it as unauditable). No `|| true`:
        # a known advisory in a real dependency fails the job.
        run: |
          python -m pip install --upgrade pip
          pip install -e . pip-audit
          # No --strict: it treats the skipped editable aptl as an error.
          # pip-audit still fails on any real dependency vulnerability.
          pip-audit --skip-editable --progress-spinner=off
      - name: npm audit (JS/TS workspaces)
        run: |
          set +e
          for dir in web mcp/aptl-mcp-common mcp/mcp-casemgmt mcp/mcp-indexer mcp/mcp-network mcp/mcp-red mcp/mcp-reverse mcp/mcp-soar mcp/mcp-threatintel mcp/mcp-wazuh; do
            [ -f "$dir/package.json" ] || continue
            echo ""
            echo "=== $dir ==="
            (cd "$dir" && npm install --no-audit --no-fund --silent >/dev/null 2>&1 && npm audit --audit-level=high)
          done
          true

  trivy-fs:
    name: Trivy filesystem scan (advisory)
    runs-on: ubuntu-latest
    # Advisory — surfaces vulnerable Python/Node deps and embedded secrets
    # found on disk. Output is a SARIF artifact; `security-events: write`
    # is intentionally not requested (artifact-only per ADR-026).
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH,MEDIUM
          limit-severities-for-sarif: 'true'
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          retention-days: 7

  trivy-iac:
    name: Trivy IaC / config scan (advisory)
    runs-on: ubuntu-latest
    # Advisory — surfaces Dockerfile, compose, and config misconfigs
    # (USER root, missing healthchecks, etc.). Distinct from `trivy-fs`
    # and `trivy-image` by design (ADR-026 § Boundaries).
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH,MEDIUM
          limit-severities-for-sarif: 'true'
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-iac-sarif
          path: trivy-iac.sarif
          retention-days: 7

  trivy-image:
    name: Trivy image scan (advisory) — ${{ matrix.name }}
    runs-on: ubuntu-latest
    # Advisory image scan per locally-built Dockerfile. Matrix is bounded
    # to images defined in `web/` and `containers/`; upstream-image-only
    # services (wazuh/, misp/, etc.) are out of scope. ADR-026 calls out
    # the cost of one-image-per-job. These advisory builds intentionally
    # avoid buildx GHA layer cache because expired cache blob URLs can fail
    # the job before Trivy runs.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ad
            dockerfile: containers/ad/Dockerfile
            context: .
          - name: base-rocky
            dockerfile: containers/base/Dockerfile.rocky
            context: ./containers
          - name: base-ubuntu
            dockerfile: containers/base/Dockerfile.ubuntu
            context: ./containers
          - name: dns
            dockerfile: containers/dns/Dockerfile
            context: .
          - name: fileshare
            dockerfile: containers/fileshare/Dockerfile
            context: .
          - name: kali
            dockerfile: containers/kali/Dockerfile
            context: ./containers/kali
          - name: misp-suricata-sync
            dockerfile: containers/misp-suricata-sync/Dockerfile
            context: .
          - name: reverse
            dockerfile: containers/reverse/Dockerfile
            context: ./containers
          - name: victim
            dockerfile: containers/victim/Dockerfile
            context: ./containers
          - name: wazuh-sidecar
            dockerfile: containers/wazuh-sidecar/Dockerfile
            context: .
          - name: webapp
            dockerfile: containers/webapp/Dockerfile
            context: .
          - name: workstation
            dockerfile: containers/workstation/Dockerfile
            context: ./containers
          - name: web
            dockerfile: web/Dockerfile
            context: web
          - name: web-api
            dockerfile: web/Dockerfile.api
            context: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Decide whether this image needs scanning
        id: image-scope
        shell: bash
        run: |
          set -euo pipefail

          scan=true
          if [ "${{ matrix.name }}" = "kali" ]; then
            scan=false
            base=""
            head="HEAD"

            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
            elif [ "${{ github.event_name }}" = "push" ]; then
              base="${{ github.event.before }}"
            fi

            if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
              scan=true
            elif ! git cat-file -e "$base^{commit}"; then
              scan=true
            elif git diff --name-only "$base" "$head" | grep -Eq '^(containers/kali/|\.github/workflows/checks\.yml$)'; then
              scan=true
            fi
          fi

          echo "scan=$scan" >> "$GITHUB_OUTPUT"
          echo "scan=$scan"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        if: steps.image-scope.outputs.scan == 'true'
      - name: Build image
        if: steps.image-scope.outputs.scan == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: aptl-scan/${{ matrix.name }}:ci
          load: true
          push: false
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: steps.image-scope.outputs.scan == 'true'
        with:
          scan-type: image
          image-ref: aptl-scan/${{ matrix.name }}:ci
          vuln-type: os,library
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH,MEDIUM
          limit-severities-for-sarif: 'true'
      - name: Upload SARIF
        if: always() && steps.image-scope.outputs.scan == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-${{ matrix.name }}-sarif
          path: trivy-image-${{ matrix.name }}.sarif
          retention-days: 7

  osv-scanner:
    name: OSV-scanner (uv.lock advisory)
    runs-on: ubuntu-latest
    # Advisory — covers the project-root `uv.lock` Python dependency
    # graph. Complements the existing `dependency-audit` job (pip-audit /
    # npm audit); ADR-026 § Risks notes OSV is not wired as a wholesale
    # replacement for the ecosystem audits.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install osv-scanner (checksum-verified)
        # Pin to a specific release and verify the binary against the
        # publisher's SHA256SUMS manifest before exec'ing it. Without
        # verification a tampered release artifact would gain code
        # execution in the runner under the workflow's GITHUB_TOKEN.
        run: |
          set -euo pipefail
          version=v2.3.8
          asset=osv-scanner_linux_amd64
          base="https://github.com/google/osv-scanner/releases/download/${version}"
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          curl -sSL -o "${asset}" "${base}/${asset}"
          curl -sSL -o osv-scanner_SHA256SUMS "${base}/osv-scanner_SHA256SUMS"
          grep " ${asset}\$" osv-scanner_SHA256SUMS | sha256sum -c -
          sudo install -m 0755 "${asset}" /usr/local/bin/osv-scanner
      - name: Scan uv.lock
        # OSV-scanner v2 exits 0 (no vulns), 1 (vulns found), or other
        # codes for tool/CLI errors. We swallow exit 1 so advisory
        # findings don't fail the step, but propagate other codes so a
        # broken invocation can't silently produce no SARIF artifact.
        run: |
          set +e
          osv-scanner scan -L uv.lock --format sarif --output-file osv-scanner.sarif
          ec=$?
          if [ "$ec" -eq 0 ] || [ "$ec" -eq 1 ]; then
            exit 0
          fi
          echo "osv-scanner failed with exit code $ec" >&2
          exit "$ec"
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-scanner-sarif
          path: osv-scanner.sarif
          retention-days: 7

  sonarcloud:
    name: SonarCloud quality gate
    needs: [python-tests, mcp-tests, web-tests]
    # Dependabot-triggered runs are handed the Dependabot secret store, not the
    # Actions one, so `secrets.SONAR_TOKEN` is empty and the scan can only ever
    # fail with "Not authorized or project not found". Mirroring the token into
    # Dependabot secrets would hand it to the very third-party action version
    # the PR is bumping, which defeats the SHA pinning above, so skip instead:
    # Dependabot never touches first-party source, so there is no new code for
    # the gate to judge. A job skipped by a condition reports success, which
    # keeps this satisfiable as a required check. Human PRs and pushes to
    # main/dev still run the full gate.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - name: Generate svelte-kit tsconfig (sonar reads web/tsconfig.json which extends it)
        run: |
          cd web
          npm install --no-audit --no-fund --silent
          npx svelte-kit sync
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-coverage
          path: .
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mcp-coverage
          path: mcp/aptl-mcp-common/coverage/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mcp-red-coverage
          path: mcp/mcp-red/coverage/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-coverage
          path: web/coverage/
      - uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
      - name: Fail on new SonarCloud issues
        if: github.ref_type != 'tag'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: python3 tools/sonar/assert_no_new_issues.py --project-key Brad-Edwards_aptl
