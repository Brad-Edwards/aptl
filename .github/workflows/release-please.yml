name: Release Please

# Automated releases with release-please. On pushes to main it maintains a
# release PR (version bump + CHANGELOG.md, derived from Conventional Commit
# history). Merging that PR creates the git tag + GitHub Release; the publish
# job then builds and uploads to PyPI via OIDC trusted publishing.
#
# Third-party actions are pinned to commit SHAs (Dependabot keeps them current).
on:
  push:
    branches: [main]

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the release tag + GitHub Release
      pull-requests: write   # open/maintain the release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # upload release assets
      id-token: write   # OIDC trusted publishing to PyPI
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Generate CycloneDX SBOM
        run: |
          python -m pip install dist/*.whl cyclonedx-bom
          mkdir -p sbom
          cyclonedx-py environment --output-format JSON --output-file sbom/aptl.cdx.json

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

      - name: Attach artifacts to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* sbom/* --clobber

  backmerge:
    name: Back-merge release into dev
    needs: [release-please, publish]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Open main -> dev back-merge PR
        # release-please committed the version bump + CHANGELOG.md to main, so
        # main is now ahead of dev. Auto-open a back-merge PR so dev stays
        # current. It's opened by GITHUB_TOKEN, so dev's required checks won't
        # run on it — admin-merge it (one click).
        run: |
          set -euo pipefail
          if [ "$(gh pr list --base dev --head main --state open --json number --jq 'length')" != "0" ]; then
            echo "back-merge PR main->dev already open; nothing to do."
            exit 0
          fi
          gh pr create --base dev --head main \
            --title "chore: back-merge ${{ needs.release-please.outputs.tag_name }} into dev" \
            --body "Automated back-merge of the release commit (version bump + CHANGELOG.md) from \`main\` into \`dev\` so dev stays current after the release. Admin-merge it — dev's required checks don't run on a bot-opened PR." \
            || echo "no back-merge needed (dev already up to date with main)."
