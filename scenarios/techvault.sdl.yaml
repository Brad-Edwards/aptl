name: techvault
description: >
  ACES-authored TechVault scenario inventory surface. This file is the
  incremental SCN-010 authoring target for the webapp inventory pass and does
  not replace the legacy scenario set until the cutover issue completes.

nodes:
  dmz-net:
    type: Switch
    description: TechVault DMZ network for externally reachable services.
  internal-net:
    type: Switch
    description: TechVault internal network for application-to-database traffic.
  security-net:
    type: Switch
    description: Security/SOC network used by Wazuh and related telemetry.

  db:
    type: VM
    os: linux
    source: postgres-16-alpine
    services:
      - {port: 5432, protocol: tcp, name: postgres}

  wazuh-manager:
    type: VM
    os: linux
    source: wazuh-manager-4.12
    services:
      - {port: 1514, protocol: tcp, name: wazuh-agent-events}
      - {port: 1515, protocol: tcp, name: wazuh-agent-registration}
      - {port: 514, protocol: udp, name: syslog}

  webapp:
    type: VM
    description: TechVault customer portal web application container.
    os: linux
    os_version: Debian GNU/Linux 13 (trixie)
    source:
      name: aptl-webapp
      version: aptl-webapp@sha256:7f2c715f953094ae36c10d15fbb038f0fdc6b855fd052236a95ad040410a25e0
      build:
        description: >
          Observed local Docker build provenance for the TechVault webapp image.
          The build used python:3.11-slim as a mutable base tag; an immutable
          base-image digest was not available in the frozen local capture.
        base_image: python:3.11-slim
        dockerfile_path: containers/webapp/Dockerfile
        instructions:
        - instruction: from
          arguments:
          - python:3.11-slim
        - instruction: env
          arguments:
          - DEBIAN_FRONTEND=noninteractive
        - instruction: run
          arguments:
          - apt-get update && apt-get install -y iputils-ping net-tools curl rsyslog
            iptables supervisor && rm -rf /var/lib/apt/lists/*
        - instruction: copy
          arguments:
          - containers/_wazuh-agent/install.sh
          - /tmp/install-wazuh.sh
        - instruction: copy
          arguments:
          - containers/_wazuh-agent/aptl-firewall-drop.sh
          - /tmp/aptl-firewall-drop.sh
        - instruction: copy
          arguments:
          - config/wazuh_cluster/etc/lists/active-response-whitelist
          - /tmp/active-response-whitelist
        - instruction: run
          arguments:
          - /tmp/install-wazuh.sh && rm /tmp/install-wazuh.sh /tmp/aptl-firewall-drop.sh
            /tmp/active-response-whitelist
        - instruction: copy
          arguments:
          - containers/_wazuh-agent/ossec.conf.template
          - /opt/aptl/wazuh/ossec.conf.template
        - instruction: copy
          arguments:
          - containers/_wazuh-agent/wazuh-agent.sh
          - /opt/aptl/wazuh/wazuh-agent.sh
        - instruction: run
          arguments:
          - chmod +x /opt/aptl/wazuh/wazuh-agent.sh
        - instruction: workdir
          arguments:
          - /app
        - instruction: copy
          arguments:
          - containers/webapp/requirements.txt
          - .
        - instruction: run
          arguments:
          - pip install --no-cache-dir -r requirements.txt
        - instruction: copy
          arguments:
          - containers/webapp/app/
          - ./
        - instruction: copy
          arguments:
          - containers/webapp/entrypoint.sh
          - /entrypoint.sh
        - instruction: copy
          arguments:
          - containers/webapp/supervisord.conf
          - /etc/supervisor/conf.d/webapp.conf
        - instruction: run
          arguments:
          - chmod +x /entrypoint.sh
        - instruction: run
          arguments:
          - mkdir -p /var/log/gunicorn
        - instruction: expose
          arguments:
          - "8080"
        - instruction: env
          arguments:
          - FLASK_APP=app.py
        - instruction: env
          arguments:
          - FLASK_ENV=production
        - instruction: entrypoint
          arguments:
          - /entrypoint.sh
        layers:
        - created_by: "ENTRYPOINT [\"/entrypoint.sh\"]"
          size: 0
          empty: true
        - created_by: ENV FLASK_ENV=production
          size: 0
          empty: true
        - created_by: ENV FLASK_APP=app.py
          size: 0
          empty: true
        - created_by: "EXPOSE [8080/tcp]"
          size: 0
          empty: true
        - created_by: "RUN /bin/sh -c mkdir -p /var/log/gunicorn # buildkit"
