schema_version: 1
asset:
  id: misp-db
  scenario: TechVault
  aptl_issue: 347
  aces_methodology_issue: 353
  source_class: upstream-image-plus-volume-backed-runtime-state
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: mariadb@sha256:407fccb51e710f34752c1a3ef9b936d1f55f38d4ac7fa043b3759742d266fd9a
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence:
    - path: evidence/docker-buildx-imagetools.image.txt
    - path: evidence/docker-buildx-imagetools.image.raw.json
    limits:
    - No registry-visible OCI, in-toto, or SLSA attestation was available in the captured imagetools evidence.
notes:
- Capture used the already-running aptl project per operator direction and did not run aptl lab stop -v && aptl lab start.
- 'Brad-Edwards/aces#388 and #431 are consumed through runtime.database_services and runtime.service_listeners; no known ACES
  expressivity gap remains for the catalogued MISP DB steady-state facts.'
- Raw MariaDB authentication material is redacted; secret-bearing table files are represented by metadata and selected safe
  checksums rather than contents.
correspondence_checks:
- id: misp-db-evidence-bundle-integrity
  status: implemented
  source: docs/aces/inventory/misp-db/evidence
  method: evidence-sha256sums.txt hashes every committed evidence file except the manifest itself.
  realized_evidence:
  - path: evidence/evidence-sha256sums.txt
  - path: evidence/captured-at-utc.txt
  ledger_fact_ids:
  - misp-db.capture.toolchain-baseline
- id: misp-db-sdl-runtime-correspondence
  status: implemented
  source: scenarios/techvault.sdl.yaml nodes.techvault.misp-db
  method: tests/test_misp_db_inventory.py parses ACES SDL and asserts image, runtime, listener, package, CVE, identity, database,
    content, and relationship counts.
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-listening-ports.json
  - path: evidence/mariadb-state.txt
  - path: evidence/trivy-vulnerability-list.json
  ledger_fact_ids:
  - misp-db.runtime.container-policy
  - misp-db.runtime.service-listeners
  - misp-db.database.service
  - misp-db.database.databases-schemas-tables
  - misp-db.database.table-cardinalities
  - misp-db.runtime.vulnerability-scan
- id: misp-db-scope-and-redaction-caveats
  status: implemented
  source: docs/aces/inventory/misp-db/evidence/capture-limits.txt
  method: README and tests assert non-destructive capture scope, secret redaction, Syft normalization, unavailable osquery
    tables, and database auth material caveats.
  realized_evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  ledger_fact_ids:
  - misp-db.capture.toolchain-baseline
  - misp-db.runtime.filesystem-inventory
  - misp-db.database.roles
facts:
- id: misp-db.capture.toolchain-baseline
  category: capture
  summary: Capture used digest-pinned Trivy, Syft, and osquery images, recorded Docker/Compose versions, and recorded explicit
    capture limits.
  evidence:
  - path: evidence/captured-at-utc.txt
  - path: evidence/docker-version.json
  - path: evidence/docker-compose-version.json
  - path: evidence/trivy-version.txt
  - path: evidence/syft-version.json
  - path: evidence/osquery-version.txt
  - path: evidence/capture-limits.txt
  - path: evidence/evidence-sha256sums.txt
  aces:
    disposition: encoded_with_caveat
    surface: runtime_contract
    checked_surfaces:
    - runtime_contract
    fields:
    - docs/aces/inventory/misp-db/capture-evidence.sh
    - docs/aces/inventory/misp-db/evidence/capture-limits.txt
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
    caveat: Scanner and runtime observations are time-sensitive evidence from the current-running lab, not immutable clean-reset
      proof.
- id: misp-db.image.identity-provenance
  category: image
  summary: MariaDB resolved to the captured upstream image digest and Ubuntu Jammy image metadata.
  evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/docker-buildx-imagetools.image.txt
  - path: evidence/docker-buildx-imagetools.image.raw.json
  - path: evidence/osquery-docker-images.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.source.name
    - nodes.techvault.misp-db.source.version
    - nodes.techvault.misp-db.os_version
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.image.history-layers
  category: image
  summary: Docker history and Trivy layer metadata are encoded as upstream-image build provenance.
  evidence:
  - path: evidence/docker-history.image.txt
  - path: evidence/docker-history.image.jsonl
  - path: evidence/docker-inspect.image.json
  - path: evidence/trivy-vulnerabilities.json.gz
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.source.build.instructions
    - nodes.techvault.misp-db.source.build.layers
    - nodes.techvault.misp-db.source.build.config
    - nodes.techvault.misp-db.source.build.attestation
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.compose.service-contract
  category: compose
  summary: Compose declares aptl-misp-db, image mariadb:10.11, healthcheck, memory limit, data volume, redacted fixture env,
    and security-net address.
  evidence:
  - path: evidence/compose-service.misp-db.json
  - path: evidence/source-checksums.txt
  - path: evidence/docker-compose-version.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db
    - infrastructure.misp-db
    - conditions.misp-db-ready
    - features.techvault-misp-db-service
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.source.realization-inputs
  category: source
  summary: Local docker-compose.yml checksum is captured as the local realization input for the upstream MariaDB image.
  evidence:
  - path: evidence/source-checksums.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.source.build.source_inputs
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.runtime.container-policy
