schema_version: 1
asset:
  id: techvault-composition
  scenario: TechVault
  aptl_issue: 329
  aces_methodology_issue: 353
  source_class: runtime-composed-scenario
  proof_scope: scenario-composition-spec
provenance:
  image_digest: "not-applicable: TechVault runtime-composed scenario composition (issue #329)"
  attestation:
    status: not_applicable
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence:
    - path: evidence/composition-sdl-surface-index.json
      note: Committed SDL section/import surface index for the composition.
    - path: evidence/composition-per-asset-index.json
      note: Per-asset inventory bundle index used as composition inputs.
    - path: evidence/captured-at-utc.txt
      note: Capture timestamp for the composition snapshot.
    limits:
    - A composition bundle has no single OCI image or supply-chain attestation.
correspondence_checks:
- id: composition-sdl-surface-correspondence
  status: implemented
  source: scenarios/techvault.sdl.yaml
  realized_evidence:
  - path: evidence/composition-sdl-surface-index.json
  - path: evidence/composition-network-topology.json
  - path: evidence/composition-dependency-graph.json
  ledger_fact_ids:
  - composition.network.topology
  - composition.dependency.graph
  - composition.dns.surface
  method: Generate a sanitized composition index from the committed TechVault root SDL and imported infrastructure/relationship sections, then compare the expected surfaces in tests/test_techvault_composition_inventory.py.
  limit: Static SDL snapshot only; this does not mutate or rebuild the lab.
- id: composition-runtime-handoff-correspondence
  status: implemented
  source: docker-compose.yml
  realized_evidence:
  - path: evidence/composition-mount-sharing.json
  - path: evidence/composition-relationship-index.json
  ledger_fact_ids:
  - composition.mount-sharing
  - composition.observation.chains
  - composition.defensive.workflow-chains
  method: Parse Compose volume uses and ACES relationship edges to identify cross-node runtime handoff surfaces.
  limit: Static Compose/SDL correspondence only; workflow execution traces are out of scope.
- id: composition-identity-content-correspondence
  status: implemented
  source: scenarios/techvault/sections/accounts.sdl.yaml + scenarios/techvault/sections/content.sdl.yaml
  realized_evidence:
  - path: evidence/composition-account-host-map.json
  - path: evidence/composition-content-placement.json
  ledger_fact_ids:
  - composition.trust.relationships
  - composition.account.host-map
  - composition.content.placement
  method: Parse account and content sections into sanitized placement indexes and verify required map coverage in tests.
  limit: Secret values are intentionally omitted from the composition evidence.
- id: composition-bundle-reproducibility
  status: implemented
  source: docs/aces/inventory/_composition/capture-evidence.sh
  realized_evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/captured-at-utc.txt
  - path: evidence/evidence-sha256sums.txt
  - path: evidence/composition-per-asset-index.json
  ledger_fact_ids:
  - composition.capture.scope-and-limits
  - composition.per-asset-coverage
  method: Record capture limits, timestamp, per-asset inventory inputs, and a SHA-256 manifest for generated evidence.
  limit: The manifest covers the generated composition evidence files, not every per-asset evidence file.
notes:
- The composition bundle indexes committed SDL, Compose, and existing per-asset bundles; it does not duplicate per-asset scanner or SBOM evidence.
- No known ACES expressivity blocker remains for the catalogued TechVault composition facts. Static-snapshot and no-workflow-trace limits are capture-scope caveats.
facts:
- id: composition.capture.scope-and-limits
  category: provenance
  summary: The composition capture is a non-destructive static snapshot over committed SDL, Compose, and per-asset bundle metadata.
  evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/captured-at-utc.txt
  - path: evidence/evidence-sha256sums.txt
  aces:
    disposition: encoded_with_caveat
    surface: runtime_contract
    fields:
    - docs/aces/inventory/_composition/capture-evidence.sh
    - docs/aces/inventory/_composition/evidence/capture-limits.txt
    caveat: Composition evidence has no single image/rootfs scanner baseline and does not prove a fresh clean-lab rebuild.
    rationale: The capture method and limits are explicit downstream runtime-contract artifacts.
- id: composition.network.topology
  category: network-topology
  summary: TechVault composition spans redteam, DMZ, internal, and security networks with authored static node placement.
  evidence:
  - path: evidence/composition-network-topology.json
  aces:
    disposition: encoded
    surface: infrastructure
    fields:
    - infrastructure.techvault.redteam-net
    - infrastructure.techvault.dmz-net
    - infrastructure.techvault.internal-net
    - infrastructure.techvault.security-net
    - infrastructure.*.links
    - infrastructure.*.properties
    rationale: ACES infrastructure encodes network nodes, CIDRs, gateways, attached links, and static IP properties.
- id: composition.dependency.graph
  category: dependencies
  summary: Authored SDL dependencies and relationship edges encode cross-service readiness and integration paths.
  evidence:
  - path: evidence/composition-dependency-graph.json
  - path: evidence/composition-relationship-index.json
  aces:
    disposition: encoded
    surface: relationships
    fields:
    - infrastructure.*.dependencies
    - relationships.*
    - forwarding_agents.*
    rationale: ACES infrastructure dependencies and typed relationships capture service and integration graph ownership.
- id: composition.mount-sharing
  category: runtime-handoff
  summary: Shared runtime handoff volumes connect db to its Wazuh sidecar and Suricata to both the Wazuh sidecar and MISP rule sync.
  evidence:
  - path: evidence/composition-mount-sharing.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    fields:
    - nodes.*.runtime.mounts
    - relationships.db-logs-forwarded-wazuh
    - relationships.suricata-logs-forwarded-wazuh
    - relationships.misp-suricata-sync-updates-suricata-rules
    caveat: ACES records the realized handoff through per-node mounts and relationship edges rather than a separate top-level volume graph.
    rationale: Current nodes.runtime and relationships surfaces preserve the shared-mount handoff behavior without introducing a duplicate schema.
- id: composition.dns.surface
  category: dns
  summary: TechVault DNS placement and AD forwarding are encoded in the DNS node runtime service and AD-to-DNS relationship.
  evidence:
  - path: evidence/composition-network-topology.json
  - path: evidence/composition-sdl-surface-index.json
  aces:
    disposition: encoded
    surface: nodes
    fields:
    - nodes.techvault.dns.runtime.dns_services
    - relationships.ad-forwards-dns
    - infrastructure.techvault.dns
    rationale: The node runtime DNS service plus relationship edge records resolver, zone, and forwarding behavior.
- id: composition.trust.relationships
  category: trust
  summary: Cross-node trust and service authorization surfaces are represented by typed relationships and runtime identity/application authorization sections.
  evidence:
  - path: evidence/composition-relationship-index.json
  - path: evidence/composition-account-host-map.json
  aces:
    disposition: encoded
    surface: relationships
    fields:
    - relationships.*
    - nodes.*.runtime.identity_authorities
    - nodes.*.runtime.app_authorizations
    rationale: Trust is captured through typed edges plus node runtime identity and application authorization facts.
- id: composition.account.host-map
  category: accounts
  summary: Scenario accounts are mapped to their owning hosts without copying raw secret values into composition evidence.
  evidence:
  - path: evidence/composition-account-host-map.json
  aces:
    disposition: encoded
    surface: accounts
    fields:
    - accounts.*
    - nodes.*.runtime.local_identity
    - nodes.*.runtime.identity_authorities
    rationale: ACES accounts and runtime identity sections encode account placement and identity authority ownership.
- id: composition.content.placement
  category: content
  summary: Authored and observed content placement is indexed from the TechVault content section.
  evidence:
  - path: evidence/composition-content-placement.json
  aces:
    disposition: encoded
    surface: content
    fields:
    - content.*
    - nodes.*.runtime.mounts
    rationale: ACES content records the source, target, path/destination, sensitivity flag, and checksum-bearing source metadata.
- id: composition.observation.chains
  category: observation
  summary: Wazuh and Suricata observation chains are encoded through forwarding agents, forwarding relationship edges, and security monitoring runtime sections.
  evidence:
  - path: evidence/composition-relationship-index.json
  - path: evidence/composition-sdl-surface-index.json
  aces:
    disposition: encoded
    surface: relationships
    fields:
    - forwarding_agents.*
    - relationships.*.forwarding_edge
    - nodes.techvault.wazuh-manager.runtime.security_monitoring_managers
    - nodes.techvault.suricata.runtime.network_sensors
    rationale: The current relationship and runtime monitoring surfaces preserve log shipping and sensor observation paths.
- id: composition.defensive.workflow-chains
  category: defensive-workflows
  summary: Defensive integration chains across Shuffle, TheHive, Cortex, MISP, Suricata, Wazuh, and backing datastores are statically encoded.
  evidence:
  - path: evidence/composition-relationship-index.json
  - path: evidence/composition-dependency-graph.json
  aces:
    disposition: encoded_with_caveat
    surface: relationships
    fields:
    - relationships.shuffle-frontend-proxies-backend
    - relationships.shuffle-backend-connects-opensearch
    - relationships.thehive-connects-cortex
    - relationships.misp-suricata-sync-updates-suricata-rules
    - nodes.*.runtime.platform_applications
    caveat: Static integration topology is encoded; analyst timing, SOAR execution traces, and post-attack workflow state are out of scope for issue #329.
    rationale: Current ACES relationships and platform application runtime facts capture the authored defensive workflow topology.
- id: composition.per-asset-coverage
  category: inventory-coverage
  summary: The composition bundle cites existing per-asset inventories instead of copying scanner/SBOM/runtime evidence into a scenario-level bundle.
  evidence:
  - path: evidence/composition-per-asset-index.json
  aces:
    disposition: encoded_with_caveat
    surface: runtime_contract
    fields:
    - docs/aces/inventory/*/mapping-ledger.yaml
    - docs/aces/inventory/*/evidence/
    caveat: Composition completeness depends on the sibling per-asset inventory bundles remaining valid and linked.
    rationale: Per-asset ledgers retain authoritative image and runtime facts while this bundle records cross-asset composition facts.
