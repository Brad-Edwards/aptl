          auth_required: false
          auth_scheme: ''
          session_required: false
          parameters: []
          responses: []
          templates: []
          static_assets: []
          vulnerability_refs: []
          redirects: []
          disclosures: []
          exposed_fields: []
          upstream_target: null
        - route_id: api-user-current
          path: /api/user/current
          methods:
