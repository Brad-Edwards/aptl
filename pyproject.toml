[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aptl"
version = "0.1.0"
description = "Advanced Purple Team Lab CLI"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12.0",
    "pydantic>=2.0.0",
    "rich>=13.0.0",
    "PyYAML>=6.0",
    "opentelemetry-api>=1.33.0",
    "opentelemetry-sdk>=1.33.0",
    "opentelemetry-exporter-otlp-proto-http>=1.33.0",
    "opentelemetry-semantic-conventions>=0.54b0",
]

[project.scripts]
aptl = "aptl.cli.main:app"

[project.optional-dependencies]
s3 = [
    "boto3>=1.28.0",
]
web = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "sse-starlette>=2.0.0",
    "asyncssh>=2.17.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-mock>=3.12.0",
    "coverage>=7.0.0",
    "httpx>=0.27.0",
    "hypothesis>=6.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/aptl"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "fuzz: property-based fuzz tests (run with: pytest -m fuzz)",
]
addopts = "-m 'not fuzz'"

[tool.coverage.run]
source = ["aptl"]

[tool.coverage.report]
show_missing = true

[tool.coverage.xml]
output = "coverage.xml"
