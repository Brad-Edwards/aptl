- id: misp-redis.network.identity
  category: network
  summary: misp-redis is attached to security-net at a DHCP-assigned 172.20.0.3 with Docker aliases, DNS names, a MAC address, and no host-published ports.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/docker-network.aptl-security.json
  - path: evidence/participant-discovery.misp.txt
  - path: evidence/participant-discovery.kali.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
