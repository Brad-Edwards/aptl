  summary: dpkg package inventory captures 110 installed OS packages from the python:3.11-slim base plus curl/ca-certificates.
  evidence:
  - path: evidence/os-packages.txt
  - path: evidence/osquery-apt-sources.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
