    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.source.build.source_inputs
    rationale: Current ACES SDL build source_inputs carry the build-context inputs and their checksums directly.
- id: wazuh-sidecar-suricata.compose.service-contract
  category: compose
  summary: Compose declares aptl-wazuh-sidecar-suricata, image aptl-wazuh-sidecar:local, plain forwarding env, 256m memory
    limit, suricata_logs read-only mount, depends_on wazuh.manager, and security-net address 172.20.0.36.
  evidence:
  - path: evidence/compose-service.wazuh-sidecar-suricata.json
  - path: evidence/docker-compose-version.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    - relationships
    fields:
    - nodes.techvault.wazuh-sidecar-suricata.runtime.environment
    - nodes.techvault.wazuh-sidecar-suricata.runtime.operational_policy
    - forwarding_agents.aptl-suricata-wazuh-agent
    rationale: Current ACES SDL node + scenario-level forwarding_agents fields carry the compose contract directly.
- id: wazuh-sidecar-suricata.runtime.container-policy
  category: runtime
  summary: Docker runtime policy captures restart unless-stopped, 256 MiB memory, namespaces, masked/read-only paths, no added
    capabilities, log driver, and runc runtime.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/docker-top.txt
  - path: evidence/docker-logs.wazuh-sidecar-suricata.txt
  aces:
