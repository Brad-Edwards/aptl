      - count:6
      description: 'Six attribute rows were present: three ip-src IOCs and three pattern-in-traffic IOCs.'
    - name: objects
      tags:
      - misp
      - count:0
      description: No MISP object rows were present.
    - name: tags
      tags:
      - misp
