schema_version: 1
asset:
  id: mailserver
  scenario: TechVault
  aptl_issue: 335
  aces_methodology_issue: 353
  source_class: upstream-image-plus-mounted-provisioner
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: ghcr.io/docker-mailserver/docker-mailserver@sha256:af51b15dd3fc72153c0e90eb7692bb5e3a463212d87959a80fa7aa89b617d44a
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence: []
    limits:
      - The upstream image exposes OCI labels and a registry manifest, but no registry-visible in-toto/SLSA attestation was
        captured for this mutable latest tag.
correspondence_checks:
  - id: mailserver-node-source-correspondence
    status: planned
    source: nodes.techvault.mailserver.source
    realized_evidence:
      - path: evidence/docker-inspect.image.json
      - path: evidence/docker-history.image.jsonl
      - path: evidence/source-checksums.txt
    ledger_fact_ids:
      - mailserver.image.identity
      - mailserver.image.history
      - mailserver.compose.service
    method: Compare the ACES source name/version/build provenance and APTL setup source inputs against the upstream image
      inspect/history and source checksums captured in this bundle.
    limit: 'Planned because issue #335 records a frozen steady-state asset spec rather than a destructive live equivalence
      proof.'
  - id: mailserver-runtime-correspondence
    status: planned
    source: nodes.techvault.mailserver.runtime
    realized_evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
      - path: evidence/mailserver-state.txt
      - path: evidence/participant-discovery.kali.txt
      - path: evidence/os-packages.txt
      - path: evidence/trivy-vulnerability-list.json
      - path: evidence/filesystem-tree.txt
    ledger_fact_ids:
      - mailserver.transport.listeners
      - mailserver.host-published-ports
      - mailserver.runtime.mount-table
      - mailserver.runtime.container-policy
      - mailserver.runtime.processes
      - mailserver.runtime.environment
      - mailserver.runtime.local-identity-database
      - mailserver.runtime.filesystem-inventory
      - mailserver.runtime.package-inventory
      - mailserver.runtime.vulnerability-scan
      - mailserver.mail.protocol-capabilities
      - mailserver.mail.domain-mailboxes
      - mailserver.mail.alias-queue-state
      - mailserver.mail.runtime-settings
    method: Re-run the encoded scenario from ACES SDL, recapture mailserver runtime evidence, and compare network, filesystem,
      package, vulnerability, local identity, and typed mail-service logical state against this ledger.
    limit: Planned because this issue records the frozen steady-state ACES spec and evidence, not a destructive clean-lab
      equivalence run.
notes:
  - Capture used the already-running local aptl project and started only the mail profile service non-destructively.
  - containers/mailserver/setup.sh was executed manually after start before capture because the upstream image waited for
    at least one account and did not auto-run the mounted script.
  - 'ACES issue #420 / ADR-038 is consumed; no known remaining ACES expressivity blocker remains for the catalogued mailserver
    steady-state inventory facts.'
  - The SDL build-history strings normalize two Docker-history shell fragments from braced parameter syntax to shell-equivalent
    unbraced syntax because ACES reserves ${...} for scenario variables; the byte-exact raw history remains in evidence.
facts:
  - id: mailserver.image.identity
    category: provenance
    summary: The asset uses upstream image ghcr.io/docker-mailserver/docker-mailserver@sha256:af51b15dd3fc72153c0e90eb7692bb5e3a463212d87959a80fa7aa89b617d44a
      with docker-mailserver v15.1.0 labels.
    evidence:
      - path: evidence/docker-inspect.image.json
      - path: evidence/docker-buildx-imagetools.image.txt
      - path: evidence/docker-buildx-imagetools.image.raw.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.techvault.mailserver.source.name
        - nodes.techvault.mailserver.source.version
      rationale: Current ACES SDL has a typed runtime surface for this captured fact; evidence remains provenance, not a substitute
        for the SDL encoding.
  - id: mailserver.image.history
    category: provenance
    summary: Docker history records 86 upstream image history rows/layer records.
