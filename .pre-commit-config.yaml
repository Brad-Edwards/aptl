fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^tests/

  - repo: local
    hooks:
      - id: changelog-updated
        name: Changelog must be updated
        entry: bash -c 'git diff --cached --name-only | grep -q "^CHANGELOG.md$"'
        language: system
        always_run: true
        pass_filenames: false
