        protocol: http
        name: Cortex 3.1.8-1
        base_path: /
        framework: Play 2.8.19 / Elastic4Play 1.13.6 / Elastic4s 7.17.2
        description: Cortex analyzer engine REST API. API status reports authType key/local and capabilities authByKey, changePassword,
          setPassword. TheHive authenticates with the seeded service-account API key.
