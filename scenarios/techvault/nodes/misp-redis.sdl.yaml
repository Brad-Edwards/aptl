name: techvault-node-misp-redis
nodes:
  misp-redis:
    type: vm
    description: MISP Redis companion backing store (redis:7-alpine) steady-state inventory.
    source:
      name: redis
      version: redis@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
      build:
        base_image: alpine:3.21.7
        base_image_digest: ''
        dockerfile_path: upstream:redis/docker-library/7/alpine
        instructions:
        - instruction: add
          arguments:
          - 'alpine-minirootfs-3.21.7-x86_64.tar.gz / # buildkit'
          description: ''
        - instruction: cmd
          arguments:
          - '["/bin/sh"]'
          description: ''
        - instruction: run
          arguments:
          - set -eux;  addgroup -S -g 1000 redis;  adduser -S -G redis -u 999 redis
          description: ''
        - instruction: run
          arguments:
          - set -eux;  apk add --no-cache   tzdata  ;
          description: ''
        - instruction: env
          arguments:
          - GOSU_VERSION=1.17
          description: ''
        - instruction: run
          arguments:
          - 'set -eux;  apk add --no-cache --virtual .gosu-fetch gnupg;  arch="$(apk --print-arch)";  case
            "$arch" in   ''x86_64'') url=''https://github.com/tianon/gosu/releases/download/1.17/gosu-amd64'';
            sha256=''bbc4136d03ab138b1ad66fa4fc051bafc6cc7ffae632b069a53657279a450de3'' ;;   ''aarch64'')
            url=''https://github.com/tianon/gosu/releases/download/1.17/gosu-arm64''; sha256=''c3805a85d17f4454c23d7059bcb97e1ec1af272b90126e79ed002342de08389b''
            ;;   ''armhf'') url=''https://github.com/tianon/gosu/releases/download/1.17/gosu-armhf'';
            sha256=''e5866286277ff2a2159fb9196fea13e0a59d3f1091ea46ddb985160b94b6841b'' ;;   ''x86'')
            url=''https://github.com/tianon/gosu/releases/download/1.17/gosu-i386''; sha256=''087dbb8fe479537e64f9c86fa49ff3b41dee1cbd28739a19aaef83dc8186b1ca''
            ;;   ''ppc64le'') url=''https://github.com/tianon/gosu/releases/download/1.17/gosu-ppc64el'';
            sha256=''1891acdcfa70046818ab6ed3c52b9d42fa10fbb7b340eb429c8c7849691dbd76'' ;;   ''riscv64'')
            url=''https://github.com/tianon/gosu/releases/download/1.17/gosu-riscv64''; sha256=''38a6444b57adce135c42d5a3689f616fc7803ddc7a07ff6f946f2ebc67a26ba6''
            ;;   ''s390x'') url=''https://github.com/tianon/gosu/releases/download/1.17/gosu-s390x'';
            sha256=''69873bab588192f760547ca1f75b27cfcf106e9f7403fee6fd0600bc914979d0'' ;;   ''armv7'')
            url=''https://github.com/tianon/gosu/releases/download/1.17/gosu-armhf''; sha256=''e5866286277ff2a2159fb9196fea13e0a59d3f1091ea46ddb985160b94b6841b''
            ;;   *) echo >&2 "error: unsupported gosu architecture: ''$arch''"; exit 1 ;;  esac;  wget
            -O /usr/local/bin/gosu.asc "$url.asc";  wget -O /usr/local/bin/gosu "$url";  echo "$sha256
            */usr/local/bin/gosu" | sha256sum -c -;  export GNUPGHOME="$(mktemp -d)";  gpg --batch --keyserver
            hkps://keys.openpgp.org --recv-keys B42F6819007F00F88E364FD4036A9C25BF357DD4;  gpg --batch
            --verify /usr/local/bin/gosu.asc /usr/local/bin/gosu;  gpgconf --kill all;  rm -rf "$GNUPGHOME"
            /usr/local/bin/gosu.asc;  apk del --no-network .gosu-fetch;  chmod +x /usr/local/bin/gosu;  gosu
            --version;  gosu nobody true'
          description: ''
        - instruction: env
          arguments:
          - REDIS_VERSION=7.4.8
          description: ''
        - instruction: env
          arguments:
          - REDIS_DOWNLOAD_URL=http://download.redis.io/releases/redis-7.4.8.tar.gz
          description: ''
        - instruction: env
          arguments:
          - REDIS_DOWNLOAD_SHA=f6773cb7d63be236c59c2917a82f1f08e47b77d89b2f0c9f53becb22b8ea4172
          description: ''
        - instruction: run
          arguments:
          - set -eux;   apk add --no-cache --virtual .build-deps   coreutils   dpkg-dev dpkg   gcc   linux-headers   make   musl-dev   openssl-dev   wget  ;   wget
            -O redis.tar.gz "$REDIS_DOWNLOAD_URL";  echo "$REDIS_DOWNLOAD_SHA *redis.tar.gz" | sha256sum
            -c -;  mkdir -p /usr/src/redis;  tar -xzf redis.tar.gz -C /usr/src/redis --strip-components=1;  rm
            redis.tar.gz;   grep -E '^ *createBoolConfig[(]"protected-mode",.*, *1 *,.*[)],$' /usr/src/redis/src/config.c;  sed
            -ri 's!^( *createBoolConfig[(]"protected-mode",.*, *)1( *,.*[)],)$!\10\2!' /usr/src/redis/src/config.c;  grep
            -E '^ *createBoolConfig[(]"protected-mode",.*, *0 *,.*[)],$' /usr/src/redis/src/config.c;   gnuArch="$(dpkg-architecture
            --query DEB_BUILD_GNU_TYPE)";  extraJemallocConfigureFlags="--build=$gnuArch";  dpkgArch="$(dpkg
            --print-architecture)";  case "${dpkgArch##*-}" in   amd64 | i386 | x32) extraJemallocConfigureFlags="$extraJemallocConfigureFlags
            --with-lg-page=12" ;;   *) extraJemallocConfigureFlags="$extraJemallocConfigureFlags --with-lg-page=16"
            ;;  esac;  extraJemallocConfigureFlags="$extraJemallocConfigureFlags --with-lg-hugepage=21";  grep
            -F 'cd jemalloc && ./configure ' /usr/src/redis/deps/Makefile;  sed -ri 's!cd jemalloc &&
            ./configure !&'"$extraJemallocConfigureFlags"' !' /usr/src/redis/deps/Makefile;  grep -F "cd
            jemalloc && ./configure $extraJemallocConfigureFlags " /usr/src/redis/deps/Makefile;   export
            BUILD_TLS=yes;  make -C /usr/src/redis -j "$(nproc)" all;  make -C /usr/src/redis install;   serverMd5="$(md5sum
            /usr/local/bin/redis-server | cut -d' ' -f1)"; export serverMd5;  find /usr/local/bin/redis*
            -maxdepth 0   -type f -not -name redis-server   -exec sh -eux -c '    md5="$(md5sum "$1" |
            cut -d" " -f1)";    test "$md5" = "$serverMd5";   ' -- '{}' ';'   -exec ln -svfT 'redis-server'
            '{}' ';'  ;   rm -r /usr/src/redis;   runDeps="$(   scanelf --needed --nobanner --format '%n#p'
            --recursive /usr/local    | tr ',' '\n'    | sort -u    | awk 'system("[ -e /usr/local/lib/"
            $1 " ]") == 0 { next } { print "so:" $1 }'  )";  apk add --no-network --virtual .redis-rundeps
            $runDeps;  apk del --no-network .build-deps;   redis-cli --version;  redis-server --version
          description: ''
        - instruction: run
          arguments:
          - mkdir /data && chown redis:redis /data
          description: ''
        - instruction: volume
