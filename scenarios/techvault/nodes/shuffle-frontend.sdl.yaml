name: techvault-node-shuffle-frontend
nodes:
  shuffle-frontend:
    type: vm
    description: 'TechVault Shuffle SOAR frontend (compose service shuffle-frontend, container aptl-shuffle-frontend, image
      ghcr.io/shuffle/shuffle-frontend:latest). nginx 1.29.3 serving the pre-built React SPA and reverse-proxying /api/v1|v2
      to shuffle-backend:5001. Inventoried at experiment grade under docs/aces/inventory/shuffle-frontend/ (SCN-010 issue
      #354). On security-net 172.20.0.21; HTTP/80 published to the host as 3001:80 and HTTPS/443 as 3443:443. The nginx TLS
      private key is a captured scenario fixture; it reverse-proxies to the backend (relationships.shuffle-frontend-proxies-backend).'
    source:
      name: ghcr.io/shuffle/shuffle-frontend
      version: ghcr.io/shuffle/shuffle-frontend@sha256:3c471f39c4d0a773ee22ed8575a68579ff08dd7123e94e70a2482973a4cc296f
      build:
        base_image: debian:13
        base_image_digest: ''
        dockerfile_path: ''
        instructions:
        - instruction: run
          arguments:
          - '# debian.sh --arch ''amd64'' out/ ''trixie'' ''@1765152000'''
          description: Observed from docker history.
        - instruction: label
          arguments:
          - maintainer=NGINX Docker Maintainers <docker-maint@nginx.com>
          description: Observed from docker history.
        - instruction: env
          arguments:
          - NGINX_VERSION=1.29.3
          description: Observed from docker history.
