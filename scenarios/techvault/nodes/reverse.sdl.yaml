        description: Locally built APTL image (aptl-reverse:latest); not a registry artifact, so source.version is the local
          image config ID (sha256:7ba01e2a24863fd18fff96a3944fe4d31876d24953fb4f6410334ff36f27a192, docker image inspect .Id)
          and docker buildx imagetools inspect fails (see capture-limits.txt). Build context is ./containers; the Dockerfile
          builds the reverse-engineering workbench on the shared Ubuntu 22.04 base layer (systemd, sshd, rsyslog, the APTL
          wazuh/falco bootstrap, and the first-boot reverse-tools-install unit). The reverse-engineering toolchain (radare2
          from source, YARA, UPX, osslsigncode, OpenJDK 17, pipx flare-floss + flare-capa) and the Wazuh/Falco agents are
          installed on first boot into the writable layer and are therefore NOT present in these image layers; runtime package
