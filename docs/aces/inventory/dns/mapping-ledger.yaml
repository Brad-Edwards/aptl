schema_version: 1
asset:
  id: dns
  scenario: TechVault
  aptl_issue: 336
  aces_methodology_issue: 353
  source_class: custom-build
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: aptl-dns@sha256:98deb7dcc1ef3e3435bfeb4a9bffaac8a177636da8505164fba9eeee7508ec75
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence: []
    limits:
    - This first-party local image was captured from the local Docker daemon. No registry-visible OCI, in-toto, or SLSA attestation was available for the mutable local tag at capture time.
correspondence_checks:
- id: dns-node-source-correspondence
  status: planned
  source: nodes.dns.source
  realized_evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/source-checksums.txt
  - path: evidence/docker-history.image.txt
  ledger_fact_ids:
  - dns.image.identity
  - dns.build.recipe
  method: Compare the ACES source name/version and source.build provenance in scenarios/techvault.sdl.yaml against the realized local image digest, Docker build history, and containers/dns/ source-package checksums captured in this bundle.
  limit: 'Planned because issue #336 records the current steady-state asset spec; this branch does not rerun the lab for a live equivalence proof.'
- id: dns-runtime-correspondence
  status: planned
  source: nodes.dns.runtime
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/os-packages.txt
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/filesystem-tree.txt
  - path: evidence/osquery-listening-ports.json
  ledger_fact_ids:
  - dns.network.identity
  - dns.transport.listeners
  - dns.healthcheck
  - dns.runtime.mount-table
  - dns.runtime.filesystem-inventory
  - dns.runtime.primary-process
  - dns.runtime.supervised-process-set
  - dns.runtime.environment-policy
  - dns.runtime.container-policy
  - dns.runtime.local-identity-database
  - dns.runtime.package-inventory
  - dns.runtime.vulnerability-scan
  method: Re-run the encoded scenario from ACES SDL, recapture runtime evidence, and compare network, health, mount, filesystem, process, environment, container host/security, identity, package, vulnerability, and optional osquery surfaces against this ledger.
  limit: Planned because this issue records the frozen steady-state ACES spec and evidence, not a destructive clean-lab equivalence run.
- id: dns-logical-state-correspondence
  status: planned
  source: nodes.dns.runtime.dns_services.techvault-bind
  realized_evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/filesystem-checksums.txt
  - path: evidence/source-checksums.txt
  - path: evidence/language-manifests.txt
  ledger_fact_ids:
  - dns.service.implementation
  - dns.resolver-policy
  - dns.zone.forward
  - dns.zone.reverse
  - dns.zone.dynamic-update-transfer
  method: Recapture BIND version, named-checkconf output, named-checkzone output, and AXFR results and compare typed resolver policy, zone files, transfer observation, and RRsets against the ACES DNS runtime service model.
  limit: Planned because this issue records the snapshot DNS logical state rather than a fresh runtime equivalence proof.
notes:
- Capture used the already-running local aptl-dns container on 2026-05-28. `aptl lab stop -v && aptl lab start` was not run, so this is a non-destructive current-baseline capture rather than clean-lab rebuild proof.
- 'Brad-Edwards/aces#426 / PR #427 is consumed; current ACES dev provides runtime.dns_services for typed DNS resolver, zone, RRset, and record-state inventory.'
- No known ACES expressivity blocker remains for the catalogued DNS steady-state inventory facts. Localhost-only AXFR probing is recorded as a correspondence caveat, not a schema gap.
facts:
- id: dns.image.identity
