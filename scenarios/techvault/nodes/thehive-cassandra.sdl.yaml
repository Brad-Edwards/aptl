name: techvault-node-thehive-cassandra
nodes:
  thehive-cassandra:
    type: vm
    description: 'TechVault TheHive Cassandra datastore (compose service thehive-cassandra, container aptl-thehive-cassandra,
      image cassandra:4.1). Single-node Cassandra 4.1 wide-column store holding TheHive''s primary case/alert data in the
      ''thehive'' keyspace. Inventoried at experiment grade under docs/aces/inventory/thehive-cassandra/ (SCN-010 issue #351).
      Reached only on security-net by the thehive node (relationships.thehive-connects-cassandra); CQL/9042, 7000, 7199 are
      not host-published.'
