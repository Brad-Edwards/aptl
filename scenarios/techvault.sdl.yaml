    features:
      techvault-mailserver-service: mailserver-root
    conditions:
      mailserver-smtp-ready: mailserver-root
    roles:
      mailserver-root:
        username: root
    resources:
      ram: 512 mib
      cpu: 1
    services:
      - port: 25
        protocol: tcp
        name: smtp
      - port: 143
        protocol: tcp
        name: imap
      - port: 465
        protocol: tcp
        name: smtps
      - port: 587
        protocol: tcp
        name: submission
