name: techvault
description: >
  ACES-authored TechVault scenario inventory surface. This file is the
  incremental SCN-010 authoring target for the webapp inventory pass and does
  not replace the legacy scenario set until the cutover issue completes.

nodes:
  dmz-net:
    type: Switch
    description: TechVault DMZ network for externally reachable services.
  internal-net:
    type: Switch
    description: TechVault internal network for application-to-database traffic.
  security-net:
    type: Switch
    description: Security/SOC network used by Wazuh and related telemetry.

  db:
    type: VM
    os: linux
    source: postgres-16-alpine
    services:
      - {port: 5432, protocol: tcp, name: postgres}

  wazuh-manager:
    type: VM
    os: linux
    source: wazuh-manager-4.12
    services:
      - {port: 1514, protocol: tcp, name: wazuh-agent-events}
      - {port: 1515, protocol: tcp, name: wazuh-agent-registration}
      - {port: 514, protocol: udp, name: syslog}

  webapp:
    type: VM
    description: TechVault customer portal web application container.
    os: linux
    os_version: Debian GNU/Linux 13 (trixie)
    source:
      name: aptl-webapp
      version: aptl-webapp@sha256:7f2c715f953094ae36c10d15fbb038f0fdc6b855fd052236a95ad040410a25e0
    resources: {ram: 536870912, cpu: 1}
    features:
      techvault-webapp-service: webapp-root
      webapp-rsyslog-forwarding: webapp-root
      webapp-wazuh-agent: webapp-root
    conditions:
      webapp-http-ready: webapp-root
    vulnerabilities:
      - webapp-sqli-login
      - webapp-sqli-search
      - webapp-command-injection
      - webapp-reflected-xss
      - webapp-stored-xss
      - webapp-idor-files
      - webapp-idor-users
      - webapp-env-disclosure
      - webapp-debug-disclosure
      - webapp-weak-jwt
      - webapp-unrestricted-upload
      - webapp-hardcoded-secret
    roles:
      webapp-root:
        username: root
    services:
      - {port: 8080, protocol: tcp, name: http}
    runtime:
      mounts:
      - target: /var/log/gunicorn
        source: aptl_webapp_logs
        source_kind: volume
        read_only: false
        description: Gunicorn access-log volume tailed by the in-process Wazuh agent.
      process:
        name: supervisord
        pid: 1
        command:
        - /usr/bin/python3
        - /usr/bin/supervisord
        - -n
        - -c
        - /etc/supervisor/supervisord.conf
        role: supervisor
        user: root
        group: root
        working_directory: /app
      processes:
      - name: supervisord
        pid: 1
        command:
        - /usr/bin/python3
        - /usr/bin/supervisord
        - -n
        - -c
        - /etc/supervisor/supervisord.conf
        role: supervisor
        user: root
        group: root
        working_directory: /app
      - name: rsyslogd
        pid: 10
        parent_pid: 1
        command:
        - /usr/sbin/rsyslogd
        - -n
        role: sidecar
        user: root
      - name: gunicorn-master
        pid: 11
        parent_pid: 1
        command:
        - /usr/local/bin/python3.11
        - /usr/local/bin/gunicorn
        - --bind
        - 0.0.0.0:8080
        - --workers
        - '2'
        - --access-logfile
        - /var/log/gunicorn/access.log
        - --error-logfile
        - '-'
        - app:app
        role: worker
        user: root
        working_directory: /app
      - name: gunicorn-worker-1
        pid: 20
        parent_pid: 11
        command:
        - /usr/local/bin/python3.11
        - /usr/local/bin/gunicorn
        - --bind
        - 0.0.0.0:8080
        - --workers
        - '2'
        - --access-logfile
        - /var/log/gunicorn/access.log
        - --error-logfile
        - '-'
        - app:app
        role: worker
        user: root
        working_directory: /app
      - name: gunicorn-worker-2
        pid: 21
        parent_pid: 11
        command:
        - /usr/local/bin/python3.11
        - /usr/local/bin/gunicorn
        - --bind
        - 0.0.0.0:8080
        - --workers
        - '2'
        - --access-logfile
        - /var/log/gunicorn/access.log
        - --error-logfile
        - '-'
        - app:app
        role: worker
        user: root
        working_directory: /app
      - name: wazuh-agent-wrapper
        pid: 316
        parent_pid: 1
        command:
        - /bin/bash
        - /opt/aptl/wazuh/wazuh-agent.sh
        role: agent
        user: root
      - name: wazuh-execd
        pid: 362
        parent_pid: 1
        command:
        - /var/ossec/bin/wazuh-execd
        role: agent
        user: root
      - name: wazuh-agentd
        pid: 370
        parent_pid: 1
        command:
        - /var/ossec/bin/wazuh-agentd
        role: agent
        user: wazuh
      - name: wazuh-syscheckd
        pid: 388
        parent_pid: 1
        command:
        - /var/ossec/bin/wazuh-syscheckd
        role: agent
        user: root
      - name: wazuh-logcollector
        pid: 398
        parent_pid: 1
        command:
        - /var/ossec/bin/wazuh-logcollector
        role: agent
        user: root
      - name: wazuh-modulesd
        pid: 426
        parent_pid: 1
        command:
        - /var/ossec/bin/wazuh-modulesd
        role: agent
        user: root
      environment:
      - name: AGENT_NAME
        value: aptl-webapp-agent
        value_classification: plain
        provenance: compose
      - name: DB_HOST
        value: 172.20.2.11
        value_classification: plain
        provenance: compose
      - name: DB_NAME
        value: techvault
        value_classification: plain
        provenance: compose
      - name: DB_PASSWORD
        value: techvault_db_pass
        value_classification: secret_fixture
        provenance: compose
        description: Intentional TechVault fixture credential visible inside the range.
      - name: DB_PORT
        value: '5432'
        value_classification: plain
        provenance: compose
      - name: DB_USER
        value: techvault
        value_classification: plain
        provenance: compose
      - name: DEBIAN_FRONTEND
        value: noninteractive
        value_classification: plain
        provenance: image
      - name: FLASK_APP
        value: app.py
        value_classification: plain
        provenance: image
      - name: FLASK_ENV
        value: production
        value_classification: plain
        provenance: compose
      - name: GPG_KEY
        value: A035C8C19219BA821ECEA86B64E628F8D684696D
        value_classification: plain
        provenance: image
      - name: HOME
        value: /root
        value_classification: plain
        provenance: runtime
      - name: HOSTNAME
        value: webapp
        value_classification: plain
        provenance: container
      - name: LANG
        value: C.UTF-8
        value_classification: plain
        provenance: image
      - name: LOG_FORMAT
        value: syslog
        value_classification: plain
        provenance: compose
      - name: LOG_PATHS
        value: /var/log/gunicorn/access.log
        value_classification: plain
        provenance: compose
      - name: PATH
        value: /usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        value_classification: plain
        provenance: image
      - name: PWD
        value: /app
        value_classification: plain
        provenance: runtime
      - name: PYTHON_SHA256
        value: 272179ddd9a2e41a0fc8e42e33dfbdca0b3711aa5abf372d3f2d51543d09b625
        value_classification: plain
        provenance: image
      - name: PYTHON_VERSION
        value: 3.11.15
        value_classification: plain
        provenance: image
      - name: SIEM_IP
        value: 172.20.2.30
        value_classification: plain
        provenance: compose
      - name: WAZUH_MANAGER
        value: wazuh.manager
        value_classification: plain
        provenance: compose
      linux_capabilities:
        required:
        - CAP_NET_ADMIN
        effective:
        - CAP_CHOWN
        - CAP_DAC_OVERRIDE
        - CAP_FOWNER
        - CAP_FSETID
        - CAP_KILL
        - CAP_SETGID
        - CAP_SETUID
        - CAP_SETPCAP
        - CAP_NET_BIND_SERVICE
        - CAP_NET_ADMIN
        - CAP_NET_RAW
        - CAP_SYS_CHROOT
        - CAP_MKNOD
        - CAP_AUDIT_WRITE
        - CAP_SETFCAP
        add:
        - CAP_NET_ADMIN
        description: Observed effective set from /proc/1/status CapEff; CAP_NET_ADMIN is explicitly added for Wazuh active response.
      operational_policy:
        restart: unless_stopped
        resource_limits:
          memory: 536870912
          memory_swap: 1073741824
        description: Docker HostConfig has no explicit CPU, PID, or ulimit cap for this container.
