    - nodes
    fields:
    - relationships.misp-suricata-sync-updates-suricata-rules
    rationale: The realized IOC-enforcement handoff is encoded as a typed relationship carrying the socket and rules paths.
- id: misp-suricata-sync.secret.misp-api-key-fixture
  category: secret
  summary: MISP_API_KEY equals the lab MISP admin API key already disclosed as a secret_fixture on nodes.techvault.misp (ADMIN_KEY);
    evidence and SDL carry the fixture value verbatim.
  evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.environment
    rationale: The scenario-fixture API key is encoded with its value per the repo secret-fixture policy (deliberate lab credential,
      reproduction input).
    caveat: Committed evidence and SDL both retain the scenario-fixture API key, identical to the misp node's ADMIN_KEY.
