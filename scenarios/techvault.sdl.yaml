name: techvault
description: >
  ACES-authored TechVault scenario inventory surface. This file is the
  incremental SCN-010 authoring target for the TechVault container inventory
  passes and does not replace the legacy scenario set until the cutover issue
  completes.

nodes:
  redteam-net:
    type: Switch
    description: TechVault red-team network for the kali attacker container.

  dmz-net:
    type: Switch
    description: TechVault DMZ network for externally reachable services.
  internal-net:
    type: Switch
    description: TechVault internal network for application-to-database traffic.
  security-net:
    type: Switch
    description: Security/SOC network used by Wazuh and related telemetry.

  db:
    type: VM
    description: TechVault PostgreSQL database container steady-state inventory.
    os: linux
    os_version: Alpine Linux v3.23
    source:
      name: postgres
      version: postgres@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
      build:
        description: Observed upstream postgres:16-alpine image provenance plus TechVault init-script bind mount inputs.
        base_image: alpine:3.23.4
        dockerfile_path: upstream:docker-library/postgres/16/alpine/Dockerfile
        instructions:
        - instruction: add
          arguments:
          - 'alpine-minirootfs-3.23.4-x86_64.tar.gz / # buildkit'
        - instruction: cmd
          arguments:
          - '["/bin/sh"]'
        - instruction: run
          arguments:
          - '/bin/sh -c set -eux;  addgroup -g 70 -S postgres;  adduser -u 70 -S -D -G postgres -H -h /var/lib/postgresql -s /bin/sh postgres;  install --verbose --directory --owner postgres --group postgres --mode 1777 /var/lib/postgresql # buildkit'
        - instruction: env
          arguments:
          - GOSU_VERSION=1.19
        - instruction: run
          arguments:
          - '/bin/sh -c set -eux;   apk add --no-cache --virtual .gosu-deps   ca-certificates   dpkg   gnupg  ;   dpkgArch="$(dpkg --print-architecture | awk -F- ''{ print $NF }'')";  wget -O /usr/local/bin/gosu "https://github.com/tianon/gosu/releases/download/$GOSU_VERSION/gosu-$dpkgArch";  wget -O /usr/local/bin/gosu.asc "https://github.com/tianon/gosu/releases/download/$GOSU_VERSION/gosu-$dpkgArch.asc";   export GNUPGHOME="$(mktemp -d)";  gpg --batch --keyserver hkps://keys.openpgp.org --recv-keys B42F6819007F00F88E364FD4036A9C25BF357DD4;  gpg --batch --verify /usr/local/bin/gosu.asc /usr/local/bin/gosu;  gpgconf --kill all;  rm -rf "$GNUPGHOME" /usr/local/bin/gosu.asc;   apk del --no-network .gosu-deps;   chmod +x /usr/local/bin/gosu;  gosu --version;  gosu nobody true # buildkit'
        - instruction: run
          arguments:
          - '/bin/sh -c set -eux; ln -svf gosu /usr/local/bin/su-exec; su-exec nobody true # backwards compatibility (removed in PostgreSQL 17+) # buildkit'
        - instruction: env
          arguments:
          - LANG=en_US.utf8
        - instruction: run
          arguments:
          - '/bin/sh -c mkdir /docker-entrypoint-initdb.d # buildkit'
        - instruction: env
          arguments:
          - PG_MAJOR=16
        - instruction: env
          arguments:
          - PG_VERSION=16.13
        - instruction: env
          arguments:
          - PG_SHA256=dc2ddbbd245c0265a689408e3d2f2f3f9ba2da96bd19318214b313cdd9797287
        - instruction: env
          arguments:
          - DOCKER_PG_LLVM_DEPS=llvm19-dev   clang19
        - instruction: run
          arguments:
          - '/bin/sh -c set -eux;   wget -O postgresql.tar.bz2 "https://ftp.postgresql.org/pub/source/v$PG_VERSION/postgresql-$PG_VERSION.tar.bz2";  echo "$PG_SHA256 *postgresql.tar.bz2" | sha256sum -c -;  mkdir -p /usr/src/postgresql;  tar   --extract   --file postgresql.tar.bz2   --directory /usr/src/postgresql   --strip-components 1  ;  rm postgresql.tar.bz2;   apk add --no-cache --virtual .build-deps   $DOCKER_PG_LLVM_DEPS   bison   coreutils   dpkg-dev dpkg   flex   g++   gcc   krb5-dev   libc-dev   libedit-dev   libxml2-dev   libxslt-dev   linux-headers   make   openldap-dev   openssl-dev   perl-dev   perl-ipc-run   perl-utils   python3-dev   tcl-dev   util-linux-dev   zlib-dev   icu-dev   lz4-dev   zstd-dev  ;   cd /usr/src/postgresql;  awk ''$1 == "#define" && $2 == "DEFAULT_PGSOCKET_DIR" && $3 == "\"/tmp\"" { $3 = "\"/var/run/postgresql\""; print; next } { print }'' src/include/pg_config_manual.h > src/include/pg_config_manual.h.new;  grep ''/var/run/postgresql'' src/include/pg_config_manual.h.new;  mv src/include/pg_config_manual.h.new src/include/pg_config_manual.h;  gnuArch="$(dpkg-architecture --query DEB_BUILD_GNU_TYPE)";   export LLVM_CONFIG="/usr/lib/llvm19/bin/llvm-config";  export CLANG=clang-19;   ./configure   --enable-option-checking=fatal   --build="$gnuArch"   --enable-integer-datetimes   --enable-thread-safety   --enable-tap-tests   --disable-rpath   --with-uuid=e2fs   --with-pgport=5432   --with-system-tzdata=/usr/share/zoneinfo   --prefix=/usr/local   --with-includes=/usr/local/include   --with-libraries=/usr/local/lib   --with-gssapi   --with-icu   --with-ldap   --with-libxml   --with-libxslt   --with-llvm   --with-lz4   --with-openssl   --with-perl   --with-python   --with-tcl   --with-zstd  ;  make -j "$(nproc)" world-bin;  make install-world-bin;  make -C contrib install;   runDeps="$(   scanelf --needed --nobanner --format ''%n#p'' --recursive /usr/local    | tr '','' ''\n''    | sort -u    | awk ''system("[ -e /usr/local/lib/" $1 " ]") == 0 { next } { print "so:" $1 }''    | grep -v -e perl -e python -e tcl  )";  apk add --no-cache --virtual .postgresql-rundeps   $runDeps   bash   tzdata   zstd   icu-data-full   $([ "$(apk --print-arch)" != ''ppc64le'' ] && echo ''nss_wrapper'')  ;  apk del --no-network .build-deps;  cd /;  rm -rf   /usr/src/postgresql   /usr/local/share/doc   /usr/local/share/man  ;   postgres --version # buildkit'
        - instruction: run
          arguments:
          - '/bin/sh -c set -eux;  cp -v /usr/local/share/postgresql/postgresql.conf.sample /usr/local/share/postgresql/postgresql.conf.sample.orig;  sed -ri "s!^#?(listen_addresses)\s*=\s*\S+.*!\1 = ''*''!" /usr/local/share/postgresql/postgresql.conf.sample;  grep -F "listen_addresses = ''*''" /usr/local/share/postgresql/postgresql.conf.sample # buildkit'
        - instruction: run
          arguments:
          - '/bin/sh -c install --verbose --directory --owner postgres --group postgres --mode 3777 /var/run/postgresql # buildkit'
        - instruction: env
          arguments:
          - PGDATA=/var/lib/postgresql/data
        - instruction: run
          arguments:
          - '/bin/sh -c install --verbose --directory --owner postgres --group postgres --mode 1777 "$PGDATA" # buildkit'
        - instruction: volume
          arguments:
          - '[/var/lib/postgresql/data]'
        - instruction: copy
          arguments:
          - 'docker-entrypoint.sh docker-ensure-initdb.sh /usr/local/bin/ # buildkit'
        - instruction: run
          arguments:
          - '/bin/sh -c ln -sT docker-ensure-initdb.sh /usr/local/bin/docker-enforce-initdb.sh # buildkit'
        - instruction: entrypoint
          arguments:
          - '["docker-entrypoint.sh"]'
        - instruction: stopsignal
          arguments:
          - SIGINT
        - instruction: expose
          arguments:
          - map[5432/tcp:{}]
        - instruction: cmd
          arguments:
          - '["postgres"]'
