StylesPath = .vale/styles
MinAlertLevel = error
Packages = Google

[*.md]
BasedOnStyles = Google, AptlProject
# Lab docs quote literal config values ("512MB" mem_limit, "300s"
# timeout). Inserting a space between number and unit would make the
# prose diverge from the strings that actually appear in compose files
# and CLI output.
Google.Units = NO

# Generated/collated artifacts: CHANGELOG.md is built by towncrier from
# changelog.d/ fragments; neither is hand-maintained prose worth gating.
[CHANGELOG.md]
BasedOnStyles =

[changelog.d/**]
BasedOnStyles =

# Agent-facing contracts, not external-facing docs: skills, repo
# instructions, and issue templates carry their own conventions.
[{.claude,.gc,.github}/**]
BasedOnStyles =

[{AGENTS,CLAUDE}.md]
BasedOnStyles =

# ACES inventory evidence bundles are capture artifacts — verbatim
# record value outweighs enforcing prose style on generated READMEs
# and ledgers.
[docs/aces/inventory/**]
BasedOnStyles =
