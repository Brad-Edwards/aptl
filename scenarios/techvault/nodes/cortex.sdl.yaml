          - analyze
          - orgadmin
          description: Seeded APTL Cortex service account used by TheHive; raw API key/password are redacted.
        roles:
        - role_id: read
          name: read
          description: ''
        - role_id: analyze
          name: analyze
          description: ''
        - role_id: orgadmin
          name: orgadmin
          description: ''
        permission_grants:
        - grant_id: cortex_appliance_access
          role_ref: orgadmin
          resource_kind: app_resource
          actions:
          - read
          - analyze
          - orgadmin
          resource_patterns:
          - APTL/*
          effect: allow
          description: Cortex stores role names on the service-account user document; the grant captures the observed app-level
