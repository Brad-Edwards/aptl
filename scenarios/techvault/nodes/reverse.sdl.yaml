        buffer_policy:
          buffer_policy_id: reverse-wazuh-agent-buffer
          queue_capacity: null
          eps: null
          crypto: aes
          reconnect_seconds: null
          description: crypto_method aes from the rendered ossec.conf; queue/eps/reconnect left unset.
        reload_channels: []
        settings: []
        description: In-process Wazuh agent (wazuh-agentd, PID in runtime.processes). Registers to the manager via agent-auth
          (manager agent_control shows it Active). The registration NAME is runtime-generated by install-all.sh as reverse-$(hostname)-$(date
          +%s) (e.g. reverse-reverse-host-<unix-ts>, id 009 in this capture), so the literal agent name is non-deterministic
          and is NOT encoded as a stable value; this node-level forwarding_agent is the stable handle the reverse-forwards-wazuh
          relationship resolves to. The wazuh-manager node's agents[] list is intentionally NOT extended for this node for
          the same reason (see mapping-ledger).
