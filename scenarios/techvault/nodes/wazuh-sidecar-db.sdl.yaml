name: techvault-node-wazuh-sidecar-db
nodes:
  wazuh-sidecar-db:
    type: vm
    description: 'TechVault Wazuh log-forwarding sidecar container steady-state inventory (SCN-010 issue #343). Custom-built debian:12-slim image (aptl-wazuh-sidecar:local) running wazuh-agent 4.12.0 as the off-node forwarder for the db node: it mounts the shared db_data volume read-only at /logs and ships /logs/pg_log/postgresql.log (syslog format) to the wazuh-manager. It is an ADR-020 carve-out (postgres:16-alpine has no first-party Wazuh package). The sidecar sits on security-net only, publishes no host ports, and exposes no network listener (it dials out to the manager on TCP/1514, evidenced by the manager agent_control registration as agent 005 aptl-db-agent). The cross-node forwarding behaviour is registered at the scenario level as forwarding_agents[aptl-db-wazuh-agent] (per Brad-Edwards/aces#460), which the relationships.db-logs-forwarded-wazuh and wazuh-sidecar-db-forwards-wazuh-manager edges resolve to; this node carries the asset-level inventory (image, packages, CVEs, filesystem, identity, runtime) that the registry entry cannot express.'
    os: linux
    os_version: Debian GNU/Linux 12 (bookworm)
    source:
      name: aptl-wazuh-sidecar
      version: aptl-wazuh-sidecar@sha256:1a9c99918f73a234721fe07ccafdcc6c49e1b3784a16ce86cdb2864636345d25
      build:
        description: Locally built APTL image (aptl-wazuh-sidecar:local); not a registry artifact, so source.version is the local image config ID (sha256:1a9c99918f73a234721fe07ccafdcc6c49e1b3784a16ce86cdb2864636345d25, docker image inspect .Id) and docker buildx imagetools inspect fails (see capture-limits.txt). The build context is the repo root; the Dockerfile (containers/wazuh-sidecar/Dockerfile) COPYs the shared containers/_wazuh-agent bootstrap and the active-response whitelist, installs wazuh-agent=4.12.0-1 from packages.wazuh.com via install.sh, then purges curl/gnupg for image trim. Build inputs and their checksums are recorded in source_inputs and source-checksums.txt; layer sizes are docker history values.
        base_image: debian:12-slim
        base_image_digest: ''
        dockerfile_path: containers/wazuh-sidecar/Dockerfile
        instructions:
        - instruction: from
          arguments:
          - debian:12-slim
          description: Base image.
        - instruction: env
          arguments:
          - DEBIAN_FRONTEND=noninteractive
          description: ''
        - instruction: copy
          arguments:
          - containers/_wazuh-agent/install.sh
          - /tmp/install-wazuh.sh
          description: Shared wazuh-agent installer.
        - instruction: copy
          arguments:
          - containers/_wazuh-agent/aptl-firewall-drop.sh
          - /tmp/aptl-firewall-drop.sh
          description: Active-response wrapper (ADR-021).
        - instruction: copy
          arguments:
          - config/wazuh_cluster/etc/lists/active-response-whitelist
          - /tmp/active-response-whitelist
          description: Kali AR whitelist (ADR-021).
        - instruction: run
          arguments:
          - /tmp/install-wazuh.sh && rm /tmp/install-wazuh.sh /tmp/aptl-firewall-drop.sh /tmp/active-response-whitelist && apt-get purge -y curl gnupg && apt-get autoremove -y && rm -rf /var/lib/apt/lists/*
          description: Install wazuh-agent=4.12.0-1 + AR wrapper, then trim curl/gnupg.
        - instruction: copy
          arguments:
          - containers/_wazuh-agent/ossec.conf.template
          - /opt/aptl/wazuh/ossec.conf.template
          description: Agent config template.
        - instruction: copy
          arguments:
          - containers/_wazuh-agent/wazuh-agent.sh
          - /opt/aptl/wazuh/wazuh-agent.sh
          description: Runtime bootstrap entrypoint.
        - instruction: run
          arguments:
          - chmod +x /opt/aptl/wazuh/wazuh-agent.sh
          description: ''
        - instruction: entrypoint
          arguments:
          - '["/opt/aptl/wazuh/wazuh-agent.sh"]'
          description: ''
        layers:
        - digest: ''
          created_by: '/bin/sh -c #(nop) debian.sh --arch ''amd64'' out/ ''bookworm'' ''@1779062400'''
          size: 85200000
          empty: false
          description: debian:12-slim bookworm rootfs (debuerreotype 0.17).
        - digest: ''
          created_by: ENV DEBIAN_FRONTEND=noninteractive
          size: 0
          empty: true
          description: ''
        - digest: ''
