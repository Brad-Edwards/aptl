name: techvault-node-shuffle-opensearch
nodes:
  shuffle-opensearch:
    type: vm
    description: 'TechVault Shuffle SOAR OpenSearch datastore (compose service shuffle-opensearch, container aptl-shuffle-opensearch,
      image opensearchproject/opensearch:2.14.0). Single-node OpenSearch 2.14 with the security plugin ENABLED (HTTPS + basic
      auth); the sole persistence backend for the Shuffle SOAR stack (24 indices). Inventoried at experiment grade under docs/aces/inventory/shuffle-opensearch/
      (SCN-010 issue #356). Reached only on security-net by shuffle-backend (relationships.shuffle-backend-connects-opensearch);
      9200/9300/9600 are not host-published.'
