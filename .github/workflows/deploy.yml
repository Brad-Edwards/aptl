name: Deploy Lab

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: environment
        required: true

jobs:
  deploy:
    # On push to dev: use DEFAULT_DEPLOY_ENVIRONMENT repo variable.
    # On manual dispatch: use the selected environment.
    # If neither exists, the job is skipped entirely — users who
    # only run locally are unaffected.
    environment: ${{ inputs.environment || vars.DEFAULT_DEPLOY_ENVIRONMENT }}
    if: ${{ inputs.environment || vars.DEFAULT_DEPLOY_ENVIRONMENT != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        if: vars.DEPLOY_VIA_TAILSCALE == 'true'
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/aptl' }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=accept-new ${DEPLOY_USER}@${DEPLOY_HOST}"

          # Sync repo from runner to remote (runner has repo access, remote doesn't)
          $SSH "mkdir -p ${DEPLOY_DIR}"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=accept-new" \
            --exclude='.git' \
            --exclude='.env' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_DIR}/"

          # Seed .env from example if first deploy
          $SSH "cd ${DEPLOY_DIR} && [ -f .env ] || cp .env.example .env"

          # Install Python CLI in venv
          $SSH "cd ${DEPLOY_DIR} && ([ -d .venv ] || python3 -m venv .venv) && .venv/bin/pip install -e ."

          # Read enabled profiles from aptl.json and start
          PROFILES=$($SSH "cd ${DEPLOY_DIR} && python3 -c \"
          import json
          c = json.load(open('aptl.json')).get('containers', {})
          print(' '.join(f'--profile {k}' for k, v in c.items() if v))
          \"")

          $SSH "cd ${DEPLOY_DIR} && docker compose down --remove-orphans 2>/dev/null || true"
          $SSH "cd ${DEPLOY_DIR} && docker compose ${PROFILES} --profile otel up --build -d"

      - name: Verify
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/aptl' }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=accept-new ${DEPLOY_USER}@${DEPLOY_HOST}"

          # Poll until all containers are running (12 attempts x 10s = 120s max)
          for attempt in $(seq 1 12); do
            echo "Verify attempt ${attempt}/12..."
            RESULT=$($SSH "cd ${DEPLOY_DIR} && docker compose ps --format json" 2>/dev/null || echo "")

            if [ -n "$RESULT" ]; then
              STATUS=$(echo "$RESULT" | python3 -c "
          import json, sys
          containers = []
          for line in sys.stdin:
              line = line.strip()
              if not line: continue
              try:
                  if line.startswith('['):
                      containers.extend(json.loads(line))
                  else:
                      containers.append(json.loads(line))
              except json.JSONDecodeError:
                  continue
          if not containers:
              print('WAITING')
              sys.exit(0)
          for c in containers:
              name = c.get('Name', 'unknown')
              state = c.get('State', 'unknown')
              health = c.get('Health', '')
              info = f'  {name}: {state}'
              if health: info += f' ({health})'
              print(info, file=sys.stderr)
          running = sum(1 for c in containers if c.get('State') == 'running')
          total = len(containers)
          print(f'{running}/{total} containers running', file=sys.stderr)
          if running >= total:
              print('PASS')
          else:
              print('WAITING')
          ")

              if [ "$STATUS" = "PASS" ]; then
                echo "All containers running."
                exit 0
              fi
            fi

            echo "Not ready yet, waiting 10s..."
            sleep 10
          done

          echo "ERROR: Containers did not all reach running state within 120s"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
