  summary: The sync service resolves to the local image config ID aptl-misp-suricata-sync@sha256:f2e12bfa... on Debian 13
    (trixie); no registry digest exists for the local build.
  evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/docker-buildx-imagetools.image.err
  - path: evidence/osquery-docker-images.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.source.name
    - nodes.techvault.misp-suricata-sync.source.version
    - nodes.techvault.misp-suricata-sync.os_version
    rationale: Current ACES SDL node source fields carry the local-build image identity directly.
- id: misp-suricata-sync.image.build-recipe
  category: image
  summary: The Dockerfile instructions (7 authored), 16 BuildKit history layers, default config, and absent attestation are
    encoded as local-build provenance.
  evidence:
  - path: evidence/docker-history.image.txt
  - path: evidence/docker-history.image.jsonl
  - path: evidence/docker-inspect.image.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.source.build.instructions
    - nodes.techvault.misp-suricata-sync.source.build.layers
    - nodes.techvault.misp-suricata-sync.source.build.config
    - nodes.techvault.misp-suricata-sync.source.build.attestation
    rationale: Current ACES SDL node build fields carry this catalogued fact directly.
- id: misp-suricata-sync.source.build-inputs
  category: source
  summary: The packaging metadata (pyproject.toml) and the eight executed aptl.services.misp_suricata_sync sources are recorded
    with sha256 checksums; the Dockerfile COPYs the entire repo src/ tree.
  evidence:
  - path: evidence/source-checksums.txt
  - path: evidence/filesystem-checksums.txt.xz
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.source.build.source_inputs
    rationale: Current ACES SDL build source_inputs carry the executed-package build inputs and their checksums directly.
    caveat: source_inputs enumerate pyproject.toml plus the executed service package, not every file of the full src/ copy;
      the in-image copy is evidenced by the filesystem manifest under /app and the installed site-packages tree.
- id: misp-suricata-sync.compose.service-contract
  category: compose
  summary: Compose declares aptl-misp-suricata-sync, a local build, ten env vars (MISP_API_KEY as an interpolation template),
    128m memory limit, the socket volume + the shared misp-rules volume + the lab-CA bind, depends_on misp healthy /
    suricata started, and security-net address 172.20.0.19.
  evidence:
  - path: evidence/compose-service.misp-suricata-sync.json
  - path: evidence/docker-compose-version.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    - relationships
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.environment
    - nodes.techvault.misp-suricata-sync.runtime.operational_policy
    - nodes.techvault.misp-suricata-sync.runtime.mounts
    rationale: Current ACES SDL node runtime fields carry the compose contract directly.
- id: misp-suricata-sync.runtime.container-policy
  category: runtime
  summary: Docker runtime policy captures restart unless-stopped, 128 MiB memory, namespaces, masked/read-only paths, no added
    capabilities, log driver, and runc runtime.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/docker-top.txt
  - path: evidence/docker-logs.misp-suricata-sync.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.container
    - nodes.techvault.misp-suricata-sync.runtime.operational_policy
    rationale: Current ACES SDL node runtime container/operational_policy fields carry this catalogued fact directly.
- id: misp-suricata-sync.network.identity
  category: network
  summary: The service is attached to security-net only at 172.20.0.19 with Docker aliases/DNS names/MAC, publishes no host
    ports, and is unreachable from the kali participant vantage.
  evidence:
  - path: evidence/docker-network.aptl-security.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/participant-discovery.kali.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.network.endpoints
    - nodes.techvault.misp-suricata-sync.runtime.network.published_ports
    rationale: Current ACES SDL node network fields carry the realized endpoint and no-published-port facts directly.
- id: misp-suricata-sync.runtime.mounts-volume
  category: runtime
  summary: 'Three mounts: the shared suricata_command_socket volume rw at /var/run/suricata, the shared
    aptl_suricata_misp_rules named volume rw at /var/lib/suricata/rules/misp (ADR-043; formerly a .aptl host bind), and the
    lab CA pem ro at /etc/lab-ca/lab-ca.pem.'
  evidence:
  - path: evidence/docker-volume.suricata_command_socket.json
  - path: evidence/docker-volume.suricata_misp_rules.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.mounts
    rationale: Current ACES SDL node runtime.mounts carries the volume mounts directly.
    caveat: ACES models the shared socket volume as a node mount with the volume name as source; there is no typed cross-node
      volume-ownership reference, consistent with the sidecar inventory precedent. The socket itself belongs to the suricata
      asset.
- id: misp-suricata-sync.runtime.filesystem-inventory
  category: filesystem
  summary: The /app build copy, installed aptl package, console script, lab CA input, rules handoff directory (with the generated
    misp-iocs.rules and the suricata-owned hash lists), command socket, and os-release are encoded with checksums for stable
    files.
  evidence:
  - path: evidence/filesystem-tree.txt.gz
  - path: evidence/filesystem-checksums.txt.xz
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.filesystem_inventory
    rationale: Current ACES SDL node runtime.filesystem_inventory carries the path/metadata/checksum facts directly.
    caveat: The manifest is scoped to application surfaces; __pycache__ bytecode and third-party site-packages trees are excluded
      (SBOM + pip list evidence the dependency closure). The hash-list sidecar files are the suricata asset's authored content,
      visible via the shared aptl_suricata_misp_rules volume.
- id: misp-suricata-sync.runtime.process-tree
  category: runtime
  summary: PID 1 is the single python3.11 aptl-misp-suricata-sync process (root); no supervisor, no worker pool.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-processes.json
  - path: evidence/docker-top.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.processes
    rationale: Current ACES SDL node runtime.processes carries the captured single-process tree directly.
- id: misp-suricata-sync.runtime.service-listeners
  category: runtime
  summary: The service exposes no network listener; osquery (container netns) shows only the Docker embedded DNS resolver.
  evidence:
  - path: evidence/osquery-listening-ports.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.service_listeners
    - nodes.techvault.misp-suricata-sync.runtime.network.published_ports
    rationale: Current ACES SDL node fields carry the no-network-listener fact directly (empty service_listeners + empty published_ports).
    caveat: ss/netstat are not installed in the image, so the listener fact is sourced from container-namespace osquery; the
      only sockets are the backend-generated Docker DNS resolver.
- id: misp-suricata-sync.runtime.environment
  category: runtime
  summary: Runtime environment is ten compose variables (sync loop config plus MISP_API_KEY) and five image variables (PATH,
    LANG, GPG_KEY, PYTHON_VERSION, PYTHON_SHA256).
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.environment
    rationale: Current ACES SDL node runtime.environment carries the captured variables directly.
    caveat: MISP_API_KEY and GPG_KEY are retained verbatim in committed evidence and SDL; MISP_API_KEY equals the ADMIN_KEY
      fixture already disclosed on nodes.techvault.misp.
- id: misp-suricata-sync.runtime.linux-capabilities
  category: runtime
  summary: PID 1 holds the default Docker capability set (00000000a80425fb); no cap_add. The service runs as root to write
    misp-iocs.rules into the shared aptl_suricata_misp_rules volume (whose tree the suricata entrypoint chowns), not for added
    kernel capabilities.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.linux_capabilities
    rationale: Current ACES SDL node runtime.linux_capabilities carries the effective capability mask directly.
- id: misp-suricata-sync.runtime.local-identity
  category: identity
  summary: Local passwd/group inventory records 18 users and 38 groups (stock Debian 13 slim set; no added service account),
    no sudo rules.
  evidence:
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    - accounts
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.local_identity
    rationale: Current ACES SDL node runtime.local_identity carries the local identity surface directly.
- id: misp-suricata-sync.application.software-versions
