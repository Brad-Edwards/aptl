name: Checks

# Single quality + security gate. There is intentionally no auto-deploy
# workflow — APTL is local-first and there is currently nowhere to deploy
# to. All checks below run in parallel; SonarCloud waits for the test
# jobs to finish so it can ingest their coverage.
#
# Required repo secrets:
#   SONAR_TOKEN — SonarCloud authentication
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pre-commit
      # Skip the local test hooks here — the dedicated python-tests /
      # mcp-tests / web-tests jobs below already run them with the right
      # toolchain (deps installed, node available, etc). The test hooks
      # exist for local pre-commit safety, not CI redundancy.
      - run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: pytest,vitest-mcp-common,vitest-mcp-red,vitest-web

  python-tests:
    name: Python tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Clone aces-sdl at pinned SHA
        # aces-sdl carries its controlled-vocabulary catalog as a
        # repo-relative artifact under contracts/; aces_contracts
        # resolves it via Path(__file__).parents[4]. That only points
        # at a real directory under an EDITABLE install rooted in the
        # actual source tree. `pip install -e "git+..."` with a
        # `subdirectory=` URL fragment does NOT produce an editable
        # install on GitHub Actions today — it builds a wheel anyway,
        # the catalog falls outside parents[4], and BackendManifest
        # construction dies with FileNotFoundError. Workaround: clone
        # the repo explicitly so we install from a real path. Tracked
        # in docs/lessons/2026-05-19-aces-backend-skeleton.md.
        run: |
          git clone --depth 1 https://github.com/Brad-Edwards/aces.git ../aces-sdl
          (cd ../aces-sdl && git fetch --depth 1 origin 12d9a8234b354f4f181a5db251d791ac57441f52 && git checkout 12d9a8234b354f4f181a5db251d791ac57441f52)
      - run: |
          python -m pip install --upgrade pip
          pip install -e ../aces-sdl/implementations/python
          pip install -e ".[dev,web]"
      - run: |
          coverage run -m pytest tests/ -q -k "not integration"
          coverage xml -o coverage.xml
      - uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 7

  # ACES backend conformance for the provisioning-only profile
  # (#310 / SCN-010 / ADR-035). Runs the published ACES conformance
  # suite against APTL's RuntimeTarget. Blocking — APTL has cut over
  # to the ACES authoring surface; a failure here means the backend
  # contract surface has drifted relative to the pinned aces-sdl SHA.
  # Bumping that SHA in .github/workflows/checks.yml is what bumps
  # the contract surface this gate validates against; record findings
  # in docs/lessons/.
  aces-conformance:
    name: ACES backend conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Clone aces-sdl at pinned SHA
        # See note on python-tests job: pip install -e "git+..." with
        # a subdirectory= fragment does NOT produce an editable install
        # on GitHub Actions; the aces_contracts parents[4] path walk
        # for the controlled-vocabulary catalog falls outside the
        # cloned tree. Clone explicitly and install from path.
        run: |
          git clone --depth 1 https://github.com/Brad-Edwards/aces.git ../aces-sdl
          (cd ../aces-sdl && git fetch --depth 1 origin 12d9a8234b354f4f181a5db251d791ac57441f52 && git checkout 12d9a8234b354f4f181a5db251d791ac57441f52)
      - run: |
          python -m pip install --upgrade pip
          pip install -e ../aces-sdl/implementations/python
          pip install -e ".[dev]"
      - name: Run conformance against provisioning-only profile
        run: |
          python -c "
          import json
          from aces_conformance.conformance import run_target_conformance
          from aptl.backends.aces import create_aptl_target

          report = run_target_conformance(
              create_aptl_target(), profile='provisioning-only'
          )
          # Report shape: passed bool + diagnostics. Print structured.
          print(json.dumps({
              'passed': report.passed,
              'diagnostic_count': len(report.diagnostics),
              'diagnostics': [
                  {'code': d.code, 'address': d.address, 'severity': d.severity.value, 'message': d.message}
                  for d in report.diagnostics
              ],
          }, indent=2))
          # Non-zero exit gates the workflow (the surrounding
          # continue-on-error: true was removed at cutover).
          raise SystemExit(0 if report.passed else 1)
          "

  mcp-tests:
    name: MCP TypeScript tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: aptl-mcp-common — install, build, test
        # `npm run build` runs explicitly before mcp-red copies the build
        # output. The `prepare` script also builds, but ordering across
        # `npm install` and `npx vitest run --coverage` is not load-bearing
        # — the explicit build keeps the contract obvious and the mcp-red
        # step below dependable.
        # The `sed` rewrites LCOV `SF:src/...` paths to repo-root-relative
        # `SF:mcp/aptl-mcp-common/src/...` so SonarCloud can match coverage
        # against the actual project tree (Sonar resolves SF: paths against
        # `sonar.sources`, which is anchored at the repo root).
        run: |
          cd mcp/aptl-mcp-common
          npm install
          npm run build
          npx vitest run --coverage
          sed -i 's|^SF:|SF:mcp/aptl-mcp-common/|' coverage/lcov.info
      - name: mcp-red — install (rebuilds against fresh common), test, and coverage
        # mcp-red consumes aptl-mcp-common via `file:`. npm install in
        # mcp-red copies the *current* build artifact, so the explicit
        # `npm run build` above must have produced fresh `build/` first.
        # `sed` rewrites LCOV paths so SonarCloud matches coverage against
        # `mcp/mcp-red/src/...` (see aptl-mcp-common step for the same
        # reasoning).
        run: |
          cd mcp/mcp-red
          rm -rf node_modules/aptl-mcp-common
          npm install --no-audit --no-fund
          npx vitest run --coverage
          sed -i 's|^SF:|SF:mcp/mcp-red/|' coverage/lcov.info
      - name: dependent MCPs — rebuild against fresh common (build-only verification)
        # Plan rules require every aptl-mcp-common consumer to rebuild
        # and pass tests when common changes. None of these dependents
        # currently ship vitest suites, but a build pass catches type-
        # level breakage from common API drift. When any of these
        # packages add tests, extend the matrix below to also run
        # `npx vitest run`.
        run: |
          for pkg in mcp-wazuh mcp-soar mcp-network mcp-indexer mcp-reverse mcp-threatintel mcp-casemgmt; do
            echo "=== $pkg ==="
            cd "mcp/$pkg"
            rm -rf node_modules/aptl-mcp-common
            npm install --no-audit --no-fund
            if [ -f tsconfig.build.json ]; then
              npx tsc -p tsconfig.build.json
            else
              npx tsc
            fi
            cd -
          done
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-coverage
          path: mcp/aptl-mcp-common/coverage/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-red-coverage
          path: mcp/mcp-red/coverage/
          retention-days: 7

  web-tests:
    name: Web frontend tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: |
          cd web
          npm install
          npx svelte-kit sync
          npx vitest run --coverage
          sed -i 's|^SF:|SF:web/|' coverage/lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage/
          retention-days: 7

  dependency-audit:
    name: Dependency vulnerability scan (advisory)
    runs-on: ubuntu-latest
    # Advisory only — the lab has known-vulnerable training targets and a
    # large transitive Node tree. Findings are surfaced in the job log so
    # they can be triaged out of band, not gated in CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: pip-audit (Python dependencies)
        run: |
          pip install pip-audit
          pip-audit --strict --progress-spinner=off || true
      - name: npm audit (JS/TS workspaces)
        run: |
          set +e
          for dir in web mcp/aptl-mcp-common mcp/mcp-casemgmt mcp/mcp-indexer mcp/mcp-network mcp/mcp-red mcp/mcp-reverse mcp/mcp-soar mcp/mcp-threatintel mcp/mcp-wazuh; do
            [ -f "$dir/package.json" ] || continue
            echo ""
            echo "=== $dir ==="
            (cd "$dir" && npm install --no-audit --no-fund --silent >/dev/null 2>&1 && npm audit --audit-level=high)
          done
          true

  trivy-fs:
    name: Trivy filesystem scan (advisory)
    runs-on: ubuntu-latest
    # Advisory — surfaces vulnerable Python/Node deps and embedded secrets
    # found on disk. Output is a SARIF artifact; `security-events: write`
    # is intentionally not requested (artifact-only per ADR-026).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH,MEDIUM
          limit-severities-for-sarif: 'true'
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          retention-days: 7

  trivy-iac:
    name: Trivy IaC / config scan (advisory)
    runs-on: ubuntu-latest
    # Advisory — surfaces Dockerfile, compose, and config misconfigs
    # (USER root, missing healthchecks, etc.). Distinct from `trivy-fs`
    # and `trivy-image` by design (ADR-026 § Boundaries).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH,MEDIUM
          limit-severities-for-sarif: 'true'
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-iac-sarif
          path: trivy-iac.sarif
          retention-days: 7

  trivy-image:
    name: Trivy image scan (advisory) — ${{ matrix.name }}
    runs-on: ubuntu-latest
    # Advisory image scan per locally-built Dockerfile. Matrix is bounded
    # to images defined in `web/` and `containers/`; upstream-image-only
    # services (wazuh/, misp/, etc.) are out of scope. ADR-026 calls out
    # the cost of one-image-per-job — buildx GHA layer cache (scoped per
    # matrix entry) keeps repeat-runs cheap.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ad
            dockerfile: containers/ad/Dockerfile
            context: .
          - name: base-rocky
            dockerfile: containers/base/Dockerfile.rocky
            context: ./containers
          - name: base-ubuntu
            dockerfile: containers/base/Dockerfile.ubuntu
            context: ./containers
          - name: dns
            dockerfile: containers/dns/Dockerfile
            context: .
          - name: fileshare
            dockerfile: containers/fileshare/Dockerfile
            context: .
          - name: kali
            dockerfile: containers/kali/Dockerfile
            context: ./containers/kali
          - name: misp-suricata-sync
            dockerfile: containers/misp-suricata-sync/Dockerfile
            context: .
          - name: reverse
            dockerfile: containers/reverse/Dockerfile
            context: ./containers
          - name: victim
            dockerfile: containers/victim/Dockerfile
            context: ./containers
          - name: wazuh-sidecar
            dockerfile: containers/wazuh-sidecar/Dockerfile
            context: .
          - name: webapp
            dockerfile: containers/webapp/Dockerfile
            context: .
          - name: workstation
            dockerfile: containers/workstation/Dockerfile
            context: ./containers
          - name: web
            dockerfile: web/Dockerfile
            context: web
          - name: web-api
            dockerfile: web/Dockerfile.api
            context: .
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Decide whether this image needs scanning
        id: image-scope
        shell: bash
        run: |
          set -euo pipefail

          scan=true
          if [ "${{ matrix.name }}" = "kali" ]; then
            scan=false
            base=""
            head="HEAD"

            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
            elif [ "${{ github.event_name }}" = "push" ]; then
              base="${{ github.event.before }}"
            fi

            if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
              scan=true
            elif ! git cat-file -e "$base^{commit}"; then
              scan=true
            elif git diff --name-only "$base" "$head" | grep -Eq '^(containers/kali/|\.github/workflows/checks\.yml$)'; then
              scan=true
            fi
          fi

          echo "scan=$scan" >> "$GITHUB_OUTPUT"
          echo "scan=$scan"
      - uses: docker/setup-buildx-action@v3
        if: steps.image-scope.outputs.scan == 'true'
      - name: Build image
        if: steps.image-scope.outputs.scan == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: aptl-scan/${{ matrix.name }}:ci
          load: true
          push: false
          cache-from: type=gha,scope=trivy-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=trivy-${{ matrix.name }}
      - uses: aquasecurity/trivy-action@v0.36.0
        if: steps.image-scope.outputs.scan == 'true'
        with:
          scan-type: image
          image-ref: aptl-scan/${{ matrix.name }}:ci
          vuln-type: os,library
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH,MEDIUM
          limit-severities-for-sarif: 'true'
      - name: Upload SARIF
        if: always() && steps.image-scope.outputs.scan == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-${{ matrix.name }}-sarif
          path: trivy-image-${{ matrix.name }}.sarif
          retention-days: 7

  osv-scanner:
    name: OSV-scanner (uv.lock advisory)
    runs-on: ubuntu-latest
    # Advisory — covers the project-root `uv.lock` Python dependency
    # graph. Complements the existing `dependency-audit` job (pip-audit /
    # npm audit); ADR-026 § Risks notes OSV is not wired as a wholesale
    # replacement for the ecosystem audits.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install osv-scanner (checksum-verified)
        # Pin to a specific release and verify the binary against the
        # publisher's SHA256SUMS manifest before exec'ing it. Without
        # verification a tampered release artifact would gain code
        # execution in the runner under the workflow's GITHUB_TOKEN.
        run: |
          set -euo pipefail
          version=v2.3.8
          asset=osv-scanner_linux_amd64
          base="https://github.com/google/osv-scanner/releases/download/${version}"
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          curl -sSL -o "${asset}" "${base}/${asset}"
          curl -sSL -o osv-scanner_SHA256SUMS "${base}/osv-scanner_SHA256SUMS"
          grep " ${asset}\$" osv-scanner_SHA256SUMS | sha256sum -c -
          sudo install -m 0755 "${asset}" /usr/local/bin/osv-scanner
      - name: Scan uv.lock
        # OSV-scanner v2 exits 0 (no vulns), 1 (vulns found), or other
        # codes for tool/CLI errors. We swallow exit 1 so advisory
        # findings don't fail the step, but propagate other codes so a
        # broken invocation can't silently produce no SARIF artifact.
        run: |
          set +e
          osv-scanner scan -L uv.lock --format sarif --output-file osv-scanner.sarif
          ec=$?
          if [ "$ec" -eq 0 ] || [ "$ec" -eq 1 ]; then
            exit 0
          fi
          echo "osv-scanner failed with exit code $ec" >&2
          exit "$ec"
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osv-scanner-sarif
          path: osv-scanner.sarif
          retention-days: 7

  sonarcloud:
    name: SonarCloud quality gate (advisory)
    needs: [python-tests, mcp-tests, web-tests]
    runs-on: ubuntu-latest
    # Advisory — the scan still uploads results to SonarCloud and the
    # dashboard reflects current state; removing -Dsonar.qualitygate.wait
    # means the action does not fail the workflow when the gate is RED.
    # The lab is research code; coverage targets that make sense for
    # production apps would block infra-only commits (Dockerfiles, compose,
    # workflows, scripts). Re-enable strict gating by adding the wait flag
    # back and re-listing this job as a required status check on the
    # branch protection rule once the project's coverage debt is sized.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Generate svelte-kit tsconfig (sonar reads web/tsconfig.json which extends it)
        run: |
          cd web
          npm install --no-audit --no-fund --silent
          npx svelte-kit sync
      - uses: actions/download-artifact@v4
        with:
          name: python-coverage
          path: .
      - uses: actions/download-artifact@v4
        with:
          name: mcp-coverage
          path: mcp/aptl-mcp-common/coverage/
      - uses: actions/download-artifact@v4
        with:
          name: mcp-red-coverage
          path: mcp/mcp-red/coverage/
      - uses: actions/download-artifact@v4
        with:
          name: web-coverage
          path: web/coverage/
      - uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
