schema_version: 1
asset:
  id: cortex
  scenario: TechVault
  aptl_issue: 357
  aces_methodology_issue: 353
  source_class: upstream-registry-image-application
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: thehiveproject/cortex@sha256:ae8b3d72eb5de785513bc33492d93278c32b79d9ff89401463c3a9c577e0bc0b
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence:
    - path: evidence/docker-buildx-imagetools.image.raw.json
    - path: evidence/docker-inspect.image.json
    limits:
    - Upstream thehiveproject/cortex registry image; identity is the pinned RepoDigest. No registry-visible OCI/in-toto/SLSA
      attestation is published for this tag.
notes:
- 'SCN-010 issue #357 inventories Cortex as nodes.techvault.cortex after repairing TheHive/Cortex integration.'
- Cortex remains HTTP-only per ADR-034, but key auth is enabled and TheHive authenticates with a fixture service
  account.
- No known ACES expressivity gap remains for catalogued Cortex steady-state facts.
correspondence_checks:
- id: cortex-evidence-bundle-integrity
  status: implemented
  source: docs/aces/inventory/cortex/evidence
  method: evidence-sha256sums.txt hashes every committed evidence file except itself; tests/test_cortex_inventory.py recomputes
    and compares.
  realized_evidence:
  - path: evidence/evidence-sha256sums.txt
  - path: evidence/captured-at-utc.txt
  ledger_fact_ids:
  - cortex.capture.toolchain-baseline
- id: cortex-sdl-runtime-correspondence
  status: implemented
  source: nodes.techvault.cortex.runtime
  method: tests/test_cortex_inventory.py parses the ACES SDL and asserts image, package, CVE, filesystem, identity, process,
    environment, listener, application, and auth values against evidence.
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/os-packages.txt
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/cortex-state.txt
  ledger_fact_ids:
  - cortex.runtime.container-host-config
  - cortex.runtime.package-inventory
  - cortex.runtime.vulnerability-scan
  - cortex.application.api
  - cortex.auth.service-account
- id: cortex-relationship-correspondence
  status: implemented
  source: scenarios/techvault/sections/relationships.sdl.yaml
  method: tests assert Cortex->thehive-es and TheHive->Cortex relationship edges against captured config and TheHive consumer
    auth evidence.
  realized_evidence:
  - path: evidence/cortex-state.txt
  - path: evidence/thehive-cortex-auth-current-user.json
  - path: evidence/participant-discovery.kali.txt
  ledger_fact_ids:
  - cortex.elasticsearch.backend
  - cortex.thehive.consumer-integration
- id: cortex-scope-and-credential-capture-caveats
  status: implemented
  source: docs/aces/inventory/cortex/evidence/capture-limits.txt
  method: README and tests assert clean-start scope, HTTPS deferral, credential capture, jobs-volume boundary, Syft normalization,
    and optional osquery limits.
  realized_evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/cortex-index-documents.json
  - path: evidence/thehive-cortex-auth-current-user.json
  ledger_fact_ids:
  - cortex.auth.service-account
  - cortex.runtime.filesystem-inventory
  - cortex.runtime.osquery-baseline
facts:
- id: cortex.capture.toolchain-baseline
  category: capture
  summary: Capture used a clean lab start, digest-pinned scanner images, Docker/Compose version capture, explicit limits,
    and evidence checksums.
  evidence:
  - path: evidence/captured-at-utc.txt
  - path: evidence/capture-limits.txt
  - path: evidence/docker-version.json
  - path: evidence/docker-compose-version.json
  - path: evidence/trivy-version.txt
  - path: evidence/syft-version.json
  - path: evidence/osquery-version.txt
  - path: evidence/evidence-sha256sums.txt
  aces:
    disposition: encoded_with_caveat
    surface: runtime_contract
    checked_surfaces:
    - runtime_contract
    fields:
    - docs/aces/inventory/cortex/capture-evidence.sh
    - docs/aces/inventory/cortex/evidence/capture-limits.txt
    rationale: Current ACES SDL runtime_contract fields carry this catalogued Cortex fact.
    caveat: Scanner output is time-sensitive and COMPOSE_BAKE=false is a local startup workaround.
- id: cortex.image.identity-provenance
  category: image
  summary: Cortex resolves to upstream registry image thehiveproject/cortex@sha256:ae8b3d72eb5de785513bc33492d93278c32b79d9ff89401463c3a9c577e0bc0b;
    image history, rootfs layers, and registry metadata are captured.
  evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/docker-buildx-imagetools.image.raw.json
  - path: evidence/docker-buildx-imagetools.image.txt
  - path: evidence/docker-history.image.txt
  - path: evidence/docker-history.image.jsonl
  - path: evidence/source-checksums.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.source
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
- id: cortex.compose.service-contract
  category: compose
  summary: Compose declares aptl-cortex, image thehiveproject/cortex:3.1.8, job_directory env, cortex_data volume, Docker
    socket bind, application.conf/lab-ca binds, HTTP 9001, healthcheck, 512 MiB memory, thehive-es and cortex-index-init dependencies.
  evidence:
  - path: evidence/compose-service.cortex.json
  - path: evidence/compose-service.cortex-index-init.json
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.container
    - nodes.techvault.cortex.runtime.mounts
    - nodes.techvault.cortex.runtime.operational_policy
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
- id: cortex.runtime.container-host-config
  category: runtime
  summary: Runtime host config captures restart policy, memory/swap limits, namespace defaults, Docker default capabilities,
    masked/read-only paths, runc runtime, and Docker socket control bind.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/docker-top.txt
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-logs.cortex.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.container
    - nodes.techvault.cortex.runtime.linux_capabilities
    - nodes.techvault.cortex.runtime.processes
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
- id: cortex.network.identity
  category: network
  summary: Cortex is attached to security-net at 172.20.0.22 with aliases aptl-cortex/cortex, publishes 9001:9001, and is
    not reachable from Kali because security-net is isolated.
  evidence:
  - path: evidence/docker-network.aptl-security.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/participant-discovery.kali.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.network
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
- id: cortex.runtime.service-listeners
  category: runtime
  summary: Cortex listens on TCP/9001 for HTTP API traffic; Docker embedded DNS loopback TCP/UDP listeners are also captured.
  evidence:
  - path: evidence/osquery-listening-ports.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/cortex-state.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.service_listeners
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
- id: cortex.application.api
  category: application
  summary: Cortex API status reports Cortex 3.1.8-1, Elastic4Play 1.13.6, Play 2.8.19, key/local auth, and authByKey/changePassword/setPassword
    capabilities.
  evidence:
  - path: evidence/cortex-state.txt
  - path: evidence/language-manifests.txt
  - path: evidence/thehive-cortex-auth-current-user.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.applications.cortex-api
    - nodes.techvault.cortex.runtime.software_components
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
- id: cortex.auth.service-account
  category: auth
  summary: The APTL organization and aptl-svc@cortex.local service account are seeded in cortex_6; raw key/password,
    hasKey/hasPassword, roles, org, and successful TheHive bearer auth are captured.
  evidence:
  - path: evidence/cortex-index-documents.json
  - path: evidence/thehive-cortex-auth-current-user.json
  - path: evidence/cortex-state.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.app_authorizations
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
    caveat: ACES app_authorizations has no raw credential field; the raw fixture values are carried in evidence and scenario
      descriptions while auth behaviour is typed.
- id: cortex.elasticsearch.backend
  category: relationship
  summary: Cortex uses search.uri http://thehive-es:9200, index cortex_6, with key-auth fields relations/status/key pre-created
    as keyword mappings by cortex-index-init.
  evidence:
  - path: evidence/cortex-state.txt
  - path: evidence/compose-service.cortex-index-init.json
  - path: evidence/compose-service.cortex.json
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
    - relationships
    fields:
    - relationships.cortex-connects-thehive-es
    rationale: Current ACES SDL relationships fields carry this catalogued Cortex fact.
- id: cortex.thehive.consumer-integration
  category: relationship
  summary: TheHive reaches Cortex on http://cortex:9001 and authenticates as aptl-svc@cortex.local with roles read/analyze/orgadmin.
  evidence:
  - path: evidence/thehive-cortex-auth-current-user.json
  - path: evidence/participant-discovery.kali.txt
  - path: evidence/compose-service.cortex.json
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
    - relationships
    fields:
    - relationships.thehive-connects-cortex
    rationale: Current ACES SDL relationships fields carry this catalogued Cortex fact.
- id: cortex.runtime.filesystem-inventory
  category: runtime
  summary: Filesystem inventory covers /opt/cortex, /etc/cortex, /etc/lab-ca, /var/log/cortex, /etc/os-release, and top-level
    /opt/cortex/jobs volume state.
  evidence:
  - path: evidence/filesystem-tree.txt.gz
  - path: evidence/filesystem-checksums.txt.xz
  - path: evidence/docker-volume.cortex_data.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.filesystem_inventory
    - nodes.techvault.cortex.runtime.mounts
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
    caveat: Future analyzer job artifacts under /opt/cortex/jobs are dynamic and absent at the snapshot.
- id: cortex.runtime.package-inventory
  category: runtime
  summary: Runtime package and JVM component inventories are captured from dpkg, Trivy CycloneDX, Syft CycloneDX, and language
    probes.
  evidence:
  - path: evidence/os-packages.txt
  - path: evidence/trivy-sbom.cyclonedx.json.gz
  - path: evidence/syft-sbom.cyclonedx.json.gz
  - path: evidence/language-manifests.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.packages
    - nodes.techvault.cortex.runtime.software_components
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
- id: cortex.runtime.vulnerability-scan
  category: runtime
  summary: Trivy captured 1060 vulnerability findings for the image at snapshot time with severity counts preserved.
  evidence:
  - path: evidence/trivy-vulnerabilities.json.xz
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/trivy-vulnerability-counts.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.package_vulnerabilities
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
    caveat: Vulnerability findings are time-sensitive scanner output.
- id: cortex.runtime.local-identity
  category: runtime
  summary: Local identity inventory captures 24 users, 44 groups, no sudo rules, and the cortex runtime user used below the
    entrypoint/su wrapper.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-processes.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.cortex.runtime.local_identity
    - nodes.techvault.cortex.runtime.processes
    rationale: Current ACES SDL nodes fields carry this catalogued Cortex fact.
- id: cortex.runtime.osquery-baseline
  category: runtime
  summary: osquery captured process/listener rows; unavailable optional osquery tables are recorded as not_available JSON
    with a first-class limit.
  evidence:
  - path: evidence/osquery-processes.json
  - path: evidence/osquery-listening-ports.json
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  - path: evidence/osquery-apt-sources.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/osquery-docker-images.json
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: runtime_contract
    checked_surfaces:
    - runtime_contract
    fields:
    - docs/aces/inventory/cortex/evidence/osquery-*.json
    rationale: Current ACES SDL runtime_contract fields carry this catalogued Cortex fact.
    caveat: Some optional osquery tables are not meaningful from the digest-pinned namespace-sharing scanner.
