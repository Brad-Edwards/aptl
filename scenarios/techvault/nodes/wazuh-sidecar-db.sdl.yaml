          checksum: 7543254be8d7661122e886f99192e27c65165a4c2e634051abf030eb41c138ef
          checksum_algorithm: sha256
        attestation:
          status: absent
          verification: not_applicable
          attestation_type: none
          description: Locally built image; no registry-visible OCI/in-toto/SLSA attestation. docker buildx imagetools inspect failed (no registry manifest).
    services: []
    runtime:
