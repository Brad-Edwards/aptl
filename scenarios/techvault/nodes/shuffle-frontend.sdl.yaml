        routes:
        - route_id: spa-root
          path: /
          methods:
          - GET
          name: React SPA root
          description: Serves the static React SPA from /usr/share/nginx/html (nginx -T).
          auth_required: false
          auth_scheme: ''
          session_required: false
          parameters: []
          responses: []
          templates: []
          static_assets: []
          vulnerability_refs: []
          redirects: []
          disclosures: []
          exposed_fields: []
          upstream_target: null
        - route_id: api-proxy
          path: /api/v(1|2)
          methods:
          - GET
          - POST
          - PUT
          - DELETE
          name: backend API reverse-proxy
          description: nginx proxy_pass to http://shuffle-backend:5001 for all /api/v1 and /api/v2 requests (nginx -T).
          auth_required: false
          auth_scheme: ''
          session_required: false
          parameters: []
          responses: []
          templates: []
          static_assets: []
          vulnerability_refs: []
          redirects: []
          disclosures: []
          exposed_fields: []
          upstream_target: null
