  webapp:
    type: VM
    description: TechVault customer portal web application container.
    os: linux
    os_version: Debian GNU/Linux 13 (trixie)
    source:
      name: aptl-webapp
      version: aptl-webapp@sha256:4a179c1043213c1cfed182c8e472dbe97b07a58f512067ec0c0ea3642425704a
      build:
        description: >
          Observed local Docker build provenance for the TechVault webapp image.
          The build used python:3.11-slim as a mutable base tag; an immutable
          base-image digest was not available in the current local capture.
        base_image: python:3.11-slim
        dockerfile_path: containers/webapp/Dockerfile
        instructions:
        - instruction: from
          arguments:
          - python:3.11-slim
        - instruction: env
          arguments:
          - DEBIAN_FRONTEND=noninteractive
        - instruction: run
          arguments:
          - apt-get update && apt-get install -y iputils-ping net-tools curl rsyslog
            iptables supervisor && rm -rf /var/lib/apt/lists/*
        - instruction: copy
