schema_version: 1
asset:
  id: wazuh-sidecar-suricata
  scenario: TechVault
  aptl_issue: 344
  aces_methodology_issue: 353
  source_class: local-custom-build-forwarding-agent-sidecar
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: aptl-wazuh-sidecar@sha256:1a9c99918f73a234721fe07ccafdcc6c49e1b3784a16ce86cdb2864636345d25
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence:
    - path: evidence/docker-buildx-imagetools.image.err
    - path: evidence/docker-inspect.image.json
    limits:
    - aptl-wazuh-sidecar:local is a locally built image with no registry manifest, so docker buildx imagetools inspect failed
      (see docker-buildx-imagetools.image.err) and no registry-visible OCI/in-toto/SLSA attestation could be captured. Image
      identity is the local config ID in docker-inspect.image.json plus the build recipe in source-checksums.txt.
notes:
- Capture used the already-running aptl project (soc profile up) per operator direction and did not run aptl lab stop -v &&
  aptl lab start; this bundle is a steady-state observation of that local lab, not clean-reset rebuild proof.
- 'SCN-010 issue #344 promotes the off-node Wazuh sidecar for the suricata node from a docker-compose-only forwarding_agents
  stub to a fully inventoried participant node nodes.techvault.wazuh-sidecar-suricata, following the #343 wazuh-sidecar-db
  precedent (same aptl-wazuh-sidecar:local image). Every catalogued observable maps to a current ACES surface: image/build/packages/CVEs/filesystem/identity/runtime
  on the node, and the cross-node forwarding behaviour on the scenario-level forwarding_agents registry (Brad-Edwards/aces#460).
  No known ACES expressivity gap remains for the catalogued wazuh-sidecar-suricata steady-state facts.'
- The aptl-firewall-drop active-response wrapper ships in the image (ADR-021) but the sidecar holds only the default Docker
  capability set (no CAP_NET_ADMIN), so it cannot run iptables; this present-but-inert posture is encoded on runtime.linux_capabilities
  and the filesystem_inventory entry, not asserted as a working prevention control.
- /logs is the suricata container's log directory (shared suricata_logs volume) mounted read-only; its content (eve.json,
  suricata.log, stats.log, fast.log) is the suricata asset's inventory (docs/aces/inventory/suricata/). Only the monitored
  log path is recorded here as the agent's tailed source.
- The agent's manager-registration fixture (/var/ossec/etc/client.keys) is represented by path/metadata plus verbatim key material.
correspondence_checks:
- id: wazuh-sidecar-suricata-evidence-bundle-integrity
  status: implemented
  source: docs/aces/inventory/wazuh-sidecar-suricata/evidence
  method: evidence-sha256sums.txt hashes every committed evidence file except the manifest itself; tests/test_wazuh_sidecar_db_inventory.py
    recomputes and compares.
  realized_evidence:
  - path: evidence/evidence-sha256sums.txt
  - path: evidence/captured-at-utc.txt
  ledger_fact_ids:
  - wazuh-sidecar-suricata.capture.toolchain-baseline
- id: wazuh-sidecar-suricata-sdl-runtime-correspondence
  status: implemented
  source: scenarios/techvault.sdl.yaml nodes.techvault.wazuh-sidecar-suricata
  method: tests/test_wazuh_sidecar_db_inventory.py parses the ACES SDL and asserts image, build, package, CVE, filesystem,
    identity, process, environment, capability, network, and forwarding-agent counts/values against the evidence.
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/os-packages.txt
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/wazuh-agent-state.txt
  ledger_fact_ids:
  - wazuh-sidecar-suricata.runtime.container-policy
  - wazuh-sidecar-suricata.runtime.package-inventory
  - wazuh-sidecar-suricata.runtime.vulnerability-scan
  - wazuh-sidecar-suricata.runtime.local-identity
  - wazuh-sidecar-suricata.agent.forwarding-spec
- id: wazuh-sidecar-suricata-forwarding-relationship-correspondence
  status: implemented
  source: scenarios/techvault.sdl.yaml relationships + forwarding_agents[aptl-suricata-wazuh-agent]
  method: README and tests assert the realized sidecar-to-manager forwarding edge (manager agent_control shows agent 006 aptl-suricata-agent
    Active) and the read-only suricata_logs log source.
  realized_evidence:
  - path: evidence/observer-discovery.wazuh-manager.txt
  - path: evidence/participant-discovery.kali.txt
  - path: evidence/wazuh-agent-state.txt
  ledger_fact_ids:
  - wazuh-sidecar-suricata.agent.connection-state
  - wazuh-sidecar-suricata.relationship.forwards-manager
  - wazuh-sidecar-suricata.relationship.reads-suricata-logs
- id: wazuh-sidecar-suricata-scope-and-fixture-caveats
  status: implemented
  source: docs/aces/inventory/wazuh-sidecar-suricata/evidence/capture-limits.txt
  method: README and tests assert non-destructive capture scope, verbatim client.keys capture, db PGDATA owner/consumer split, Syft
    normalization, missing ss/netstat, and unavailable osquery tables.
  realized_evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  ledger_fact_ids:
  - wazuh-sidecar-suricata.capture.toolchain-baseline
  - wazuh-sidecar-suricata.runtime.filesystem-inventory
  - wazuh-sidecar-suricata.runtime.service-listeners
