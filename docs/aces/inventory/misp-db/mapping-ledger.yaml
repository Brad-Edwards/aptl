    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.runtime.mounts-volume
  category: runtime
  summary: Runtime mount table and Docker volume inspect record overlay/pseudo mounts plus aptl_misp_db_data at /var/lib/mysql.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-inspect.container.json
  - path: evidence/docker-volume.misp-db-data.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.mounts
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.runtime.filesystem-inventory
  category: filesystem
  summary: The SDL encodes the compressed filesystem manifest and checksum surface for MariaDB config and data-volume paths.
  evidence:
  - path: evidence/filesystem-tree.txt.gz
  - path: evidence/filesystem-checksums.txt.xz
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.filesystem_inventory
    - content.techvault.misp-db-data-directory
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
    caveat: Secret-bearing database authorization files are represented by path/metadata and selected safe checksums; raw
      table contents are not captured.
- id: misp-db.runtime.process-tree
  category: runtime
  summary: Runtime process evidence captures PID 1 mariadbd as mysql.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-processes.json
  - path: evidence/docker-top.txt
  aces:
    disposition: encoded
    surface: nodes
