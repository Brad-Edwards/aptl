          size: 41800000
          empty: false
          description: wazuh-agent install + AR wrapper + curl/gnupg purge.
        - digest: ''
          created_by: 'COPY containers/_wazuh-agent/ossec.conf.template /opt/aptl/wazuh/ossec.conf.template # buildkit'
          size: 20500
          empty: false
          description: ''
        - digest: ''
