name: Release

# Automated releases with release-please. On pushes to main it maintains a
# release PR (version bump + CHANGELOG.md, derived from Conventional Commit
# history). Merging that PR creates the git tag + GitHub Release; the publish
# job then builds and uploads to PyPI via OIDC trusted publishing.
#
# workflow_dispatch is the one-time bootstrap that publishes the current
# committed version (0.1.0) before release-please has cut anything.
#
# Third-party actions are pinned to commit SHAs (Dependabot keeps them current).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the release tag + GitHub Release
      pull-requests: write   # open/maintain the release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [release-please]
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # bootstrap tag + upload release assets
      id-token: write   # OIDC trusted publishing to PyPI
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Resolve version and ensure tag + release exist
        id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          # release-please already made the tag + Release when it cut a release;
          # on the manual bootstrap dispatch they don't exist yet, so create them.
          if ! git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "v${version}" -m "Release v${version}"
            git push origin "v${version}"
          fi
          if ! gh release view "v${version}" >/dev/null 2>&1; then
            gh release create "v${version}" --title "v${version}" --notes "Release v${version}"
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Generate CycloneDX SBOM
        run: |
          python -m pip install dist/*.whl cyclonedx-bom
          mkdir -p sbom
          cyclonedx-py environment --output-format JSON --output-file sbom/aptl.cdx.json

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

      - name: Attach artifacts to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ steps.v.outputs.version }}" dist/* sbom/* --clobber

  backmerge:
    name: Back-merge release into dev
    needs: [release-please, publish]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Open main -> dev back-merge PR
        # release-please committed the version bump + CHANGELOG.md to main, so
        # main is now ahead of dev. Auto-open a back-merge PR so dev stays
        # current. It's opened by GITHUB_TOKEN, so dev's required checks won't
        # run on it — admin-merge it (one click).
        run: |
          set -euo pipefail
          if [ "$(gh pr list --base dev --head main --state open --json number --jq 'length')" != "0" ]; then
            echo "back-merge PR main->dev already open; nothing to do."
            exit 0
          fi
          gh pr create --base dev --head main \
            --title "chore: back-merge ${{ needs.release-please.outputs.tag_name }} into dev" \
            --body "Automated back-merge of the release commit (version bump + CHANGELOG.md) from \`main\` into \`dev\` so dev stays current after the release. Admin-merge it — dev's required checks don't run on a bot-opened PR." \
            || echo "no back-merge needed (dev already up to date with main)."
