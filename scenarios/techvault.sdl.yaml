      webapp-rsyslog-forwarding: webapp-root
      webapp-wazuh-agent: webapp-root
    conditions:
      webapp-http-ready: webapp-root
    vulnerabilities:
      - webapp-sqli-login
      - webapp-sqli-search
      - webapp-command-injection
      - webapp-reflected-xss
      - webapp-stored-xss
      - webapp-idor-files
      - webapp-idor-users
      - webapp-admin-authz-bypass
      - webapp-backup-secret-disclosure
      - webapp-env-disclosure
      - webapp-debug-disclosure
      - webapp-weak-jwt
      - webapp-unrestricted-upload
      - webapp-upload-path-traversal
      - webapp-api-rate-limit-missing
      - webapp-hardcoded-secret
      - webapp-verbose-error-disclosure
    roles:
      webapp-root:
        username: root
    services:
      - {port: 8080, protocol: tcp, name: http}
    runtime:
      mounts:
