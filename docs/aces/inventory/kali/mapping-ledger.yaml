schema_version: 1
asset:
  id: kali
  scenario: TechVault
  aptl_issue: 339
  aces_methodology_issue: 353
  source_class: custom-build
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: aptl-kali@sha256:f524320106669c6885679587510652c8a78ca1961b7545692f0fa8f4695974b9
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence: []
    limits:
      - >
        The first-party local image was rebuilt from current containers/kali/
        source and captured from the local Docker daemon. The BuildKit build
        emitted SBOM and provenance attestation manifests into the local
        containerd image store, but the image is not registry-published and
        `docker buildx imagetools inspect` cannot read a local-only reference,
        so no registry-visible, independently verifiable attestation evidence
        was captured.
correspondence_checks:
  - id: kali-node-source-correspondence
    status: planned
    source: nodes.kali.source
    realized_evidence:
      - path: evidence/docker-inspect.image.json
      - path: evidence/source-checksums.txt
      - path: evidence/docker-history.image.txt
    ledger_fact_ids:
      - kali.image.identity
      - kali.build.recipe
    method: >
      Compare the ACES source name/version and source.build provenance in
      scenarios/techvault.sdl.yaml against the realized local image digest,
      Docker build history, and containers/kali/ source-package checksums
      captured in this bundle.
    limit: >
      Planned because issue #339 records the asset spec; this branch does not
      rerun the lab for a live equivalence proof.
  - id: kali-runtime-correspondence
    status: planned
    source: nodes.kali.runtime
    realized_evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
      - path: evidence/os-packages.txt
      - path: evidence/grype-vulnerability-list.json
    ledger_fact_ids:
      - kali.runtime.mounts
      - kali.runtime.filesystem
      - kali.runtime.primary-process
      - kali.runtime.environment
      - kali.runtime.capability-policy
      - kali.runtime.capsh-subtree-drop
      - kali.runtime.operational-policy
      - kali.runtime.container-host-config
      - kali.runtime.init-process
      - kali.runtime.seccomp
      - kali.runtime.network-realization
      - kali.runtime.health
      - kali.runtime.extra-hosts
      - kali.runtime.ssh-server-config
      - kali.runtime.package-inventory
      - kali.runtime.vulnerability-scan
      - kali.runtime.local-identity
    method: >
      Re-run the encoded scenario from ACES SDL, recapture runtime evidence,
      and compare the mount, filesystem, process, environment, capability,
      operational-policy, container host/security, network, health, package,
      and scanner surfaces against this ledger.
    limit: >
      Planned because this issue records the frozen steady-state ACES spec and
      evidence, not a fresh live equivalence run.
notes:
  - >
    The aptl-kali image was rebuilt from current containers/kali/ source and
    the container recreated immediately before capture, so the realized
    container matches HEAD source. Capture used the already-running local lab;
    `aptl lab stop -v && aptl lab start` was not run.
  - >
    Trivy 0.70.0 detects the image as debian/kali-rolling and enumerates 947
    OS packages but reports 0 OS-package vulnerabilities because it has no
    advisory database for the rolling kali-rolling release. The patch-state
    inventory uses Grype 0.112.0 as the primary scanner; Trivy evidence is
    retained as a cross-check.
  - >
    The four ACES expressivity surfaces filed against this inventory have
    landed on `Brad-Edwards/aces` dev: #384 / ADR-027 (init_process), #385 /
    ADR-028 (seccomp_profile + security_opt), #386 / ADR-030
    (RuntimeCapabilityPolicy.process_overrides), and #387 / ADR-031
    (RuntimeConfiguration.ssh_servers). All four facts that were previously
    blocked_by_aces_gap are now encoded directly in the kali node; no known
    ACES expressivity blocker remains for the catalogued kali steady-state
    inventory.
  - >
    Kali is the scenario attacker node, not a target host: it carries no
    authored scenario weaknesses. Scanner CVE findings are runtime package
    evidence under nodes.kali.runtime.package_vulnerabilities, not top-level
    vulnerabilities entries.
  - >
    The kali_captures and kali_operations named volumes and the
    /host-ssh-keys operator bind mount are recorded by mount metadata only;
    their contents are out of scope for this committed bundle per ADR-033 and
    ADR-029. The kali filesystem inventory catalogues the APTL-authored/custom
    and scenario-relevant runtime paths; a full Kali tool root filesystem
    enumeration is deferred capture scope, not an ACES expressivity limit.
facts:
  - id: kali.image.identity
    category: provenance
    summary: >
      The asset uses first-party local image aptl-kali:latest, captured as
      aptl-kali@sha256:f524320106669c6885679587510652c8a78ca1961b7545692f0fa8f4695974b9.
    evidence:
      - path: evidence/docker-inspect.image.json
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.source.name
        - nodes.kali.source.version
      rationale: >
        ACES node source identifies the provider-neutral artifact and the
        observed immutable image digest used by later backend realization.
  - id: kali.build.recipe
    category: provenance
    summary: >
      The image is a custom build from containers/kali/Dockerfile on base
      kalilinux/kali-last-release:latest, with copied source inputs from
      containers/kali/.
    evidence:
      - path: evidence/docker-history.image.txt
      - path: evidence/docker-inspect.image.json
      - path: evidence/source-checksums.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.source.build.base_image
        - nodes.kali.source.build.dockerfile_path
        - nodes.kali.source.build.instructions
        - nodes.kali.source.build.layers
        - nodes.kali.source.build.copied_sources
        - nodes.kali.source.build.config
        - nodes.kali.source.build.source_inputs
        - nodes.kali.source.build.attestation
      rationale: >
        ACES Source.build (image provenance) encodes the observed Dockerfile
        recipe, Docker history/layer chain, copied source mappings,
        checksum-addressed source inputs, image-default config, and the
        absent-attestation fact directly.
  - id: kali.os.version
    category: runtime-configuration
    summary: The realized runtime OS is Kali GNU/Linux Rolling 2026.1 (kali-rolling).
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.image.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.os
        - nodes.kali.os_version
      rationale: ACES nodes have explicit OS family and version fields.
  - id: kali.network.identity
    category: network
    summary: >
      The container is attached to aptl_aptl-redteam (172.20.4.30),
      aptl_aptl-dmz (172.20.1.30), and aptl_aptl-internal (172.20.2.35).
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/docker-network.aptl-redteam.json
      - path: evidence/docker-network.aptl-dmz.json
      - path: evidence/docker-network.aptl-internal.json
    aces:
      disposition: encoded
      surface: infrastructure
      fields:
        - infrastructure.kali.links
        - infrastructure.kali.properties
      rationale: >
        ACES infrastructure links and properties encode authored network
        attachment and static IP assignments across the three TechVault
        networks the attacker node joins.
  - id: kali.ssh.service
    category: service-surface
    summary: >
      The container exposes the OpenSSH server on TCP port 22, bound to
      0.0.0.0:22 and [::]:22, with no host port published.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.image.json
      - path: evidence/compose-service.kali.json
    aces:
      disposition: encoded
      surface: nodes.services
      fields:
        - nodes.kali.services
      rationale: ACES node service bindings model exposed network services by port.
  - id: kali.healthcheck
    category: runtime-configuration
    summary: >
      Compose declares a healthcheck running /usr/local/bin/aptl-healthcheck.sh
      with a 15s interval, 5s timeout, 5 retries, and 30s start period.
    evidence:
      - path: evidence/compose-service.kali.json
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: conditions
      fields:
        - conditions.kali-healthcheck
        - nodes.kali.conditions
      rationale: ACES conditions represent health/readiness commands and timing.
  - id: kali.runtime.mounts
    category: runtime-configuration
    summary: >
      The realized container exposes its overlay root, proc/sys/tmpfs
      pseudo-filesystems, Docker-managed resolver/hostname/hosts files, the
      docker-init bind, the operator key bind mount, and the kali_operations
      and kali_captures named volumes.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.mounts
      rationale: >
        ACES typed runtime mounts encode filesystem type, options, propagation,
        stability, and backend-generated fields for the full observed mount
        table.
  - id: kali.runtime.filesystem
    category: filesystem-inventory
    summary: >
      The catalogued APTL-authored/custom and scenario-relevant runtime paths
      (entrypoint, capture wrapper, healthcheck, audit rules, sshd_config,
      generated SSH key pair, readiness marker, and their directories) are
      encoded with metadata, ownership, permissions, and checksums.
    evidence:
      - path: evidence/filesystem-tree.txt
      - path: evidence/filesystem-checksums.txt
      - path: evidence/source-checksums.txt
    aces:
      disposition: encoded
      surface: content
      fields:
        - nodes.kali.runtime.filesystem_inventory
        - content
      rationale: >
        ACES runtime filesystem inventory carries path type, owner/group,
        UID/GID, mode, size, digest, source, stability, and sensitivity, and
        ACES content entries carry checksum-addressed source placement for the
        catalogued path set.
  - id: kali.runtime.primary-process
    category: runtime-configuration
    summary: >
      PID 1 is /sbin/docker-init wrapping /entrypoint.sh; the steady-state
      process set is docker-init, the entrypoint keepalive (sleep infinity),
      and the sshd listener.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-top.txt
      - path: evidence/docker-inspect.image.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.process
        - nodes.kali.runtime.processes
      rationale: >
        ACES runtime process identity and process-set inventory preserve PID 1
        and the load-bearing process set.
  - id: kali.runtime.environment
    category: runtime-configuration
    summary: >
      The container runtime environment (PATH, LANG, DEBIAN_FRONTEND, TZ,
      HOSTNAME, HOME, and the compose-provided VICTIM_IP) is encoded with value
      classification and provenance.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.container.json
      - path: evidence/compose-service.kali.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.environment
      rationale: >
        ACES observed runtime environment variables carry value classification
        and provenance so image, compose, container, and runtime variables are
        not collapsed.
  - id: kali.runtime.capability-policy
    category: runtime-configuration
    summary: >
      The container is granted CAP_AUDIT_CONTROL, CAP_AUDIT_WRITE,
      CAP_NET_ADMIN, CAP_NET_RAW, and CAP_SYS_PACCT; the observed PID 1
      effective set is encoded.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.linux_capabilities
      rationale: >
        ACES linux_capabilities encodes the container-wide
        required/effective/add/drop capability sets. The capsh per-process
        drop on the sshd subtree is encoded under linux_capabilities.process_overrides
        (see kali.runtime.capsh-subtree-drop).
  - id: kali.runtime.operational-policy
    category: runtime-configuration
    summary: >
      The container carries restart policy unless-stopped, a 1 GiB memory
      limit, and a 2 GiB memory+swap limit.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/compose-service.kali.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.operational_policy
      rationale: >
        ACES runtime operational policy encodes restart policy and resource
        limits.
  - id: kali.runtime.container-host-config
    category: runtime-configuration
    summary: >
      Docker inspect exposes container host/security configuration: entrypoint,
      log driver, namespace modes, privileged/read-only flags, shm size,
      masked/read-only paths, runtime name, and the nine extra_hosts entries.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.container
      rationale: >
        ACES RuntimeContainerConfiguration encodes entrypoint, namespaces,
        privileged/read-only flags, masked/read-only paths, runtime name,
        and extra_hosts directly. The Docker init / PID-1 reaper and the
        seccomp / security_opt posture are encoded separately under
        kali.runtime.init-process and kali.runtime.seccomp.
  - id: kali.runtime.network-realization
    category: network
    summary: >
      Docker exposes per-network aliases, DNS names, endpoint IDs, MAC
      addresses, IPs, gateways, and bridge/IPAM realization detail for the
      three network endpoints; no host ports are published.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/docker-network.aptl-redteam.json
      - path: evidence/docker-network.aptl-dmz.json
      - path: evidence/docker-network.aptl-internal.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.network
      rationale: >
        ACES runtime.network encodes Docker aliases, DNS names, endpoint IDs,
        MAC addresses, IP/gateway data, bridge/IPAM backend detail, and the
        empty published-ports set.
  - id: kali.runtime.health
    category: runtime-configuration
    summary: >
      Docker reports the container healthy with a zero failing streak; the
      readiness marker records sshd=ok, wrapper=ok, auditd=degraded,
      procacct=ok.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.kali.runtime.health
      caveat: >
        The container is healthy but capture-degraded: the readiness marker
        records auditd=degraded because the kernel audit netlink interface is
        not fully available to the container. The marker itself is encoded as
        a runtime filesystem entry; ACES has no first-class capture-subsystem
        readiness taxonomy, so the degraded state is carried as observed
        marker content rather than a typed field.
      rationale: >
        ACES runtime.health encodes Docker health status and healthcheck log
        output directly.
  - id: kali.runtime.extra-hosts
    category: network
    summary: >
      The container injects nine static /etc/hosts entries for the TechVault
      target hosts (techvault.local, dc, db, files, mail, ws01, ns1, and the
      uppercase realm aliases).
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/compose-service.kali.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.container.extra_hosts
      rationale: >
        ACES RuntimeContainerConfiguration.extra_hosts encodes static
        hostname/address /etc/hosts injection directly.
  - id: kali.runtime.package-inventory
    category: runtime-inventory
    summary: >
      The runtime image contains 947 dpkg OS packages (kali-linux-core,
      kali-tools-top10, the AD/enterprise attack toolset, OBS-003 capture
      packages, openssh-server, and nodejs).
    evidence:
      - path: evidence/os-packages.txt
      - path: evidence/trivy-os-packages.json
      - path: evidence/language-manifests.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.packages
        - nodes.kali.runtime.dependency_manifests
      rationale: >
        ACES runtime package and dependency-manifest inventory encode the
        observed dpkg package set and language manifests.
  - id: kali.runtime.vulnerability-scan
    category: vulnerability-inventory
    summary: >
      Grype 0.112.0 reported 58 package vulnerability findings at capture time
      (1 critical, 12 high, 26 medium, 19 low); Trivy 0.70.0 reported 0 because
      it has no advisory database for the kali-rolling release.
    evidence:
      - path: evidence/grype-version.txt
      - path: evidence/grype-vulnerability-counts.json
      - path: evidence/grype-vulnerability-list.json
      - path: evidence/trivy-vulnerability-list.json
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.kali.runtime.package_vulnerabilities
      caveat: >
        Grype is the primary scanner for this asset because Trivy 0.70.0 has
        no advisory database for the rolling kali-rolling release and reports
        0 findings. Scanner output is time-sensitive to the scanner version
        and advisory feeds.
      rationale: >
        ACES runtime package vulnerability findings encode scanner-derived CVE
        records with scanner identity, version, severity, and image digest.
  - id: kali.runtime.local-accounts
    category: identity-surface
    summary: >
      The 26 observed /etc/passwd users are represented as ACES accounts with
      username, node binding, shell, home, disabled state, and local-file auth
      method.
    evidence:
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded_with_caveat
      surface: accounts
      fields:
        - accounts
      caveat: >
        Top-level ACES accounts are curated account placements, not the full
        observed Linux identity database; the complete passwd/group/sudo
        inventory is encoded under nodes.kali.runtime.local_identity.
      rationale: >
        ACES accounts express local account name, node binding, shell, home,
        auth method, and disabled state.
  - id: kali.runtime.local-identity
    category: identity-surface
    summary: >
      The runtime identity database — 26 passwd users with UID/GID, primary
      groups, GECOS, home, shell, and no-login state, plus 48 /etc/group
      records and the kali NOPASSWD sudo rule.
    evidence:
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.local_identity.users
        - nodes.kali.runtime.local_identity.groups
        - nodes.kali.runtime.local_identity.sudo_rules
      rationale: >
        ACES runtime.local_identity encodes the observed passwd users, group
        records, and sudo-rule inventory.
  - id: kali.relationships
    category: relationship
    summary: >
      At the steady-state snapshot the kali attacker node has no active
      connections to other scenario nodes; its reachability to the TechVault
      targets is realized by shared attachment to the dmz-net and internal-net
      switches. The SSH control-plane ingress is APTL backend realization, not
      a scenario relationship.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: infrastructure
      fields:
        - infrastructure.kali.links
      rationale: >
        ACES infrastructure links encode the network adjacency that gives the
        attacker node reachability; ACES connects_to relationships model
        active connections, of which an idle attacker node has none at the
        steady-state snapshot. The kali SSH service itself is encoded under
        nodes.kali.services.
  - id: kali.runtime.init-process
    category: runtime-configuration
    summary: >
      The container runs with Docker init: true; PID 1 is /sbin/docker-init
      (tini), reaping orphaned descendants of /entrypoint.sh.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.container.init_process.enabled
        - nodes.kali.runtime.container.init_process.implementation
        - nodes.kali.runtime.container.init_process.executable_path
        - nodes.kali.runtime.container.init_process.reaps_children
        - nodes.kali.runtime.container.init_process.argv
      rationale: >
        ACES ADR-027 / Brad-Edwards/aces#384 added
        RuntimeContainerConfiguration.init_process to express a
        backend-injected init / PID-1 reaper distinct from the observed PID 1
        process inventory.
  - id: kali.runtime.seccomp
    category: runtime-configuration
    summary: >
      The container runs with security_opt seccomp:unconfined; the default
      seccomp syscall filter is disabled.
    evidence:
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.container.seccomp_profile
        - nodes.kali.runtime.container.security_opt
      rationale: >
        ACES ADR-028 / Brad-Edwards/aces#385 added
        RuntimeContainerConfiguration.seccomp_profile and security_opt to
        express the container seccomp profile and full security_opt list as
        first-class facts distinct from privileged.
  - id: kali.runtime.capsh-subtree-drop
    category: runtime-configuration
    summary: >
      The entrypoint spawns sshd via capsh --drop=cap_audit_control, so the
      sshd subtree (and the interactive kali user) runs without
      CAP_AUDIT_CONTROL while the container holds it.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.linux_capabilities.process_overrides
      rationale: >
        ACES ADR-030 / Brad-Edwards/aces#386 added
        RuntimeCapabilityPolicy.process_overrides with subtree-scope deltas
        so the sshd subtree's CAP_AUDIT_CONTROL drop is expressed alongside
        the container-wide capability baseline.
  - id: kali.runtime.ssh-server-config
    category: service-surface
    summary: >
      sshd for the kali user is configured with ForceCommand
      (/usr/local/bin/aptl-wrap-shell.sh) and AcceptEnv (APTL_RUN_ID,
      APTL_SESSION_ID, APTL_TRACE_ID, plus OpenSSH-default locale and color
      names), with AllowUsers narrowed to kali and password authentication
      disabled.
    evidence:
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.kali.runtime.ssh_servers
      rationale: >
        ACES ADR-031 / Brad-Edwards/aces#387 added RuntimeConfiguration.ssh_servers
        as a typed sshd policy surface (SshServerConfig + SshMatchRule +
        SshForcedCommand) so ForceCommand, AcceptEnv, AllowUsers, and the
        Match rule wiring the per-session capture wrapper are all expressible.
