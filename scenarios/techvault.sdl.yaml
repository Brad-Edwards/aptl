name: techvault
description: >
  TechVault is APTL's flagship purple-team scenario, sized to exercise
  every node/service/vulnerability surface the legacy scenarios/*.yaml
  set covered. Lab is segmented into four network zones (DMZ, internal,
  identity, redteam) hosting a webapp + database in the DMZ, file
  share + workstation + AD in identity, victim host in internal, and
  Kali on the redteam segment. Wazuh's SOC stack observes from
  soc-net. ADR-035 § Parity Gate: post-cutover this is the default
  scenario; the legacy scenarios/*.yaml files move to scenarios/archive/.

nodes:
  # ---- networks ----
  dmz-net:
    type: Switch
    description: DMZ — public-facing webapp + DB.

  internal-net:
    type: Switch
    description: Internal — victim host with vulnerable services.

  identity-net:
    type: Switch
    description: Identity — AD + file share + workstation.

  redteam-net:
    type: Switch
    description: Red-team segment hosting Kali.

  soc-net:
    type: Switch
    description: SOC stack observation network (Wazuh + indexer + dashboard).

  # ---- DMZ ----
  webapp:
    type: VM
    os: linux
    resources: {ram: 2 gib, cpu: 2}
    services:
      - {port: 8080, name: http}

  database:
    type: VM
    os: linux
    resources: {ram: 2 gib, cpu: 2}
    services:
      - {port: 5432, name: postgres}

  # ---- Internal ----
  victim:
    type: VM
    os: linux
    resources: {ram: 2 gib, cpu: 2}
    services:
      - {port: 22, name: ssh}

  # ---- Identity ----
  active-directory:
    type: VM
    os: windows
    resources: {ram: 4 gib, cpu: 2}
    services:
      - {port: 389, name: ldap}
      - {port: 445, name: smb}

  fileshare:
    type: VM
    os: linux
    resources: {ram: 2 gib, cpu: 1}
    services:
      - {port: 445, name: smb}

  workstation:
    type: VM
    os: windows
    resources: {ram: 4 gib, cpu: 2}
    services:
      - {port: 3389, name: rdp}

  # ---- Red team ----
  kali:
    type: VM
    os: linux
    resources: {ram: 4 gib, cpu: 2}
    services:
      - {port: 22, name: ssh}

  # ---- SOC ----
  wazuh-manager:
    type: VM
    os: linux
    resources: {ram: 4 gib, cpu: 2}
    services:
      - {port: 1514, name: wazuh-agent-ingest}
      - {port: 55000, name: wazuh-api}

  wazuh-indexer:
    type: VM
    os: linux
    resources: {ram: 4 gib, cpu: 2}
    services:
      - {port: 9200, name: opensearch}

  wazuh-dashboard:
    type: VM
    os: linux
    resources: {ram: 2 gib, cpu: 1}
    services:
      - {port: 5601, name: kibana}
