    fields:
    - nodes.techvault.wazuh-sidecar-suricata.source.name
    - nodes.techvault.wazuh-sidecar-suricata.source.version
    - nodes.techvault.wazuh-sidecar-suricata.os_version
    rationale: Current ACES SDL node source fields carry the local-build image identity directly.
- id: wazuh-sidecar-suricata.image.build-recipe
