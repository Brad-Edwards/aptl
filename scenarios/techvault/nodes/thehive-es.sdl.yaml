name: techvault-node-thehive-es
nodes:
  thehive-es:
    type: vm
    description: 'TechVault TheHive Elasticsearch search-index datastore (compose service thehive-es, container aptl-thehive-es,
      image docker.elastic.co/elasticsearch/elasticsearch:7.17.28). Single-node ES 7.17 with xpack.security disabled; serves
      TheHive''s search indices (primary data is in Cassandra). Inventoried at experiment grade under docs/aces/inventory/thehive-es/
      (SCN-010 issue #352). Reached only on security-net by the thehive node (relationships.thehive-connects-es); 9200/9300
      are not host-published.'
