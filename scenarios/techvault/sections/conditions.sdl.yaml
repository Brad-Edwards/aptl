name: techvault-conditions
conditions:
  db-postgres-ready:
    name: ''
    command: pg_isready -U techvault -d techvault
    interval: 10
    timeout: 5
    retries: 5
    start_period: 15
    source: null
    description: ''
    environment: []
  wazuh-api-ready:
    name: ''
    command: curl -ks https://localhost:55000 || exit 1
    interval: 30
    timeout: 10
    retries: 5
    start_period: 120
    source: null
    description: ''
    environment: []
  webapp-http-ready:
    name: ''
    command: curl -sf http://localhost:8080/ || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
    source: null
    description: ''
    environment: []
  fileshare-smb-ready:
    name: ''
    command: smbclient -L localhost -N || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
    source: null
    description: ''
    environment: []
  mailserver-smtp-ready:
    name: ''
    command: nc -z localhost 25 || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 120
    source: null
    description: ''
    environment: []
  kali-healthcheck:
    name: ''
    command: /usr/local/bin/aptl-healthcheck.sh
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
    source: null
    description: ''
    environment: []
  ad-domain-ready:
    name: ''
    command: samba-tool domain info 127.0.0.1 || exit 1
    interval: 30
    timeout: 10
    retries: 10
    start_period: 60
    source: null
    description: ''
    environment: []
  workstation-ssh-ready:
    name: ''
    command: ss -tlnp | grep ':22' || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
    source: null
    description: ''
    environment: []
  victim-ssh-ready:
    name: ''
    command: ss -tlnp | grep ':22' || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
    source: null
    description: ''
    environment: []
  dns-soa-ready:
    name: ''
    command: dig @localhost techvault.local SOA +short || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
    source: null
    description: ''
    environment: []
  misp-https-ready:
    name: MISP HTTPS login healthcheck
    command: curl -ksf https://localhost/users/login || (nginx -s reload 2>/dev/null; exit 1)
    interval: 30
    timeout: 10
    retries: 15
    start_period: 300
    source: null
    description: Docker Compose healthcheck for the aptl-misp container; the live container health log returns the MISP login
      HTML, including form token material.
    environment: []
  misp-db-ready:
    name: ''
    command: healthcheck.sh --connect --innodb_initialized
    interval: 15
    timeout: 5
    retries: 15
    start_period: 300
    source: null
    description: Docker Compose healthcheck for the aptl-misp-db MariaDB companion service.
    environment: []
  wazuh-indexer-ready:
    name: Wazuh indexer OpenSearch REST healthcheck
    command: curl -ks https://localhost:9200 || exit 1
    interval: 30
    timeout: 10
    retries: 10
    start_period: 180
    source: null
    description: Docker Compose healthcheck for the aptl-wazuh-indexer container. OpenSearch Security challenges the unauthenticated
      request with HTTP 401 Unauthorized; that response (exit code 0) is the readiness signal.
    environment: []
