        - route_id: webapp-static-style
          path: /static/<path:filename>
          methods: [GET, HEAD, OPTIONS]
          name: Flask static asset route
          description: Flask static route serves the stylesheet referenced by rendered templates.
          auth_required: false
          session_required: false
          parameters:
          - name: filename
            location: path
            required: true
            data_type: path
            description: Static asset filename path variable.
          responses:
          - status_code: 200
            content_type: text/css
            description: Static CSS asset response for style.css.
          static_assets:
          - /app/static/style.css
        - route_id: webapp-error-404
          path: /<unmatched_path>
          methods: [GET, HEAD, OPTIONS, POST, PUT, DELETE, PATCH]
          name: JSON 404 handler
          description: Flask 404 handler returns JSON containing the requested path for unmatched routes.
          auth_required: false
          session_required: false
          parameters:
          - name: unmatched_path
            location: path
            required: true
            data_type: path
            description: Unmatched requested path reflected in the JSON error response.
          responses:
          - status_code: 404
            content_type: application/json
            description: JSON not-found response with error and path fields.
          disclosures:
          - trigger: unmatched route
            status_code: 404
            disclosure: Requested path is returned in the JSON path field.
            sensitivity: plain
            description: 404 responses reflect the request path.
          exposed_fields:
          - name: error
            sensitivity: plain
            value: Not found
            description: Static error string.
          - name: path
            sensitivity: plain
            description: Requested path reflected by the 404 handler.
        - route_id: webapp-error-500
          path: /<erroring_path>
          methods: [GET, HEAD, OPTIONS, POST, PUT, DELETE, PATCH]
          name: JSON 500 handler
          description: Flask 500 handler returns JSON with an internal server error string and exception details.
          auth_required: false
          session_required: false
          responses:
          - status_code: 500
            content_type: application/json
            description: JSON internal server error response.
          disclosures:
          - trigger: unhandled server exception
            status_code: 500
            disclosure: Exception details are returned in the JSON details field.
            sensitivity: unknown
            description: Generic 500 handling exposes exception details.
          exposed_fields:
          - name: error
            sensitivity: plain
            value: Internal server error
            description: Static error string.
          - name: details
            sensitivity: unknown
            description: Stringified exception detail.
          vulnerability_refs:
          - webapp-verbose-error-disclosure
