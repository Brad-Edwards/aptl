    rationale: Current ACES SDL node network and infrastructure fields carry this catalogued MISP Redis fact directly.
- id: misp-redis.runtime.mounts-volume
  category: runtime
  summary: The runtime mount table records the anonymous Docker volume backing /data (image VOLUME /data), with no named Compose volume.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.mounts
    rationale: Current ACES SDL node runtime mounts field carries this catalogued MISP Redis fact directly.
    caveat: /data is backed by an anonymous Docker volume from the image VOLUME declaration; no named Compose volume exists, so the source name is backend-generated and not stable across container removal.
- id: misp-redis.runtime.filesystem-inventory
  category: filesystem
  summary: The SDL encodes a curated load-bearing filesystem set (Redis binaries, entrypoint, gosu, identity files, apk config, /data, dump.rdb) with checksums, backed by the full compressed tree and checksum manifests.
  evidence:
  - path: evidence/filesystem-tree.txt.gz
  - path: evidence/filesystem-checksums.txt.xz
  - path: evidence/capture-limits.txt
  - path: evidence/redis-manifest.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.filesystem_inventory
    rationale: Current ACES SDL node runtime filesystem_inventory field carries this catalogued MISP Redis fact directly.
    caveat: /data/dump.rdb is a volatile binary RDB that can embed cached secret material; it is represented by path/metadata and excluded from content checksums, and /etc/shadow is metadata-only.
- id: misp-redis.runtime.process
  category: runtime
  summary: Runtime process evidence captures PID 1 redis-server running as the redis service account (uid 999, gid 1000).
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-processes.json
  - path: evidence/docker-top.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.processes
    rationale: Current ACES SDL node runtime processes field carries this catalogued MISP Redis fact directly.
- id: misp-redis.runtime.service-listeners
  category: runtime
  summary: ACES listener fields encode the Redis RESP listeners on the IPv4 and IPv6 wildcard and the Docker embedded DNS TCP/UDP listeners.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-listening-ports.json
  - path: evidence/participant-discovery.misp.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.services
    - nodes.techvault.misp-redis.runtime.service_listeners
    rationale: ACES #431 listener fields carry this catalogued MISP Redis fact directly.
    caveat: Docker embedded DNS listener ports are backend-generated and ephemeral; they are encoded as node-local runtime listeners, not Redis application services.
- id: misp-redis.runtime.environment
  category: runtime
  summary: The runtime environment captures the five Redis image default variables (PATH, GOSU_VERSION, REDIS_VERSION, REDIS_DOWNLOAD_URL, REDIS_DOWNLOAD_SHA); Compose adds none.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.environment
    rationale: Current ACES SDL node runtime environment field carries this catalogued MISP Redis fact directly.
- id: misp-redis.runtime.capabilities
  category: runtime
  summary: PID 1 runs with no effective Linux capabilities (CapEff=0); the entrypoint drops privileges to the redis user via gosu and no Compose capabilities are added.
  evidence:
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.linux_capabilities
    rationale: Current ACES SDL node runtime linux_capabilities field carries this catalogued MISP Redis fact directly.
- id: misp-redis.runtime.local-identity
  category: identity
  summary: Local passwd/group inventory records 18 users (including the redis service account) and 36 groups, with no sudo rules.
  evidence:
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.local_identity
    rationale: Current ACES SDL node runtime local_identity field carries this catalogued MISP Redis fact directly.
- id: misp-redis.runtime.package-inventory
