          responses:
          - status_code: 200
            content_type: text/html
            description: Network tools page with optional command output.
          redirects:
          - target: /login
            status_code: 302
            condition: user_id missing from session
            description: Unauthenticated requests are redirected to login.
          templates:
          - /app/templates/tools.html
          - /app/templates/base.html
          static_assets:
          - /app/static/style.css
          exposed_fields:
          - name: result
            sensitivity: plain
            description: Combined stdout and stderr from ping command is rendered in a pre block.
          vulnerability_refs:
          - webapp-command-injection
        - route_id: webapp-search
          path: /search
          methods: [GET, HEAD, OPTIONS]
          name: User search page
          description: Authenticated search page accepts q, interpolates it into SQL, and reflects the query into HTML with the safe filter.
          auth_required: true
          auth_scheme: Flask session
          session_required: true
          parameters:
          - name: session
            location: cookie
            required: true
            data_type: Flask session cookie
            description: Required to access the route.
          - name: q
            location: query
            required: false
            data_type: string
            description: Search query reflected into the page and interpolated into SQL.
          responses:
          - status_code: 200
            content_type: text/html
            description: Search form and optional results table.
          redirects:
          - target: /login
            status_code: 302
            condition: user_id missing from session
            description: Unauthenticated requests are redirected to login.
          templates:
          - /app/templates/search.html
          - /app/templates/base.html
          static_assets:
          - /app/static/style.css
          exposed_fields:
          - name: query
            sensitivity: plain
            description: Query string reflected into the page with the safe filter.
          - name: results.username
            sensitivity: plain
            description: Username column in search results.
          - name: results.email
            sensitivity: plain
            description: Email column in search results.
          - name: results.department
            sensitivity: plain
            description: Department column in search results.
          vulnerability_refs:
          - webapp-sqli-search
          - webapp-reflected-xss
        - route_id: webapp-comment
          path: /comment
          methods: [OPTIONS, POST]
          name: Add comment
          description: Authenticated comment endpoint stores submitted content and redirects to dashboard where content is rendered without sanitization.
          auth_required: true
          auth_scheme: Flask session
          session_required: true
          parameters:
          - name: session
            location: cookie
            required: true
            data_type: Flask session cookie
            description: Required to submit a comment.
          - name: content
            location: form
            required: false
            data_type: string
            description: Comment body stored without sanitization.
          - name: page
            location: form
            required: false
            data_type: string
            description: Page string stored with the comment, defaulting to /dashboard.
          redirects:
          - target: /login
            status_code: 302
            condition: user_id missing from session
            description: Unauthenticated requests are redirected to login.
          - target: /dashboard
            status_code: 302
            condition: comment stored
            description: Stored comments redirect back to the dashboard.
          vulnerability_refs:
          - webapp-stored-xss
