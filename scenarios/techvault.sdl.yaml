              value: '300'
              value_classification: plain
            - name: POSTGREY_AUTO_WHITELIST_CLIENTS
              value: '5'
              value_classification: plain
            - name: POSTGREY_DELAY
              value: '300'
              value_classification: plain
            - name: POSTGREY_MAX_AGE
              value: '35'
              value_classification: plain
            - name: POSTGREY_TEXT
