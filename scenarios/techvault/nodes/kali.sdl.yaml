      ssh_servers:
      - forced_command: null
        accept_env:
        - APTL_RUN_ID
        - APTL_SESSION_ID
        - APTL_TRACE_ID
        - COLORTERM
        - LANG
        - LC_*
        - NO_COLOR
        allow_users:
        - kali
        deny_users: []
        allow_groups: []
        deny_groups: []
        authentication_methods: []
        password_authentication: false
        pubkey_authentication: true
        permit_tty: true
        chroot_directory: ''
        authorized_keys_file: ''
        description: 'OBS-003 sshd policy for the kali login user. AcceptEnv admits the APTL scenario identifiers (RUN_ID
          / SESSION_ID / TRACE_ID) plus the OpenSSH-default locale and color allowlist; AllowUsers narrows ssh login to the
          kali account; the Match rule wires the per-session capture ForceCommand (ACES ADR-031 / aces#387).

          '
        ssh_server_id: kali-sshd
        service: ssh
        match_rules:
        - forced_command:
            command_kind: absolute_path
            command: /usr/local/bin/aptl-wrap-shell.sh
            command_redacted: false
            description: 'Per-session OBS-003 capture wrapper. Every kali SSH login is replaced by aptl-wrap-shell.sh, which
              starts script(1) + tcpdump for the session under `/var/log/aptl/captures/<RUN_ID>/<SESSION_ID>/`.

              '
          accept_env: []
          allow_users: []
          deny_users: []
          allow_groups: []
          deny_groups: []
          authentication_methods: []
          password_authentication: null
          pubkey_authentication: null
          permit_tty: null
          chroot_directory: ''
          authorized_keys_file: ''
          description: 'The kali login user never gets a plain shell; the ForceCommand substitutes the per-session capture
            wrapper (ADR-033).

            '
          match_id: kali-user-forcecommand
          criteria:
          - kind: user
            pattern: kali
