name: lateral-movement-data-theft
description: >
  Path C: kali → workstation → fileshare. Lateral movement using
  compromised credentials; exfiltration of files from the SMB share.
  Wazuh observes both endpoint + network behaviors.

nodes:
  identity-net:
    type: Switch
  redteam-net:
    type: Switch
  soc-net:
    type: Switch

  kali:
    type: VM
    os: linux
    resources: {ram: 2 gib, cpu: 2}
    services:
      - {port: 22, name: ssh}

  workstation:
    type: VM
    os: windows
    resources: {ram: 4 gib, cpu: 2}
    services:
      - {port: 3389, name: rdp}

  fileshare:
    type: VM
    os: linux
    resources: {ram: 2 gib, cpu: 1}
    services:
      - {port: 445, name: smb}

  wazuh-manager:
    type: VM
    os: linux
    resources: {ram: 4 gib, cpu: 2}
    services:
      - {port: 1514, name: wazuh-agent-ingest}
