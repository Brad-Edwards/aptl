  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.package_vulnerabilities
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
    caveat: Vulnerability scanner output is time-sensitive and tied to the captured Trivy version/database state.
- id: misp-db.runtime.sbom-toolchain
  category: runtime
  summary: Required Trivy CycloneDX and useful-optional Syft CycloneDX SBOMs are captured; Syft output is deterministically
    normalized.
  evidence:
  - path: evidence/trivy-sbom.cyclonedx.json.gz
  - path: evidence/syft-sbom.cyclonedx.json.gz
  - path: evidence/syft-version.json
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.packages
    - nodes.techvault.misp-db.runtime.software_components
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
    caveat: SBOMs are retained as evidence; SDL package fields use dpkg and scanner-derived summaries rather than embedding
      full CycloneDX documents.
- id: misp-db.runtime.osquery-baseline
  category: runtime
  summary: osquery captured processes, listeners, host-side Docker container/image rows, apt sources, and unavailable Linux
    application/program table status.
  evidence:
  - path: evidence/osquery-processes.json
  - path: evidence/osquery-listening-ports.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/osquery-docker-images.json
  - path: evidence/osquery-apt-sources.json
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.processes
    - nodes.techvault.misp-db.runtime.service_listeners
    - nodes.techvault.misp-db.runtime.network
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
    caveat: installed_applications and programs tables are unavailable in the digest-pinned Linux osquery image and are recorded
      as capture limits.
- id: misp-db.database.service
  category: database
  summary: MariaDB 10.11.16 exposes the MySQL wire protocol on TCP 3306 and /run/mysqld/mysqld.sock.
  evidence:
  - path: evidence/mariadb-state.txt
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-listening-ports.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.database_services.misp-mariadb
    - nodes.techvault.misp-db.runtime.database_services.misp-mariadb.listeners
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.database.databases-schemas-tables
  category: database
  summary: MariaDB reports five databases and 235 captured table entries across the misp, mysql, and sys schemas.
  evidence:
  - path: evidence/mariadb-state.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.database_services.misp-mariadb.databases
    - nodes.techvault.misp-db.runtime.database_services.misp-mariadb.databases.misp.schemas.misp-schema.tables
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
    caveat: information_schema and performance_schema were observed as databases, but the bounded schema query did not enumerate
      their table rows.
- id: misp-db.database.roles
  category: database
  summary: MariaDB reports seven user/host roles with plugin, admin privilege booleans, and authentication-string presence
    metadata.
  evidence:
  - path: evidence/mariadb-state.txt
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.database_services.misp-mariadb.roles
    - accounts.misp-db-role-misp
    - accounts.misp-db-role-root
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
    caveat: Raw authentication strings are omitted; per-engine privilege booleans are preserved in role descriptions while
      portable login/type/origin fields remain structured.
- id: misp-db.database.settings
  category: database
  summary: SHOW GLOBAL VARIABLES captures 15 MariaDB runtime settings including port, datadir, socket, sql_mode, and max_connections.
  evidence:
  - path: evidence/mariadb-state.txt
  - path: evidence/language-manifests.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.database_services.misp-mariadb.settings
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.database.table-cardinalities
  category: content
  summary: MISP database table cardinalities are encoded as a content dataset with count tags for every captured MISP table.
  evidence:
  - path: evidence/mariadb-state.txt
  aces:
    disposition: encoded_with_caveat
    surface: content
    checked_surfaces:
    - content
    fields:
    - content.techvault.misp-db-table-cardinalities
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
    caveat: MariaDB TABLE_ROWS values are storage-engine estimates/current snapshot observations, not immutable semantic event
      counts.
- id: misp-db.participant-discovery
  category: relationship
  summary: MISP resolves and reaches MISP DB on TCP 3306 and verifies SELECT VERSION(), DATABASE(); Kali cannot reach the
    security-net address.
  evidence:
  - path: evidence/participant-discovery.misp.txt
  - path: evidence/participant-discovery.kali.txt
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
    - relationships
    fields:
    - relationships.misp-connects-mariadb
    - nodes.techvault.misp-db.runtime.service_listeners.mariadb-3306-ipv4
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.relationship.misp
  category: relationship
  summary: MISP points at misp-db using MYSQL_HOST, database misp, user misp, and a redacted password.
  evidence:
  - path: evidence/compose-service.misp-db.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/mariadb-state.txt
  - path: evidence/participant-discovery.misp.txt
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
    - relationships
    fields:
    - relationships.misp-connects-mariadb
    - relationships.misp-connects-mariadb.database_access
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
