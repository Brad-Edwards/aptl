      applications:
      - application_id: techvault-portal
        service: http
        protocol: http
        name: TechVault Solutions Customer Portal
        base_path: /
        framework: Flask 3.1.0
        description: Participant-observable Flask route, API, and UI surface implemented by /app/app.py and rendered templates/static assets.
        routes:
        - route_id: webapp-root
          path: /
          methods: [GET, HEAD, OPTIONS]
          name: Login entrypoint
          description: Root entrypoint renders the login UI for anonymous sessions and redirects authenticated sessions to the dashboard.
          auth_required: false
          session_required: false
          parameters:
          - name: session
            location: cookie
            required: false
            data_type: Flask session cookie
            description: Optional session cookie changes the response from login page to dashboard redirect.
          responses:
          - status_code: 200
            content_type: text/html
            description: Login page for anonymous sessions.
          redirects:
          - target: /dashboard
            status_code: 302
            condition: user_id present in Flask session
            description: Authenticated sessions are redirected to the dashboard.
          templates:
          - /app/templates/login.html
          - /app/templates/base.html
          static_assets:
          - /app/static/style.css
        - route_id: webapp-login
          path: /login
          methods: [GET, HEAD, OPTIONS, POST]
          name: Login form
          description: Login endpoint renders the login form, accepts username/password form fields, and interpolates the username into a SQL query.
          auth_required: false
          session_required: false
          parameters:
          - name: username
            location: form
            required: true
            data_type: string
            description: Login username used directly in the SQL WHERE clause on POST.
          - name: password
            location: form
            required: true
            data_type: string
            description: Password is MD5 hashed before comparison.
          responses:
          - status_code: 200
            content_type: text/html
            description: Login form on GET.
          - status_code: 401
            content_type: text/html
            description: Invalid credentials re-render the login form.
          - status_code: 500
            content_type: application/json
            description: SQL exceptions are returned as JSON errors.
          redirects:
          - target: /dashboard
            status_code: 302
            condition: successful login
            description: Successful credentials create a session and redirect to the dashboard.
          disclosures:
          - trigger: SQL exception during login query execution
            status_code: 500
            disclosure: Raw database exception string in JSON error field.
            sensitivity: unknown
            description: Verbose login error path exposes backend exception details.
          templates:
          - /app/templates/login.html
          - /app/templates/base.html
          static_assets:
          - /app/static/style.css
          vulnerability_refs:
          - webapp-sqli-login
          - webapp-verbose-error-disclosure
        - route_id: webapp-logout
          path: /logout
          methods: [GET, HEAD, OPTIONS]
          name: Logout
          description: Clears the Flask session and redirects to the root entrypoint.
          auth_required: false
          session_required: false
          parameters:
          - name: session
            location: cookie
            required: false
            data_type: Flask session cookie
            description: Session cookie is cleared if present.
          redirects:
          - target: /
            status_code: 302
            condition: always
            description: Logout always redirects to the root entrypoint.
        - route_id: webapp-dashboard
          path: /dashboard
          methods: [GET, HEAD, OPTIONS]
          name: Dashboard
          description: Authenticated dashboard renders user, role, customer count, file count, recent comments, and the add-comment form.
          auth_required: true
          auth_scheme: Flask session
          session_required: true
          parameters:
          - name: session
            location: cookie
            required: true
            data_type: Flask session cookie
            description: Must contain user_id, username, and role.
          responses:
          - status_code: 200
            content_type: text/html
            description: Dashboard page with recent activity and comment form.
          redirects:
          - target: /login
            status_code: 302
            condition: user_id missing from session
            description: Unauthenticated requests are redirected to login.
          templates:
          - /app/templates/dashboard.html
          - /app/templates/base.html
          static_assets:
          - /app/static/style.css
          exposed_fields:
          - name: username
            sensitivity: plain
            description: Session username rendered in page content and navigation.
          - name: role
            sensitivity: plain
            description: Session role rendered in page content and navigation.
          - name: customer_count
            sensitivity: plain
            description: Aggregate customer count from the database.
          - name: file_count
            sensitivity: plain
            description: Count of files owned by the session user.
          - name: comments.content
            sensitivity: plain
            description: Recent comment content is rendered with the safe filter.
          vulnerability_refs:
          - webapp-stored-xss
        - route_id: webapp-admin
          path: /admin
          methods: [GET, HEAD, OPTIONS]
          name: Admin panel
          description: Authenticated admin UI lacks a role check and renders user management plus backup configuration tables.
          auth_required: true
          auth_scheme: Flask session without role enforcement
          session_required: true
          parameters:
          - name: session
            location: cookie
            required: true
            data_type: Flask session cookie
            description: Any authenticated session can access the route.
          responses:
          - status_code: 200
            content_type: text/html
            description: Admin table page for users and backup configuration.
          redirects:
          - target: /login
            status_code: 302
            condition: user_id missing from session
            description: Unauthenticated requests are redirected to login.
          templates:
          - /app/templates/admin.html
          - /app/templates/base.html
          static_assets:
          - /app/static/style.css
          exposed_fields:
          - name: users.id
            sensitivity: plain
            description: User id column rendered in the admin table.
          - name: users.username
            sensitivity: plain
            description: Username column rendered in the admin table.
          - name: users.email
            sensitivity: plain
            description: Email column rendered in the admin table.
          - name: users.role
            sensitivity: plain
            description: Role column rendered in the admin table.
          - name: backup_config.access_key
            sensitivity: secret_fixture
            description: Backup access key column rendered in the backup table.
          - name: backup_config.secret_key
            sensitivity: secret_fixture
            description: Backup secret key column rendered in the backup table.
          vulnerability_refs:
          - webapp-admin-authz-bypass
          - webapp-backup-secret-disclosure
        - route_id: webapp-upload
          path: /upload
          methods: [GET, HEAD, OPTIONS, POST]
          name: File upload
          description: Authenticated upload route accepts an uploaded file and saves the submitted filename under /tmp/uploads without type, size, or traversal validation.
          auth_required: true
          auth_scheme: Flask session
          session_required: true
          parameters:
          - name: session
            location: cookie
            required: true
            data_type: Flask session cookie
            description: Required for both GET and POST.
          - name: file
            location: uploaded_file
            required: true
            data_type: multipart file
            description: Uploaded file object saved using the submitted filename.
          responses:
          - status_code: 200
            content_type: text/html
            description: Upload form on GET.
          redirects:
          - target: /login
            status_code: 302
            condition: user_id missing from session
            description: Unauthenticated requests are redirected to login.
          - target: /upload
            status_code: 302
            condition: POST without file
            description: Missing file redirects back to upload.
          - target: /dashboard
            status_code: 302
            condition: successful upload
            description: Successful upload records file metadata and redirects to dashboard.
          templates:
          - /app/templates/upload.html
          - /app/templates/base.html
          static_assets:
          - /app/static/style.css
          vulnerability_refs:
          - webapp-unrestricted-upload
          - webapp-upload-path-traversal
        - route_id: webapp-api-file
          path: /api/v1/files/<int:file_id>
          methods: [GET, HEAD, OPTIONS]
          name: File metadata API
          description: File metadata API accepts API key or session auth and lacks an ownership check for the requested file id.
          auth_required: true
          auth_scheme: Flask session or X-API-Key/api_key
          session_required: false
          parameters:
          - name: file_id
            location: path
            required: true
            data_type: integer
            description: File id path variable.
          - name: X-API-Key
            location: header
            required: false
            data_type: string
            description: Optional API key alternative to session.
          - name: api_key
            location: query
            required: false
            data_type: string
            description: Optional query API key alternative to session.
          - name: session
            location: cookie
            required: false
            data_type: Flask session cookie
            description: Optional authenticated session alternative to API key.
          responses:
          - status_code: 200
            content_type: application/json
            description: File metadata JSON with id, user_id, filename, file_size, mime_type, and created_at.
          - status_code: 401
            content_type: application/json
            description: Missing API key and session returns authentication error.
          - status_code: 404
            content_type: application/json
            description: Unknown file id returns not-found JSON.
          exposed_fields:
          - name: id
            sensitivity: plain
            description: File id.
          - name: user_id
            sensitivity: plain
            description: Owning user id is returned without ownership enforcement.
          - name: filename
            sensitivity: plain
            description: Stored filename.
          - name: mime_type
            sensitivity: plain
            description: Uploaded MIME type.
          vulnerability_refs:
          - webapp-idor-files
        - route_id: webapp-api-user
