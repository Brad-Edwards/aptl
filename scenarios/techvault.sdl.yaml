relationships:
  suricata-logs-forwarded-wazuh:
    type: connects_to
    source: suricata
    target: wazuh-manager
    description: The aptl-wazuh-sidecar-suricata agent tails Suricata eve.json from the suricata_logs volume and forwards alert telemetry to the SOC stack.
    properties:
      protocol: wazuh-agent-sidecar
      source_log: /var/log/suricata/eve.json
      sidecar: aptl-wazuh-sidecar-suricata
  db-logs-forwarded-wazuh:
    type: connects_to
    source: db
    target: wazuh-manager
    description: Wazuh sidecar tails PostgreSQL logs from the db_data volume and forwards them to the SOC stack.
    properties:
      protocol: syslog-via-sidecar
      source_log: /var/lib/postgresql/data/pg_log/postgresql.log
  webapp-connects-db:
    type: connects_to
    source: nodes.webapp.runtime.applications.techvault-portal
    target: nodes.db.runtime.database_services.techvault-postgres.databases.techvault
    description: Webapp uses the TechVault PostgreSQL database on the internal network.
    database_access:
      role_ref: techvault
      auth_method: password
    properties: {protocol: postgresql, port: "5432", auth_method: password}
  webapp-forwards-wazuh:
    type: connects_to
    source: webapp
    target: wazuh-manager
    description: Webapp forwards logs and Wazuh agent telemetry to the SOC stack.
    properties: {protocol: syslog-and-wazuh-agent}
  fileshare-forwards-wazuh:
    type: connects_to
    source: fileshare
    target: wazuh-manager
    description: Fileshare forwards Samba logs and Wazuh agent telemetry to the SOC stack.
    properties:
      protocol: syslog-and-wazuh-agent
      log_paths: /var/log/samba/log.samba-bgqd,/var/log/samba/log.*
  kali-probes-mailserver-smtp:
    type: connects_to
    source: kali
    target: nodes.mailserver.runtime.mail_services.techvault-mail.listeners.smtp-25
    description: Kali participant-vantage discovery reached the mailserver SMTP listener on the DMZ network.
    mail_access:
      protocol: smtp
      auth_mechanism: none
      tls_mode: none
      listener_ref: smtp-25
      domain_ref: techvault-domain
    properties: {protocol: smtp, port: '25', vantage: aptl-kali}
  kali-probes-mailserver-imap:
    type: connects_to
    source: kali
    target: nodes.mailserver.runtime.mail_services.techvault-mail.listeners.imap-143
    description: Kali participant-vantage discovery reached the Dovecot IMAP listener and observed pre-login capabilities.
    mail_access:
      protocol: imap
      auth_mechanism: plain
      tls_mode: none
      listener_ref: imap-143
      domain_ref: techvault-domain
    properties: {protocol: imap, port: '143', vantage: aptl-kali}

  ad-forwards-dns:
    type: connects_to
    source: ad
    target: internal-net
    description: Samba internal DNS forwards unresolved queries to the configured DNS forwarder at 172.20.1.22.
    properties: {protocol: dns, port: "53", auth_method: none, forwarder: "172.20.1.22"}
  ad-forwards-wazuh:
    type: connects_to
    source: ad
    target: wazuh-manager
    description: AD forwards Samba logs and Wazuh agent telemetry to the SOC stack.
    properties: {protocol: syslog-and-wazuh-agent, log_paths: "/var/log/samba/log.samba,/var/log/samba/log.smbd,/var/log/samba/log.winbindd"}
  ad-provides-domain:
    type: connects_to
    source: ad
    target: internal-net
    description: AD provides TECHVAULT.LOCAL identity, Kerberos, LDAP, SMB, and DNS services to internal TechVault participants.
    properties: {realm: TECHVAULT.LOCAL, domain: techvault.local}
  workstation-configures-wazuh:
    type: connects_to
    source: workstation
    target: wazuh-manager
    description: 'Workstation runtime environment points Wazuh agent/SIEM configuration at 172.20.2.30; the service-manager
      failure state is blocked on ACES #418.'
    properties:
      protocol: wazuh-agent
      configured_manager: 172.20.2.30
      observed_unit_state: blocked-by-aces-418
  workstation-credentials-reference-db:
    type: connects_to
    source: workstation-credential-fixtures
    target: db
    description: Workstation credential fixtures contain PostgreSQL connection material for the TechVault database.
    properties:
      protocol: postgresql
      port: '5432'
      auth_method: password
      sensitivity: secret_fixture
  workstation-credentials-reference-webapp:
    type: connects_to
    source: workstation-credential-fixtures
    target: webapp
