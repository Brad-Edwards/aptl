name: techvault-conditions
conditions:
  db-postgres-ready:
    command: pg_isready -U techvault -d techvault
    interval: 10
    timeout: 5
    retries: 5
    start_period: 15
  wazuh-api-ready:
    command: curl -ks https://localhost:55000 || exit 1
    interval: 30
    timeout: 10
    retries: 5
    start_period: 120
  webapp-http-ready:
    command: curl -sf http://localhost:8080/ || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
  fileshare-smb-ready:
    command: smbclient -L localhost -N || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
  mailserver-smtp-ready:
    command: nc -z localhost 25 || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 120
  kali-healthcheck:
    command: /usr/local/bin/aptl-healthcheck.sh
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
  ad-domain-ready:
    command: samba-tool domain info 127.0.0.1 || exit 1
    interval: 30
    timeout: 10
    retries: 10
    start_period: 60
  workstation-ssh-ready:
    command: ss -tlnp | grep ':22' || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
  victim-ssh-ready:
    command: ss -tlnp | grep ':22' || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
  dns-soa-ready:
    command: dig @localhost techvault.local SOA +short || exit 1
    interval: 15
    timeout: 5
    retries: 5
    start_period: 30
  misp-https-ready:
    name: MISP HTTPS login healthcheck
    command: curl -ksf https://localhost/users/login || (nginx -s reload 2>/dev/null; exit 1)
    interval: 30
    timeout: 10
    retries: 15
    start_period: 300
    description: Docker Compose healthcheck for the aptl-misp container. Output is redacted in committed evidence because it
      contains HTML token material.
