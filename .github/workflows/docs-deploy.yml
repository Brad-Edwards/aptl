name: Docs deploy

# Builds the mkdocs site and publishes it to GitHub Pages (ADR-038,
# DOC-001). Runs only on main: PRs get the same `mkdocs build --strict`
# validation from the docs job in checks.yml, without deploying.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-flight deploy finish so a
# rapid push series cannot leave the site half-published.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Job-level main-only guard: `push.branches: [main]` constrains only
    # push events, while workflow_dispatch can target any ref. Without
    # this guard a collaborator could manually deploy a non-main
    # branch's docs to Pages (codex finding on #408).
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # git-revision-date-localized needs full history for page dates
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[docs]"
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
