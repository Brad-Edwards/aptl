          name: current user API
          description: Bearer-key-authenticated endpoint used to prove TheHive can authenticate as aptl-svc@cortex.local.
          auth_required: true
          auth_scheme: bearer
          session_required: false
          parameters: []
          responses: []
          templates: []
          static_assets: []
          vulnerability_refs: []
          redirects: []
          disclosures: []
          exposed_fields:
          - name: hasKey
            sensitivity: plain
            value: 'true'
            description: Route reveals key presence, not the raw key.
          upstream_target: null
