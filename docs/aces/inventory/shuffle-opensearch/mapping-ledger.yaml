schema_version: 1
asset:
  id: shuffle-opensearch
  scenario: TechVault
  aptl_issue: 356
  aces_methodology_issue: 353
  source_class: upstream-registry-image-datastore
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: opensearchproject/opensearch@sha256:466a49f379bb8889af29d615475e69b7b990898c6987d28470cd7105df9046ff
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence:
    - path: evidence/docker-buildx-imagetools.image.raw.json
    - path: evidence/docker-inspect.image.json
    limits:
    - Upstream OpenSearch registry image; identity is the pinned RepoDigest. No registry-visible OCI/in-toto/SLSA attestation
      is published for this tag.
notes:
- Capture used the already-running aptl project (soc profile up) per operator direction and did not run aptl lab stop -v &&
  aptl lab start; this bundle is a steady-state observation of that local lab, not clean-reset rebuild proof.
- 'SCN-010 issue #356 promotes shuffle-opensearch from a docker-compose-derived node stub to the fully inventoried participant
  datastore node nodes.techvault.shuffle-opensearch (datastore family, upstream opensearch:2.14.0 image). Every catalogued
  observable maps to a current ACES surface (datastore_services search_index profile). No known ACES expressivity gap remains
  for the catalogued shuffle-opensearch steady-state facts.'
- 'OpenSearch is the sole persistence backend for the Shuffle SOAR stack: 24 indices holding workflows, executions, apps,
  organizations, users, notifications, and the OpenSearch security config (.opendistro_security). shuffle-backend is the consumer
  (relationships.shuffle-backend-connects-opensearch, already encoded).'
- The Security plugin is enabled (HTTPS + basic auth); the admin credential is the OPENSEARCH_INITIAL_ADMIN_PASSWORD committed
  scenario fixture (kept verbatim in the SDL environment, present in docker-compose.yml). All 24 index mappings were captured
  with admin auth via the _mapping API.
correspondence_checks:
- id: shuffle-opensearch-evidence-bundle-integrity
  status: implemented
  source: docs/aces/inventory/shuffle-opensearch/evidence
  method: evidence-sha256sums.txt hashes every committed evidence file except the manifest; tests/test_shuffle_opensearch_inventory.py
    recomputes and compares.
  realized_evidence:
  - path: evidence/evidence-sha256sums.txt
  - path: evidence/captured-at-utc.txt
  ledger_fact_ids:
  - shuffle-opensearch.capture.toolchain-baseline
- id: shuffle-opensearch-sdl-runtime-correspondence
  status: implemented
  source: nodes.techvault.shuffle-opensearch.runtime
  method: tests/test_shuffle_opensearch_inventory.py parses the ACES SDL and asserts image, package, CVE, filesystem, identity,
    process, environment, listener, and datastore counts/values against the evidence.
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/os-packages.txt
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/opensearch-state.txt
  ledger_fact_ids:
  - shuffle-opensearch.runtime.container-host-config
  - shuffle-opensearch.runtime.package-inventory
  - shuffle-opensearch.runtime.vulnerability-scan
  - shuffle-opensearch.runtime.local-identity
  - shuffle-opensearch.datastore.opensearch-service
- id: shuffle-opensearch-datastore-mapping-correspondence
  status: implemented
  source: nodes.techvault.shuffle-opensearch.runtime.datastore_services
  method: README and tests assert the OpenSearch engine/version/cluster, the 24 index partitions, and the 24 captured index
    mappings.
  realized_evidence:
  - path: evidence/opensearch-state.txt
  - path: evidence/shuffle-opensearch-index-mappings.json
  ledger_fact_ids:
  - shuffle-opensearch.datastore.opensearch-service
  - shuffle-opensearch.runtime.service-listeners
- id: shuffle-opensearch-scope-and-redaction-caveats
  status: implemented
  source: docs/aces/inventory/shuffle-opensearch/evidence/capture-limits.txt
  method: README and tests assert non-destructive capture scope, the data-volume manifest exclusion, the admin-password secret-fixture
    handling, and unavailable osquery tables.
  realized_evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  - path: evidence/docker-top.txt
  - path: evidence/docker-network.aptl-security.json
  - path: evidence/docker-volume.shuffle_opensearch_data.json
  - path: evidence/docker-history.image.txt
  - path: evidence/language-manifests.txt
  ledger_fact_ids:
  - shuffle-opensearch.capture.toolchain-baseline
  - shuffle-opensearch.runtime.filesystem-inventory
  - shuffle-opensearch.runtime.environment
  - shuffle-opensearch.runtime.osquery-baseline
  - shuffle-opensearch.datastore.opensearch-service
facts:
- id: shuffle-opensearch.capture.toolchain-baseline
  category: capture
  summary: Capture used digest-pinned Trivy, Syft, and osquery images, recorded Docker/Compose versions, capture time, and
    explicit capture limits.
  evidence:
  - path: evidence/captured-at-utc.txt
  - path: evidence/docker-version.json
  - path: evidence/docker-compose-version.json
  - path: evidence/trivy-version.txt
  - path: evidence/syft-version.json
  - path: evidence/osquery-version.txt
  - path: evidence/capture-limits.txt
  - path: evidence/evidence-sha256sums.txt
  aces:
    disposition: encoded_with_caveat
    surface: runtime_contract
    checked_surfaces:
    - runtime_contract
    fields:
    - docs/aces/inventory/shuffle-opensearch/capture-evidence.sh
    - docs/aces/inventory/shuffle-opensearch/evidence/capture-limits.txt
    rationale: Current ACES SDL runtime fields carry this catalogued shuffle-opensearch fact directly.
    caveat: Scanner/runtime observations are time-sensitive evidence from the current-running lab, not clean-reset proof.
- id: shuffle-opensearch.image.identity-provenance
  category: image
  summary: The datastore resolves to the upstream registry image opensearchproject/opensearch:2.14.0 (pinned RepoDigest);
    Amazon Linux 2023 base.
  evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/docker-buildx-imagetools.image.raw.json
  - path: evidence/docker-buildx-imagetools.image.txt
  - path: evidence/osquery-docker-images.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.source.name
    - nodes.techvault.shuffle-opensearch.source.version
    - nodes.techvault.shuffle-opensearch.os_version
    rationale: Current ACES SDL node source fields carry the upstream registry image identity directly.
- id: shuffle-opensearch.image.build-recipe
  category: image
  summary: The build recipe (instructions/layers from docker history, default config, absent attestation) is encoded as upstream-image
    provenance.
  evidence:
  - path: evidence/docker-history.image.txt
  - path: evidence/docker-history.image.jsonl
  - path: evidence/docker-inspect.image.json
  - path: evidence/source-checksums.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.source.build.instructions
    - nodes.techvault.shuffle-opensearch.source.build.layers
    - nodes.techvault.shuffle-opensearch.source.build.config
    - nodes.techvault.shuffle-opensearch.source.build.attestation
    rationale: Current ACES SDL node build fields carry the history-reconstructed recipe directly.
- id: shuffle-opensearch.compose.service-contract
  category: compose
  summary: Compose declares aptl-shuffle-opensearch, image opensearch:2.14.0, discovery.type=single-node, OPENSEARCH_JAVA_OPTS
    heap, OPENSEARCH_INITIAL_ADMIN_PASSWORD (committed fixture), the shuffle_opensearch_data volume, 1g memory, and security-net
    172.20.0.2 (no host-published ports).
  evidence:
  - path: evidence/compose-service.shuffle-opensearch.json
  - path: evidence/docker-compose-version.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.environment
    - nodes.techvault.shuffle-opensearch.runtime.operational_policy
    - nodes.techvault.shuffle-opensearch.runtime.mounts
    - nodes.techvault.shuffle-opensearch.runtime.network
    rationale: Current ACES SDL node runtime fields carry the compose contract directly.
- id: shuffle-opensearch.runtime.container-host-config
  category: runtime
  summary: Docker runtime policy captures restart, 1 GiB memory, namespaces, masked/read-only paths, no added capabilities,
    and runc runtime.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/docker-top.txt
  - path: evidence/docker-logs.shuffle-opensearch.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.container
    - nodes.techvault.shuffle-opensearch.runtime.operational_policy
    - nodes.techvault.shuffle-opensearch.runtime.linux_capabilities
    rationale: Current ACES SDL node runtime fields carry this catalogued fact directly.
- id: shuffle-opensearch.network.identity
  category: network
  summary: The datastore is on security-net at 172.20.0.2; 9200/9300/9600 are NOT host-published; kali (other subnets) cannot
    route to it.
  evidence:
  - path: evidence/docker-network.aptl-security.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/participant-discovery.kali.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.network.endpoints
    - nodes.techvault.shuffle-opensearch.runtime.network.published_ports
    rationale: Current ACES SDL node network fields carry the realized endpoint and no-published-port facts directly.
- id: shuffle-opensearch.runtime.service-listeners
  category: runtime
  summary: OpenSearch listens on TCP/9200 (REST, HTTPS — security enabled), TCP/9300 (transport), and TCP/9600 (performance
    analyzer); all security-net.
  evidence:
  - path: evidence/osquery-listening-ports.json
  - path: evidence/opensearch-state.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.service_listeners
    - nodes.techvault.shuffle-opensearch.services
    rationale: Current ACES SDL node service_listeners + services carry the listener facts directly.
- id: shuffle-opensearch.runtime.mounts
  category: runtime
  summary: The shuffle_opensearch_data named volume is mounted at /usr/share/opensearch/data; the runtime mount table and
    volume inspect record it.
  evidence:
  - path: evidence/docker-volume.shuffle_opensearch_data.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.mounts
    rationale: Current ACES SDL node runtime.mounts carries the data-volume mount directly.
- id: shuffle-opensearch.runtime.filesystem-inventory
  category: filesystem
  summary: The OpenSearch install tree (bin, config, modules) and os-release are encoded with checksums for stable files;
    the data volume is excluded.
  evidence:
  - path: evidence/filesystem-tree.txt.gz
  - path: evidence/filesystem-checksums.txt.xz
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.filesystem_inventory
    rationale: Current ACES SDL node runtime.filesystem_inventory carries the path/metadata/checksum facts directly.
    caveat: The minimal Amazon Linux 2023 image lacks find/xargs; the manifest was rebuilt via in-container python os.walk
      (precedent column format preserved). The /usr/share/opensearch/data volume content is excluded (top-level rows only);
      index/document state is captured in the datastore mappings + opensearch-state.txt instead.
- id: shuffle-opensearch.runtime.process-set
  category: runtime
  summary: PID 1 is the opensearch-docker-entrypoint; the main OpenSearch JVM and the performance-analyzer JVM are the steady-state
    processes.
  evidence:
  - path: evidence/osquery-processes.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-top.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.processes
    rationale: Current ACES SDL node runtime.processes carries the captured process set directly.
- id: shuffle-opensearch.runtime.environment
  category: runtime
  summary: Runtime environment is six variables (discovery.type, OPENSEARCH_INITIAL_ADMIN_PASSWORD, OPENSEARCH_JAVA_OPTS,
    PATH, JAVA_HOME, LD_LIBRARY_PATH).
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/compose-service.shuffle-opensearch.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.environment
    rationale: Current ACES SDL node runtime.environment carries the captured variables directly.
    caveat: OPENSEARCH_INITIAL_ADMIN_PASSWORD is a committed scenario fixture (value present in docker-compose.yml); it is
      kept verbatim per the secret-fixture policy (redacted in docker-inspect evidence, preserved in the authored compose
      block).
- id: shuffle-opensearch.runtime.local-identity
  category: identity
  summary: Local passwd/group inventory records 14 users and 25 groups (minimal Amazon Linux 2023 + the opensearch service
    account); no sudo rules.
  evidence:
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.local_identity
    rationale: Current ACES SDL node runtime.local_identity carries the local identity surface directly.
- id: shuffle-opensearch.application.software-versions
  category: runtime
  summary: OpenSearch 2.14.0 (lucene 9.10.0) is the application component; identified from the cluster root API and the install
    tree.
  evidence:
  - path: evidence/language-manifests.txt
  - path: evidence/opensearch-state.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.software_components
    rationale: Current ACES SDL node runtime.software_components carries the OpenSearch version directly.
- id: shuffle-opensearch.runtime.package-inventory
  category: runtime
  summary: rpm package inventory captures 110 installed OS packages from the OpenSearch Amazon Linux 2023 base.
  evidence:
  - path: evidence/os-packages.txt
  - path: evidence/osquery-apt-sources.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.packages
    rationale: Current ACES SDL node runtime.packages carries the rpm inventory directly.
- id: shuffle-opensearch.runtime.vulnerability-scan
  category: runtime
  summary: Trivy captured 410 image-layer vulnerability findings (2 critical, 157 high, 231 medium, 20 low).
  evidence:
  - path: evidence/trivy-vulnerabilities.json.gz
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/trivy-vulnerability-counts.json
  - path: evidence/trivy-version.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.package_vulnerabilities
    rationale: Current ACES SDL node runtime.package_vulnerabilities carries the per-CVE findings directly.
    caveat: Scanner output is time-sensitive and tied to the captured Trivy version/database state.
- id: shuffle-opensearch.runtime.sbom-toolchain
  category: runtime
  summary: Required Trivy CycloneDX and useful-optional Syft CycloneDX SBOMs are captured; Syft output is deterministically
    normalized.
  evidence:
  - path: evidence/trivy-sbom.cyclonedx.json.gz
  - path: evidence/syft-sbom.cyclonedx.json.gz
  - path: evidence/syft-version.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.packages
    - nodes.techvault.shuffle-opensearch.runtime.software_components
    rationale: SDL package fields use rpm + scanner-derived summaries; full CycloneDX docs retained as evidence.
    caveat: SBOMs retained as evidence; SDL package fields do not embed the full CycloneDX documents.
- id: shuffle-opensearch.runtime.osquery-baseline
  category: runtime
  summary: osquery captured processes, listeners, host-side Docker container/image rows, and the unavailable Linux application/program/apt-sources
    table status.
  evidence:
  - path: evidence/osquery-processes.json
  - path: evidence/osquery-listening-ports.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/osquery-docker-images.json
  - path: evidence/osquery-apt-sources.json
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.processes
    - nodes.techvault.shuffle-opensearch.runtime.service_listeners
    rationale: Current ACES SDL node fields carry the osquery-derived baseline directly.
    caveat: installed_applications/programs tables are unavailable in the digest-pinned Linux osquery image; apt_sources is
      not applicable to the Amazon Linux 2023 target (recorded as capture limits).
- id: shuffle-opensearch.datastore.opensearch-service
  category: datastore
  summary: 'The OpenSearch wide search-index datastore is encoded: engine opensearch 2.14.0, single-node cluster docker-cluster
    (yellow), the node with its roles, all 24 index partitions, all 24 captured index mappings (workflows, executions, apps,
    orgs, users, security), security-enabled transport, and the discovery/security/heap settings.'
  evidence:
  - path: evidence/opensearch-state.txt
  - path: evidence/shuffle-opensearch-index-mappings.json
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-opensearch.runtime.datastore_services
    rationale: Current ACES SDL node runtime.datastore_services (search_index profile) carries the engine, cluster, node,
      24 partitions, 24 mappings, transport_security, and settings facts directly.
    caveat: 'The OpenSearch Security plugin is ENABLED (HTTPS + basic auth, admin credential = the OPENSEARCH_INITIAL_ADMIN_PASSWORD
      scenario fixture); mappings were read with admin auth via the _mapping vantage (the _cluster/state fallback was wired
      but unused). Cluster health is yellow (single-node: replica shards unassigned). transport_security mode is recorded
      as mutual_tls (opendistro_security default); the exact TLS client-verification config was not separately captured.'
