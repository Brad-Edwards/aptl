schema_version: 1
asset:
  id: misp-suricata-sync
  scenario: TechVault
  aptl_issue: 349
  aces_methodology_issue: 353
  source_class: local-custom-build-integration-service
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: aptl-misp-suricata-sync@sha256:71fc6bcd3af6b6654a566b14139d1aa06b7063b12c0eb282d0d40d49361580fb
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence:
    - path: evidence/docker-buildx-imagetools.image.err
    - path: evidence/docker-inspect.image.json
    limits:
    - aptl-misp-suricata-sync:latest is a locally built image with no registry manifest, so docker buildx imagetools inspect
      failed (see docker-buildx-imagetools.image.err) and no registry-visible OCI/in-toto/SLSA attestation could be captured.
      Image identity is the local config ID in docker-inspect.image.json plus the build recipe in source-checksums.txt.
notes:
- Capture used the already-running aptl project (soc profile up) per operator direction and did not run aptl lab stop -v &&
  aptl lab start; this bundle is a steady-state observation of that local lab, not clean-reset rebuild proof.
- 'SCN-010 issue #349 replaces the docker-compose-derived node stub with the fully inventoried participant node nodes.techvault.misp-suricata-sync.
  Every catalogued observable maps to a current ACES surface: image/build/packages/CVEs/filesystem/identity/runtime on the
  node, and the MISP-API + Suricata-handoff behaviour on typed relationship edges. No known ACES expressivity gap remains
  for the catalogued misp-suricata-sync steady-state facts.'
- MISP_API_KEY is the lab MISP admin API key — the same secret_fixture value already disclosed on nodes.techvault.misp (ADMIN_KEY).
  It is retained verbatim in committed evidence and SDL because it is TechVault scenario content.
- /var/run/suricata is the suricata asset's command-socket volume and /var/lib/suricata/rules/misp is the shared
  aptl_suricata_misp_rules named volume (ADR-043); the socket and the suricata-owned hash-list files are recorded here as
  path/metadata with cross-references to the suricata asset inventory.
- Rules generation is alert-only per ADR-019 (Suricata stays IDS); the generated misp-iocs.rules held ioc_count=0 at the capture
  snapshot.
correspondence_checks:
- id: misp-suricata-sync-evidence-bundle-integrity
  status: implemented
  source: docs/aces/inventory/misp-suricata-sync/evidence
  method: evidence-sha256sums.txt hashes every committed evidence file except the manifest itself; tests/test_misp_suricata_sync_inventory.py
    recomputes and compares.
  realized_evidence:
  - path: evidence/evidence-sha256sums.txt
  - path: evidence/captured-at-utc.txt
  ledger_fact_ids:
  - misp-suricata-sync.capture.toolchain-baseline
- id: misp-suricata-sync-sdl-runtime-correspondence
  status: implemented
  source: scenarios/techvault.sdl.yaml nodes.techvault.misp-suricata-sync
  method: tests/test_misp_suricata_sync_inventory.py parses the ACES SDL and asserts image, build, package, CVE, filesystem,
    identity, process, environment, capability, and network counts/values against the evidence.
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/os-packages.txt
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/language-manifests.txt
  ledger_fact_ids:
  - misp-suricata-sync.runtime.container-policy
  - misp-suricata-sync.runtime.package-inventory
  - misp-suricata-sync.runtime.vulnerability-scan
  - misp-suricata-sync.runtime.local-identity
  - misp-suricata-sync.application.software-versions
- id: misp-suricata-sync-integration-relationship-correspondence
  status: implemented
  source: scenarios/techvault.sdl.yaml relationships misp-suricata-sync-queries-misp-api + misp-suricata-sync-updates-suricata-rules
  method: README and tests assert the realized MISP API edge and the Suricata rules/socket handoff (suricata-side observer
    confirms the same rules file and command socket).
  realized_evidence:
  - path: evidence/sync-service-state.txt
  - path: evidence/observer-discovery.suricata.txt
  - path: evidence/participant-discovery.kali.txt
  ledger_fact_ids:
  - misp-suricata-sync.relationship.queries-misp-api
  - misp-suricata-sync.relationship.updates-suricata-rules
  - misp-suricata-sync.service.sync-behavior
- id: misp-suricata-sync-scope-and-scenario-secret-caveats
  status: implemented
  source: docs/aces/inventory/misp-suricata-sync/evidence/capture-limits.txt
  method: README and tests assert non-destructive capture scope, MISP_API_KEY/GPG_KEY retention, the scoped filesystem manifest,
    missing ss/netstat, and unavailable osquery tables.
  realized_evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  ledger_fact_ids:
  - misp-suricata-sync.capture.toolchain-baseline
  - misp-suricata-sync.runtime.filesystem-inventory
  - misp-suricata-sync.runtime.service-listeners
  - misp-suricata-sync.secret.misp-api-key-fixture
facts:
- id: misp-suricata-sync.capture.toolchain-baseline
  category: capture
  summary: Capture used digest-pinned Trivy, Syft, and osquery images, recorded Docker/Compose versions, capture time, and
    explicit capture limits.
  evidence:
  - path: evidence/captured-at-utc.txt
  - path: evidence/docker-version.json
  - path: evidence/docker-compose-version.json
  - path: evidence/trivy-version.txt
  - path: evidence/syft-version.json
  - path: evidence/osquery-version.txt
  - path: evidence/capture-limits.txt
  - path: evidence/evidence-sha256sums.txt
  aces:
    disposition: encoded_with_caveat
    surface: runtime_contract
    checked_surfaces:
    - runtime_contract
    fields:
    - docs/aces/inventory/misp-suricata-sync/capture-evidence.sh
    - docs/aces/inventory/misp-suricata-sync/evidence/capture-limits.txt
    rationale: Current ACES SDL runtime/profile fields carry this catalogued misp-suricata-sync fact directly.
    caveat: Scanner and runtime observations are time-sensitive evidence from the current-running lab, not immutable clean-reset
      proof.
