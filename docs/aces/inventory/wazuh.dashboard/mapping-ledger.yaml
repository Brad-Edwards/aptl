schema_version: 1
asset:
  id: wazuh.dashboard
  scenario: TechVault
  aptl_issue: 342
  aces_methodology_issue: 428
  source_class: upstream-image-plus-mounted-configuration
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: wazuh/wazuh-dashboard@sha256:8f5b50fde67a0b1c4d2321aa26b12bbc5cef21269cf4f6225746f0b946458bd7
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence:
    - path: evidence/docker-buildx-imagetools.image.raw.json
    - path: evidence/docker-buildx-imagetools.image.txt
    limits:
    - The upstream image exposes Docker inspect/history and a registry manifest, but no registry-visible in-toto/SLSA attestation
      was captured for this image digest.
correspondence_checks:
- id: wazuh-dashboard-node-source-correspondence
  status: planned
  source: nodes.techvault.wazuh-dashboard.source
  realized_evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/docker-history.image.jsonl
  - path: evidence/source-checksums.txt
  - path: evidence/dashboard-config-files.redacted.txt
  ledger_fact_ids:
  - wazuh-dashboard.image.identity
  - wazuh-dashboard.image.history
  - wazuh-dashboard.compose.service
  method: Compare the ACES source name/version/build provenance and APTL source inputs against the upstream image inspect/history
    and source checksums captured in this bundle.
  limit: 'Planned because issue #342 records a frozen current-lab steady-state asset spec rather than a destructive live equivalence
    proof.'
- id: wazuh-dashboard-runtime-correspondence
  status: planned
  source: nodes.techvault.wazuh-dashboard.runtime
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/wazuh-dashboard-state.txt
  - path: evidence/wazuh-dashboard-probe.json
  - path: evidence/os-packages.txt
  - path: evidence/syft-sbom.cyclonedx.json.gz
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/filesystem-tree.txt.gz.part-000
  - path: evidence/filesystem-tree.txt.gz.part-001
  - path: evidence/filesystem-checksums.txt.xz.part-000
  - path: evidence/filesystem-checksums.txt.xz.part-001
  - path: evidence/filesystem-checksums.txt.xz.part-002
  - path: evidence/filesystem-checksums.txt.xz.part-003
  - path: evidence/filesystem-checksums.txt.xz.part-004
  - path: evidence/filesystem-checksums.txt.xz.part-005
  ledger_fact_ids:
  - wazuh-dashboard.network.identity
  - wazuh-dashboard.runtime.mount-table
  - wazuh-dashboard.runtime.container-policy
  - wazuh-dashboard.runtime.health
  - wazuh-dashboard.runtime.processes
  - wazuh-dashboard.runtime.environment
  - wazuh-dashboard.runtime.local-identity-database
  - wazuh-dashboard.runtime.filesystem-inventory
  - wazuh-dashboard.runtime.package-inventory
  - wazuh-dashboard.runtime.vulnerability-scan
  - wazuh-dashboard.application.surface
  - wazuh-dashboard.platform-application
  method: Re-run the encoded scenario from ACES SDL, recapture dashboard runtime evidence, and compare network, filesystem,
    package, vulnerability, local identity, and dashboard logical state against this ledger.
  limit: Planned because this issue records the frozen steady-state ACES spec and evidence, not a destructive clean-lab equivalence
    run.
notes:
- Capture used the existing running local aptl project as authorized on 2026-06-06 and did not reset the lab.
- Raw dashboard, indexer, Wazuh API, cookie, and private-key values are redacted or omitted; path, metadata, and setting-name
  evidence remains.
- No known remaining ACES expressivity blocker remains for the catalogued Wazuh dashboard steady-state inventory facts in
  this ledger.
