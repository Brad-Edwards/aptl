schema_version: 1
asset:
  id: suricata
  scenario: TechVault
  aptl_issue: 345
  aces_methodology_issue: 353
  source_class: upstream-image-plus-mounted-config
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: jasonish/suricata@sha256:7b3fa735ba2bc7c1e3e764e6070c0a319935a737ca86e86e86d2640e408295fe
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence: []
    limits:
    - The upstream jasonish/suricata:7.0 image exposes a registry manifest, but no registry-visible in-toto/SLSA attestation was captured for this tag.
correspondence_checks:
- id: suricata-node-source-correspondence
  status: planned
  source: nodes.suricata.source
  realized_evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/docker-history.image.jsonl
  - path: evidence/source-checksums.txt
  ledger_fact_ids:
  - suricata.image.identity
  - suricata.image.history
  - suricata.compose.service
  method: Compare the ACES source name/version/build provenance and APTL source inputs against the upstream image inspect/history and source checksums captured in this bundle.
  limit: 'Planned because issue #345 records a frozen steady-state asset spec rather than a destructive live equivalence proof.'
- id: suricata-runtime-correspondence
  status: planned
  source: nodes.suricata.runtime
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/suricata-state.txt
  - path: evidence/os-packages.txt
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/filesystem-tree.txt
  ledger_fact_ids:
  - suricata.runtime.mount-table
  - suricata.runtime.container-policy
  - suricata.runtime.command-socket
  - suricata.runtime.processes
  - suricata.runtime.local-identity
  - suricata.runtime.filesystem-inventory
  - suricata.runtime.package-inventory
  - suricata.runtime.vulnerability-scan
  method: Re-run the encoded scenario, recapture suricata runtime evidence, and compare network, mount, capability, filesystem, package, vulnerability, local-identity, and command-socket state against this ledger.
  limit: Planned because this issue records the frozen steady-state ACES spec and evidence, not a destructive clean-lab equivalence run.
notes:
- Capture used the already-running local aptl lab (soc profile) non-destructively; no aptl lab stop -v && aptl lab start clean reset was run.
- Suricata is the first passive network-sensor asset inventoried in TechVault; its monitoring posture (Brad-Edwards/aces#429) and typed IDS/NDR detection-engine semantics (Brad-Edwards/aces#430) are blocked on ACES expressivity gaps and recorded as blocked_by_aces_gap facts.
- eve.json and fast.log are unbounded transient sensor telemetry, recorded as filesystem metadata only.
