schema_version: 1
asset:
  id: misp
  scenario: TechVault
  aptl_issue: 346
  aces_methodology_issue: 353
  source_class: upstream-image-plus-mounted-runtime-config
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: ghcr.io/misp/misp-docker/misp-core@sha256:992fd95b8d9698a18e1acdd7dbf5e8d03b32a03fd80e4bcbcff77bc7f17768cd
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence:
      - path: evidence/docker-buildx-imagetools.image.txt
      - path: evidence/docker-buildx-imagetools.image.raw.json
    limits:
      - No registry-visible OCI, in-toto, or SLSA attestation was available in the captured imagetools evidence.
notes:
  - Capture used the already-running aptl project per operator direction and did not run aptl lab stop -v && aptl lab start.
  - ACES #431 is consumed through nodes.techvault.misp.runtime.service_listeners; no known ACES expressivity gap remains for the catalogued MISP steady-state facts.
  - The live MISP database contains one known-threat-actors event, six attributes, seven tags, and installed reference datasets.
correspondence_checks:
  - id: misp-evidence-bundle-integrity
    status: implemented
    source: docs/aces/inventory/misp/evidence
    method: evidence-sha256sums.txt hashes every committed evidence file except the manifest itself.
    realized_evidence:
      - path: evidence/evidence-sha256sums.txt
      - path: evidence/captured-at-utc.txt
    ledger_fact_ids:
      - misp.capture.toolchain-baseline
  - id: misp-sdl-runtime-correspondence
    status: implemented
    source: scenarios/techvault.sdl.yaml nodes.techvault.misp
    method: tests/test_misp_inventory.py parses ACES SDL and asserts image, runtime, listener, package, CVE, identity, route, platform-application, content, and relationship counts.
    realized_evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
      - path: evidence/osquery-listening-ports.json
      - path: evidence/misp-state.txt
      - path: evidence/trivy-vulnerability-list.json
    ledger_fact_ids:
      - misp.runtime.container-policy
      - misp.runtime.service-listeners
      - misp.application.routes-health
      - misp.application.local-authorization
      - misp.application.platform-settings
      - misp.runtime.vulnerability-scan
  - id: misp-scope-and-capture-caveats
    status: implemented
    source: docs/aces/inventory/misp/evidence/capture-limits.txt
    method: README and tests assert non-destructive capture scope, retained scenario secret values, Syft normalization,
      unavailable osquery tables, and Compose extraction caveats.
    realized_evidence:
      - path: evidence/capture-limits.txt
      - path: evidence/osquery-installed-applications.json
      - path: evidence/osquery-programs.json
    ledger_fact_ids:
      - misp.capture.toolchain-baseline
      - misp.runtime.filesystem-inventory
facts:
  - id: misp.capture.toolchain-baseline
    category: capture
    summary: Capture used digest-pinned Trivy, Syft, and osquery images, recorded Docker/Compose versions, and recorded explicit capture limits.
    evidence:
      - path: evidence/captured-at-utc.txt
      - path: evidence/docker-version.json
      - path: evidence/docker-compose-version.json
      - path: evidence/trivy-version.txt
      - path: evidence/syft-version.json
      - path: evidence/osquery-version.txt
      - path: evidence/capture-limits.txt
      - path: evidence/evidence-sha256sums.txt
    aces:
      disposition: encoded_with_caveat
      surface: runtime_contract
      checked_surfaces: [runtime_contract]
      fields:
        - docs/aces/inventory/misp/capture-evidence.sh
        - docs/aces/inventory/misp/evidence/capture-limits.txt
      caveat: Scanner and runtime observations are time-sensitive evidence from the current-running lab, not immutable clean-reset proof.
      rationale: The bundle records capture tooling and limits as methodology evidence alongside the ACES SDL encoding.
  - id: misp.image.identity-provenance
    category: image
    summary: MISP resolved to the captured upstream image digest and Debian 13 image metadata.
    evidence:
      - path: evidence/docker-inspect.image.json
      - path: evidence/docker-buildx-imagetools.image.txt
      - path: evidence/docker-buildx-imagetools.image.raw.json
      - path: evidence/osquery-docker-images.json
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.source.name
        - nodes.techvault.misp.source.version
        - nodes.techvault.misp.os_version
  - id: misp.image.history-layers
    category: image
    summary: Docker history and layer metadata are encoded as upstream-image build provenance.
    evidence:
      - path: evidence/docker-history.image.txt
      - path: evidence/docker-history.image.jsonl
      - path: evidence/docker-inspect.image.json
      - path: evidence/trivy-vulnerabilities.json.gz
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.source.build.instructions
        - nodes.techvault.misp.source.build.layers
        - nodes.techvault.misp.source.build.config
        - nodes.techvault.misp.source.build.attestation
  - id: misp.compose.service-contract
    category: compose
    summary: Compose declares aptl-misp, hostname misp, profile soc, ports 8443:443, mounted MISP volumes/certs, healthcheck, memory limit, dependencies, and security-net address.
    evidence:
      - path: evidence/compose-service.misp.json
      - path: evidence/source-checksums.txt
      - path: evidence/docker-compose-version.json
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes, infrastructure, conditions]
      fields:
        - nodes.techvault.misp
        - infrastructure.misp
        - conditions.misp-https-ready
  - id: misp.source.realization-inputs
    category: source
    summary: Local Compose, seed script, MISP certificate, and lab CA checksums are captured as local realization inputs; the live mounted TLS key is captured through container filesystem evidence.
    evidence:
      - path: evidence/source-checksums.txt
      - path: evidence/capture-limits.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      checked_surfaces: [nodes, content]
      fields:
        - nodes.techvault.misp.source.build.source_inputs
      caveat: The aptl4 checkout used for this branch does not contain config/soc_certs/misp/server.key as a source file; the running target exposes the key at /etc/nginx/certs/key.pem and the runtime checksum is captured there.
  - id: misp.runtime.container-policy
    category: runtime
    summary: Docker runtime policy captures restart behavior, memory limits, namespace modes, privileged/read-only flags, init process, health, log driver, and masked/read-only paths.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/osquery-docker-containers.json
      - path: evidence/docker-top.txt
      - path: evidence/docker-logs.misp.txt
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.container
        - nodes.techvault.misp.runtime.operational_policy
        - nodes.techvault.misp.runtime.health
  - id: misp.network.identity-publication
    category: network
    summary: MISP is attached to security-net at 172.20.0.16 with Docker aliases/DNS names and host-published HTTPS on 127.0.0.1:8443 (loopback-only).
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/docker-network.aptl-security.json
      - path: evidence/participant-discovery.kali.txt
      - path: evidence/participant-discovery.misp-suricata-sync.txt
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes, infrastructure]
      fields:
        - nodes.techvault.misp.runtime.network.endpoints
        - nodes.techvault.misp.runtime.network.published_ports
        - infrastructure.misp
  - id: misp.runtime.mounts-volumes
    category: runtime
    summary: Docker volumes, certificate binds, generated resolver files, and runtime pseudo-filesystems are encoded from inspect and mount-table evidence.
    evidence:
      - path: evidence/docker-volume.misp-data.json
      - path: evidence/docker-volume.misp-config.json
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.mounts
  - id: misp.runtime.filesystem-inventory
    category: runtime
    summary: The SDL encodes the full compressed filesystem manifest and checksum surface, including active config and TLS key paths with target-file SHA-256 digests.
    evidence:
      - path: evidence/filesystem-tree.txt.gz
      - path: evidence/filesystem-checksums.txt.xz
      - path: evidence/capture-limits.txt
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.filesystem_inventory
  - id: misp.runtime.process-tree
    category: runtime
    summary: Runtime process evidence captures tini, supervisord, nginx, rsyslogd, MISP ZMQ, scheduler worker, gpg-agent, PHP-FPM, and MISP worker pools.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/osquery-processes.json
      - path: evidence/docker-top.txt
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.processes
  - id: misp.runtime.service-listeners
    category: runtime
    summary: ACES #431 listener fields encode wildcard HTTP/HTTPS, loopback MISP ZMQ/supervisor, Docker embedded DNS, and Unix sockets.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/osquery-listening-ports.json
      - path: evidence/participant-discovery.misp-suricata-sync.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      checked_surfaces: [nodes, nodes.services]
      fields:
        - nodes.techvault.misp.services
        - nodes.techvault.misp.runtime.service_listeners
      caveat: Docker embedded DNS listener ports are backend-generated and encoded as node-local runtime listeners, not MISP application services.
  - id: misp.runtime.environment
    category: runtime
    summary: Runtime environment includes MISP database, Redis, base URL, admin email, image defaults, and unmasked scenario fixture secret values.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
      - path: evidence/compose-service.misp.json
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.environment
  - id: misp.runtime.local-identity
    category: runtime
    summary: Local passwd/group inventory records 21 users, 42 groups, and no sudo rules for the container.
    evidence:
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes, accounts]
      fields:
        - nodes.techvault.misp.runtime.local_identity
  - id: misp.application.software-versions
    category: application
    summary: MISP, PHP, nginx, Python, MariaDB client, PyMISP, Composer, Pipfile, and requirements manifests are captured and encoded.
    evidence:
      - path: evidence/language-manifests.txt
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.image.json
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.software_components
        - nodes.techvault.misp.runtime.dependency_manifests
  - id: misp.application.routes-health
    category: application
    summary: HTTP login and MISP REST search routes are represented with observed methods, auth requirement, and health/API observations.
    evidence:
      - path: evidence/misp-state.txt
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.applications.misp-web.routes
        - nodes.techvault.misp.runtime.health
  - id: misp.application.local-authorization
    category: identity
    summary: MISP-local admin user, organisation, six roles, permission policies, and API-key metadata are encoded as a runtime identity authority.
    evidence:
      - path: evidence/misp-state.txt
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes, accounts]
      fields:
        - nodes.techvault.misp.runtime.identity_authorities.misp-local-authorization
  - id: misp.application.platform-settings
    category: application
    summary: MISP platform-application state encodes threat-intelligence reference content objects and six database-backed admin settings.
    evidence:
      - path: evidence/misp-state.txt
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.platform_applications.misp-threat-intel
        - nodes.techvault.misp.runtime.platform_applications.misp-threat-intel.content_objects
        - nodes.techvault.misp.runtime.platform_applications.misp-threat-intel.settings
  - id: misp.application.content-state
    category: content
    summary: MISP database content counts show one known-threat-actors event, six attributes, zero objects, seven tags, and installed reference collections, with typed threat-intelligence platform content also encoded under runtime.platform_applications.
    evidence:
      - path: evidence/misp-state.txt
    aces:
      disposition: encoded_with_caveat
      surface: content
      checked_surfaces: [content, nodes]
      fields:
        - content.techvault.misp-reference-datasets
        - nodes.techvault.misp.runtime.platform_applications.misp-threat-intel.content_objects
        - nodes.techvault.misp.runtime.applications.misp-web.description
      caveat: Current SDL content/platform surfaces encode the MISP event and IOC rows as counted content with row-level evidence in misp-state.txt; richer MISP-native event semantics remain outside this inventory pass.
  - id: misp.runtime.package-inventory
    category: runtime
    summary: dpkg package inventory captures 238 installed OS packages.
    evidence:
      - path: evidence/os-packages.txt
      - path: evidence/osquery-apt-sources.json
    aces:
      disposition: encoded
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.packages
  - id: misp.runtime.vulnerability-scan
    category: runtime
    summary: Trivy captured 593 vulnerability findings and severity counts for the MISP image.
    evidence:
      - path: evidence/trivy-vulnerabilities.json.gz
      - path: evidence/trivy-vulnerability-list.json
      - path: evidence/trivy-vulnerability-counts.json
      - path: evidence/trivy-version.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      checked_surfaces: [nodes, vulnerabilities]
      fields:
        - nodes.techvault.misp.runtime.package_vulnerabilities
      caveat: Vulnerability scanner output is time-sensitive and tied to the captured Trivy version/database state.
  - id: misp.runtime.sbom-toolchain
    category: runtime
    summary: Required Trivy CycloneDX and useful-optional Syft CycloneDX SBOMs are captured; Syft output is deterministically normalized.
    evidence:
      - path: evidence/trivy-sbom.cyclonedx.json.gz
      - path: evidence/syft-sbom.cyclonedx.json.gz
      - path: evidence/syft-version.json
      - path: evidence/capture-limits.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      checked_surfaces: [nodes]
      fields:
        - nodes.techvault.misp.runtime.packages
        - nodes.techvault.misp.runtime.software_components
      caveat: SBOMs are retained as evidence; SDL package fields use dpkg and scanner-derived summaries rather than embedding full CycloneDX documents.
  - id: misp.runtime.osquery-baseline
    category: runtime
    summary: osquery captured container processes, listeners, host-side Docker container/image rows, and unavailable Linux application/program table status.
    evidence:
      - path: evidence/osquery-processes.json
      - path: evidence/osquery-listening-ports.json
      - path: evidence/osquery-docker-containers.json
      - path: evidence/osquery-docker-images.json
      - path: evidence/osquery-apt-sources.json
      - path: evidence/osquery-installed-applications.json
      - path: evidence/osquery-programs.json
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      checked_surfaces: [nodes, runtime_contract]
      fields:
        - nodes.techvault.misp.runtime.processes
        - nodes.techvault.misp.runtime.service_listeners
        - nodes.techvault.misp.runtime.network
      caveat: installed_applications and programs tables are unavailable in the digest-pinned Linux osquery image and are recorded as capture limits.
  - id: misp.participant-discovery
    category: relationship
    summary: misp-suricata-sync can resolve MISP, reach TCP 443/80, and verify TLS with the lab CA; Kali cannot reach the security-net address from its current vantage.
    evidence:
      - path: evidence/participant-discovery.misp-suricata-sync.txt
      - path: evidence/participant-discovery.kali.txt
    aces:
      disposition: encoded
      surface: relationships
      checked_surfaces: [relationships, nodes]
      fields:
        - relationships.misp-suricata-sync-queries-misp-api
        - nodes.techvault.misp.runtime.service_listeners.https-443-ipv4.readiness
  - id: misp.relationship.mariadb
    category: relationship
    summary: MISP points at `misp-db` using MYSQL_HOST, database `misp`, user `misp`, and password `misp_db_password`.
    evidence:
      - path: evidence/compose-service.misp.json
      - path: evidence/docker-inspect.container.json
      - path: evidence/misp-state.txt
    aces:
      disposition: encoded
      surface: relationships
      checked_surfaces: [relationships, nodes]
      fields:
        - relationships.misp-connects-mariadb
        - nodes.techvault.misp.runtime.environment
  - id: misp.relationship.redis
    category: relationship
    summary: MISP points at `misp-redis` through REDIS_HOST; MISP-side evidence does not expose a Redis password variable although the target service is configured to require one.
    evidence:
      - path: evidence/compose-service.misp.json
      - path: evidence/docker-inspect.container.json
      - path: evidence/capture-limits.txt
    aces:
      disposition: encoded_with_caveat
      surface: relationships
      checked_surfaces: [relationships, nodes]
      fields:
        - relationships.misp-connects-redis
        - nodes.techvault.misp.runtime.environment
      caveat: Redis authentication semantics are recorded as unknown for the MISP asset pass because the companion Redis service is owned by issue #348.
  - id: misp.relationship.suricata-sync
    category: relationship
    summary: misp-suricata-sync uses verified HTTPS and API-key auth material to query the MISP API for IOC synchronization.
    evidence:
      - path: evidence/participant-discovery.misp-suricata-sync.txt
      - path: evidence/misp-state.txt
    aces:
      disposition: encoded
      surface: relationships
      checked_surfaces: [relationships, nodes]
      fields:
        - relationships.misp-suricata-sync-queries-misp-api
  - id: misp.companion-boundary
    category: scope
    summary: MISP DB, Redis, and Suricata sync are represented as relationship target/source stubs; full inventories remain separate issues.
    evidence:
      - path: evidence/compose-service.misp.json
      - path: evidence/participant-discovery.misp-suricata-sync.txt
      - path: evidence/capture-limits.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      checked_surfaces: [nodes, infrastructure, relationships]
      fields:
        - nodes.techvault.misp-db
        - nodes.techvault.misp-redis
        - nodes.techvault.misp-suricata-sync
        - infrastructure.misp-db
        - infrastructure.misp-redis
        - infrastructure.misp-suricata-sync
      caveat: Stub depth is intentionally bounded to support MISP relationships; full companion service inventories are #347, #348, and #349.
