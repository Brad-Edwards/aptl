name: techvault
description: >
  ACES-authored TechVault scenario inventory surface. This file is the
  incremental SCN-010 authoring target for the webapp inventory pass and does
  not replace the legacy scenario set until the cutover issue completes.

nodes:
  dmz-net:
    type: Switch
    description: TechVault DMZ network for externally reachable services.
  internal-net:
    type: Switch
    description: TechVault internal network for application-to-database traffic.
  security-net:
    type: Switch
    description: Security/SOC network used by Wazuh and related telemetry.

  db:
    type: VM
    os: linux
    source: postgres-16-alpine
    services:
      - {port: 5432, protocol: tcp, name: postgres}

  wazuh-manager:
    type: VM
    os: linux
    source: wazuh-manager-4.12
    services:
      - {port: 1514, protocol: tcp, name: wazuh-agent-events}
      - {port: 1515, protocol: tcp, name: wazuh-agent-registration}
      - {port: 514, protocol: udp, name: syslog}

  webapp:
    type: VM
    description: TechVault customer portal web application container.
    os: linux
    os_version: Debian GNU/Linux 13 (trixie)
    source:
      name: aptl-webapp
      version: aptl-webapp@sha256:7f2c715f953094ae36c10d15fbb038f0fdc6b855fd052236a95ad040410a25e0
    resources: {ram: 536870912, cpu: 1}
    features:
      techvault-webapp-service: webapp-root
      webapp-rsyslog-forwarding: webapp-root
      webapp-wazuh-agent: webapp-root
    conditions:
      webapp-http-ready: webapp-root
    vulnerabilities:
      - webapp-sqli-login
      - webapp-sqli-search
      - webapp-command-injection
      - webapp-reflected-xss
      - webapp-stored-xss
      - webapp-idor-files
      - webapp-idor-users
      - webapp-env-disclosure
      - webapp-debug-disclosure
      - webapp-weak-jwt
      - webapp-unrestricted-upload
      - webapp-hardcoded-secret
    roles:
      webapp-root:
        username: root
    services:
      - {port: 8080, protocol: tcp, name: http}
    runtime:
