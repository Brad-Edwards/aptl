    rationale: Current ACES SDL node build fields carry this catalogued fact directly.
- id: wazuh-sidecar-suricata.source.build-inputs
  category: source
  summary: The five COPY'd build-context inputs (install.sh, wazuh-agent.sh, ossec.conf.template, aptl-firewall-drop.sh, active-response-whitelist)
    are recorded with sha256 checksums; in-image content matches for the persisted files.
  evidence:
  - path: evidence/source-checksums.txt
  - path: evidence/filesystem-checksums.txt.xz
