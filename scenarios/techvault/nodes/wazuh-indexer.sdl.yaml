              evidence_refs:
                - evidence/wazuh-indexer-templates.json.gz
              settings_summary:
                refresh_interval: 5s
              template_digest: sha256:4367638ad1385ce5acb7a887afc3f009ddf59ccd6bae18ddad200f8725e32189
              description: Index template wazuh-statistics seeding wazuh-statistics-*.
          transport_security:
            transport_security_id: techvault-wazuh-indexer-mtls
            mode: mutual_tls
            client_verification: true
            node_verification: false
            description: OpenSearch Security mutual-TLS using bind-mounted PEM material under /usr/share/wazuh-indexer/certs/; transport
              hostname verification disabled per Wazuh-indexer default. Admin DN allowlist 'CN=admin,OU=Wazuh,O=Wazuh,L=California,C=US'
              encoded under the OpenSearch Security identity authority.
          settings:
            - setting_id: discovery-type
              name: discovery.type
              value: single-node
              scope: node
              provenance: configuration_file
              classification: plain
              description: Single-node discovery is the realized cluster posture.
            - setting_id: network-host
              name: network.host
              value: 0.0.0.0
              scope: node
              provenance: configuration_file
              classification: plain
              description: OpenSearch HTTP/transport bind address.
            - setting_id: http-port
              name: http.port
              value: 9200-9299
              scope: node
              provenance: configuration_file
              classification: plain
              description: OpenSearch REST API port range; the first port (9200) is bound and host-published.
            - setting_id: transport-tcp-port
              name: transport.tcp.port
              value: 9300-9399
              scope: node
              provenance: configuration_file
              classification: plain
              description: OpenSearch transport TCP port range; transport is cluster-internal only.
            - setting_id: http-type
              name: http.type
              value: org.opensearch.security.http.SecurityHttpServerTransport
              scope: node
              provenance: configuration_file
              classification: plain
              description: OpenSearch Security overrides the HTTP transport to its mutual-TLS netty wrapper.
            - setting_id: transport-type
              name: transport.type
              value: org.opensearch.security.ssl.http.netty.SecuritySSLNettyTransport
              scope: node
              provenance: configuration_file
              classification: plain
              description: OpenSearch Security overrides the transport class to its mutual-TLS netty wrapper.
            - setting_id: plugins-index_state_management-template_migration-control
              name: plugins.index_state_management.template_migration.control
              value: '-1'
              scope: cluster
              provenance: operator_override
              classification: plain
              description: Only persistent cluster setting observed via _cluster/settings.
          description: Wazuh indexer (OpenSearch 2.19.1 fork) datastore service for the steady-state TechVault lab; persistence mounted
            at /var/lib/wazuh-indexer via the wazuh-indexer-data named volume. Encodes cluster identity + aggregate cardinality, node
            membership/roles + engine provenance + per-plugin versions + endpoint topology, per-index partition geometry + cardinality,
