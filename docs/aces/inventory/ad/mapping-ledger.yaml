schema_version: 1
asset:
  id: ad
  scenario: TechVault
  aptl_issue: 332
  aces_methodology_issue: 353
  source_class: custom-build
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: aptl-ad@sha256:5806c59b401c045391be53c0d3e0c4feb6304030e716ff3b12b79415fbb1b052
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence: []
    limits:
      - >
        This first-party local image was captured from the local Docker daemon.
        No registry-visible OCI, in-toto, or SLSA attestation was available for
        the mutable local tag at capture time.
correspondence_checks:
  - id: ad-node-source-correspondence
    status: planned
    source: nodes.ad.source
    realized_evidence:
      - path: evidence/docker-inspect.image.json
      - path: evidence/source-checksums.txt
    ledger_fact_ids:
      - ad.image.identity
      - ad.build.recipe
    method: >
      Compare the ACES source name/version and source input checksums against
      the realized local image digest and source package checksums captured
      here.
    limit: >
      Planned because issue #332 records the frozen steady-state ACES spec and
      evidence, not a live equivalence checker.
  - id: ad-runtime-correspondence
    status: planned
    source: nodes.ad.runtime
    realized_evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
      - path: evidence/filesystem-tree.txt
      - path: evidence/os-packages.txt
      - path: evidence/trivy-vulnerability-list.json
    ledger_fact_ids:
      - ad.network.identity
      - ad.runtime.service-surface
      - ad.runtime.domain-state
      - ad.runtime.filesystem-inventory
      - ad.runtime.package-inventory
      - ad.runtime.vulnerability-scan
    method: >
      Re-run the encoded scenario from ACES SDL, recapture AD runtime evidence,
      and compare the network, service, domain, filesystem, package, scanner,
      and process surfaces against this ledger.
    limit: >
      Planned because this issue records the frozen steady-state ACES spec and
      evidence, not an automated live correspondence check.
notes:
  - >
    Raw AD passwords, generated flags, Wazuh client keys, Kerberos key material,
    and Samba private database contents are redacted as secret material.
  - >
    Brad-Edwards/aces#401 added the provider-neutral
    runtime.identity_authorities surface used by this bundle for the Samba AD
    domain authority, directory subjects, policy facts, SPNs, and memberships.
    No known ACES expressivity gap remains for the catalogued AD steady-state
    inventory facts in this mapping ledger.
facts:
  - id: ad.image.identity
    category: provenance
    summary: >
      The asset uses first-party local image aptl-ad:latest, captured as
      aptl-ad@sha256:5806c59b401c045391be53c0d3e0c4feb6304030e716ff3b12b79415fbb1b052.
    evidence:
      - path: evidence/docker-inspect.image.json
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.ad.source.name
        - nodes.ad.source.version
      rationale: ACES node source identifies the artifact and immutable digest.

  - id: ad.build.recipe
    category: provenance
    summary: >
      The image is a custom build from containers/ad/Dockerfile with source
      inputs from containers/ad/, containers/_wazuh-agent/, and the active
      response whitelist.
    evidence:
      - path: evidence/compose-service.ad.json
      - path: evidence/docker-history.image.txt
      - path: evidence/source-checksums.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.ad.source.build.base_image
        - nodes.ad.source.build.dockerfile_path
        - nodes.ad.source.build.instructions
        - nodes.ad.source.build.copied_sources
        - nodes.ad.source.build.source_inputs
        - nodes.ad.source.build.attestation
      rationale: ACES node source build fields encode the observed Dockerfile recipe and source inputs.

  - id: ad.os.version
    category: runtime-configuration
    summary: The realized runtime OS is Ubuntu 22.04.5 LTS.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.image.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.ad.os
        - nodes.ad.os_version
      rationale: ACES nodes have explicit OS family and version fields.

  - id: ad.network.identity
    category: network
    summary: >
      The service is attached to aptl_aptl-internal at 172.20.2.10 with aliases
      aptl-ad and ad plus generated DNS names.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/docker-network.aptl-internal.json
      - path: evidence/compose-service.ad.json
    aces:
      disposition: encoded
      surface: infrastructure
      fields:
        - infrastructure.ad.links
        - infrastructure.ad.properties
        - nodes.ad.runtime.network.endpoints
      rationale: ACES infrastructure and runtime network fields encode authored and realized attachment facts.

  - id: ad.runtime.service-surface
    category: service-surface
    summary: >
      Samba exposes DNS, Kerberos, RPC, NetBIOS, LDAP, SMB, LDAPS, Global
      Catalog, and dynamic RPC listener surfaces inside the container.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.image.json
      - path: evidence/compose-service.ad.json
    aces:
      disposition: encoded
      surface: nodes.services
      fields:
        - nodes.ad.services
      rationale: ACES node service bindings and runtime logical state encode network services by port and protocol.

  - id: ad.healthcheck
    category: runtime-configuration
    summary: >
      Compose declares a healthcheck using samba-tool domain info 127.0.0.1 with
      30s interval, 10s timeout, 10 retries, and 60s start period.
    evidence:
      - path: evidence/compose-service.ad.json
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: conditions
      fields:
        - conditions.ad-domain-ready
        - nodes.ad.conditions
      rationale: ACES conditions represent health/readiness commands and timing.

  - id: ad.runtime.volumes
    category: runtime-configuration
    summary: >
      Named volumes aptl_ad_data and aptl_ad_logs are mounted at /var/lib/samba
      and /var/log/samba.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/docker-volume.ad-data.json
      - path: evidence/docker-volume.ad-logs.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.ad.runtime.mounts
      rationale: ACES typed runtime mount inventory encodes volume-backed paths.

  - id: ad.runtime.primary-process
    category: runtime-configuration
    summary: >
      PID 1 runs supervisord as root and supervises Samba, rsyslog, and the
      in-process Wazuh agent.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-top.txt
      - path: evidence/docker-inspect.image.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.ad.runtime.process
        - nodes.ad.runtime.processes
      rationale: ACES runtime process fields encode primary and supervised processes.

  - id: ad.runtime.environment-policy
    category: runtime-configuration
    summary: >
      Runtime environment carries domain, realm, DNS forwarder, SIEM, Wazuh,
      and log path values, with the AD admin password redacted as a fixture
      secret.
    evidence:
      - path: evidence/compose-service.ad.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.ad.runtime.environment
      rationale: ACES runtime environment entries encode provenance and value classification.

  - id: ad.runtime.capability-restart-policy
    category: runtime-configuration
    summary: >
      Compose grants SYS_ADMIN and NET_ADMIN, restart policy is
      unless-stopped, and the memory limit is 512 MiB.
    evidence:
      - path: evidence/compose-service.ad.json
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.ad.runtime.linux_capabilities
        - nodes.ad.runtime.operational_policy
      rationale: ACES runtime policy fields encode container capabilities and resource policy.

  - id: ad.runtime.container-host-config
    category: runtime-configuration
    summary: Docker inspect exposes namespace, bind, log, runtime, masked path, and read-only path settings.
    evidence:
      - path: evidence/docker-inspect.container.json
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.ad.runtime.container
      rationale: ACES runtime container fields encode host/security configuration details.

  - id: ad.runtime.package-inventory
    category: runtime-inventory
    summary: The runtime image contains 257 Debian packages recorded by dpkg-query.
    evidence:
      - path: evidence/os-packages.txt
      - path: evidence/language-manifests.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.ad.runtime.packages
      caveat: >
        The SDL encodes the 257 package rows and records checksum-addressed
        package evidence outside the SDL.
      rationale: ACES can carry runtime package inventory metadata and scanner findings for this asset spec.

  - id: ad.runtime.vulnerability-scan
    category: runtime-inventory
    summary: Trivy reported 140 package vulnerability findings at capture time.
    evidence:
      - path: evidence/trivy-version.txt
      - path: evidence/trivy-vulnerabilities.json.gz
      - path: evidence/trivy-vulnerability-counts.json
      - path: evidence/trivy-vulnerability-list.json
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.ad.runtime.package_vulnerabilities
      caveat: >
        The SDL encodes the scanner findings list while the full scanner JSON
        remains in compressed evidence.
      rationale: Scanner findings are time-sensitive package inventory facts.

  - id: ad.runtime.filesystem-inventory
    category: runtime-inventory
    summary: >
      Catalogued Samba, supervisor, Wazuh, flag, log, and generated state paths
      are recorded with metadata and checksums.
    evidence:
      - path: evidence/filesystem-tree.txt
      - path: evidence/filesystem-checksums.txt
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded
      surface: content
      fields:
        - nodes.ad.runtime.filesystem_inventory
        - content.ad-file-*
      rationale: ACES content and runtime filesystem fields encode selected path metadata and digest facts.

  - id: ad.runtime.local-identity
    category: identity
    summary: Local Linux users, groups, and Wazuh service identity are captured from getent.
    evidence:
      - path: evidence/runtime-baseline.txt
    aces:
      disposition: encoded_with_caveat
      surface: nodes
      fields:
        - nodes.ad.runtime.local_identity
        - accounts.ad-local-root
        - accounts.ad-local-wazuh
      caveat: >
        The SDL encodes the high-value local identities used by this asset
        directly and records full getent output in evidence.
      rationale: ACES runtime local identity fields encode participant-observable host identity surfaces.

  - id: ad.runtime.domain-state
    category: identity
    summary: >
      Samba provisions the TECHVAULT domain, OUs, 15 users, 45 groups, SPNs,
      group memberships, and password/lockout policy.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/source-checksums.txt
    aces:
      disposition: encoded
      surface: nodes
      fields:
        - nodes.ad.runtime.identity_authorities.techvault-domain
        - nodes.ad.runtime.identity_authorities.techvault-domain.services
        - nodes.ad.runtime.identity_authorities.techvault-domain.subjects
        - nodes.ad.runtime.identity_authorities.techvault-domain.policies
        - nodes.ad.runtime.identity_authorities.techvault-domain.relationships
        - accounts.ad-domain-* (curated scenario/provisioning account refs)
        - features.techvault-ad-domain-service
        - relationships.ad-provides-domain
      rationale: >
        ACES runtime.identity_authorities owns the observed directory/domain
        state. Top-level accounts remain curated scenario/provisioning account
        refs for known fixture credentials and weakness hooks.

  - id: ad.vulnerability.inventory
    category: vulnerability
    summary: >
      The domain carries deliberate weak-password, stale-account,
      over-privileged, and Kerberoastable service-account weaknesses.
    evidence:
      - path: evidence/runtime-baseline.txt
      - path: evidence/source-checksums.txt
    aces:
      disposition: encoded
      surface: vulnerabilities
      fields:
        - vulnerabilities.ad-weak-password-jessica
        - vulnerabilities.ad-seasonal-password-michael
        - vulnerabilities.ad-contractor-overprivileged
        - vulnerabilities.ad-former-employee-enabled
        - vulnerabilities.ad-kerberoast-svc-sql
        - vulnerabilities.ad-kerberoast-svc-web
        - vulnerabilities.ad-domain-admin-svc-backup
        - vulnerabilities.ad-domain-admin-devops
      rationale: ACES vulnerability entries encode declared scenario weaknesses carried by the AD asset.

  - id: ad.relationships
    category: relationship
    summary: >
      The AD container forwards DNS to 172.20.1.22, forwards Samba/Wazuh logs to
      Wazuh manager, and provides domain services to internal consumers.
    evidence:
      - path: evidence/compose-service.ad.json
      - path: evidence/runtime-baseline.txt
      - path: evidence/docker-inspect.container.json
    aces:
      disposition: encoded
      surface: relationships
      fields:
        - relationships.ad-forwards-dns
        - relationships.ad-forwards-wazuh
        - relationships.ad-provides-domain
      rationale: ACES relationships encode host-originating service dependencies and trust services.
