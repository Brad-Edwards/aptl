schema_version: 1
asset:
  id: shuffle-frontend
  scenario: TechVault
  aptl_issue: 354
  aces_methodology_issue: 353
  source_class: upstream-registry-image-application
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: ghcr.io/shuffle/shuffle-frontend@sha256:3c471f39c4d0a773ee22ed8575a68579ff08dd7123e94e70a2482973a4cc296f
  attestation:
    status: not_available
    verification_status: not_applicable
    standards: []
    predicate_types: []
    evidence:
    - path: evidence/docker-buildx-imagetools.image.raw.json
    - path: evidence/docker-inspect.image.json
    limits:
    - Upstream Shuffle frontend registry image (:latest tag); identity is the pinned RepoDigest. No registry-visible OCI/in-toto/SLSA
      attestation is published for this tag.
notes:
- Capture used the already-running aptl project (soc profile up) per operator direction and did not run aptl lab stop -v &&
  aptl lab start; this bundle is a steady-state observation of that local lab, not clean-reset rebuild proof.
- 'SCN-010 issue #354 inventories the Shuffle SOAR frontend as nodes.techvault.shuffle-frontend (application family, upstream
  ghcr.io/shuffle/shuffle-frontend:latest image). Every catalogued observable maps to a current ACES surface. No known ACES
  expressivity gap remains for the catalogued shuffle-frontend steady-state facts.'
- The frontend is nginx serving the pre-built React SPA and reverse-proxying /api/v1|v2 to shuffle-backend:5001 (relationships.shuffle-frontend-proxies-backend).
  HTTP/80 + HTTPS/443 are published to the host as 3001:3001 and 3443:443.
- The nginx TLS private key (/etc/nginx/privkey.pem) is a generated operator secret — metadata only, content withheld (ADR-029).
  The server certificate and lab CA are public.
- Upstream nginx-image shell variable references in the history-derived build instruction strings were normalized from ${VAR}
  to $VAR to avoid collision with ACES ${...} variable placeholders (names and recipe meaning preserved).
correspondence_checks:
- id: shuffle-frontend-evidence-bundle-integrity
  status: implemented
  source: docs/aces/inventory/shuffle-frontend/evidence
  method: evidence-sha256sums.txt hashes every committed evidence file except the manifest; tests/test_shuffle_frontend_inventory.py
    recomputes and compares.
  realized_evidence:
  - path: evidence/evidence-sha256sums.txt
  - path: evidence/captured-at-utc.txt
  ledger_fact_ids:
  - shuffle-frontend.capture.toolchain-baseline
- id: shuffle-frontend-sdl-runtime-correspondence
  status: implemented
  source: nodes.techvault.shuffle-frontend.runtime
  method: tests/test_shuffle_frontend_inventory.py parses the ACES SDL and asserts image, package, CVE, filesystem, identity,
    process, environment, listener, application, and published-port counts/values against the evidence.
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/os-packages.txt
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/frontend-state.txt
  ledger_fact_ids:
  - shuffle-frontend.runtime.container-host-config
  - shuffle-frontend.runtime.package-inventory
  - shuffle-frontend.runtime.vulnerability-scan
  - shuffle-frontend.runtime.local-identity
  - shuffle-frontend.application.shuffle-frontend-web
- id: shuffle-frontend-proxy-relationship-correspondence
  status: implemented
  source: scenarios/techvault.sdl.yaml relationships.shuffle-frontend-proxies-backend
  method: README and tests assert the realized nginx /api reverse-proxy to shuffle-backend:5001 from the rendered nginx config.
  realized_evidence:
  - path: evidence/frontend-state.txt
  ledger_fact_ids:
  - shuffle-frontend.relationship.proxies-backend
  - shuffle-frontend.runtime.service-listeners
- id: shuffle-frontend-scope-and-redaction-caveats
  status: implemented
  source: docs/aces/inventory/shuffle-frontend/evidence/capture-limits.txt
  method: README and tests assert non-destructive capture scope, the TLS private-key operator-secret exclusion, the nginx-worker
    dedup, and unavailable osquery tables.
  realized_evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  - path: evidence/docker-top.txt
  - path: evidence/docker-network.aptl-security.json
  - path: evidence/docker-history.image.txt
  - path: evidence/language-manifests.txt
  ledger_fact_ids:
  - shuffle-frontend.capture.toolchain-baseline
  - shuffle-frontend.runtime.filesystem-inventory
  - shuffle-frontend.runtime.mounts
  - shuffle-frontend.runtime.process-set
  - shuffle-frontend.runtime.osquery-baseline
facts:
- id: shuffle-frontend.capture.toolchain-baseline
  category: capture
  summary: Capture used digest-pinned Trivy, Syft, and osquery images, recorded Docker/Compose versions, capture time, and
    explicit capture limits.
  evidence:
  - path: evidence/captured-at-utc.txt
  - path: evidence/docker-version.json
  - path: evidence/docker-compose-version.json
  - path: evidence/trivy-version.txt
  - path: evidence/syft-version.json
  - path: evidence/osquery-version.txt
  - path: evidence/capture-limits.txt
  - path: evidence/evidence-sha256sums.txt
  aces:
    disposition: encoded_with_caveat
    surface: runtime_contract
    checked_surfaces:
    - runtime_contract
    fields:
    - docs/aces/inventory/shuffle-frontend/capture-evidence.sh
    - docs/aces/inventory/shuffle-frontend/evidence/capture-limits.txt
    rationale: Current ACES SDL runtime fields carry this catalogued shuffle-frontend fact directly.
    caveat: Scanner/runtime observations are time-sensitive evidence from the current-running lab, not clean-reset proof.
- id: shuffle-frontend.image.identity-provenance
  category: image
  summary: The frontend resolves to the upstream registry image ghcr.io/shuffle/shuffle-frontend:latest (pinned RepoDigest);
    Debian 13 base.
  evidence:
  - path: evidence/docker-inspect.image.json
  - path: evidence/docker-buildx-imagetools.image.raw.json
  - path: evidence/docker-buildx-imagetools.image.txt
  - path: evidence/osquery-docker-images.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.source.name
    - nodes.techvault.shuffle-frontend.source.version
    - nodes.techvault.shuffle-frontend.os_version
    rationale: Current ACES SDL node source fields carry the upstream registry image identity directly.
- id: shuffle-frontend.image.build-recipe
  category: image
  summary: The build recipe (instructions/layers from docker history, default config, absent attestation) is encoded as upstream-image
    provenance.
  evidence:
  - path: evidence/docker-history.image.txt
  - path: evidence/docker-history.image.jsonl
  - path: evidence/docker-inspect.image.json
  - path: evidence/source-checksums.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.source.build.instructions
    - nodes.techvault.shuffle-frontend.source.build.layers
    - nodes.techvault.shuffle-frontend.source.build.config
    - nodes.techvault.shuffle-frontend.source.build.attestation
    rationale: Current ACES SDL node build fields carry the history-reconstructed recipe directly.
    caveat: Upstream nginx-image shell variable references (${NGINX_VERSION} etc.) in the history-derived instruction/layer
      strings are normalized to the brace-free $VAR form to avoid collision with ACES ${...} placeholders; the variable names
      and recipe meaning are preserved.
- id: shuffle-frontend.compose.service-contract
  category: compose
  summary: Compose declares aptl-shuffle-frontend, image shuffle-frontend:latest, BACKEND_HOSTNAME=shuffle-backend, the three
    ro cert binds (server.pem, server.key, lab-ca.pem), depends_on shuffle-backend, security-net 172.20.0.21, and the 3001:3001
    + 3443:443 published ports.
  evidence:
  - path: evidence/compose-service.shuffle-frontend.json
  - path: evidence/docker-compose-version.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.environment
    - nodes.techvault.shuffle-frontend.runtime.mounts
    - nodes.techvault.shuffle-frontend.runtime.network.published_ports
    rationale: Current ACES SDL node runtime fields carry the compose contract directly.
- id: shuffle-frontend.runtime.container-host-config
  category: runtime
  summary: Docker runtime policy captures restart, namespaces, masked/read-only paths, no added capabilities, and runc runtime.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/docker-top.txt
  - path: evidence/docker-logs.shuffle-frontend.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.container
    - nodes.techvault.shuffle-frontend.runtime.operational_policy
    - nodes.techvault.shuffle-frontend.runtime.linux_capabilities
    rationale: Current ACES SDL node runtime fields carry this catalogued fact directly.
- id: shuffle-frontend.network.identity
  category: network
  summary: The frontend is on security-net at 172.20.0.21 and publishes nginx HTTP/80 + HTTPS/443 to the host as 3001:3001
    and 3443:443.
  evidence:
  - path: evidence/docker-network.aptl-security.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/participant-discovery.kali.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.network.endpoints
    - nodes.techvault.shuffle-frontend.runtime.network.published_ports
    rationale: Current ACES SDL node network fields carry the realized endpoint and published-port facts directly.
- id: shuffle-frontend.runtime.service-listeners
  category: runtime
  summary: nginx listens on TCP/80 (HTTP) and TCP/443 (HTTPS, lab-CA cert); both published to the host (3001, 3443).
  evidence:
  - path: evidence/osquery-listening-ports.json
  - path: evidence/frontend-state.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.service_listeners
    - nodes.techvault.shuffle-frontend.services
    rationale: Current ACES SDL node service_listeners + services carry the listener facts directly.
- id: shuffle-frontend.runtime.mounts
  category: runtime
  summary: 'Three ro cert binds: the nginx TLS server certificate (public), the nginx TLS private key (operator secret), and
    the lab CA pem.'
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.mounts
    rationale: Current ACES SDL node runtime.mounts carries the cert/key/CA binds directly.
    caveat: The nginx TLS private key (/etc/nginx/privkey.pem, lab-CA-signed, generated at lab start) is an operator secret
      — recorded as path/metadata only in the filesystem manifest, excluded from checksums, content never emitted (ADR-029).
- id: shuffle-frontend.runtime.filesystem-inventory
  category: filesystem
  summary: The nginx config, the static React web root (/usr/share/nginx/html), the cert/CA inputs, and os-release are encoded
    with checksums for stable files.
  evidence:
  - path: evidence/filesystem-tree.txt
  - path: evidence/filesystem-checksums.txt
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.filesystem_inventory
    rationale: Current ACES SDL node runtime.filesystem_inventory carries the path/metadata/checksum facts directly.
    caveat: The nginx TLS private key is operator_secret metadata-only (content excluded from checksums).
- id: shuffle-frontend.runtime.process-set
  category: runtime
  summary: PID 1 is the nginx master; the steady-state set is the master plus a pool of identical nginx worker processes (one
    encoded as a representative).
  evidence:
  - path: evidence/osquery-processes.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-top.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.processes
    rationale: Current ACES SDL node runtime.processes carries the master + representative worker.
    caveat: The nginx worker pool is N identical processes; one representative is encoded (the count is noted in its description)
      rather than duplicating identical rows.
- id: shuffle-frontend.runtime.environment
  category: runtime
  summary: 'Runtime environment is seven variables: BACKEND_HOSTNAME (the /api proxy target) plus the nginx image build vars
    (NGINX_VERSION, NJS_*, PKG_RELEASE, DYNPKG_RELEASE, PATH).'
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.environment
    rationale: Current ACES SDL node runtime.environment carries the captured variables directly.
- id: shuffle-frontend.runtime.local-identity
  category: identity
  summary: Local passwd/group inventory records 19 users and 39 groups (Debian 13 + the nginx service account); no sudo rules.
  evidence:
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.local_identity
    rationale: Current ACES SDL node runtime.local_identity carries the local identity surface directly.
- id: shuffle-frontend.application.shuffle-frontend-web
  category: application
  summary: nginx 1.29.3 serves the pre-built Shuffle React SPA from /usr/share/nginx/html and reverse-proxies /api/v1|v2 to
    shuffle-backend:5001; encoded as a runtime application with the SPA-root and api-proxy routes.
  evidence:
  - path: evidence/frontend-state.txt
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.applications
    - nodes.techvault.shuffle-frontend.runtime.software_components
    rationale: Current ACES SDL node runtime.applications carries the web UI surface (framework, base_path, routes) directly.
- id: shuffle-frontend.runtime.package-inventory
  category: runtime
  summary: dpkg package inventory captures 150 installed OS packages from the shuffle-frontend Debian 13 base.
  evidence:
  - path: evidence/os-packages.txt
  - path: evidence/osquery-apt-sources.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.packages
    rationale: Current ACES SDL node runtime.packages carries the dpkg inventory directly.
- id: shuffle-frontend.runtime.vulnerability-scan
  category: runtime
  summary: Trivy captured 392 image-layer vulnerability findings (7 critical, 64 high, 138 medium, 182 low, 1 unknown).
  evidence:
  - path: evidence/trivy-vulnerabilities.json.gz
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/trivy-vulnerability-counts.json
  - path: evidence/trivy-version.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.package_vulnerabilities
    rationale: Current ACES SDL node runtime.package_vulnerabilities carries the per-CVE findings directly.
    caveat: Scanner output is time-sensitive and tied to the captured Trivy version/database state.
- id: shuffle-frontend.runtime.sbom-toolchain
  category: runtime
  summary: Required Trivy CycloneDX and useful-optional Syft CycloneDX SBOMs are captured; Syft output is deterministically
    normalized.
  evidence:
  - path: evidence/trivy-sbom.cyclonedx.json.gz
  - path: evidence/syft-sbom.cyclonedx.json.gz
  - path: evidence/syft-version.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.packages
    - nodes.techvault.shuffle-frontend.runtime.software_components
    rationale: SDL package fields use dpkg + scanner-derived summaries; full CycloneDX docs retained as evidence.
    caveat: SBOMs retained as evidence; SDL package fields do not embed the full CycloneDX documents.
- id: shuffle-frontend.runtime.osquery-baseline
  category: runtime
  summary: osquery captured processes, listeners, host-side Docker container/image rows, apt sources, and the unavailable
    Linux application/program table status.
  evidence:
  - path: evidence/osquery-processes.json
  - path: evidence/osquery-listening-ports.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/osquery-docker-images.json
  - path: evidence/osquery-apt-sources.json
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.shuffle-frontend.runtime.processes
    - nodes.techvault.shuffle-frontend.runtime.service_listeners
    rationale: Current ACES SDL node fields carry the osquery-derived baseline directly.
    caveat: installed_applications and programs tables are unavailable in the digest-pinned Linux osquery image (recorded
      as capture limits).
- id: shuffle-frontend.relationship.proxies-backend
  category: relationship
  summary: nginx reverse-proxies /api/v1|v2 to shuffle-backend:5001 (BACKEND_HOSTNAME=shuffle-backend); encoded as the shuffle-frontend-proxies-backend
    edge.
  evidence:
  - path: evidence/frontend-state.txt
  - path: evidence/docker-inspect.container.json
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
    - relationships
    - nodes
    fields:
    - relationships.shuffle-frontend-proxies-backend
    rationale: The realized nginx->backend reverse-proxy is encoded as a typed connects_to relationship with the proxied paths
      and upstream port.
