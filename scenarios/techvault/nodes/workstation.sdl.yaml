name: techvault-node-workstation
nodes:
  workstation:
    type: vm
    description: 'TechVault developer workstation container (SCN-010 issue #334 steady-state ACES inventory).'
    source:
      name: aptl-workstation
      version: aptl-workstation@sha256:7843052c4410f05703c15e400d434ecfe7999de9da2078ad127839ea3ddee14f
      build:
        base_image: rockylinux:9
        base_image_digest: ''
        dockerfile_path: containers/workstation/Dockerfile
        instructions:
        - instruction: from
          arguments:
          - rockylinux:9 AS base
          description: ''
        - instruction: arg
          arguments:
          - INSTALL_WAZUH=true
          description: ''
        - instruction: arg
          arguments:
          - INSTALL_FALCO=true
          description: ''
        - instruction: arg
          arguments:
          - INSTALL_XSIAM=false
          description: ''
        - instruction: env
          arguments:
          - INSTALL_WAZUH=true
          description: ''
        - instruction: env
          arguments:
          - INSTALL_FALCO=true
          description: ''
        - instruction: env
          arguments:
          - INSTALL_XSIAM=false
          description: ''
        - instruction: run
          arguments:
          - dnf install -y epel-release && dnf update -y && dnf install -y rsyslog openssh-server sudo systemd systemd-sysv
            iproute iproute-tc hostname procps-ng openssh-clients net-tools gnupg git postgresql && dnf clean all
          description: ''
        - instruction: run
          arguments:
          - (cd /lib/systemd/system/sysinit.target.wants/; for i in *; do [ $i == systemd-tmpfiles-setup.service ] || rm -f
            $i; done); rm -f /lib/systemd/system/multi-user.target.wants/*; rm -f /etc/systemd/system/*.wants/*; rm -f /lib/systemd/system/local-fs.target.wants/*;
            rm -f /lib/systemd/system/sockets.target.wants/*udev*; rm -f /lib/systemd/system/sockets.target.wants/*initctl*;
            rm -f /lib/systemd/system/basic.target.wants/*; rm -f /lib/systemd/system/anaconda.target.wants/*;
          description: ''
        - instruction: run
          arguments:
          - systemctl set-default multi-user.target
          description: ''
        - instruction: run
          arguments:
          - systemctl enable rsyslog sshd systemd-user-sessions && systemctl enable systemd-user-sessions.service && ln -sf
            /usr/lib/systemd/system/systemd-user-sessions.service /etc/systemd/system/multi-user.target.wants/
          description: ''
        - instruction: run
          arguments:
          - mkdir /var/run/sshd && ssh-keygen -A && sed -i 's/#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
            && sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config && sed -i 's/#PubkeyAuthentication.*/PubkeyAuthentication
            yes/' /etc/ssh/sshd_config
          description: ''
        - instruction: run
          arguments:
          - useradd -m -s /bin/bash labadmin && usermod -aG wheel labadmin && echo "labadmin ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/labadmin
            && chmod 440 /etc/sudoers.d/labadmin
          description: ''
        - instruction: run
          arguments:
          - mkdir -p /home/labadmin/.ssh && chmod 700 /home/labadmin/.ssh && chown -R labadmin:labadmin /home/labadmin/.ssh
          description: ''
        - instruction: run
          arguments:
          - useradd -m -s /bin/bash dev-user && echo "dev-user:<REDACTED-SCENARIO-FIXTURE>" | chpasswd && usermod -aG wheel
            dev-user && echo "dev-user ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/dev-user && chmod 440 /etc/sudoers.d/dev-user
          description: ''
        - instruction: run
          arguments:
          - mkdir -p /opt/purple-team/scripts /etc/rsyslog.d
          description: ''
        - instruction: copy
          arguments:
          - base/scripts/entrypoint-base.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/entrypoint-base.sh
          description: ''
        - instruction: copy
          arguments:
          - base/scripts/ossec.conf.template /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - mkdir -p /etc/falco/config.d
          description: ''
        - instruction: copy
          arguments:
          - base/falco_custom.yaml /etc/falco/config.d/
          description: ''
        - instruction: run
          arguments:
          - rpm --import https://packages.wazuh.com/key/GPG-KEY-WAZUH && printf '[wazuh]\ngpgcheck=1\ngpgkey=https://packages.wazuh.com/key/GPG-KEY-WAZUH\nenabled=1\nname=EL-$releasever
            - Wazuh\nbaseurl=https://packages.wazuh.com/4.x/yum/\npriority=1\n' > /etc/yum.repos.d/wazuh.repo && dnf install
            -y wazuh-agent-4.12.0 && dnf clean all && killall wazuh-execd wazuh-agentd wazuh-syscheckd wazuh-logcollector
            wazuh-modulesd 2>/dev/null || true && rm -f /var/ossec/var/run/*.pid
          description: ''
        - instruction: run
          arguments:
          - rpm --import https://falco.org/repo/falcosecurity-packages.asc && printf '[falco]\nname=Falco repository\nbaseurl=https://download.falco.org/packages/rpm\ngpgcheck=1\ngpgkey=https://falco.org/repo/falcosecurity-packages.asc\nenabled=1\n'
            > /etc/yum.repos.d/falco.repo && dnf install -y falco && dnf clean all
          description: ''
        - instruction: copy
          arguments:
          - workstation/setup-workstation.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/setup-workstation.sh
          description: ''
        - instruction: run
          arguments:
          - /opt/purple-team/scripts/setup-workstation.sh
          description: ''
        - instruction: copy
          arguments:
          - workstation/entrypoint.sh /usr/local/bin/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /usr/local/bin/entrypoint.sh
          description: ''
        - instruction: copy
          arguments:
          - workstation/install-wazuh.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/install-wazuh.sh
          description: ''
        - instruction: copy
          arguments:
          - workstation/install-falco.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/install-falco.sh
          description: ''
        - instruction: copy
          arguments:
          - workstation/install-all.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/install-all.sh
          description: ''
        - instruction: copy
          arguments:
          - workstation/lab-install.service /etc/systemd/system/
          description: ''
        - instruction: run
          arguments:
          - systemctl enable lab-install.service
          description: ''
        - instruction: expose
          arguments:
          - '22'
          description: ''
        - instruction: volume
          arguments:
          - '["/var/log", "/home"]'
          description: ''
        - instruction: entrypoint
          arguments:
          - '["/usr/local/bin/entrypoint.sh"]'
          description: ''
        - instruction: cmd
          arguments:
          - '["/usr/sbin/init"]'
          description: ''
        layers:
        - digest: ''
          created_by: CMD ["/usr/sbin/init"]
          size: 0
          empty: true
          description: ''
        - digest: ''
          created_by: ENTRYPOINT ["/usr/local/bin/entrypoint.sh"]
          size: 0
          empty: true
          description: ''
        - digest: ''
          created_by: VOLUME [/var/log /home]
          size: 0
          empty: true
          description: ''
        - digest: ''
