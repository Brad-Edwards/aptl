  category: identity-surface
  summary: The runtime identity database includes Alpine users/groups and no observed sudo rules.
  evidence:
  - path: evidence/runtime-baseline.txt
  aces:
    disposition: encoded
    surface: nodes
    fields:
    - nodes.techvault.db.runtime.local_identity.users
