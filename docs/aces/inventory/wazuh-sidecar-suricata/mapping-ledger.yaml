    - nodes.techvault.wazuh-sidecar-suricata.runtime.operational_policy
    rationale: Current ACES SDL node runtime container/operational_policy fields carry this catalogued fact directly.
- id: wazuh-sidecar-suricata.network.identity
  category: network
  summary: The sidecar is attached to security-net only at 172.20.0.36 with Docker aliases/DNS names/MAC, publishes no host
    ports, and is unreachable from the kali participant vantage.
  evidence:
  - path: evidence/docker-network.aptl-security.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/participant-discovery.kali.txt
  aces:
    disposition: encoded
