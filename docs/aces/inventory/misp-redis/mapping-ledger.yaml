schema_version: 1
asset:
  id: misp-redis
  scenario: TechVault
  aptl_issue: 348
  aces_methodology_issue: 353
  source_class: upstream-image-plus-anonymous-volume-runtime-state
  proof_scope: steady-state-asset-spec
provenance:
  image_digest: redis@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
  attestation:
    status: captured
    verification_status: not_verified
    standards:
    - SLSA provenance v0.2
    - SPDX
    predicate_types:
    - https://slsa.dev/provenance/v0.2
    - https://spdx.dev/Document
    evidence:
    - path: evidence/docker-buildx-imagetools.image.txt
    - path: evidence/docker-buildx-imagetools.image.raw.json
    - path: evidence/docker-buildx-imagetools.attestation-amd64.raw.json
    limits:
    - Registry-visible SLSA provenance and SPDX SBOM attestation manifests were captured for redis:7-alpine, but signatures, transparency-log inclusion, and builder identity were not cryptographically verified in this pass.
notes:
- Capture used the already-running aptl project per operator direction and did not run aptl lab stop -v && aptl lab start.
- Redis is encoded through runtime.datastore_services (key_value), runtime.app_authorizations (redis_acl), and runtime.service_listeners; ACES #431 is consumed for listener semantics. No known ACES expressivity gap remains for the catalogued MISP Redis steady-state facts.
- The Redis auth fixture and its ACL password hash are redacted from every committed artifact; the password-required posture is preserved as a classified fact.
- misp-redis has no Compose healthcheck, no on-disk redis.conf (config is supplied via the Compose command), and no scenario-declared vulnerabilities; the keyspace is volatile MISP-driven state encoded as a snapshot in the datastore logical-db partitions.
correspondence_checks:
- id: misp-redis-evidence-bundle-integrity
  status: implemented
  source: docs/aces/inventory/misp-redis/evidence
  method: evidence-sha256sums.txt hashes every committed evidence file except the manifest itself.
  realized_evidence:
  - path: evidence/evidence-sha256sums.txt
  - path: evidence/captured-at-utc.txt
  ledger_fact_ids:
  - misp-redis.capture.toolchain-baseline
- id: misp-redis-sdl-runtime-correspondence
  status: implemented
  source: scenarios/techvault.sdl.yaml nodes.techvault.misp-redis
  method: tests/test_misp_redis_inventory.py parses and compiles the ACES SDL and asserts image, runtime, listener, package, CVE, identity, datastore, ACL, and relationship surfaces against the evidence.
  realized_evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-listening-ports.json
  - path: evidence/redis-state.txt
  - path: evidence/trivy-vulnerability-list.json
  ledger_fact_ids:
  - misp-redis.runtime.container-policy
  - misp-redis.runtime.service-listeners
  - misp-redis.datastore.service
  - misp-redis.datastore.logical-dbs
  - misp-redis.datastore.acl
  - misp-redis.runtime.vulnerability-scan
- id: misp-redis-scope-and-redaction-caveats
  status: implemented
  source: docs/aces/inventory/misp-redis/evidence/capture-limits.txt
  method: README and tests assert non-destructive capture scope, Redis auth redaction, Syft normalization, dump.rdb checksum exclusion, and unavailable osquery tables.
  realized_evidence:
  - path: evidence/capture-limits.txt
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  ledger_fact_ids:
  - misp-redis.capture.toolchain-baseline
  - misp-redis.runtime.filesystem-inventory
  - misp-redis.datastore.acl
facts:
- id: misp-redis.capture.toolchain-baseline
  category: capture
  summary: Capture used digest-pinned Trivy, Syft, and osquery images, recorded Docker/Compose versions, and recorded explicit capture limits.
  evidence:
  - path: evidence/captured-at-utc.txt
  - path: evidence/docker-version.json
  - path: evidence/docker-compose-version.json
  - path: evidence/trivy-version.txt
  - path: evidence/syft-version.json
  - path: evidence/osquery-version.txt
  - path: evidence/capture-limits.txt
  - path: evidence/evidence-sha256sums.txt
  aces:
    disposition: encoded_with_caveat
    surface: runtime_contract
    checked_surfaces:
    - runtime_contract
    fields:
    - docs/aces/inventory/misp-redis/capture-evidence.sh
    - docs/aces/inventory/misp-redis/evidence/capture-limits.txt
    rationale: Current ACES SDL runtime/profile fields carry this catalogued MISP Redis fact directly.
    caveat: Scanner and runtime observations are time-sensitive evidence from the current-running lab, not immutable clean-reset proof.
