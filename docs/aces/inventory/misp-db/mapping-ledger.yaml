    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.runtime.package-inventory
  category: runtime
  summary: dpkg package inventory captures 151 installed OS packages.
  evidence:
  - path: evidence/os-packages.txt
  - path: evidence/osquery-apt-sources.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.packages
    rationale: Current ACES SDL runtime/profile fields can carry this catalogued MISP DB fact directly.
- id: misp-db.runtime.vulnerability-scan
  category: runtime
  summary: Trivy captured 100 vulnerability findings and severity counts for the MariaDB image.
  evidence:
  - path: evidence/trivy-vulnerabilities.json.gz
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/trivy-vulnerability-counts.json
