          source_kind: volume
          filesystem_type: volume
          read_only: false
          options:
            - rw
          propagation: unknown
          stability: volume_backed
          backend_generated: false
          description: Docker volume mount observed at /var/log/mail.
        - target: /tmp/setup.sh
          source: containers/mailserver/setup.sh
          source_kind: bind
          filesystem_type: ext4
