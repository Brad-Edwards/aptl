          hosts: []
          description: Cortex stores roles on the user document; mapping records the observed service-account role set.
        tenants:
        - tenant_id: aptl
          name: APTL
          description: Seeded Cortex organization for the APTL lab.
        description: Observed from cortex_6 Elasticsearch documents and /api/user/current, with raw key/password redacted.
