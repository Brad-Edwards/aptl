    rationale: Current ACES SDL node runtime package_vulnerabilities field carries this catalogued MISP Redis fact directly.
    caveat: Vulnerability scanner output is time-sensitive and tied to the captured Trivy version/database state.
- id: misp-redis.runtime.sbom-toolchain
  category: runtime
  summary: Required Trivy CycloneDX and useful-optional Syft CycloneDX SBOMs are captured; Syft output is deterministically normalized.
  evidence:
  - path: evidence/trivy-sbom.cyclonedx.json.gz
  - path: evidence/syft-sbom.cyclonedx.json.gz
  - path: evidence/syft-version.json
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.packages
    - nodes.techvault.misp-redis.runtime.software_components
    rationale: Current ACES SDL node runtime package/software_component fields carry this catalogued MISP Redis fact directly.
    caveat: SBOMs are retained as evidence; SDL package fields use apk and scanner-derived summaries rather than embedding full CycloneDX documents.
- id: misp-redis.runtime.osquery-baseline
  category: runtime
  summary: osquery captured processes, listeners, host-side Docker container/image rows, and the unavailable Alpine application/program/apt-sources table status.
  evidence:
  - path: evidence/osquery-processes.json
  - path: evidence/osquery-listening-ports.json
  - path: evidence/osquery-docker-containers.json
  - path: evidence/osquery-docker-images.json
  - path: evidence/osquery-apt-sources.json
  - path: evidence/osquery-installed-applications.json
  - path: evidence/osquery-programs.json
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.processes
    - nodes.techvault.misp-redis.runtime.service_listeners
    - nodes.techvault.misp-redis.runtime.network
    rationale: Current ACES SDL node runtime process/listener/network fields carry this catalogued MISP Redis fact directly.
    caveat: apt_sources, installed_applications, and programs tables are unavailable for the Alpine target in the digest-pinned Linux osquery image and are recorded as capture limits.
- id: misp-redis.datastore.service
  category: datastore
  summary: Redis 7.4.8 exposes a key_value RESP datastore service on TCP 6379, encoded through runtime.datastore_services rather than the relational database_services.
  evidence:
  - path: evidence/redis-state.txt
  - path: evidence/runtime-baseline.txt
  - path: evidence/osquery-listening-ports.json
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.datastore_services.misp_redis
    rationale: ACES runtime.datastore_services (engine redis, data_model key_value) carries this catalogued fact directly; Redis is deliberately not encoded as relational database_services.
- id: misp-redis.datastore.persistence
  category: datastore
  summary: The key-value persistence profile captures the RDB save points (3600 1, 300 100, 60 10000), AOF disabled, noeviction, and maxmemory 0.
  evidence:
  - path: evidence/redis-state.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.datastore_services.misp_redis.persistence
    rationale: The ACES key_value data_model requires and carries a persistence profile directly.
- id: misp-redis.datastore.logical-dbs
  category: datastore
  summary: 16 logical DBs are configured; db0 (120 keys), db1 (9 keys), and db13 (21 keys) are populated at the snapshot, encoded as logical_db partitions with datatype census.
  evidence:
  - path: evidence/redis-state.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.datastore_services.misp_redis.partitions
    rationale: ACES logical_db partitions with datatype_census carry the observed Redis keyspace shape directly.
    caveat: Per-DB key counts and datatype census are volatile, MISP-driven, TTL-bearing snapshot observations; the configured 16-logical-DB capacity is the stable fact while population is point-in-time.
- id: misp-redis.datastore.settings
  category: datastore
  summary: 18 captured CONFIG settings (save, appendonly, maxmemory-policy, dir, bind, databases, etc.) are encoded as datastore settings with the requirepass value redacted.
  evidence:
  - path: evidence/redis-state.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.datastore_services.misp_redis.settings
    rationale: ACES datastore settings carry the catalogued CONFIG fact directly; the secret-named requirepass setting omits its value and is classified redacted.
- id: misp-redis.datastore.acl
  category: identity
  summary: The single built-in default Redis ACL user (enabled, sanitize-payload, password-required, full +@all access over ~* keys and &* channels) is encoded via app_authorizations with resource_vocabulary redis_acl.
  evidence:
  - path: evidence/redis-state.txt
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.app_authorizations.misp_redis_acl
    - nodes.techvault.misp-redis.runtime.datastore_services.misp_redis.authorization_ref
    rationale: ACES runtime.app_authorizations with resource_vocabulary redis_acl carries the Redis ACL directly, linked from the datastore via authorization_ref.
    caveat: The raw Redis password and its ACL hash are redacted; the password-required posture is preserved via credential_classification and the redacted requirepass setting.
- id: misp-redis.participant-discovery
  category: relationship
  summary: MISP resolves and reaches misp-redis on TCP 6379; Kali cannot reach the security-net address from its current network vantage.
  evidence:
  - path: evidence/participant-discovery.misp.txt
  - path: evidence/participant-discovery.kali.txt
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
    - relationships
    - nodes
    fields:
    - relationships.misp-connects-redis
    - nodes.techvault.misp-redis.runtime.service_listeners.redis-6379-ipv4
    rationale: Current ACES SDL relationship and node listener fields carry this catalogued reachability fact directly.
- id: misp-redis.relationship.misp
  category: relationship
  summary: MISP points at misp-redis via REDIS_HOST=misp-redis; the Redis side requires a password while MISP exposes no Redis password variable, so MISP-side auth is recorded as unknown.
  evidence:
  - path: evidence/compose-service.misp-redis.json
  - path: evidence/docker-inspect.container.json
  - path: evidence/redis-state.txt
  - path: evidence/participant-discovery.misp.txt
  aces:
    disposition: encoded_with_caveat
    surface: relationships
    checked_surfaces:
    - relationships
    fields:
    - relationships.misp-connects-redis
    rationale: Current ACES SDL relationship fields carry this catalogued MISP-to-Redis fact directly, targeting the typed datastore service.
    caveat: target_requires_password is confirmed true by Redis-side ACL evidence, but MISP-side auth_method remains unobserved (unknown) because the MISP container exposes no Redis password variable.
