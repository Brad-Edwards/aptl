name: techvault-node-cortex
nodes:
  cortex:
    type: vm
    description: 'TechVault Cortex analyzer engine (compose service cortex, container aptl-cortex, image thehiveproject/cortex:3.1.8).
      Cortex 3.1.8-1 serves HTTP on TCP/9001 at security-net 172.20.0.22, stores organization/user metadata in the shared
      thehive-es Elasticsearch backend (cortex_6 index), and exposes key/local auth for TheHive. Inventoried at experiment
      grade under docs/aces/inventory/cortex/ (SCN-010 issue #357) after a clean lab start. HTTPS is intentionally deferred
      by ADR-034; TheHive consumes Cortex over the internal network with a redacted fixture API key.'
    os: linux
    os_version: Debian GNU/Linux 11 (bullseye)
    source:
      name: thehiveproject/cortex
      version: thehiveproject/cortex@sha256:ae8b3d72eb5de785513bc33492d93278c32b79d9ff89401463c3a9c577e0bc0b
      build:
        description: Upstream TheHive Project Cortex image. No in-repo Dockerfile exists; build instructions and layers are
          reconstructed from docker history. The registry RepoDigest is the immutable image identity captured by Docker inspect/imagetools.
        base_image: debian:11
        base_image_digest: ''
        dockerfile_path: ''
        instructions:
        - instruction: add
          arguments:
          - '/bin/sh -c #(nop) ADD file:7eb149bcaba1d7dcab06b3f9a0615ca459e9cb28459a0864f92b0037f270ba66 in / '
          description: Observed from docker history.
        - instruction: cmd
          arguments:
          - '/bin/sh -c #(nop)  CMD ["bash"]'
          description: Observed from docker history.
        - instruction: label
          arguments:
          - LABEL MAINTAINER=TheHive Project <support@thehive-project.org> repository=https://github.com/TheHive-Project/TheHive
          description: Observed from docker history.
        - instruction: workdir
          arguments:
          - WORKDIR /opt/cortex
          description: Observed from docker history.
        - instruction: env
          arguments:
          - ENV JAVA_HOME=/usr/lib/jvm/java-11-amazon-corretto
          description: Observed from docker history.
        - instruction: run
          arguments:
          - 'RUN /bin/sh -c apt update && apt upgrade -y && apt install -y iptables lxc wget curl gnupg && curl -fL https://apt.corretto.aws/corretto.key
            | gpg --dearmor -o /usr/share/keyrings/corretto.gpg && echo ''deb [signed-by=/usr/share/keyrings/corretto.gpg]
            https://apt.corretto.aws stable main'' > /etc/apt/sources.list.d/corretto.list && mkdir -p /usr/share/man/man1
            || true && apt update && apt install -y java-11-amazon-corretto-jdk && apt autoclean -y -q && apt autoremove -y
            -q && wget -q -O - https://download.docker.com/linux/static/stable/x86_64/docker-18.09.0.tgz | tar -xzC /usr/local/bin/
            --strip-components 1 && addgroup --system dockremap && adduser --system --ingroup dockremap dockremap && addgroup
            --system docker && echo dockremap:165536:65536 >> /etc/subuid && echo dockremap:165536:65536 >> /etc/subgid &&
            rm -rf /var/lib/apt/lists/* && ( type groupadd 1>/dev/null 2>&1 && groupadd -g 1001 cortex || addgroup -g 1001
            -S cortex ) && ( type useradd 1>/dev/null 2>&1 && useradd --system --uid 1001 --gid 1001 cortex || adduser -S
            -u 1001 -G cortex cortex ) # buildkit'
          description: Observed from docker history.
        - instruction: add
          arguments:
          - 'ADD opt /opt # buildkit'
          description: Observed from docker history.
        - instruction: add
          arguments:
          - 'ADD var /var # buildkit'
          description: Observed from docker history.
        - instruction: add
          arguments:
          - 'ADD etc /etc # buildkit'
          description: Observed from docker history.
        - instruction: volume
          arguments:
          - VOLUME [/var/lib/docker]
          description: Observed from docker history.
        - instruction: run
          arguments:
          - 'RUN chmod +x /opt/cortex/bin/cortex /opt/cortex/entrypoint # buildkit'
          description: Observed from docker history.
        - instruction: expose
          arguments:
          - EXPOSE map[9001/tcp:{}]
          description: Observed from docker history.
        - instruction: entrypoint
          arguments:
          - ENTRYPOINT ["/opt/cortex/entrypoint"]
          description: Observed from docker history.
        - instruction: cmd
          arguments:
          - CMD []
          description: Observed from docker history.
