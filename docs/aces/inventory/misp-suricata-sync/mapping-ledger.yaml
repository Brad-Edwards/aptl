- id: misp-suricata-sync.service.sync-behavior
  category: runtime
  summary: The sync loop pulls aptl:enforce-tagged indicators every 300s, writes alert-only rules (ADR-019, sid_base 99000000)
    to misp-iocs.rules, and reloads Suricata over the unix socket; ioc_count=0 at the snapshot.
  evidence:
  - path: evidence/sync-service-state.txt
  - path: evidence/docker-logs.misp-suricata-sync.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    - relationships
    fields:
    - nodes.techvault.misp-suricata-sync.runtime.processes
    - nodes.techvault.misp-suricata-sync.runtime.environment
    - nodes.techvault.misp-suricata-sync.runtime.filesystem_inventory
    rationale: The sync behaviour is carried by the node's process/environment/filesystem facts plus the typed relationship
      edges; the generated rules file is a runtime_created filesystem entry.
- id: misp-suricata-sync.relationship.queries-misp-api
  category: relationship
  summary: The service reaches the MISP HTTPS API at https://misp (TCP/443), verifies TLS against the lab CA, and authenticates
    with the MISP admin API key fixture.
  evidence:
  - path: evidence/sync-service-state.txt
  - path: evidence/docker-inspect.container.json
  - path: evidence/capture-limits.txt
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
    - relationships
    - nodes
    fields:
    - relationships.misp-suricata-sync-queries-misp-api
    rationale: The realized service-to-MISP API edge is encoded as a typed relationship with auth_method api_key and lab CA
      verification.
- id: misp-suricata-sync.relationship.updates-suricata-rules
  category: relationship
  summary: The service hands rules to the suricata node via the shared aptl_suricata_misp_rules volume and triggers reloads via the shared unix-command
    socket (suricata side confirms the same file and socket).
  evidence:
  - path: evidence/sync-service-state.txt
  - path: evidence/observer-discovery.suricata.txt
  - path: evidence/docker-volume.suricata_command_socket.json
  aces:
    disposition: encoded
    surface: relationships
    checked_surfaces:
