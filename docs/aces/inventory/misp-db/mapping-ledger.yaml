- id: misp-db.network.identity
  category: network
  summary: MISP DB is attached to security-net at 172.20.0.17 with Docker aliases, DNS names, MAC address, and no host-published
    ports.
  evidence:
  - path: evidence/docker-inspect.container.json
  - path: evidence/docker-network.aptl-security.json
  - path: evidence/participant-discovery.misp.txt
  - path: evidence/participant-discovery.kali.txt
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-db.runtime.network.endpoints
    - nodes.techvault.misp-db.runtime.network.published_ports
