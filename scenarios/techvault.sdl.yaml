  workstation:
    type: VM
    description: 'TechVault developer workstation container (SCN-010 issue #334 steady-state ACES inventory).'
    os: linux
    os_version: Rocky Linux 9.7 (Blue Onyx)
    source:
      name: aptl-workstation
      version: aptl-workstation@sha256:7843052c4410f05703c15e400d434ecfe7999de9da2078ad127839ea3ddee14f
      build:
        description: Observed local Docker build provenance for the TechVault workstation image. The mutable rockylinux:9 base
          tag is paired with the observed local image digest; no registry-visible attestation was available in this capture.
        base_image: rockylinux:9
        base_image_digest: ''
        dockerfile_path: containers/workstation/Dockerfile
        instructions:
        - instruction: from
          arguments:
          - rockylinux:9 AS base
        - instruction: arg
          arguments:
          - INSTALL_WAZUH=true
        - instruction: arg
          arguments:
          - INSTALL_FALCO=true
        - instruction: arg
          arguments:
          - INSTALL_XSIAM=false
        - instruction: env
          arguments:
          - INSTALL_WAZUH=true
        - instruction: env
          arguments:
          - INSTALL_FALCO=true
        - instruction: env
          arguments:
          - INSTALL_XSIAM=false
        - instruction: run
          arguments:
          - dnf install -y epel-release && dnf update -y && dnf install -y rsyslog openssh-server sudo systemd systemd-sysv iproute
            iproute-tc hostname procps-ng openssh-clients net-tools gnupg git postgresql && dnf clean all
