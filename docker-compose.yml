services:
  # ==========================================================================
  # SECURITY STACK (aptl-security network: 172.20.0.0/24)
  # ==========================================================================

  # Wazuh Manager
  wazuh.manager:
    profiles: ["wazuh"]
    container_name: aptl-wazuh-manager
    image: wazuh/wazuh-manager:4.12.0
    hostname: wazuh.manager
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      # SEC / ADR-034 Host Exposure Amendment (issue #416): SOC management
      # surfaces bind 127.0.0.1 so they are not reachable from other hosts on
      # the operator's LAN. Container-side ports and the security-net addresses
      # are unchanged; in-cluster agents reach the manager over the Docker net.
      - "127.0.0.1:${APTL_HP_WAZUH_MANAGER_1514:-1514}:1514"
      - "127.0.0.1:${APTL_HP_WAZUH_MANAGER_1515:-1515}:1515"
      - "127.0.0.1:${APTL_HP_WAZUH_MANAGER_514:-514}:514/udp"
      - "127.0.0.1:${APTL_HP_WAZUH_MANAGER_55000:-55000}:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=${INDEXER_USERNAME}
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/wazuh/root-ca-manager.pem
      - SSL_CERTIFICATE=/etc/ssl/wazuh/wazuh.manager.pem
      - SSL_KEY=/etc/ssl/wazuh/wazuh.manager-key.pem
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - ./config/wazuh_cluster/custom-shuffle:/var/ossec/integrations/custom-shuffle
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./config/wazuh_cluster/filebeat_wazuh_module.yml:/run/filebeat-override.yml:ro
      - ./config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/wazuh/root-ca-manager.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/wazuh/wazuh.manager.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/wazuh/wazuh.manager-key.pem:ro
      # Credentialized copy rendered by `aptl lab start` from the checked-in
      # template config/wazuh_cluster/wazuh_manager.conf (ADR-028); never edit
      # the .aptl/ copy by hand.
      - ./.aptl/config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
      - ./config/wazuh_cluster/falco_rules.xml:/var/ossec/etc/rules/falco_rules.xml
      # kali_redteam_rules.xml and kali_decoders.xml mounts removed under
      # ADR-033 — no red activity flows into the SIEM (non-contamination).
      - ./config/wazuh_cluster/samba_decoders.xml:/var/ossec/etc/decoders/samba_decoders.xml
      - ./config/wazuh_cluster/postgresql_decoders.xml:/var/ossec/etc/decoders/postgresql_decoders.xml
      - ./config/wazuh_cluster/ad_rules.xml:/var/ossec/etc/rules/ad_rules.xml
      - ./config/wazuh_cluster/webapp_rules.xml:/var/ossec/etc/rules/webapp_rules.xml
      - ./config/wazuh_cluster/suricata_rules.xml:/var/ossec/etc/rules/suricata_rules.xml
      - ./config/wazuh_cluster/database_rules.xml:/var/ossec/etc/rules/database_rules.xml
      - ./config/wazuh_cluster/patch-rule-path.py:/docker-entrypoint-initdb.d/patch-rule-path.py:ro
    entrypoint: ["/bin/bash", "-c", "cp /run/filebeat-override.yml /etc/filebeat/filebeat.yml && chown root:root /etc/filebeat/filebeat.yml && python3 /docker-entrypoint-initdb.d/patch-rule-path.py 2>/dev/null; exec /init"]
    healthcheck:
      test: ["CMD-SHELL", "curl -ks https://localhost:55000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      wazuh.indexer:
        condition: service_healthy
    networks:
      aptl-security:
        ipv4_address: 172.20.0.10
      aptl-dmz:
        ipv4_address: 172.20.1.10
      aptl-internal:
        ipv4_address: 172.20.2.30

  # Wazuh Indexer
  wazuh.indexer:
    profiles: ["wazuh"]
    container_name: aptl-wazuh-indexer
    image: wazuh/wazuh-indexer:4.12.0
    hostname: wazuh.indexer
    restart: always
    ports:
      # ADR-034 Host Exposure Amendment (issue #416): loopback-only.
      - "127.0.0.1:${APTL_HP_WAZUH_INDEXER_9200:-9200}:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer-key.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem:ro
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml
    healthcheck:
      test: ["CMD-SHELL", "curl -ks https://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      aptl-security:
        ipv4_address: 172.20.0.12

  # Wazuh Dashboard
  wazuh.dashboard:
    profiles: ["wazuh"]
    container_name: aptl-wazuh-dashboard
    image: wazuh/wazuh-dashboard:4.12.0
    hostname: wazuh.dashboard
    restart: always
    ports:
      # ADR-034 Host Exposure Amendment (issue #416): loopback-only.
      - "127.0.0.1:${APTL_HP_WAZUH_DASHBOARD_5601:-443}:5601"
    environment:
      - INDEXER_USERNAME=${INDEXER_USERNAME}
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
    volumes:
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh.dashboard.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh.dashboard-key.pem:ro
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      # Credentialized copy rendered by `aptl lab start` from the checked-in
      # template config/wazuh_dashboard/wazuh.yml (ADR-028); never edit the
      # .aptl/ copy by hand.
      - ./.aptl/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    healthcheck:
      test: ["CMD-SHELL", "curl -ks https://localhost:5601 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      wazuh.indexer:
        condition: service_healthy
      wazuh.manager:
        condition: service_healthy
    networks:
      aptl-security:
        ipv4_address: 172.20.0.11

  # Suricata IDS
  suricata:
    profiles: ["soc"]
    image: jasonish/suricata:7.0
    container_name: aptl-suricata
    hostname: suricata
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      # ADR-043: Suricata no longer bind-mounts any checked-in or .aptl host
      # path onto a directory the upstream image entrypoint chowns (that
      # rewrote host-side ownership to UID 991). `aptl lab start` seeds these
      # Compose project-scoped named volumes from config/suricata/ via a root
      # container; the wrapper entrypoint below copies the seeded config into
      # the image-owned /etc/suricata before delegating to the upstream
      # entrypoint, so its chown only ever touches Docker-managed paths.
      - suricata_config_seed:/seed:ro
      - suricata_logs:/var/log/suricata
      - suricata_command_socket:/var/run/suricata
      # MISP IOC rules under default-rule-path so misp-iocs.rules and the
      # hash-list sidecars resolve via Suricata's relative-path lookup;
      # shared read-write with aptl-misp-suricata-sync, which owns rule
      # content. Writable because the entrypoint chowns the rules tree —
      # now harmless, since this is a named volume, not a host bind.
      - suricata_misp_rules:/var/lib/suricata/rules/misp:rw
    # Wrapper entrypoint (ADR-043): stage the seeded config into the
    # image-owned /etc/suricata, then exec the upstream entrypoint with the
    # original Suricata args baked in. Data-free — only fixed container
    # paths, no secrets. Args are baked rather than passed via `command:` to
    # avoid Compose `$`-interpolation of a `$@` passthrough.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /etc/suricata/rules
        cp /seed/suricata.yaml /etc/suricata/suricata.yaml
        cp /seed/rules/local.rules /etc/suricata/rules/local.rules
        exec /docker-entrypoint.sh -c /etc/suricata/suricata.yaml --pcap
    deploy:
      resources:
        limits:
          # 1g was too small: the container OOM-killed (exit 137) shortly
          # after loading the full ~52k signature set (default + local +
          # MISP + suricata_rules + falco + ad + webapp + database +
          # samba + postgresql). Colima on macOS reproduced this
          # consistently with 18 restarts before compose gave up. 3g
          # leaves headroom for signature reloads and packet buffers
          # without dominating the 24 GB Colima footprint.
          memory: 3g
    networks:
      aptl-dmz:
        ipv4_address: 172.20.1.50
      aptl-internal:
        ipv4_address: 172.20.2.50
      aptl-security:
        ipv4_address: 172.20.0.50

  # ==========================================================================
  # SOC TOOLS (aptl-security network)
  # ==========================================================================

  # MISP - Threat Intelligence Platform
  misp:
    profiles: ["soc"]
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: aptl-misp
    hostname: misp
    restart: unless-stopped
    ports:
      # ADR-034 Host Exposure Amendment (issue #416): loopback-only.
      - "127.0.0.1:${APTL_HP_MISP_443:-8443}:443"
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp_db_password
      - ADMIN_EMAIL=admin@admin.test
      - ADMIN_PASSWORD=admin
      # Same value as misp-suricata-sync's MISP_API_KEY so server and
      # client stay aligned; sourced from .env per SEC-005. The previous
      # hardcoded default was removed in #250 after a codex security
      # review flagged it.
      - ADMIN_KEY=${MISP_API_KEY:?MISP_API_KEY must be set in .env (copy .env.example to .env)}
      - BASE_URL=https://localhost
      - REDIS_HOST=misp-redis
    volumes:
      - misp_data:/var/www/MISP/app/files
      - misp_config:/var/www/MISP/app/Config
      # SEC-006 / ADR-034: override MISP's built-in self-signed cert with
      # the lab-CA-signed cert generated by `aptl.core.soc_ca`. MISP's
      # bundled /etc/nginx/sites-enabled/misp443 references
      # /etc/nginx/certs/cert.pem + /etc/nginx/certs/key.pem.
      - ./config/soc_certs/misp/server.pem:/etc/nginx/certs/cert.pem:ro
      - ./config/soc_certs/misp/server.key:/etc/nginx/certs/key.pem:ro
    healthcheck:
      # `-k` is acceptable INSIDE the container's own healthcheck — the
      # container has no shared trust anchor with the host CA. External
      # consumers (Python, MCPs, collectors) verify against lab-ca.pem.
      test: ["CMD-SHELL", "curl -ksf https://localhost/users/login || (nginx -s reload 2>/dev/null; exit 1)"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      misp-db:
        condition: service_healthy
      misp-redis:
        condition: service_started
    networks:
      aptl-security:
        ipv4_address: 172.20.0.16

  misp-db:
    profiles: ["soc"]
    image: mariadb:10.11
    container_name: aptl-misp-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp_db_password
      - MYSQL_ROOT_PASSWORD=misp_root_password
    volumes:
      - misp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      aptl-security:
        ipv4_address: 172.20.0.17

  misp-redis:
    profiles: ["soc"]
    image: redis:7-alpine
    container_name: aptl-misp-redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword
    deploy:
      resources:
        limits:
          memory: 128m
    networks:
      aptl-security:

  # MISP -> Suricata IOC sync (intel-driven detection per ADR-019)
  # Realized generically from scenarios/techvault-operational.sdl.yaml
  # (ADR-048 / issue #581) — a `runtime:` node, never Compose-started. This
  # stub exists only so `--scale misp-suricata-sync=0` (the mixed-
  # realization exclusion) has a declared service to scale to zero; no
  # config here is live.
  misp-suricata-sync:
    profiles: ["soc"]
    image: debian:12-slim
    container_name: aptl-misp-suricata-sync
    networks:
      aptl-security:
        ipv4_address: 172.20.0.19

  # TheHive - Case Management
  thehive:
    profiles: ["soc"]
    image: strangebee/thehive:5.4
    container_name: aptl-thehive
    hostname: thehive
    restart: unless-stopped
    ports:
      # ADR-034 Host Exposure Amendment (issue #416): loopback-only.
      - "127.0.0.1:${APTL_HP_THEHIVE_9000:-9000}:9000"
    environment:
      - JVM_OPTS=-Xms512m -Xmx512m
    # SEC-006 / ADR-034: keystore password loaded from the env_file
    # generated by `aptl.core.soc_ca` (env_file format
    # `HTTPS_KEYSTORE_PASSWORD=<value>`). Play substitutes
    # `${?HTTPS_KEYSTORE_PASSWORD}` in the mounted application.conf.
    env_file:
      - ./config/soc_certs/thehive/keystore.p12.password
      - ./config/cortex/thehive-cortex.env
    volumes:
      - thehive_data:/opt/thp/thehive/data
      - thehive_index:/opt/thp/thehive/index
      # SEC-006: HTTPS keystore + Play config overlay.
      - ./config/soc_certs/thehive/keystore.p12:/etc/thehive/keystore.p12:ro
      - ./config/thehive/application.conf:/etc/thehive/application.conf:ro
      - ./config/soc_certs/lab-ca.pem:/etc/lab-ca/lab-ca.pem:ro
    command:
      - --secret
      - "aptl-thehive-lab-secret-key-2024-purple"
      - --cql-hostnames
      - "thehive-cassandra"
      - --index-backend
      - lucene
      - --es-hostnames
      - "thehive-es"
      - --cortex-proto
      - http
      - --cortex-hostnames
      - cortex
      - --cortex-port
      - "9001"
    healthcheck:
      # `-k` is acceptable for the in-container healthcheck per ADR-034
      # (no shared trust anchor inside the container); external clients
      # verify against lab-ca.pem.
      test: ["CMD-SHELL", "curl -ksf https://localhost:9000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      thehive-cassandra:
        condition: service_healthy
      thehive-es:
        condition: service_healthy
      cortex:
        condition: service_healthy
    networks:
      aptl-security:
        ipv4_address: 172.20.0.18

  thehive-cassandra:
    profiles: ["soc"]
    image: cassandra:4.1
    container_name: aptl-thehive-cassandra
    restart: unless-stopped
    environment:
      - CASSANDRA_CLUSTER_NAME=thehive
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    volumes:
      - thehive_cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      aptl-security:

  thehive-es:
    profiles: ["soc"]
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.28
    container_name: aptl-thehive-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # TheHive and Cortex share this disposable single-node datastore. Host
      # percentage watermarks can block fresh bootstrap writes even with tens
      # of GiB free while the healthcheck continues to report green.
      - cluster.routing.allocation.disk.threshold_enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - thehive_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      aptl-security:

  cortex-index-init:
    profiles: ["soc"]
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.28
    container_name: aptl-cortex-index-init
    restart: "no"
    entrypoint: ["/bin/sh", "/usr/local/bin/cortex-index-init.sh"]
    volumes:
      - ./scripts/cortex-index-init.sh:/usr/local/bin/cortex-index-init.sh:ro
    depends_on:
      thehive-es:
        condition: service_healthy
    networks:
      aptl-security:

  # Shuffle SOAR
  shuffle-backend:
    profiles: ["soc"]
    image: ghcr.io/shuffle/shuffle-backend:latest
    container_name: aptl-shuffle-backend
    hostname: shuffle-backend
    restart: unless-stopped
    # SEC-006 / ADR-034: the backend's plaintext API used to be
    # published as ``5001:5001`` on the host, which kept a plaintext
    # bypass around the new HTTPS frontend at :3443. The backend is
    # intra-cluster only (orborus / frontend reach it on the
    # aptl-security Docker network), so the host port publication was
    # removed. Any host-side client must go through the lab-CA-verified
    # frontend.
    environment:
      - SHUFFLE_APP_SDK_TIMEOUT=120
      - SHUFFLE_DEFAULT_USERNAME=admin
      - SHUFFLE_DEFAULT_PASSWORD=ShuffleAdmin2024!
      - SHUFFLE_DEFAULT_APIKEY=31a211c4-ea5c-4a49-b022-5e2434e758a7
      - SHUFFLE_OPENSEARCH_URL=https://shuffle-opensearch:9200
      - SHUFFLE_OPENSEARCH_USERNAME=admin
      - SHUFFLE_OPENSEARCH_PASSWORD=StrongPassword123!
      - SHUFFLE_OPENSEARCH_SKIPSSL_VERIFY=true
    volumes:
      - shuffle_data:/shuffle-database
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      shuffle-opensearch:
        condition: service_healthy
    networks:
      aptl-security:
        ipv4_address: 172.20.0.20

  shuffle-frontend:
    profiles: ["soc"]
    image: ghcr.io/shuffle/shuffle-frontend:latest
    container_name: aptl-shuffle-frontend
    restart: unless-stopped
    ports:
      # SEC-006 / ADR-034: host port 3443 → container 443 (HTTPS). The
      # in-container nginx config overlay terminates TLS using the
      # lab-CA-signed cert. ADR-034 Host Exposure Amendment (issue #416):
      # loopback-only.
      - "127.0.0.1:${APTL_HP_SHUFFLE_FRONTEND_443:-3443}:443"
      # Host port 3001 → container 80 (HTTP). The in-container nginx
      # listens on 80/443 only; the previous 3001:3001 mapping pointed at
      # a port nothing listens on (issue #405). Loopback-only (issue #416).
      - "127.0.0.1:${APTL_HP_SHUFFLE_FRONTEND_80:-3001}:80"
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
    volumes:
      # SEC-006 / ADR-034: Override the Shuffle upstream image's bundled
      # self-signed cert by mounting the lab-CA-signed cert+key directly
      # over /etc/nginx/{fullchain.cert.pem,privkey.pem} — the paths the
      # upstream image's baked-in /etc/nginx/nginx.conf already references
      # for the 443 listener. This keeps the upstream HTTPS routing
      # contract intact while swapping the trust anchor.
      - ./config/soc_certs/shuffle-frontend/server.pem:/etc/nginx/fullchain.cert.pem:ro
      - ./config/soc_certs/shuffle-frontend/server.key:/etc/nginx/privkey.pem:ro
      - ./config/soc_certs/lab-ca.pem:/etc/lab-ca/lab-ca.pem:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -ksf https://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      - shuffle-backend
    networks:
      aptl-security:
        ipv4_address: 172.20.0.21

  shuffle-orborus:
    profiles: ["soc"]
    image: ghcr.io/shuffle/shuffle-orborus:latest
    container_name: aptl-shuffle-orborus
    restart: unless-stopped
    hostname: shuffle-orborus
    environment:
      - SHUFFLE_APP_SDK_TIMEOUT=300
      - ENVIRONMENT_NAME=Shuffle
      - ORG_ID=Shuffle
      # SEC-006 / ADR-034 § Decision: this is Shuffle's internal SOAR
      # mechanism (worker manager → orchestration backend) on the
      # aptl-security network, NOT a SOC-consumer surface. The backend
      # core deliberately stays HTTP on 5001; only shuffle-frontend
      # terminates TLS for external clients.
      - BASE_URL=http://shuffle-backend:5001
      - DOCKER_API_VERSION=1.44
      - SHUFFLE_WORKER_IMAGE=ghcr.io/shuffle/shuffle-worker:latest
      - SHUFFLE_ORBORUS_EXECUTION_TIMEOUT=600
      - SHUFFLE_STATS_DISABLED=true
      - SHUFFLE_LOGS_DISABLED=true
      - SHUFFLE_SKIP_PIPELINES=true
      - ORBORUS_CONTAINER_NAME=aptl-shuffle-orborus
      - CLEANUP=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      - shuffle-backend
    networks:
      aptl-security:
        # Pinned so the orborus asset has a stable, reproducible address
        # for the ACES inventory capture. It was previously DHCP-assigned,
        # which let its address drift between capture runs (.6 vs .7) and
        # made the inventory evidence bundle internally inconsistent.
        ipv4_address: 172.20.0.7

  shuffle-opensearch:
    profiles: ["soc"]
    image: opensearchproject/opensearch:2.14.0
    container_name: aptl-shuffle-opensearch
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - discovery.type=single-node
      # This is a disposable, single-node lab datastore sharing the host
      # filesystem. Percentage watermarks can make it read-only even when the
      # host still has tens of GiB free, leaving Shuffle healthy but unable to
      # accept the seeded workflow. Match the Wazuh indexer's lab policy.
      - cluster.routing.allocation.disk.threshold_enabled=false
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=StrongPassword123!
    volumes:
      - shuffle_opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -ks https://localhost:9200 -u admin:StrongPassword123! || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      aptl-security:

  # Cortex - TheHive analyzer engine
  cortex:
    profiles: ["soc"]
    image: thehiveproject/cortex:3.1.8
    container_name: aptl-cortex
    hostname: cortex
    restart: unless-stopped
    ports:
      # ADR-034 Host Exposure Amendment (issue #416): Cortex holds the host
      # docker.sock; loopback-binding removes the LAN-reachable management
      # surface. (Socket-proxy hardening is a separate follow-up.)
      - "127.0.0.1:${APTL_HP_CORTEX_9001:-9001}:9001"
    environment:
      - job_directory=/opt/cortex/jobs
    volumes:
      - cortex_data:/opt/cortex/jobs
      - /var/run/docker.sock:/var/run/docker.sock
      # SEC-006 / ADR-034: ES wiring (`search.uri`) + lab-CA mount for
      # outbound trust. The HTTPS keystore is generated under
      # config/soc_certs/cortex/ for future activation; see the
      # application.conf comment for the deferral rationale.
      - ./config/cortex/application.conf:/etc/cortex/application.conf:ro
      - ./config/soc_certs/lab-ca.pem:/etc/lab-ca/lab-ca.pem:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9001/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s
    deploy:
      resources:
        limits:
          # 512m was too small: the Play/Scala JVM was kernel-killed during
          # warm-up before the /api/status healthcheck could turn green,
          # blocking the ACES handoff for the whole operational scenario.
          # 2g matches thehive-es next to it and is enough headroom to
          # boot + serve healthchecks in the lab (StrangeBee's guidance
          # for production is 4g, but the lab does not need that).
          memory: 2g
    depends_on:
      thehive-es:
        condition: service_healthy
      cortex-index-init:
        condition: service_completed_successfully
    networks:
      aptl-security:
        ipv4_address: 172.20.0.22

  # ==========================================================================
  # ENTERPRISE DMZ (aptl-dmz network: 172.20.1.0/24)
  # ==========================================================================

  # TechVault Web Application
  # Realized generically from scenarios/techvault-operational.sdl.yaml
  # (ADR-048 / issue #581) — a `runtime:` node, never Compose-started. This
  # stub exists only so `--scale webapp=0` (the mixed-realization
  # exclusion) has a declared service to scale to zero; no config here is
  # live.
  webapp:
    profiles: ["enterprise"]
    image: debian:12-slim
    container_name: aptl-webapp
    networks:
      aptl-dmz:
        ipv4_address: 172.20.1.20
      aptl-internal:
        ipv4_address: 172.20.2.25

  # Host publication for webapp, same reason as kali-ssh-proxy below: webapp's
  # own networks (aptl-dmz, aptl-internal) are both internal: true (SAF-002),
  # which Docker never routes host traffic through, published port or not.
  # webapp is a deliberate attack-surface target (test_docker_compose_port_
  # bindings.py TARGET_SURFACES), so unlike kali-ssh-proxy this proxy's own
  # publish stays on all interfaces, not loopback (issue #581). Targets the
  # container name, not webapp's declared static IP: webapp is realized
  # generically (ADR-048), and an image-free node's declared docker-
  # compose.yml ipv4_address is reference data only, never actually applied
  # to the running container's network attachment.
  webapp-proxy:
    profiles: ["enterprise"]
    build:
      context: ./containers/kali-ssh-proxy
      dockerfile: Dockerfile
    container_name: aptl-webapp-proxy
    restart: unless-stopped
    environment:
      - APTL_PROXY_LISTEN_PORT=8080
      - APTL_PROXY_TARGET_HOST=aptl-webapp
      - APTL_PROXY_TARGET_PORT=8080
    ports:
      - "${APTL_HP_WEBAPP_8080:-8080}:8080"
    networks:
      aptl-control:
      aptl-dmz:
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1', 8080), 2); s.close()"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Mail Server (docker-mailserver)
  mailserver:
    profiles: ["mail"]
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: aptl-mailserver
    hostname: mail.techvault.local
    domainname: techvault.local
    restart: unless-stopped
    ports:
      # Loopback-only (ADR-039): the mailserver holds fixture credentials
      # (known lab password), so its SMTP/IMAP ports must not be published on
      # 0.0.0.0 where an exposed host would become an open, known-cred relay.
      # In-range traffic (kali phishing -> victims) uses the docker networks
      # below, not these host publishes; these exist only for operator access
      # from the host itself.
      - "127.0.0.1:${APTL_HP_MAILSERVER_25:-25}:25"
      - "127.0.0.1:${APTL_HP_MAILSERVER_143:-143}:143"
      - "127.0.0.1:${APTL_HP_MAILSERVER_587:-587}:587"
      - "127.0.0.1:${APTL_HP_MAILSERVER_993:-993}:993"
    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
      - ENABLE_POSTGREY=0
      - ENABLE_SASLAUTHD=0
      - ONE_DIR=1
      - DMS_DEBUG=0
      - OVERRIDE_HOSTNAME=mail.techvault.local
      - PERMIT_DOCKER=network
      - SSL_TYPE=
      - SIEM_IP=172.20.0.10
    volumes:
      - mailserver_data:/var/mail
      - mailserver_state:/var/mail-state
      - mailserver_logs:/var/log/mail
      - ./containers/mailserver/setup.sh:/tmp/setup.sh:ro
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      aptl-dmz:
        ipv4_address: 172.20.1.21
      aptl-internal:
        ipv4_address: 172.20.2.26

  # Realized generically from scenarios/techvault-operational.sdl.yaml
  # (ADR-048 / issue #581) — a `runtime:` node, never Compose-started. This
  # stub exists only so `--scale dns=0` (the mixed-realization exclusion)
  # has a declared service to scale to zero; no config here is live.
  dns:
    profiles: ["dns"]
    image: debian:12-slim
    container_name: aptl-dns
    ports:
      - "${APTL_DNS_HOST_PORT:-5353}:53/tcp"
      - "${APTL_DNS_HOST_PORT:-5353}:53/udp"
    networks:
      aptl-dmz:
        ipv4_address: 172.20.1.22
      aptl-internal:
        ipv4_address: 172.20.2.27
      aptl-security:
        ipv4_address: 172.20.0.25

  # ==========================================================================
  # ENTERPRISE INTERNAL (aptl-internal network: 172.20.2.0/24)
  # ==========================================================================

  # Samba Active Directory Domain Controller
  ad:
    profiles: ["enterprise"]
    build:
      context: .
      dockerfile: containers/ad/Dockerfile
    container_name: aptl-ad
    hostname: dc.techvault.local
    restart: unless-stopped
    environment:
      - SAMBA_DOMAIN=TECHVAULT
      - SAMBA_REALM=TECHVAULT.LOCAL
      - SAMBA_ADMIN_PASSWORD=Admin123!
      - DNS_FORWARDER=172.20.1.22
      - SIEM_IP=172.20.2.30  # wazuh.manager on aptl-internal
      # In-process Wazuh agent (issue #248) — replaces wazuh-sidecar-ad.
      # log.nmbd is intentionally absent: Samba in AD-DC mode does not
      # run nmbd and never writes log.nmbd. The previous sidecar config
      # included it and the agent emitted "Could not open file" on every
      # restart.
      - WAZUH_MANAGER=wazuh.manager
      - AGENT_NAME=aptl-ad-agent
      - LOG_PATHS=/var/log/samba/log.samba,/var/log/samba/log.smbd,/var/log/samba/log.winbindd
      - LOG_FORMAT=syslog
    volumes:
      - ad_data:/var/lib/samba
      - ad_logs:/var/log/samba
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN  # required so the in-process agent's `firewall-drop` AR can iptables on this container's namespace
    healthcheck:
      test: ["CMD-SHELL", "samba-tool domain info 127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
    # No `depends_on: wazuh.manager` — the in-process bootstrap waits
    # 180s for the manager port and then continues regardless, so the
    # target can boot independently of the SOC profile. Targets and
    # the manager live in different compose profiles; a hard dependency
    # would make `aptl lab start --profile enterprise` fail when SOC
    # is not selected.
    networks:
      aptl-internal:
        ipv4_address: 172.20.2.10

  # Realized generically from scenarios/techvault-operational.sdl.yaml
  # (ADR-048 / issue #581) — a `runtime:` node, never Compose-started. This
  # stub exists only so `--scale db=0` (the mixed-realization exclusion)
  # has a declared service to scale to zero; no config here is live.
  # wazuh-sidecar-db's `db_data:/logs:ro` mount (below) is now stale — the
  # realized db no longer writes to that volume — pending the same ACES
  # gaps (aces#845/#847/#849) blocking wazuh-sidecar-db's own conversion.
  db:
    profiles: ["enterprise"]
    image: debian:12-slim
    container_name: aptl-db
    networks:
      aptl-internal:
        ipv4_address: 172.20.2.11

  # Realized generically from scenarios/techvault-operational.sdl.yaml
  # (ADR-048 / issue #581) — a `runtime:` node, never Compose-started. This
  # stub exists only so `--scale fileshare=0` (the mixed-realization
  # exclusion) has a declared service to scale to zero; no config here is
  # live.
  fileshare:
    profiles: ["fileshare"]
    image: debian:12-slim
    container_name: aptl-fileshare
    networks:
      aptl-internal:
        ipv4_address: 172.20.2.12

  # ==========================================================================
  # WAZUH AGENT SIDECARS
  #
  # One sidecar per service container that does not host an in-process Wazuh
  # agent. Each mounts the target's existing log volume read-only and ships
  # log lines through to the manager. These exist so a fresh `aptl lab start`
  # produces SIEM visibility into samba, BIND9, the webapp, postgres, and
  # Suricata without modifying upstream container images.
  # ==========================================================================

  # wazuh-sidecar-{fileshare,ad,dns,webapp} were removed in #248 — those
  # four targets now run wazuh-agent in-process via supervisord. The two
  # remaining sidecars below cover the carve-outs documented in ADR-020:
  # `db` (postgres:16-alpine has no first-party Wazuh package; deferred)
  # and `suricata` (deployment governed by ADR-019).

  wazuh-sidecar-db:
    profiles: ["soc"]
    image: aptl-wazuh-sidecar:local
    build:
      context: .
      dockerfile: containers/wazuh-sidecar/Dockerfile
    container_name: aptl-wazuh-sidecar-db
    hostname: wazuh-sidecar-db
    restart: unless-stopped
    environment:
      - WAZUH_MANAGER=wazuh.manager
      - AGENT_NAME=aptl-db-agent
      - LOG_PATHS=/logs/pg_log/postgresql.log
      - LOG_FORMAT=syslog
    volumes:
      - db_data:/logs:ro
    depends_on:
      wazuh.manager:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      aptl-security:
        ipv4_address: 172.20.0.35

  wazuh-sidecar-suricata:
    profiles: ["soc"]
    image: aptl-wazuh-sidecar:local
    build:
      context: .
      dockerfile: containers/wazuh-sidecar/Dockerfile
    container_name: aptl-wazuh-sidecar-suricata
    hostname: wazuh-sidecar-suricata
    restart: unless-stopped
    environment:
      - WAZUH_MANAGER=wazuh.manager
      - AGENT_NAME=aptl-suricata-agent
      - LOG_PATHS=/logs/eve.json
      - LOG_FORMAT=json
    volumes:
      - suricata_logs:/logs:ro
    depends_on:
      wazuh.manager:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      aptl-security:
        ipv4_address: 172.20.0.36

  # Realized generically from scenarios/techvault-operational.sdl.yaml
  # (ADR-048 / issue #581) — a `runtime:` node, never Compose-started. This
  # stub exists only so `--scale victim=0` (the mixed-realization
  # exclusion) has a declared service to scale to zero; no config here is
  # live.
  victim:
    profiles: ["victim"]
    image: debian:12-slim
    container_name: aptl-victim
    networks:
      aptl-internal:
        ipv4_address: 172.20.2.20

  # Realized generically from scenarios/techvault-operational.sdl.yaml
  # (ADR-048 / issue #581) — a `runtime:` node, never Compose-started. This
  # stub exists only so `--scale workstation=0` (the mixed-realization
  # exclusion) has a declared service to scale to zero; no config here is
  # live.
  workstation:
    profiles: ["enterprise"]
    image: debian:12-slim
    container_name: aptl-workstation
    networks:
      aptl-internal:
        ipv4_address: 172.20.2.40

  # ==========================================================================
  # RED TEAM (aptl-redteam network: 172.20.4.0/24)
  # ==========================================================================

  # Realized generically from scenarios/techvault-operational.sdl.yaml
  # (ADR-048 / issue #581) — a `runtime:` node, never Compose-started. This
  # stub exists only so `--scale kali=0` (the mixed-realization exclusion)
  # has a declared service to scale to zero, and so kali-ssh-proxy /
  # kali-capture (below, still Compose-managed) have a `kali:` service to
  # reference — `depends_on: kali: condition: service_healthy` and
  # `network_mode: container:aptl-kali` both resolve against the real,
  # generically-materialized container regardless of what's declared here.
  # No config on this stub is live.
  kali:
    profiles: ["kali"]
    image: debian:12-slim
    container_name: aptl-kali
    networks:
      aptl-redteam:
        ipv4_address: 172.20.4.30
      aptl-dmz:
        ipv4_address: 172.20.1.30
      aptl-internal:
        ipv4_address: 172.20.2.35

  # Host-side Kali SSH bridge for MCP clients.
  #
  # Docker Desktop, Colima, and WSL2 do not route Compose bridge IPs from the
  # host. Publishing a port directly on a service attached only to
  # internal:true networks is also not made reachable by those backends. Keep
  # Kali isolated and put the host publication on this tiny proxy instead:
  # host localhost:2023 -> proxy -> aptl-kali:22 on aptl-redteam.
  kali-ssh-proxy:
    profiles: ["kali"]
    build:
      context: ./containers/kali-ssh-proxy
      dockerfile: Dockerfile
    container_name: aptl-kali-ssh-proxy
    restart: unless-stopped
    environment:
      - APTL_PROXY_TARGET_HOST=172.20.4.30
      - APTL_PROXY_TARGET_PORT=22
    ports:
      # Default host port 2023 matches the MCP red config's pinned ssh_port
      # (mcp/mcp-red/docker-lab-config.json). `aptl lab start` may remap it if
      # 2023 is in use; the start summary then flags that the MCP client needs
      # the reported port. The default parity is enforced by test_consistency.
      - "127.0.0.1:${APTL_HP_KALI_SSH_PROXY_2023:-2023}:2023"
    networks:
      aptl-control:
      aptl-redteam:
    depends_on:
      kali:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1', 2023), 2); s.close()"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64m

  # ---------------------------------------------------------------------------
  # ADR-041 / issue #305: Kali Capture Sidecar
  #
  # The SOLE owner of the kali_captures volume (read-write). The Kali workload
  # does not mount the volume at all, so a sudo-capable agent cannot read,
  # list, delete, or modify any session's evidence. The sidecar receives PTY
  # bytes over an abstract Unix socket, runs the per-session tcpdump, and hosts
  # auditd + process accounting. The MCP-red server harvests captures via
  # `docker cp aptl-kali-capture:...` (see capture_container_name in
  # mcp/mcp-red/docker-lab-config.json).
  #
  # Shares ONLY the Kali network namespace, so tcpdump observes Kali's traffic
  # and the abstract Unix socket is mutually reachable. It must NOT share the
  # PID namespace: with a shared PID namespace a sudo-root Kali shell can see
  # the sidecar's PIDs and traverse `/proc/<sidecar-pid>/root/var/log/aptl/
  # captures` into the sidecar's mount namespace, reading or deleting the
  # evidence the sidecar owns — defeating the whole boundary (codex pre-push
  # cycle 1 finding F2). auditd and process accounting are kernel-wide and do
  # not need PID sharing to observe Kali's processes. NOTE: `network_mode:
  # container:aptl-kali` forbids hostname/ports/networks/extra_hosts on this
  # service — Docker rejects the combination at `up` time. Do not re-add a
  # `hostname:`. Referenced by the container name (not `service:kali`) because
  # ADR-048 (#581) materializes kali directly via the generic materializer,
  # not as a Compose-started container — `service:kali` cannot resolve a
  # container Compose never started. The container name is stable either way.
  # ---------------------------------------------------------------------------
  kali-capture:
    profiles: ["kali"]
    build:
      context: ./containers/kali-capture
      dockerfile: Dockerfile
    container_name: aptl-kali-capture
    restart: unless-stopped
    # ADR-033 §2 pattern: run under Docker's bundled init so the per-session
    # tcpdump / auditd / accton children are reaped rather than zombified.
    init: true
    # Share ONLY Kali's network namespace (abstract socket + tcpdump). PID
    # namespace is deliberately NOT shared (codex F2 — /proc traversal).
    network_mode: "container:aptl-kali"
    depends_on:
      - kali
    volumes:
      # Read-write owner of the captures volume (ADR-041 security boundary).
      - kali_captures:/var/log/aptl/captures
      # Bind-mount the canonical APTL audit ruleset from the kali image's
      # build context so rule text is never duplicated (ADR-041 §Maintainability).
      - ./containers/kali/audit/aptl.rules:/etc/audit/rules.d/aptl.rules:ro
    cap_add:
      # ADR-041: capture-only capabilities live here, never on the kali workload.
      - AUDIT_CONTROL  # auditctl — load rules, start/stop auditd
      - AUDIT_WRITE    # write audit events
      - SYS_PACCT      # accton — enable process accounting
      - NET_RAW        # tcpdump on the shared (Kali) network namespace
    # No host ports: the only new control surface is the abstract Unix socket
    # which is local to the shared PID/network namespace (ADR-041 §Security).
    deploy:
      resources:
        limits:
          memory: 256m

  # Reverse Engineering Container
  reverse:
    profiles: ["reverse"]
    build:
      context: ./containers
      dockerfile: reverse/Dockerfile
    container_name: aptl-reverse
    hostname: reverse-host
    restart: unless-stopped
    cgroup: host
    networks:
      aptl-security:
        ipv4_address: 172.20.0.27
    ports:
      - "${APTL_HP_REVERSE_22:-2027}:22"    # SSH access
    environment:
      - SIEM_IP=172.20.0.10  # wazuh.manager
      - LABADMIN_SSH_KEY_FILE=/keys/aptl_lab_key.pub
    cap_add:
      - SYS_NICE        # For process scheduling
      - SYS_ADMIN       # Required for systemd in container
      - SYS_RESOURCE    # For setting limits and OOM score
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      # SEC #417: targets receive only PUBLIC keys, never a private key. The
      # control-plane pubkey authorizes operator/MCP host access; the kali
      # pivot pubkey authorizes kali's in-scenario pivot into this target.
      - ./keys/aptl_lab_key.pub:/keys/aptl_lab_key.pub:ro
      - ./config/lab-ssh/kali_pivot_key.pub:/keys/kali_pivot_key.pub:ro
      - reverse_logs:/var/log
    tmpfs:
      - /run
      - /run/lock # Ubuntu systemd mounts a nested /run/lock tmpfs itself; AppArmor docker-default denies that mount, so pre-create it
      - /tmp
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep ':22' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g # first-boot tools install compiles radare2 from source (parallel make); 512m OOM-killed the build

  # ==========================================================================
  # WEB UI (web profile)
  # ==========================================================================

  aptl-web-api:
    profiles: ["web"]
    container_name: aptl-web-api
    build:
      context: .
      dockerfile: web/Dockerfile.api
    restart: unless-stopped
    ports:
      # Loopback-only: only the operator's machine can reach this port (ADR-039).
      - "127.0.0.1:${APTL_HP_APTL_WEB_API_8400:-8400}:8400"
    environment:
      - APTL_PROJECT_DIR=/project
      # Validated by the API at runtime. Do not use `${VAR:?}` here: Compose
      # expands inactive-profile services too, which would make the default lab
      # start require the optional web control-plane token.
      - APTL_API_TOKEN=${APTL_API_TOKEN:-}
      # The browser reaches the GUI on the aptl-web-ui (Caddy) origin, not this
      # API bind address. Print the one-time login URL for that origin so the
      # session header token is stored for the origin the SPA actually runs on.
      - APTL_WEB_PUBLIC_ORIGIN=http://127.0.0.1:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project:ro
    networks:
      aptl-security:
        ipv4_address: 172.20.0.40
    deploy:
      resources:
        limits:
          memory: 512m

  aptl-web-ui:
    profiles: ["web"]
    container_name: aptl-web-ui
    build:
      context: web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Loopback-only: only the operator's machine can reach the UI (ADR-039).
      - "127.0.0.1:${APTL_HP_APTL_WEB_UI_3000:-3000}:3000"
    # UI-008a: serves the built static SPA and reverse-proxies /api/* (incl. the
    # terminal WebSocket) to aptl-web-api, which owns the entire auth/CSRF
    # boundary (the FastAPI BFF). The control-plane token is NOT present in this
    # container — it lives only in aptl-web-api. Same-origin to the browser, so
    # no token reaches page code and no cross-origin boundary exists in the UI.
    depends_on:
      - aptl-web-api
    networks:
      aptl-security:
        ipv4_address: 172.20.0.41
    deploy:
      resources:
        limits:
          memory: 256m

  # ==========================================================================
  # OBSERVABILITY STACK (OpenTelemetry)
  # ==========================================================================

  aptl-otel-collector:
    profiles: ["otel"]
    container_name: aptl-otel-collector
    image: otel/opentelemetry-collector-contrib:0.123.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APTL_HP_APTL_OTEL_COLLECTOR_4317:-4317}:4317"
      - "127.0.0.1:${APTL_HP_APTL_OTEL_COLLECTOR_4318:-4318}:4318"
    volumes:
      - ./config/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config", "/etc/otelcol-contrib/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      aptl-security:
        ipv4_address: 172.20.0.53
    deploy:
      resources:
        limits:
          memory: 256m

  aptl-tempo:
    profiles: ["otel"]
    container_name: aptl-tempo
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "127.0.0.1:${APTL_HP_APTL_TEMPO_3200:-3200}:3200"
    volumes:
      - ./config/otel/tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      aptl-security:
        ipv4_address: 172.20.0.51
    deploy:
      resources:
        limits:
          memory: 512m

  aptl-grafana-otel:
    profiles: ["otel"]
    container_name: aptl-grafana-otel
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APTL_HP_APTL_GRAFANA_OTEL_3000:-3100}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./config/otel/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/tempo.yaml:ro
      - grafana_otel_data:/var/lib/grafana
    networks:
      aptl-security:
        ipv4_address: 172.20.0.52
    deploy:
      resources:
        limits:
          memory: 256m

# ==========================================================================
# NETWORKS
# ==========================================================================

networks:
  # Host-published control-plane proxy network. This network is intentionally
  # not attached to Kali; it exists so loopback-only host publications work on
  # Docker VM backends without adding an egress-capable interface to Kali.
  aptl-control:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.5.0/24

  # Security / Management network - Wazuh, SOC tools
  aptl-security:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

  # DMZ - Public-facing services (web, mail, DNS)
  # SAF-002: internal: true blocks internet egress from containers
  aptl-dmz:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.1.0/24
          gateway: 172.20.1.1  # bridge interface IP; no external routing (internal network)

  # Internal - AD, database, file server, app server
  # SAF-002: internal: true blocks internet egress from containers
  aptl-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24
          gateway: 172.20.2.1  # bridge interface IP; no external routing (internal network)

  # Red team - Kali attack platform
  # SAF-002: internal: true blocks internet egress from containers
  aptl-redteam:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.4.0/24
          gateway: 172.20.4.1  # bridge interface IP; no external routing (internal network)

# ==========================================================================
# VOLUMES
# ==========================================================================

volumes:
  # Wazuh volumes
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:

  # Suricata
  suricata_logs:
  suricata_command_socket:
  # ADR-043: seeded from config/suricata/ at `aptl lab start` (config seed
  # is consumed read-only by the wrapper entrypoint; the MISP rules volume
  # is shared read-write with aptl-misp-suricata-sync). No explicit `name:`
  # — Compose project-scoping derives <project>_<key> so worktrees and
  # custom deployment.project_name values do not collide.
  suricata_config_seed:
  suricata_misp_rules:

  # MISP
  misp_data:
  misp_config:
  misp_db_data:

  # TheHive
  thehive_data:
  thehive_index:
  thehive_cassandra_data:
  thehive_es_data:

  # Shuffle
  shuffle_data:
  shuffle_opensearch_data:

  # Cortex
  cortex_data:

  # Enterprise services
  # fileshare_data/fileshare_logs, dns_logs, webapp_logs, victim_logs,
  # workstation_logs, and kali_operations were removed under #581: those
  # six nodes are realized generically (ADR-048) and no longer write to a
  # Compose-managed volume. db_data stays — wazuh-sidecar-db (still
  # Compose-managed, blocked on aces#845/#847/#849) mounts it read-only,
  # even though the realized db no longer populates it.
  ad_data:
  ad_logs:
  db_data:

  # Mail server
  mailserver_data:
  mailserver_state:
  mailserver_logs:

  # Application volumes
  # kali_logs (was /var/log) removed under ADR-033. Replaced with
  # kali_captures (mounted at /var/log/aptl/captures) so per-session
  # behavioural captures stay inside a docker-managed volume — the
  # kali user cannot escape its current session subdir to read
  # prior runs' MCP-side records, and the MCP server harvests data
  # out via `docker cp` on session close.
  kali_captures:
  reverse_logs:

  # OpenTelemetry
  tempo_data:
  grafana_otel_data:
