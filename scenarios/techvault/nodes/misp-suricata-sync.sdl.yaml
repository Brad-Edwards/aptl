name: techvault-node-misp-suricata-sync
nodes:
  misp-suricata-sync:
    type: vm
    description: 'MISP-to-Suricata IOC synchronization service (compose service misp-suricata-sync, container aptl-misp-suricata-sync,
      custom python:3.11-slim build). Every SYNC_INTERVAL_SECONDS (300) it pulls indicators tagged aptl:enforce from the MISP
      HTTPS API (lab-CA-verified, MISP admin API key fixture), translates them into Suricata alert rules (ADR-019 IDS-only),
      atomically rewrites /var/lib/suricata/rules/misp/misp-iocs.rules on the shared host bind, and triggers a Suricata rule
      reload over the shared unix-command socket. No inbound listener; outbound HTTPS to misp:443 only. Inventoried at experiment
      grade under docs/aces/inventory/misp-suricata-sync/ (SCN-010 issue #349). The realized edges are relationships.misp-suricata-sync-queries-misp-api
      and relationships.misp-suricata-sync-updates-suricata-rules.'
    os: linux
    os_version: Debian GNU/Linux 13 (trixie)
    source:
      name: aptl-misp-suricata-sync
      version: aptl-misp-suricata-sync@sha256:71fc6bcd3af6b6654a566b14139d1aa06b7063b12c0eb282d0d40d49361580fb
      build:
        description: Locally built APTL image (aptl-misp-suricata-sync:latest); not a registry artifact, so source.version
          is the local image config ID (sha256:71fc6bcd3af6b6654a566b14139d1aa06b7063b12c0eb282d0d40d49361580fb, docker image
          inspect .Id) and docker buildx imagetools inspect fails (see capture-limits.txt). The build context is the repo
          root; the Dockerfile (containers/misp-suricata-sync/Dockerfile) COPYs pyproject.toml and the entire src/ tree, then
          pip-installs the aptl package whose aptl-misp-suricata-sync console script is the entrypoint. source_inputs checksums
          cover the packaging metadata and the executed aptl.services.misp_suricata_sync package; the full src/ copy is evidenced
          by the in-image filesystem manifest. Layer sizes are docker history values (BuildKit; base python:3.11-slim rows
          included).
        base_image: python:3.11-slim
        base_image_digest: ''
        dockerfile_path: containers/misp-suricata-sync/Dockerfile
        instructions:
        - instruction: from
          arguments:
          - python:3.11-slim
          description: Base image (Debian 13 trixie slim with CPython 3.11).
        - instruction: run
          arguments:
          - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates git && rm -rf /var/lib/apt/lists/*
          description: OS prerequisites for the pip install (git is purged again afterwards).
        - instruction: workdir
          arguments:
          - /app
          description: ''
        - instruction: copy
          arguments:
          - pyproject.toml
          - /app/
          description: Packaging metadata for the aptl distribution.
        - instruction: copy
          arguments:
          - src
          - /app/src
          description: Entire repo src/ tree (the executed code is the aptl.services.misp_suricata_sync package).
        - instruction: run
          arguments:
          - pip install --no-cache-dir . && apt-get purge -y git && apt-get autoremove -y && apt-get clean && rm -rf /var/lib/apt/lists/*
          description: Installs the aptl package (console script aptl-misp-suricata-sync) and trims git.
        - instruction: entrypoint
          arguments:
          - '["aptl-misp-suricata-sync"]'
          description: Runs the sync service as PID 1 (root per the Dockerfile bind-mount ownership rationale).
