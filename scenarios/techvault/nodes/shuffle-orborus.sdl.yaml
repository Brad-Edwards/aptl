name: techvault-node-shuffle-orborus
nodes:
  shuffle-orborus:
    type: vm
    description: 'TechVault Shuffle SOAR Orborus worker orchestrator (compose service shuffle-orborus, container aptl-shuffle-orborus,
      image ghcr.io/shuffle/shuffle-orborus:latest). Alpine 3.22 running the orborus Go binary, which polls shuffle-backend:5001
      for execution jobs and spawns shuffle-worker containers by driving the HOST Docker daemon through the bind-mounted /var/run/docker.sock
      (read-write) — a host-root-equivalent control surface, encoded as runtime.local_control_interfaces. Inventoried at experiment
      grade under docs/aces/inventory/shuffle-orborus/ (SCN-010 issue #355). security-net (DHCP) only; NO inbound listener,
      no published ports; the realized edge is relationships.orborus-connects-backend.'
