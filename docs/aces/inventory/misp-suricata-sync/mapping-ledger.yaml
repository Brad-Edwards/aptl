  summary: aptl 0.1.0 (pip; console script aptl-misp-suricata-sync) on CPython 3.11.15 are the application components; 62
    pip distributions form the dependency closure.
  evidence:
  - path: evidence/language-manifests.txt
  - path: evidence/runtime-baseline.txt
  aces:
