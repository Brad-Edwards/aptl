name: techvault-node-thehive
nodes:
  thehive:
    type: vm
    description: 'TechVault TheHive SOC case-management application (compose service thehive, container aptl-thehive, image
      strangebee/thehive:5.4). TheHive 5.4.11 (Play/Scala) serving HTTPS on 9000 (published 9000:9000), backed by Cassandra
      (primary data, relationships.thehive-connects-cassandra) and a LOCAL Lucene search index (index.search.backend=lucene,
      the thehive_index volume) — NOT the deployed thehive-es, which it does not use. Inventoried at experiment grade under
      docs/aces/inventory/thehive/ (SCN-010 issue #350). The Play application secret is a committed scenario fixture (the
      --secret container argument, value in docker-compose.yml); the HTTPS keystore password is kInP5SyV3kLmdbLVVMP1wgSQtzkEv2UM.'
