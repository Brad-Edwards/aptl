[program:samba]
command=/usr/sbin/samba -F --no-process-group
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/samba/samba.log
stderr_logfile=/var/log/samba/samba_err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

[program:rsyslog]
command=/usr/sbin/rsyslogd -n
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:wazuh-agent]
; In-process Wazuh agent (issue #248). Replaces wazuh-sidecar-ad.
; The shared bootstrap script registers with the manager on first run, then
; execs `tail -F` on the agent's ossec.log so supervisord can manage
; lifecycle. Env vars come from the container's environment block in
; docker-compose.yml.
command=/opt/aptl/wazuh/wazuh-agent.sh
autostart=true
autorestart=true
startretries=10
startsecs=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=WAZUH_AGENT_TEMPLATE="/opt/aptl/wazuh/ossec.conf.template"
