- id: dns.zone.dynamic-update-transfer
  category: dns-runtime
  summary: Both zones declare allow-update none; localhost AXFR succeeded during capture while wider transfer ACLs were not separately probed.
  evidence:
  - path: evidence/runtime-baseline.txt
  - path: evidence/source-checksums.txt
  aces:
    disposition: encoded_with_caveat
    surface: nodes
    fields:
    - nodes.dns.runtime.dns_services.techvault-bind.dynamic_update
    - nodes.dns.runtime.dns_services.techvault-bind.zones.*.transfer
    rationale: Current ACES SDL has a typed surface for this captured fact; evidence remains provenance, not a substitute for SDL encoding.
    caveat: AXFR was observed from localhost only; this issue did not separately probe non-local clients for allow-transfer behavior.
- id: dns.runtime.logging-relationship
  category: relationships
  summary: The DNS container writes named query/default logs under /var/log/named and runs the shared Wazuh agent configured to collect those paths for the SOC stack.
  evidence:
  - path: evidence/compose-service.dns.json
  - path: evidence/runtime-baseline.txt
  - path: evidence/docker-volume.dns-logs.json
  - path: evidence/source-checksums.txt
  aces:
    disposition: encoded
    surface: relationships
    fields:
    - relationships.dns-forwards-wazuh
    - relationships.dns-forwards-wazuh.forwarding_edge
    - nodes.dns.runtime.forwarding_agents
    - features.dns-wazuh-agent
    - nodes.dns.runtime.dns_services.techvault-bind.log_file_refs
    rationale: >
      ACES PR #458 introduced typed relationship payloads alongside the new
      node-scoped runtime.forwarding_agents family. The dns→wazuh-manager
      relationship now carries a forwarding_edge.forwarder_ref pointing at
      the in-process dns-wazuh-agent (per ADR-020); the legacy
      properties.protocol="syslog-and-wazuh-agent" + log_paths prose is
      retired. The named query/default log_file_refs on the BIND
      dns_services entry continue to anchor the source-log evidence side
      of the relationship.
