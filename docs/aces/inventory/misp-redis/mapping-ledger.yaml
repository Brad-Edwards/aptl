  summary: Software components capture the Redis 7.4.8 server and the gosu 1.17 Go binary tree (gosu, moby/sys/user, golang.org/x/sys, go stdlib 1.18.2).
  evidence:
  - path: evidence/redis-manifest.txt
  - path: evidence/syft-sbom.cyclonedx.json.gz
  aces:
    disposition: encoded
    surface: nodes
    checked_surfaces:
    - nodes
    fields:
    - nodes.techvault.misp-redis.runtime.software_components
    rationale: Current ACES SDL node runtime software_components field carries this catalogued MISP Redis fact directly.
- id: misp-redis.runtime.vulnerability-scan
  category: runtime
  summary: Trivy captured 101 vulnerability findings (4 critical, 46 high, 47 medium, 4 low), dominated by the gosu go1.18.2 stdlib, plus severity counts.
  evidence:
  - path: evidence/trivy-vulnerabilities.json.gz
  - path: evidence/trivy-vulnerability-list.json
  - path: evidence/trivy-vulnerability-counts.json
