name: techvault-node-reverse
nodes:
  reverse:
    type: vm
    description: 'TechVault reverse-engineering workbench (compose service reverse, container aptl-reverse, profile reverse,
      image aptl-reverse:local). Ubuntu 22.04 systemd container running sshd (published to the host as 2027->22), rsyslog,
      an in-process Wazuh agent and Falco, and a first-boot-installed malware-analysis toolchain (radare2, YARA, UPX, osslsigncode,
      OpenJDK 17, and pipx-installed flare-floss + flare-capa). Inventoried at experiment grade under docs/aces/inventory/reverse/
      (SCN-010 issue #338). Family: target. Both log-forwarding paths (Wazuh agent + rsyslog) are encoded as node-level forwarding_agents;
      the realized wazuh edge is relationships.reverse-forwards-wazuh.'
    source:
      name: aptl-reverse
      version: aptl-reverse@sha256:37f8911050ec6224e435665152d07fd51ce2fb82d476c6d1798dbe4fa1af2f13
      build:
        base_image: ubuntu:22.04
        base_image_digest: ''
        dockerfile_path: containers/reverse/Dockerfile
        instructions:
        - instruction: from
          arguments:
          - ubuntu:22.04
          description: ''
        - instruction: env
          arguments:
          - DEBIAN_FRONTEND=noninteractive
          description: ''
        - instruction: run
          arguments:
          - apt-get update && apt-get install -y rsyslog openssh-server sudo systemd systemd-sysv iproute2 hostname procps
            openssh-client net-tools gnupg curl wget ca-certificates && apt-get clean && rm -rf /var/lib/apt/lists/*
          description: ''
        - instruction: run
          arguments:
          - (cd /lib/systemd/system/sysinit.target.wants/; for i in *; do [ $i == systemd-tmpfiles-setup.service ] || rm -f
            $i; done); rm -f /lib/systemd/system/multi-user.target.wants/*; rm -f /etc/systemd/system/*.wants/*; rm -f /lib/systemd/system/local-fs.target.wants/*;
            rm -f /lib/systemd/system/sockets.target.wants/*udev*; rm -f /lib/systemd/system/sockets.target.wants/*initctl*;
            rm -f /lib/systemd/system/basic.target.wants/*; rm -f /lib/systemd/system/anaconda.target.wants/*;
          description: ''
        - instruction: run
          arguments:
          - systemctl set-default multi-user.target
          description: ''
        - instruction: run
          arguments:
          - systemctl enable rsyslog ssh systemd-user-sessions && systemctl enable systemd-user-sessions.service && ln -sf
            /usr/lib/systemd/system/systemd-user-sessions.service /etc/systemd/system/multi-user.target.wants/
          description: ''
        - instruction: run
          arguments:
          - mkdir /var/run/sshd && ssh-keygen -A && sed -i 's/#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
            && sed -i 's/#PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config && sed -i 's/#PubkeyAuthentication.*/PubkeyAuthentication
            yes/' /etc/ssh/sshd_config
          description: ''
        - instruction: run
          arguments:
          - useradd -m -s /bin/bash labadmin && usermod -aG sudo labadmin && echo "labadmin ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/labadmin
            && chmod 440 /etc/sudoers.d/labadmin
          description: ''
        - instruction: run
          arguments:
          - mkdir -p /home/labadmin/.ssh && chmod 700 /home/labadmin/.ssh && chown -R labadmin:labadmin /home/labadmin/.ssh
          description: ''
        - instruction: run
          arguments:
          - mkdir -p /opt/purple-team/scripts /etc/rsyslog.d
          description: ''
        - instruction: copy
          arguments:
          - base/scripts/entrypoint-base.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/entrypoint-base.sh
          description: ''
        - instruction: copy
          arguments:
          - base/scripts/ossec.conf.template /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - mkdir -p /etc/falco/config.d
          description: ''
        - instruction: copy
          arguments:
          - base/falco_custom.yaml /etc/falco/config.d/
          description: ''
        - instruction: copy
          arguments:
          - reverse/entrypoint.sh /usr/local/bin/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /usr/local/bin/entrypoint.sh
          description: ''
        - instruction: copy
          arguments:
          - reverse/install-wazuh.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/install-wazuh.sh
          description: ''
        - instruction: copy
          arguments:
          - reverse/install-falco.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/install-falco.sh
          description: ''
        - instruction: copy
          arguments:
          - reverse/install-all.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/install-all.sh
          description: ''
        - instruction: copy
          arguments:
          - reverse/setup-reverse-tools.sh /opt/purple-team/scripts/
          description: ''
        - instruction: run
          arguments:
          - chmod +x /opt/purple-team/scripts/setup-reverse-tools.sh
          description: ''
        - instruction: copy
          arguments:
          - reverse/reverse-tools-install.service /etc/systemd/system/
          description: ''
        - instruction: run
          arguments:
          - systemctl enable reverse-tools-install.service
          description: ''
        - instruction: expose
          arguments:
          - 22 514
          description: ''
        - instruction: volume
          arguments:
          - '["/var/log", "/home"]'
          description: ''
        - instruction: entrypoint
          arguments:
          - '["/usr/local/bin/entrypoint.sh"]'
          description: ''
        - instruction: cmd
          arguments:
          - '["/usr/sbin/init"]'
          description: ''
