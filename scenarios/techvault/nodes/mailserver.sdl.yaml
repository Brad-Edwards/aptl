      identity_authorities: []
      file_services: []
      mail_services:
      - mail_service_id: techvault-mail
        service: smtp
        engine: docker-mailserver
        version: v15.1.0
        name: TechVault mail service
        description: 'Provider-neutral runtime mail-service inventory for the docker-mailserver container; observed at SCN-010
          issue #335 snapshot.'
        components:
        - component_id: postfix
          kind: mta
          name: Postfix
          version: 3.7.11
          description: ''
        - component_id: dovecot
          kind: imap_server
          name: Dovecot
          version: 2.3.19.1
          description: ''
        - component_id: amavis
          kind: spam_filter
          name: amavisd-new
          version: 2.13.0
          description: ''
        - component_id: opendkim
          kind: policy_service
          name: OpenDKIM
          version: 2.11.0
          description: ''
        - component_id: opendmarc
          kind: policy_service
          name: OpenDMARC
          version: 1.4.2
          description: ''
        listeners:
        - listener_id: smtp-25
          service: smtp
          protocol: esmtp
          role: inbound_mx
          component_ref: postfix
          banner: 220 mail.techvault.local ESMTP
          advertised_identity: mail.techvault.local
          capabilities:
          - PIPELINING
          - SIZE 10240000
          - ETRN
          - ENHANCEDSTATUSCODES
          - 8BITMIME
          - CHUNKING
          auth_mechanisms:
          - none
          tls_mode: none
          tls_versions: []
          description: Participant probe from aptl-kali reached TCP/25 and EHLO did not advertise STARTTLS or AUTH.
        - listener_id: submission-587
          service: submission
          protocol: submission
          role: submission
          component_ref: postfix
          banner: 220 mail.techvault.local ESMTP
          advertised_identity: mail.techvault.local
          capabilities:
          - PIPELINING
          - SIZE 10240000
          - ETRN
          - AUTH PLAIN LOGIN
          - AUTH=PLAIN LOGIN
          - ENHANCEDSTATUSCODES
          - 8BITMIME
          - DSN
          - CHUNKING
          auth_mechanisms:
          - plain
          - login
          tls_mode: none
          tls_versions: []
          description: Participant probe reached TCP/587 and observed plaintext AUTH advertisement; startup logs warn SSL
            is configured with plain text access.
        - listener_id: smtp-465-plaintext
          service: smtps
          protocol: smtp
          role: submission
          component_ref: postfix
          banner: ''
          advertised_identity: ''
          capabilities: []
          auth_mechanisms:
          - plain
          - login
          tls_mode: none
          tls_versions: []
          description: TCP/465 was reachable from aptl-kali, but an implicit TLS probe failed with wrong version number; this
            is recorded as a plaintext SMTP-family listener on the smtps-named service, not as working implicit TLS.
        - listener_id: imap-143
          service: imap
          protocol: imap
          role: mail_access
          component_ref: dovecot
          banner: Dovecot (Debian) ready.
          advertised_identity: mail.techvault.local
          capabilities:
          - IMAP4rev1
          - SASL-IR
          - LOGIN-REFERRALS
          - ID
          - ENABLE
          - IDLE
          - LITERAL+
          - AUTH=PLAIN
          - AUTH=LOGIN
          auth_mechanisms:
          - plain
          - login
          tls_mode: none
          tls_versions: []
          description: Participant probe reached TCP/143 and listed pre-login Dovecot capabilities; 993/tcp was refused at
            capture time.
        domains:
        - domain_id: techvault-domain
          name: techvault.local
          role: local_delivery
          description: ''
        mailbox_stores:
        - store_id: techvault-maildir
          kind: maildir
          path: /var/mail/techvault.local
          description: ONE_DIR=1 Maildir backing for local techvault.local mailboxes.
        mailboxes:
        - mailbox_id: sarah-mitchell
          address: sarah.mitchell@techvault.local
          local_part: sarah.mitchell
          domain_ref: techvault-domain
          role: user
          status: enabled
          auth_mechanisms:
