name: techvault-node-kali
nodes:
  kali:
    type: vm
    description: TechVault kali red-team attacker container (SCN-010 steady-state ACES inventory).
    source:
      name: aptl-kali
      version: aptl-kali@sha256:fee0813b38264c78fab66c86167595715803a6fd9152bf6c0af8e6835d368462
      build:
        base_image: kalilinux/kali-last-release:latest
        base_image_digest: ''
        dockerfile_path: containers/kali/Dockerfile
        instructions:
        - instruction: from
          arguments:
          - kalilinux/kali-last-release:latest
          description: ''
        - instruction: env
          arguments:
          - DEBIAN_FRONTEND=noninteractive
          description: ''
        - instruction: env
          arguments:
          - TZ=UTC
          description: ''
        - instruction: run
          arguments:
          - apt-get update &&  apt-get install -y kali-archive-keyring &&  apt-get update &&  apt-get upgrade -y -o Dpkg::Options::="--force-confdef"
            -o Dpkg::Options::="--force-confold" &&  apt-get install -y  kali-linux-core  kali-tools-top10  openssh-server  iputils-ping
          description: ''
        - instruction: run
          arguments:
          - apt-get update &&  apt-get install -y --no-install-recommends  python3-impacket impacket-scripts  ldap-utils  smbclient  smbmap  enum4linux  bloodhound.py
            &&  apt-get clean && rm -rf /var/lib/apt/lists/*
          description: ''
        - instruction: run
          arguments:
          - useradd -m -s /bin/bash -G sudo kali &&  echo 'kali:kali' | chpasswd &&  echo 'kali ALL=(ALL) NOPASSWD:ALL' >>
            /etc/sudoers
          description: ''
        - instruction: run
          arguments:
          - 'mkdir -p /var/run/sshd &&  sed -i ''s/#PermitRootLogin prohibit-password/PermitRootLogin no/'' /etc/ssh/sshd_config
            &&  sed -i ''s/#PasswordAuthentication yes/PasswordAuthentication no/'' /etc/ssh/sshd_config &&  sed -i ''s/#PubkeyAuthentication
            yes/PubkeyAuthentication yes/'' /etc/ssh/sshd_config &&  sed -i ''s/#AuthorizedKeysFile/AuthorizedKeysFile/''
            /etc/ssh/sshd_config &&  echo ''AllowUsers kali'' >> /etc/ssh/sshd_config &&  echo '''' >> /etc/ssh/sshd_config
            &&  echo ''# OBS-003 / ADR-033: per-session capture wiring'' >> /etc/ssh/sshd_config &&  echo ''AcceptEnv APTL_SESSION_ID
            APTL_RUN_ID APTL_TRACE_ID'' >> /etc/ssh/sshd_config &&  echo ''Match User kali'' >> /etc/ssh/sshd_config &&  echo
            ''    ForceCommand /usr/local/bin/aptl-wrap-shell.sh'' >> /etc/ssh/sshd_config'
          description: ''
        - instruction: run
          arguments:
          - mkdir -p /home/kali/operations &&  chown -R kali:kali /home/kali/operations &&  mkdir -p /home/kali/.msf4 &&  mkdir
            -p /home/kali/.john &&  mkdir -p /home/kali/.hashcat &&  chown -R kali:kali /home/kali/.msf4 /home/kali/.john
            /home/kali/.hashcat &&
          description: ''
        - instruction: run
          arguments:
          - apt-get update &&  apt-get install -y ca-certificates curl gnupg &&  mkdir -p /etc/apt/keyrings &&  curl -fsSL
            https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
            &&  echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main"
            > /etc/apt/sources.list.d/nodesource.list &&  apt-get update &&  apt-get install -y nodejs &&  apt-get clean &&
            rm -rf /var/lib/apt/lists/*
          description: ''
        - instruction: run
          arguments:
          - sudo -u kali ssh-keygen -t rsa -b 2048 -f /home/kali/.ssh/id_rsa -N "" &&  chown -R kali:kali /home/kali/.ssh/
          description: ''
        - instruction: copy
          arguments:
          - --chown=kali:kali scripts/ /home/kali/
          description: ''
        - instruction: run
          arguments:
          - install -m 0755 /home/kali/aptl-wrap-shell.sh /usr/local/bin/aptl-wrap-shell.sh &&  rm -f /home/kali/aptl-wrap-shell.sh
            &&  setcap cap_net_raw,cap_net_admin+eip /usr/bin/tcpdump
          description: ''
        - instruction: copy
          arguments:
          - audit/aptl.rules /etc/audit/rules.d/aptl.rules
          description: ''
        - instruction: run
          arguments:
          - chmod 0640 /etc/audit/rules.d/aptl.rules &&  chown root:root /etc/audit/rules.d/aptl.rules
          description: ''
        - instruction: copy
          arguments:
          - entrypoint.sh /entrypoint.sh
          description: ''
        - instruction: run
          arguments:
          - chmod +x /entrypoint.sh
          description: ''
        - instruction: copy
          arguments:
          - healthcheck.sh /usr/local/bin/aptl-healthcheck.sh
          description: ''
        - instruction: run
          arguments:
          - chmod 0755 /usr/local/bin/aptl-healthcheck.sh &&  chown root:root /usr/local/bin/aptl-healthcheck.sh
          description: ''
        - instruction: expose
          arguments:
          - '22'
          description: ''
        - instruction: user
          arguments:
          - kali
          description: ''
        - instruction: workdir
          arguments:
          - /home/kali
          description: ''
        - instruction: run
          arguments:
          - echo 'export PATH="$PATH:/usr/local/bin"' >> ~/.bashrc
          description: ''
        - instruction: user
          arguments:
          - root
          description: ''
        - instruction: entrypoint
          arguments:
          - /entrypoint.sh
          description: ''
