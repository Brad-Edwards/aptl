[tool.towncrier]
# Project name shown in any default templates. The custom Markdown
# template writes the release title, so this is mostly informational.
name = "aptl"

# CHANGELOG.md lives at the repo root and follows Keep a Changelog.
filename = "CHANGELOG.md"

# Where fragment files live. Each PR creates a new file, so fragments do
# not conflict between PRs.
directory = "changelog.d"

# Custom Markdown template that produces:
# "## [X.Y.Z] - YYYY-MM-DD\n\n### Section\n\n- bullet".
template = "changelog.d/_template.md.jinja"

# Suppress towncrier's default title rendering; the template writes it.
title_format = false

# New release blocks are inserted just below this marker. Everything below
# the marker is preserved as historical hand-written changelog content
# until release collation moves fragments into it.
start_string = "<!-- towncrier release notes start -->\n"

# Append "(#NNN)" to each bullet using the fragment filename's leading
# integer. Prefix no-issue fragments with "+" to suppress the suffix, for
# example +typo-fix.fixed.md.
issue_format = "(#{issue})"

# 0/false means no wrapping; fragments are hand-formatted Markdown.
wrap = false

# Single-section changelog: do not split by package or component.
all_bullets = true

# Fragment types map to Keep a Changelog sections. The order here is the
# order they appear under each release heading.
[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "added"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "changed"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecated"
name = "Deprecated"
showcontent = true

[[tool.towncrier.type]]
directory = "removed"
name = "Removed"
showcontent = true

[[tool.towncrier.type]]
directory = "fixed"
name = "Fixed"
showcontent = true
